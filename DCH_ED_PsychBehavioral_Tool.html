<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acute Psych / Behavioral — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useEffect}=React;
const C={primary:"#475569",pLight:"#f8fafc",pBorder:"#cbd5e1",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};
const TEACH={
overview:{title:"Pathway Rationale — Acute Psychiatric/Behavioral",patho:"Pediatric psychiatric emergencies are increasing — ED visits for mental health doubled between 2010-2016 (Hoffmann, Acad Pediatr 2019). Common presentations include intentional ingestion, self-harm/cutting, suicidal ideation/attempt, drug or alcohol use, psychotic behavior, and acute agitation. The pathway provides a structured framework for safety assessment, risk stratification, legal consent/holds, and agitation medication management.\n\nThis pathway explicitly excludes underlying autism spectrum disorder, developmental delay, and neurological disorders as primary presentations — these require different management approaches. However, psychiatric emergencies CAN occur in patients with these conditions.",pearls:"Core ED goals: (1) Determine patient stability and safety, (2) Identify potentially violent patients, (3) Coordinate care with Child Psychiatry, Social Work, and DHS as needed.\n\nImmediate on arrival: ESI II, notify Charge RN + Attending + Social Worker + DPS. Complete age-appropriate suicide risk screen. Search and secure belongings — remove all unsafe items, securely lock medications, change to paper scrubs. Initiate multidisciplinary huddle (RN, LIP, Public Safety, SW).\n\nKey principle: pediatric behavioral patients are generally NOT admitted to DCH inpatient — they are held in the ED. All psychiatric inpatient transfers require EMTALA paperwork.",evidence:"BEST Practices consensus statement for agitated children/adolescents in the ED (Gerson, West J Emerg Med 2019). AAP/ACEP guidelines for evaluation and management of acute mental health/behavioral problems (Chun, Pediatrics 2016). (OHSU DCH ED Pathway July 2021)"},
screening:{title:"Suicide Risk Screening — ASQ & Columbia",pearls:"Age-appropriate screening on arrival:\n• Ages 10–17: ASQ (Ask Suicide-Screening Questions) — validated pediatric tool\n• Ages ≥18: Depression Screen (PHQ-2). If score >3 → complete Columbia Scale Severity Risk Screen\n• Age <10 or developmentally <10: screening deferred (document as appropriate)\n\nASQ Acute Positive (HIGH risk) → 1:1 PSA (Patient Safety Attendant) to bedside immediately\nASQ Non-acute Positive (moderate-low risk) → PSA or CVM (Continuous Video Monitoring) options\n\nRe-evaluate sitter need every 4 hours. Complete Behavioral Health Initial/Shift Assessment with safety measures."},
legal:{title:"Legal Framework — Consent, NMI, DHS",patho:"The legal framework for holding minors for psychiatric evaluation is distinct from adult psychiatric holds. Minors are referred to as undergoing 'Behavioral Assessments' — the term 'hold' applies to adults. There are four scenarios based on patient safety and guardian cooperation:\n\n1. Not in immediate danger, cooperative → assess and coordinate\n2. Not safe to leave + guardian agrees → Complete 'Notice of and Consent for Behavioral Health Assessment of Minors' (CO-4792)\n3. Not safe to leave + guardian NOT in agreement or unaccompanied → Complete Notice of Mental Illness (NMI), fax to county court, notify DHS\n4. Young adult ≥18 + imminent danger → NMI as in scenario 3",pearls:"Parent/guardian may rescind permission at any time. If LIP determines minor remains dangerous → notify DHS for ongoing permission + complete NMI until DHS takes custody.\n\nNMIs are valid for 72 hours or until court assessor evaluates. NMI cannot be discontinued — must have hold withdrawal paperwork completed, scanned, and faxed to court.\n\nIf minor is already a ward of the state → Oregon Youth Authority (parole officer) can sign behavioral consent.\n\n2-physician hold can be used while waiting for parents/guardians or state paperwork — this is documented in the medical record but NOT sent to court (unlike adults)."},
agitation:{title:"Behavioral Agitation Medication Pathway",pearls:"MILD (pacing, overly moody/irritable): behavioral redirection first. Refer to patient-specific COPE plan if available. Consider lorazepam 0.025–0.05 mg/kg PO Q6h PRN (max 2 mg/dose).\n\nMODERATE (non-redirectable, mildly impulsive): review de-escalation. Remove external stimulation. Limited seclusion room use as time-out. Consider olanzapine ODT: 2.5 mg (children), 5 mg (adolescents), 10 mg (>16 yr) PO Q2h PRN (max 20 mg/day). Alternative: risperidone M-Tab 0.25–0.5 mg (children), 0.5–1 mg (adolescents) BID PRN (max 2 mg/day).\n\nSEVERE (threatening, attempting property damage, physically threatening): Code Green if indicated. Remove stimuli, evaluate sitter, consider seclusion → restraints (least restrictive means). IM olanzapine: 5 mg (children), 10 mg (adolescents) Q1h PRN (max 25 mg/day). DO NOT give IM olanzapine with IM/IV lorazepam (respiratory depression risk). Alternative: ziprasidone IM 2.5–5 mg (children), 5–10 mg (adolescents), 10–20 mg (>16 yr) Q2h PRN (max 40 mg/day).\n\nIf initial treatment fails after 2–4 hours: repeat same med if partially effective, try different med if ineffective, add lorazepam if antipsychotic alone failed (except olanzapine combination)."},
medClearance:{title:"Medical Clearance & Rule-Outs",pearls:"Rule out medical causes of agitation before attributing to psychiatric etiology:\n• Hyper- or hypoglycemia (bedside CBG on all patients)\n• Electrolyte disturbance\n• Renal or hepatic failure\n• Thyroid or adrenal disorders\n• Hypotension, heart failure\n• Neurologic disorders (stroke, seizure)\n• Meningitis/infection\n• Substance intoxication or withdrawal\n• Medication-induced (steroids, anticholinergics, barbiturates, amphetamines, antipsychotic-induced akathisia)\n\nLabs PRN for medical clearance: CBC, CMP, acetaminophen, ASA, ETOH, TSH, UDS, uHCG. EKG for all suspected overdoses. COVID swab."},
disposition:{title:"Disposition",pearls:"Pediatric behavioral patients are generally NOT admitted to DCH — they are held in the ED pending Child Psychiatry evaluation and disposition.\n\nPICU: if concurrent medical emergency requiring ICU-level care.\nED observation: most patients remain in ED for behavioral assessment, with interdisciplinary huddle at least once per shift.\nTransfer: all psychiatric inpatient transfers require EMTALA paperwork. Consult Child Psychiatry for disposition planning.\n\nSeclusion/restraint documentation is age-dependent: <9yr → renew every 1 hour with face-to-face; 9–17yr → renew every 2 hours; ≥18yr → renew every 4 hours. Patient checked Q15 min with 1:1 close observation for the first hour of seclusion."}
};

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,lorazPO_lo:Math.round(wt*0.025*100)/100,lorazPO_hi:Math.min(Math.round(wt*0.05*10)/10,2),lorazIM_lo:Math.round(wt*0.05*10)/10,lorazIM_hi:Math.min(Math.round(wt*0.1*10)/10,2),midazIM:Math.min(Math.round(wt*0.1*10)/10,5),midazIV:Math.min(Math.round(wt*0.1*10)/10,5)};}
function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Acute Psych / Behavioral</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · July 2021</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function DoseRow({label,value,unit}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit||""}</span></div>)}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}
function TeachBox({id,teaching}){var s=useState("pearls"),tab=s[0],setTab=s[1];if(!teaching||!TEACH[id])return null;var t=TEACH[id];var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>{tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}</div><div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeKey]||""}</div></div>);}

function Wizard({teaching,doses}){
  var s1=useState(null),riskLevel=s1[0],setRiskLevel=s1[1];
  var s2=useState(null),safetyStatus=s2[0],setSafetyStatus=s2[1];
  var s3=useState(null),agitation=s3[0],setAgitation=s3[1];
  function reset(){setRiskLevel(null);setSafetyStatus(null);setAgitation(null);}
  return(<Pad>
    <Q text="Acute Psych/Behavioral Walk-Through" sub="Safety assessment · Risk screening · Legal framework · Agitation management"/>
    <TeachBox id="overview" teaching={teaching}/>
    <Card title="Step 1 — Immediate Safety Actions" color={C.red}>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔒" title="On Arrival — Safety First">
        <strong>1.</strong> ESI Triage Level II<br/>
        <strong>2.</strong> Notify: Charge RN, Attending, Social Worker, DPS (Public Safety)<br/>
        <strong>3.</strong> Search and secure belongings — remove ALL unsafe items<br/>
        <strong>4.</strong> Securely lock all medications (DO NOT leave meds in patient room)<br/>
        <strong>5.</strong> Change patient into paper scrubs or hospital attire<br/>
        <strong>6.</strong> Document legal decision maker<br/>
        <strong>7.</strong> Provide family with All About Me Poster and Welcome Packet<br/>
        <strong>8.</strong> NPO status if ingestion suspected
      </Alert>
    </Card>
    <Card title="Step 2 — Suicide Risk Screening" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Complete age-appropriate screening:</div>
      <WizBtn label="ASQ Acute Positive — HIGH Risk (ages 10–17)" sub="1:1 PSA to bedside immediately · Consent or NMI required" color={C.red} bg={C.redBg} border={C.redBorder} selected={riskLevel==="high"} onClick={function(){setRiskLevel("high")}}/>
      <WizBtn label="ASQ Non-Acute Positive — Moderate/Low Risk" sub="PSA or CVM options · Continue reassessing" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={riskLevel==="moderate"} onClick={function(){setRiskLevel("moderate")}}/>
      <WizBtn label="Not at imminent risk — cooperative" sub="Assess and coordinate care" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={riskLevel==="low"} onClick={function(){setRiskLevel("low")}}/>
      <div style={{fontSize:12,color:C.muted,marginTop:4}}>Ages ≥18: use PHQ-2. If score {'>'}3 → Columbia Scale. Age {"<"}10 or developmentally {"<"}10 → screening deferred.</div>
      <TeachBox id="screening" teaching={teaching}/>
    </Card>

    {riskLevel!==null&&<Card title="Step 3 — Safety Status & Legal Framework" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Determine patient safety and guardian cooperation:</div>
      <WizBtn label="Safe with guardian cooperation" sub="Not in immediate danger · Guardian present and cooperative" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={safetyStatus==="safe"} onClick={function(){setSafetyStatus("safe")}}/>
      <WizBtn label="Not safe to leave — guardian AGREES to behavioral assessment" sub="Complete Consent for Behavioral Health Assessment (CO-4792)" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={safetyStatus==="consent"} onClick={function(){setSafetyStatus("consent")}}/>
      <WizBtn label="Not safe to leave — guardian NOT in agreement or absent" sub="Complete NMI · Fax to county court · Notify DHS" color={C.red} bg={C.redBg} border={C.redBorder} selected={safetyStatus==="nmi"} onClick={function(){setSafetyStatus("nmi")}}/>
      <WizBtn label="Young adult ≥18 — imminent danger to self/others" sub="Complete NMI · Fax to county court" color={C.red} bg={C.redBg} border={C.redBorder} selected={safetyStatus==="adult"} onClick={function(){setSafetyStatus("adult")}}/>
      {safetyStatus==="consent"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="📋" title="Consent for Behavioral Assessment">Complete Notice of and Consent for Behavioral Health Assessment of Minors (CO-4792). Notify Public Safety of patient placement. Search/secure belongings. Consult Peds Mental Health SW (0830-1700) or ED SW after hours. Consult Child Psychiatry.</Alert>}
      {safetyStatus==="nmi"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📋" title="NMI — Notice of Mental Illness">Complete NMI paperwork and fax to county of residence court. Notify DHS to report situation and begin establishing custody. Notify Public Safety. Consult Peds Mental Health SW + Child Psychiatry. NMI valid for 72 hours or until court assessor evaluates.</Alert>}
      {safetyStatus==="adult"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📋" title="Adult NMI">Complete NMI as above for patient ≥18 in imminent danger. Consult Child Psychiatry. Notify Public Safety.</Alert>}
      <TeachBox id="legal" teaching={teaching}/>
    </Card>}

    {riskLevel!==null&&<Card title="Step 4 — Agitation Management" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>What is the current agitation level?</div>
      <WizBtn label="Mild — Pacing, moody, irritable" sub="Behavioral redirection · COPE plan if available" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={agitation==="mild"} onClick={function(){setAgitation("mild")}}/>
      <WizBtn label="Moderate — Non-redirectable, mildly impulsive" sub="De-escalation · Remove stimuli · PO olanzapine or risperidone" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={agitation==="moderate"} onClick={function(){setAgitation("moderate")}}/>
      <WizBtn label="Severe — Threatening, destructive, physically aggressive" sub="Code Green · Seclusion → restraints · IM olanzapine or ziprasidone" color={C.red} bg={C.redBg} border={C.redBorder} selected={agitation==="severe"} onClick={function(){setAgitation("severe")}}/>
      {agitation==="mild"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="💊" title="Mild Agitation">Behavioral redirection first. Refer to patient-specific COPE plan. If medication needed:<br/>Lorazepam {doses?doses.lorazPO_lo+"–"+doses.lorazPO_hi+" mg":"0.025–0.05 mg/kg"} PO Q6h PRN (max 2 mg/dose)</Alert>}
      {agitation==="moderate"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="💊" title="Moderate Agitation">Review/revise de-escalation. Remove external stimulation (video games, limit TV, may include limiting visitors). Consider limited seclusion room use as time-out.<br/><br/>Olanzapine ODT: 2.5 mg (children) · 5 mg (adolescents) · 10 mg ({'>'}16yr) PO Q2h PRN (max 20 mg/day)<br/>Alternative: Risperidone M-Tab 0.25–0.5 mg (children) · 0.5–1 mg (adolescents) BID PRN (max 2 mg/day)</Alert>}
      {agitation==="severe"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="💊" title="Severe Agitation">Call Code Green if indicated. Remove all stimuli. Evaluate sitter. Consider seclusion → restraints (least restrictive means). Complete significant event form.<br/><br/>IM Olanzapine: 5 mg (children) · 10 mg (adolescents) Q1h PRN (max 25 mg/day)<br/><strong style={{color:C.red}}>DO NOT give IM olanzapine with IM/IV lorazepam — respiratory depression risk</strong><br/>Alternative: Ziprasidone IM 2.5–5 mg (children) · 5–10 mg (adolescents) · 10–20 mg ({'>'}16yr) Q2h PRN (max 40 mg/day)</Alert>}
      <TeachBox id="agitation" teaching={teaching}/>
    </Card>}

    <Card title="Medical Clearance" color={C.blue} defaultOpen={false}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Rule out medical causes: bedside CBG, electrolytes, substance intoxication/withdrawal, medication causes (akathisia), neurologic, infectious. EKG for all suspected overdoses.<br/>Labs PRN: CBC, CMP, acetaminophen, ASA, ETOH, TSH, UDS, uHCG. COVID swab.</div>
      <TeachBox id="medClearance" teaching={teaching}/>
    </Card>

    {riskLevel!==null&&<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>}
  </Pad>);
}

function RefTriage({teaching}){return(<Pad><Q text="Triage & Safety" sub="Acute psychiatric or behavioral complaint · Safety assessment · Risk screening"/><TeachBox id="overview" teaching={teaching}/><Card title="Inclusion / Exclusion" color={C.primary}><div style={{marginTop:8}}><Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Minor presenting with new or acute behavioral or psychiatric complaint: intentional ingestion, self-harm/cutting, drug/alcohol use, psychotic behavior, suicidal ideation/attempt.</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Underlying autism spectrum disorder, developmental delay, or neurological disorder as primary presentation.</Alert></div></Card><Card title="Initiate on Arrival" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}><strong>ESI II</strong> · Full vitals as soon as safely possible<br/>Notify Charge RN, Attending, Social Worker, DPS<br/>Complete age-appropriate suicide risk screen (ASQ 10–17yr, PHQ-2/Columbia ≥18yr)<br/>Search/secure belongings · Remove unsafe items · Lock medications · Paper scrubs<br/>Determine observation level (1:1 PSA for high-risk, PSA/CVM for moderate)<br/>Document legal decision maker · Provide family Welcome Packet</div></Card><Card title="Suicide Screening Tools" color={C.red}><div style={{marginTop:8}}><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>ASQ Acute Positive (HIGH Risk) → 1:1 PSA</div></div><div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>ASQ Non-Acute Positive (Moderate-Low) → PSA or CVM</div></div><div style={{fontSize:12,color:C.muted,marginTop:4}}>Re-evaluate sitter need Q4h. Complete BH Initial/Shift Assessment.</div></div><TeachBox id="screening" teaching={teaching}/></Card></Pad>)}
function RefDecisions({teaching}){return(<Pad><Q text="Legal Framework & Safety"/><Card title="Four Scenarios" color={C.primary}><div style={{marginTop:8}}>{[{n:"1",title:"Not in immediate danger",desc:"Cooperative · Guardian present → Assess and coordinate",c:C.greenMid,bg:C.greenBg,bd:C.greenBorder},{n:"2",title:"Not safe to leave — guardian agrees",desc:"Complete Consent for BH Assessment (CO-4792) · Consult Child Psych",c:C.amberMid,bg:C.amberBg,bd:C.amberBorder},{n:"3",title:"Not safe to leave — guardian absent/disagrees",desc:"NMI → fax to county court · Notify DHS · Consult Child Psych",c:C.red,bg:C.redBg,bd:C.redBorder},{n:"4",title:"Young adult ≥18 — imminent danger",desc:"NMI → fax to county court · Consult Child Psych",c:C.red,bg:C.redBg,bd:C.redBorder}].map(function(s){return <div key={s.n} style={{background:s.bg,border:"1.5px solid "+s.bd,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:s.c}}>{s.n}. {s.title}</div><div style={{fontSize:12,marginTop:2}}>{s.desc}</div></div>})}</div><TeachBox id="legal" teaching={teaching}/></Card><Card title="Seclusion / Restraint Renewal" color={C.muted} defaultOpen={false}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>{"<"}9yr: renew Q1h with face-to-face<br/>9–17yr: renew Q2h<br/>≥18yr: renew Q4h<br/>RN documentation Q1h ({"<"}9yr) or Q2h (≥9yr). Check Q15 min. 1:1 close observation first hour.</div></Card></Pad>)}
function RefMeds({teaching,doses}){return(<Pad><Q text="Agitation Medications" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/><Card title="Mild Agitation" color={C.greenMid}><div style={{marginTop:8}}><DoseRow label="Lorazepam PO (0.025–0.05 mg/kg Q6h, max 2mg)" value={doses?doses.lorazPO_lo+"–"+doses.lorazPO_hi:"—"} unit={doses?"mg":""}/></div></Card><Card title="Moderate Agitation" color={C.amberMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Olanzapine ODT: 2.5 mg (children) · 5 mg (adolescents) · 10 mg ({'>'}16yr) PO Q2h PRN (max 20 mg/day)<br/>Alternative: Risperidone M-Tab 0.25–0.5 mg (children) · 0.5–1 mg (adolescents) BID PRN (max 2 mg/day)</div></Card><Card title="Severe Agitation" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>IM Olanzapine: 5 mg (children) · 10 mg (adolescents) Q1h PRN (max 25 mg/day)<br/><span style={{color:C.red,fontWeight:600}}>DO NOT combine IM olanzapine with IM/IV lorazepam</span><br/>Alternative: Ziprasidone IM 2.5–5 mg (children) · 5–10 mg (adolescents) · 10–20 mg ({'>'}16yr) Q2h (max 40 mg/day)</div></Card><Card title="PRN Sedation Reference" color={C.muted} defaultOpen={false}><div style={{marginTop:8}}><DoseRow label="Lorazepam IM (0.05–0.1 mg/kg, max 2mg)" value={doses?doses.lorazIM_lo+"–"+doses.lorazIM_hi:"—"} unit={doses?"mg":""}/><DoseRow label="Midazolam IM (0.05–0.1 mg/kg, max 5mg)" value={doses?doses.midazIM:"—"} unit={doses?"mg":""}/><DoseRow label="Midazolam IV (0.05–0.1 mg/kg, max 5mg)" value={doses?doses.midazIV:"—"} unit={doses?"mg":""}/><div style={{fontSize:12,color:C.muted,marginTop:6}}>After IM agents: monitor vitals and clinical status at regular intervals. Allow adequate time between doses. Use lower starting doses in children.</div></div></Card><TeachBox id="agitation" teaching={teaching}/></Pad>)}
function RefDispo({teaching}){return(<Pad><Q text="Disposition & References"/><Card title="Disposition" color={C.primary}><div style={{marginTop:8}}><Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🏥" title="ED Observation (Most Patients)">Pediatric behavioral patients are generally NOT admitted to DCH — held in ED pending Child Psychiatry evaluation. Interdisciplinary huddle daily + PRN each shift.</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📋" title="Psychiatric Transfer">All psychiatric inpatient transfers require EMTALA paperwork. Use .EDRNEMTALA dot phrase.</Alert></div><TeachBox id="disposition" teaching={teaching}/></Card><Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>OHSU DCH ED Acute Psychiatric/Behavioral Clinical Pathway, July 2021<br/>Gerson R et al. BETA: Best Practices for Evaluation and Treatment of Agitated Children and Adolescents in the ED. West J Emerg Med 2019;20(2):409-418<br/>Chun TH et al. Evaluation and Management of Children with Acute Mental Health or Behavioral Problems. Pediatrics 2016;138(3):e20161570<br/>Hoffmann JA et al. Trends in Visits and Costs for Mental Health Emergencies in a Pediatric ED. Acad Pediatr 2019;19(4):386-393</div></Card></Pad>)}

function App(){var s1=useState("wizard"),mode=s1[0],setMode=s1[1];var s2=useState("triage"),tab=s2[0],setTab=s2[1];var s3=useState(false),teaching=s3[0],setTeaching=s3[1];var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);var rr=useResponsive(),maxW=rr.maxW;var refTabs=[{key:"triage",label:"Triage"},{key:"decisions",label:"Legal/Safety"},{key:"meds",label:"Agitation Meds"},{key:"dispo",label:"Dispo & Refs"}];return(<div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}><Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>{mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}<div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px"}}><div><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="35" style={{display:"block",width:"50%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div></div>{mode==="wizard"&&<Wizard teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}{mode==="reference"&&tab==="decisions"&&<RefDecisions teaching={teaching}/>}{mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}<div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}><strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.<br/>Doernbecher Children's Hospital · PED · Acute Psychiatric/Behavioral Clinical Pathway · July 2021</div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
