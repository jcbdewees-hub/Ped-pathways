const TEACH={
overview:{title:"Pediatric Psychiatric Crisis — Neurobiology & Epidemiology",
patho:"The adolescent brain is uniquely vulnerable to psychiatric crisis because of a fundamental developmental mismatch: the limbic system (amygdala, ventral striatum — emotion, reward, impulsivity) matures by age 12–14, while the prefrontal cortex (PFC — inhibition, planning, consequence evaluation) does not fully myelinate until age 25. This creates a 10+ year window where emotional reactivity outpaces executive control.

In acute psychosis, dopaminergic hyperactivity in the mesolimbic pathway (ventral tegmental area → nucleus accumbens) produces positive symptoms (hallucinations, delusions), while hypofunction of dopamine in the mesocortical pathway (VTA → PFC) produces negative symptoms (flat affect, amotivation) and cognitive disorganization. In acute affective storms (agitation without psychosis), the amygdala hijacks the PFC via the uncinate fasciculus, producing dysregulated fight-or-flight that overwhelms the still-developing cortical inhibitory circuits.

Serotonin dysregulation underlies many adolescent presentations: 5-HT deficiency in raphe nuclei projections to the PFC contributes to impulsivity, aggression, and suicidality. This is why SSRIs (which increase synaptic 5-HT) reduce impulsive self-harm over weeks, but paradoxically increase activation/agitation in the first 2 weeks before anxiolytic effects emerge — explaining the black box warning.",
pearls:"Key clinical distinctions the pathway doesn't explicitly address:

• Agitation vs psychosis vs delirium: Agitation is a behavioral state (motor restlessness, emotional dysregulation) that can occur with any etiology. Psychosis involves reality distortion (hallucinations, delusions, thought disorder). Delirium is an acute organic brain syndrome (fluctuating consciousness, inattention, disorganized thinking from a medical cause). The treatment is completely different for each — benzos for agitation, antipsychotics for psychosis, and treating the underlying cause for delirium. Giving antipsychotics for delirium (especially anticholinergic ones) can worsen the condition.

• 'First-break psychosis' in an adolescent warrants medical workup BEFORE attributing to primary psychiatric illness: anti-NMDA receptor encephalitis, thyrotoxicosis, CNS lupus, Wilson disease, late-presenting inborn errors of metabolism, and substance intoxication all mimic first-episode psychosis.

• The suicidal adolescent who 'seems fine now': acute suicidal crises are often transient (the 'bridge study' showed that >90% of people who survived jumping from the Golden Gate Bridge did not go on to die by suicide). But transient doesn't mean safe — the lethality of the means matters. Screen for access to lethal means (firearms, medications) even if the acute crisis has resolved.",
evidence:"ED visits for pediatric mental health emergencies increased 166% between 2001–2015 (Kalb, Pediatrics 2019). Suicide is the 2nd leading cause of death ages 10–24 (CDC WISQARS 2020). PFC myelination continues until age ~25 (Giedd, PNAS 1999; Gogtay, PNAS 2004). Limbic-prefrontal mismatch model: Casey (Ann NY Acad Sci 2008). SSRI paradoxical activation in adolescents: FDA black box warning based on meta-analysis showing 4% vs 2% suicidal ideation rate, NNH 50 (Hammad, Arch Gen Psychiatry 2006). Anti-NMDA receptor encephalitis as psychosis mimic: 65% of cases present with psychiatric symptoms first (Dalmau, Lancet Neurol 2008). Bridge study — 90% survival and non-repetition (Seiden, Suicide Life Threat Behav 1978)."},

screening:{title:"Suicide Risk Screening — ASQ Validation & Limitations",
patho:"The Ask Suicide-Screening Questions (ASQ) was developed at NIMH specifically for ED use because existing tools (Columbia Scale, PHQ-9) were too long for acute care settings. The ASQ consists of 4 screening items plus 1 acuity item:

(1) 'In the past few weeks, have you wished you were dead?' — targets passive ideation (death wish without plan).
(2) 'In the past few weeks, have you felt that you or your family would be better off if you were dead?' — targets perceived burdensomeness, a key construct in the Interpersonal Theory of Suicide.
(3) 'In the past week, have you been having thoughts about killing yourself?' — targets active ideation.
(4) 'Have you ever tried to kill yourself?' — targets prior attempts, the strongest predictor of future attempts.
Acuity item: 'Are you having thoughts of killing yourself right now?' — triggers immediate safety intervention.

Validation: sensitivity 97%, specificity 88% for suicide risk in pediatric ED patients (Horowitz, JAMA Pediatr 2012). The high sensitivity means few at-risk youth are missed; the moderate specificity means ~12% false positive rate — acceptable for a screening tool where the cost of missing a case is death.",
pearls:"Screening pitfalls — when the tool's limitations matter most:

• A 'no' on the ASQ does NOT mean safe. The tool screens for ideation/history, not imminent risk. A child with no prior attempts but new access to a firearm after a breakup may be higher risk than one with chronic ideation and no means. Clinical judgment always trumps screening scores.

• Non-verbal or developmentally delayed patients: ASQ requires verbal self-report. For children who are non-verbal, pre-verbal, or cognitively unable to understand the questions, document that screening was deferred due to developmental capacity and rely on behavioral observation and caregiver collateral.

• Cultural factors: some cultures have strong stigma around discussing death or suicide, leading to underreporting. 'Better off dead' language may not translate meaningfully. Use culturally sensitive phrasing and consider interpreter involvement.

• Somatic presentations of psychiatric crisis: 'My stomach hurts' may be the only presenting complaint in a child with severe anxiety or depression. If the medical workup is unrevealing and the child seems distressed, screen even when the chief complaint is purely somatic. Recurrent ED visits for unexplained pain are a red flag.

• The acute-positive ASQ (current ideation): this triggers immediate 1:1 Patient Safety Attendant (PSA). Do not leave the patient alone — this includes bathroom breaks. Remove ALL potential ligature points, sharps, and medications from the room. This is the most time-critical screening result.",
evidence:"ASQ validation: sensitivity 97%, specificity 88% in pediatric ED (Horowitz, JAMA Pediatr 2012). ASQ validated across medical, surgical, and psychiatric ED patients aged 10–21 (Horowitz, JAMA Pediatr 2012). Prior suicide attempt is the strongest predictor of future attempt: OR 38 (Beautrais, J Epidemiol Community Health 2004). Means restriction effectiveness: firearm safe storage counseling in ED reduces access by 21% at 6 months (Betz, Ann Intern Med 2016). Somatic presentations: up to 30% of adolescent depression presents with somatic complaints (Campo, Curr Opin Pediatr 2012)."},

legal:{title:"Oregon Legal Framework — NMI, Holds & DHS",
patho:"The legal framework for psychiatric holds of minors in Oregon is distinct from adult holds and frequently misunderstood by ED providers:

'Notice of Mental Illness' (NMI) — NOT 'hold': For minors, the document is an NMI, not a psychiatric hold. This distinction matters because the NMI authorizes a 72-hour evaluation period — not involuntary commitment. The NMI must be faxed to the county court clerk and triggers a court-appointed evaluator visit within the 72-hour window.

Consent hierarchy for minors needing behavioral assessment:
Scenario 1: Not in immediate danger + guardian cooperative → standard assessment with informed consent.
Scenario 2: Not safe to leave + guardian agrees → CO-4792 form ('Notice of and Consent for Behavioral Health Assessment of Minors').
Scenario 3: Not safe to leave + guardian refuses/absent → NMI filed, DHS notified for potential custody.
Scenario 4: Age ≥18 + imminent danger → NMI (adult-type) with 2-physician certification.

The 2-physician hold mechanism (for minors): when waiting for guardian consent or DHS paperwork, two physicians can authorize temporary hold documented in the medical record. Unlike adult holds, this is NOT sent to court — it bridges the gap until legal authority (parent consent or DHS custody) is established.

DHS custody process: If guardian is absent, uncooperative, or the suspected perpetrator, DHS can take temporary protective custody. This requires: DHS hotline call → intake worker assessment → field worker deployment → court order within 24 hours.",
pearls:"Common legal mistakes in the ED that create liability:

• Forgetting to fax the NMI to court: the NMI is only legally valid when received by the county court clerk's office. An unfaxed NMI is legally equivalent to no NMI — the patient is being held without legal authority.

• Not documenting rescinded consent properly: when a guardian initially consents (CO-4792) but later rescinds, the provider must document: (1) time of rescission, (2) clinical determination that the minor remains dangerous, (3) immediate DHS notification, (4) initiation of NMI process. The gap between rescinded consent and NMI/DHS authority is a legal vulnerability — document your clinical reasoning for the temporary hold.

• Using adult psychiatric hold terminology: 'we're placing your child on a psych hold' is legally inaccurate and alarming to families. Use: 'we need to keep your child here for a safety evaluation. We'd like your consent for a behavioral health assessment' (Scenario 2). If consent is refused: 'because we believe your child is not safe to leave, we'll be filing a Notice of Mental Illness with the court to ensure their safety.'

• Oregon Youth Authority wards: if the minor is a ward of the state, the OYA parole/probation officer has authority to sign the behavioral consent form — don't wait for a judge. Contact OYA dispatch.

• NMI cannot be discontinued unilaterally: hold withdrawal requires specific paperwork, completed and faxed to court. It's not sufficient to simply decide the patient is safe — the legal process must be formally closed.",
evidence:"Oregon NMI statute: ORS 426.070-426.072 (notice of mental illness provisions). CO-4792 form: Oregon-specific consent form for behavioral health assessment of minors (OHSU DCH form library). 2-physician hold for minors: ORS 426.232 — differs from adult Director's Custody process. DHS custody timeline: ORS 419B.150 — 24-hour court order requirement for protective custody. EMTALA psychiatric transfer requirements: 42 CFR 489.24 — applies to all psychiatric patients in the ED regardless of age."},

agitation:{title:"Agitation Pharmacology — GABA, Dopamine & the Olanzapine-Benzo Warning",
patho:"The neuropharmacology of acute agitation management targets three receptor systems:

Benzodiazepines (lorazepam, midazolam): bind the gamma subunit of the GABA-A receptor, a ligand-gated chloride channel. Binding increases the FREQUENCY of chloride channel opening (not the duration — that's barbiturates), hyperpolarizing the postsynaptic neuron. This produces anxiolysis at low doses, sedation at moderate doses, and general anesthesia at high doses. The GABA-A receptor requires endogenous GABA to function — benzodiazepines are positive allosteric modulators, not direct agonists. This explains their ceiling effect and relative safety in isolation.

Atypical antipsychotics (olanzapine, ziprasidone): antagonize D2 receptors in the mesolimbic pathway (antipsychotic effect) and 5-HT2A receptors (reduces EPS, provides anxiolysis). Olanzapine additionally blocks muscarinic M1 (anticholinergic → sedation + dry mouth), histamine H1 (sedation + appetite), and alpha-1 adrenergic (orthostasis) receptors. This multi-receptor profile makes olanzapine more sedating than ziprasidone (which lacks significant anticholinergic/histamine activity) — advantageous for acute agitation but hazardous in combination.

THE CRITICAL INTERACTION — IM olanzapine + IM/IV benzodiazepine: Olanzapine's anticholinergic effects suppress compensatory airway-protective reflexes. Its H1 blockade produces CNS depression. Adding benzodiazepine GABA-ergic sedation creates additive — potentially synergistic — respiratory depression. Post-marketing surveillance identified fatalities when IM olanzapine was given within 1 hour of parenteral benzodiazepines (FDA safety alert 2005). The mechanism is additive CNS and respiratory depression exceeding compensatory capacity.",
pearls:"De-escalation should always be attempted before pharmacology — medications manage symptoms but do not resolve the underlying crisis:

• STAMP approach: Sit down (reduces perceived threat), Tone (low, slow, calm), Active listening (reflect feelings, not content: 'it sounds like you're really frustrated'), Motivate ('what can I do to help you feel safer right now?'), Plan ('here's what's going to happen next — you have a choice in how we proceed').

• Environmental modifications: dim lighting, reduce noise, remove audience (other patients, extra staff), remove potentially threatening equipment from visible areas. Offer food, blankets, and a phone call. A hungry, cold, scared teenager escalates; a fed, warm, connected one often de-escalates.

• Medication selection algorithm: Mild agitation → PO lorazepam (0.025–0.05 mg/kg, max 2 mg). Moderate (not redirectable) → PO olanzapine ODT (2.5–10 mg by age) — dissolves on tongue, no need to swallow. Severe (threatening/aggressive) → IM olanzapine 5–10 mg by age OR IM ziprasidone (avoids the olanzapine-benzo restriction). If olanzapine was given and more sedation needed → DO NOT add benzo × 1 hour. Use ziprasidone IM instead.

• Why olanzapine is preferred over haloperidol in pediatrics: lower extrapyramidal symptom (EPS) rate (~5% vs ~20%), faster onset of sedation (15–20 min IM vs 30–45 min), and the anticholinergic component provides additional sedation without needing a separate benztropine order. Haloperidol also carries higher risk of QTc prolongation and acute dystonia in children.

• Restraint documentation: age-tiered renewal — <9yr: Q1h with face-to-face; 9–17yr: Q2h; ≥18yr: Q4h. Q15-minute checks with 1:1 observation for first hour of any seclusion. Always document the least restrictive failed alternative before escalating.",
evidence:"IM olanzapine + benzodiazepine fatalities: FDA safety alert (2005); at least 29 post-marketing reports of cardiorespiratory adverse events including fatalities (Eli Lilly post-marketing data). Olanzapine vs haloperidol EPS rates: 5% vs 20% in acute agitation (Breier, Am J Psychiatry 2002). Olanzapine IM onset: 15–20 minutes, peak 30 minutes (Wright, Am J Psychiatry 2001). BETA (Best practices in Evaluation and Treatment of Agitation) Project recommendations (Wilson, West J Emerg Med 2012). De-escalation reduces use of restraints by 52% in pediatric EDs (Richmond, J Emerg Med 2012). STAMP framework adapted from Crisis Prevention Institute training. Haloperidol QTc prolongation: FDA black box warning for IV use (2007)."},

medClearance:{title:"Medical Clearance — Low Yield but High Stakes When Positive",
patho:"The concept of 'medical clearance' for psychiatric patients is poorly defined but practically important. The evidence consistently shows that routine laboratory testing in patients with isolated psychiatric presentations has extremely low yield: <1% of routine labs change management in patients without historical or physical exam findings suggesting organic disease (Donofrio, Acad Emerg Med 2014).

However, 'low yield' is not the same as 'zero yield,' and the cases where labs change management are often dangerous misses:

• First-break psychosis: new-onset psychotic symptoms in a patient with NO prior psychiatric history warrant comprehensive medical workup. Anti-NMDA receptor encephalitis — an autoimmune condition where antibodies target the NR1 subunit of the NMDA receptor, producing psychosis, seizures, movement disorders, and autonomic instability — presents with psychiatric symptoms first in 65% of cases. It predominantly affects young women and is treatable with immunotherapy if caught early. Missing it leads to ICU admission and potential death.

• Delirium vs psychosis: delirium is acute, fluctuating, with impaired attention and often visual hallucinations. Psychosis is typically non-fluctuating with preserved attention and auditory hallucinations. This distinction matters because delirium has a medical cause (infection, metabolic, toxic, CNS) that will kill the patient if not treated. The 'psychiatric patient' who is actually delirious from sepsis, hyponatremia, or thyroid storm cannot be treated with olanzapine alone.

• Serotonin syndrome: adolescents on SSRIs who present with agitation, hyperthermia, myoclonus, and hyperreflexia after adding a serotonergic agent (tramadol, dextromethorphan, MDMA). This is often misdiagnosed as psychiatric agitation and treated with restraints/sedation rather than cyproheptadine and cooling.",
pearls:"A practical framework for when labs change management:

• ALWAYS get: bedside glucose (CBG) on every patient. Hypo- and hyperglycemia both mimic psychiatric presentations and are immediately treatable. This single test has the highest yield-to-effort ratio.

• Get a UDS + acetaminophen + salicylate + ETOH if: any suggestion of ingestion, altered mental status, or the history is unreliable. 'I didn't take anything' from an agitated, altered teenager is not reliable history.

• Get CBC/CMP/TSH if: first-break psychosis (no prior psychiatric history), age <12 with new behavioral changes, any physical exam abnormalities, or presentation inconsistent with stated psychiatric history.

• Get urine pregnancy (uHCG) on all post-pubertal females — always. Pregnancy changes management, medications, and disposition.

• Get EKG if: suspected overdose (any), starting antipsychotics in a patient on QTc-prolonging medications, or family history of sudden cardiac death.

• COVID swab per institutional protocol — COVID can present with neuropsychiatric symptoms in children, and it changes isolation/cohorting.

• Consider anti-NMDA receptor antibodies for: young woman + first-break psychosis + seizures or movement abnormalities + autonomic instability. Don't wait for neurology to suggest it.",
evidence:"Routine labs change management in <1% of isolated psychiatric presentations (Donofrio, Acad Emerg Med 2014; Amin, West J Emerg Med 2015). Anti-NMDA receptor encephalitis: 65% present with psychiatric symptoms first, predominantly young women (Dalmau, Lancet Neurol 2008). Delirium misdiagnosed as psychiatric: occurs in 7–10% of psychiatry consults (Han, J Psychosom Res 2009). Serotonin syndrome mimicking agitation: incidence 0.4 per 1000 patient-months on SSRIs (Mackay, Br J Gen Pract 1999). Bedside glucose as highest-yield test: 2–4% of undifferentiated altered mental status is hypoglycemia (Malouf, QJM 2007). ACEP Clinical Policy: routine labs not recommended for alert, cooperative psychiatric patients with normal vitals and known psychiatric history (Nazarian, Ann Emerg Med 2017)."},

disposition:{title:"Disposition — The Boarding Crisis & Harm Reduction",
patho:"Pediatric psychiatric patients board in the ED because the system lacks adequate inpatient psychiatric beds for children. The numbers are stark: between 2009 and 2020, the US lost 17% of pediatric inpatient psychiatric beds while pediatric psychiatric ED visits increased 166%. The result is that children in psychiatric crisis routinely spend 24–72 hours (and sometimes >7 days) in an ED room designed for acute medical care, not therapeutic psychiatric milieu.

This creates a paradox: the ED environment actively worsens the conditions it is trying to treat. Bright lights, constant noise, lack of privacy, unfamiliar staff rotating in shifts, physical restraints, and absence of therapeutic activities all increase agitation, anxiety, and despair. For suicidal adolescents, the message is: 'you asked for help and were put in a room with nothing to do, watched by a stranger, for days.' This is iatrogenic harm.

EMTALA (Emergency Medical Treatment and Labor Act) complicates transfers: a psychiatric emergency is a qualifying emergency medical condition, and the ED must provide stabilizing treatment. Transfer to an inpatient psychiatric facility requires: (1) the receiving facility has accepted the patient, (2) the medical benefits of transfer outweigh the risks, and (3) all EMTALA paperwork is completed. In practice, finding an accepting psychiatric facility for a pediatric patient can take days.",
pearls:"Harm reduction strategies for boarded psychiatric patients — these are imperfect solutions to a systemic problem, but they meaningfully reduce suffering:

• Child Life involvement: request Child Life services for every boarded pediatric psych patient. Activity kits, art supplies, games, and developmental normalization reduce agitation more effectively than PRN medications. If Child Life is unavailable, ask the family to bring activities from home.

• Maintain routines: regular meals at consistent times, preserved sleep-wake cycles (dim lights at night, open blinds in morning), scheduled bathroom breaks. Structure reduces anxiety in children.

• Family presence as de-escalation: having a safe caregiver at bedside (not the suspected abuser, not the person the child is in conflict with) reduces agitation, provides comfort, and often eliminates the need for 1:1 PSA. Formalize this with visiting hours/overnight stays as unit policy allows.

• Electronic agreements: for patients who arrived with phones/tablets, create a behavioral contract that allows supervised device access in exchange for cooperation with safety protocols. Screen time is not therapeutic, but boredom is actively anti-therapeutic for boarded children.

• Interdisciplinary huddle at least once per shift: RN + attending + social worker + PSA review the patient's status, agitation trajectory, medication needs, and disposition progress. Document the huddle.

• Restraint minimization: every restraint episode requires documentation of the least restrictive failed alternative. Chemical restraint (medication) is generally preferable to physical restraint for children — physical restraint is re-traumatizing for abuse survivors and carries physical risk (positional asphyxia).",
evidence:"Pediatric psych beds decreased 17% from 2009–2020 while ED visits increased 166% (Kalb, Pediatrics 2019; Plemmons, Pediatrics 2018). Mean ED boarding time for pediatric psych patients: 24–48 hours, with some >7 days (Mahajan, Pediatrics 2009). EMTALA psychiatric transfer requirements: 42 CFR 489.24 (CMS). Child Life intervention reduces agitation and PRN medication use in boarded patients by 32% (Tyson, J Emerg Nurs 2014). Physical restraint complications in children: positional asphyxia risk 0.3%, soft tissue injury 5–10% (Mohr, Psychiatr Serv 2003). AAP Policy Statement: boarding of pediatric psychiatric patients in the ED causes measurable psychological harm (Dolan, Pediatrics 2011)."}

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,lorazPO_lo:Math.round(wt*0.025*100)/100,lorazPO_hi:Math.min(Math.round(wt*0.05*10)/10,2),lorazIM_lo:Math.round(wt*0.05*10)/10,lorazIM_hi:Math.min(Math.round(wt*0.1*10)/10,2),midazIM:Math.min(Math.round(wt*0.1*10)/10,5),midazIV:Math.min(Math.round(wt*0.1*10)/10,5)};}

function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}
function TeachBox({id,teaching}){var s=useState("pearls"),tab=s[0],setTab=s[1];if(!teaching||!TEACH[id])return null;var t=TEACH[id];var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>{tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}</div><div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeKey]||""}</div></div>);}

  return(<Pad>
    <Q text="Acute Psych/Behavioral Walk-Through" sub="Safety assessment · Risk screening · Legal framework · Agitation management"/>
    <TeachBox id="overview" teaching={teaching}/>
    <Card title="Step 1 — Immediate Safety Actions" color={C.red}>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔒" title="On Arrival — Safety First">
        <strong>1.</strong> ESI Triage Level II<br/>
        <strong>2.</strong> Notify: Charge RN, Attending, Social Worker, DPS (Public Safety)<br/>
        <strong>3.</strong> Search and secure belongings — remove ALL unsafe items<br/>
        <strong>4.</strong> Securely lock all medications (DO NOT leave meds in patient room)<br/>
        <strong>5.</strong> Change patient into paper scrubs or hospital attire<br/>
        <strong>6.</strong> Document legal decision maker<br/>
        <strong>7.</strong> Provide family with All About Me Poster and Welcome Packet<br/>
        <strong>8.</strong> NPO status if ingestion suspected
      </Alert>
    </Card>
    <Card title="Step 2 — Suicide Risk Screening" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Complete age-appropriate screening:</div>
      <WizBtn label="ASQ Acute Positive — HIGH Risk (ages 10–17)" sub="1:1 PSA to bedside immediately · Consent or NMI required" color={C.red} bg={C.redBg} border={C.redBorder} selected={riskLevel==="high"} onClick={function(){setRiskLevel("high")}}/>
      <WizBtn label="ASQ Non-Acute Positive — Moderate/Low Risk" sub="PSA or CVM options · Continue reassessing" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={riskLevel==="moderate"} onClick={function(){setRiskLevel("moderate")}}/>
      <WizBtn label="Not at imminent risk — cooperative" sub="Assess and coordinate care" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={riskLevel==="low"} onClick={function(){setRiskLevel("low")}}/>
      <div style={{fontSize:12,color:C.muted,marginTop:4}}>Ages ≥18: use PHQ-2. If score {'>'}3 → Columbia Scale. Age {"<"}10 or developmentally {"<"}10 → screening deferred.</div>
      <TeachBox id="screening" teaching={teaching}/>
    </Card>

    {riskLevel!==null&&<Card title="Step 3 — Safety Status & Legal Framework" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Determine patient safety and guardian cooperation:</div>
      <WizBtn label="Safe with guardian cooperation" sub="Not in immediate danger · Guardian present and cooperative" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={safetyStatus==="safe"} onClick={function(){setSafetyStatus("safe")}}/>
      <WizBtn label="Not safe to leave — guardian AGREES to behavioral assessment" sub="Complete Consent for Behavioral Health Assessment (CO-4792)" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={safetyStatus==="consent"} onClick={function(){setSafetyStatus("consent")}}/>
      <WizBtn label="Not safe to leave — guardian NOT in agreement or absent" sub="Complete NMI · Fax to county court · Notify DHS" color={C.red} bg={C.redBg} border={C.redBorder} selected={safetyStatus==="nmi"} onClick={function(){setSafetyStatus("nmi")}}/>
      <WizBtn label="Young adult ≥18 — imminent danger to self/others" sub="Complete NMI · Fax to county court" color={C.red} bg={C.redBg} border={C.redBorder} selected={safetyStatus==="adult"} onClick={function(){setSafetyStatus("adult")}}/>
      {safetyStatus==="consent"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="📋" title="Consent for Behavioral Assessment">Complete Notice of and Consent for Behavioral Health Assessment of Minors (CO-4792). Notify Public Safety of patient placement. Search/secure belongings. Consult Peds Mental Health SW (0830-1700) or ED SW after hours. Consult Child Psychiatry.</Alert>}
      {safetyStatus==="nmi"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📋" title="NMI — Notice of Mental Illness">Complete NMI paperwork and fax to county of residence court. Notify DHS to report situation and begin establishing custody. Notify Public Safety. Consult Peds Mental Health SW + Child Psychiatry. NMI valid for 72 hours or until court assessor evaluates.</Alert>}
      {safetyStatus==="adult"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📋" title="Adult NMI">Complete NMI as above for patient ≥18 in imminent danger. Consult Child Psychiatry. Notify Public Safety.</Alert>}
      <TeachBox id="legal" teaching={teaching}/>
    </Card>}

    {riskLevel!==null&&<Card title="Step 4 — Agitation Management" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>What is the current agitation level?</div>
      <WizBtn label="Mild — Pacing, moody, irritable" sub="Behavioral redirection · COPE plan if available" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={agitation==="mild"} onClick={function(){setAgitation("mild")}}/>
      <WizBtn label="Moderate — Non-redirectable, mildly impulsive" sub="De-escalation · Remove stimuli · PO olanzapine or risperidone" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={agitation==="moderate"} onClick={function(){setAgitation("moderate")}}/>
      <WizBtn label="Severe — Threatening, destructive, physically aggressive" sub="Code Green · Seclusion → restraints · IM olanzapine or ziprasidone" color={C.red} bg={C.redBg} border={C.redBorder} selected={agitation==="severe"} onClick={function(){setAgitation("severe")}}/>
      {agitation==="mild"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="💊" title="Mild Agitation">Behavioral redirection first. Refer to patient-specific COPE plan. If medication needed:<br/>Lorazepam {doses?doses.lorazPO_lo+"–"+doses.lorazPO_hi+" mg":"0.025–0.05 mg/kg"} PO Q6h PRN (max 2 mg/dose)</Alert>}
      {agitation==="moderate"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="💊" title="Moderate Agitation">Review/revise de-escalation. Remove external stimulation (video games, limit TV, may include limiting visitors). Consider limited seclusion room use as time-out.<br/><br/>Olanzapine ODT: 2.5 mg (children) · 5 mg (adolescents) · 10 mg ({'>'}16yr) PO Q2h PRN (max 20 mg/day)<br/>Alternative: Risperidone M-Tab 0.25–0.5 mg (children) · 0.5–1 mg (adolescents) BID PRN (max 2 mg/day)</Alert>}
      {agitation==="severe"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="💊" title="Severe Agitation">Call Code Green if indicated. Remove all stimuli. Evaluate sitter. Consider seclusion → restraints (least restrictive means). Complete significant event form.<br/><br/>IM Olanzapine: 5 mg (children) · 10 mg (adolescents) Q1h PRN (max 25 mg/day)<br/><strong style={{color:C.red}}>DO NOT give IM olanzapine with IM/IV lorazepam — respiratory depression risk</strong><br/>Alternative: Ziprasidone IM 2.5–5 mg (children) · 5–10 mg (adolescents) · 10–20 mg ({'>'}16yr) Q2h PRN (max 40 mg/day)</Alert>}
      <TeachBox id="agitation" teaching={teaching}/>
    </Card>}

    <Card title="Medical Clearance" color={C.blue} defaultOpen={false}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Rule out medical causes: bedside CBG, electrolytes, substance intoxication/withdrawal, medication causes (akathisia), neurologic, infectious. EKG for all suspected overdoses.<br/>Labs PRN: CBC, CMP, acetaminophen, ASA, ETOH, TSH, UDS, uHCG. COVID swab.</div>
      <TeachBox id="medClearance" teaching={teaching}/>
    </Card>

    {riskLevel!==null&&<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>}
  </Pad>);
}

function RefTriage({teaching}){return(<Pad><Q text="Triage & Safety" sub="Acute psychiatric or behavioral complaint · Safety assessment · Risk screening"/><TeachBox id="overview" teaching={teaching}/><Card title="Inclusion / Exclusion" color={C.primary}><div style={{marginTop:8}}><Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Minor presenting with new or acute behavioral or psychiatric complaint: intentional ingestion, self-harm/cutting, drug/alcohol use, psychotic behavior, suicidal ideation/attempt.</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Underlying autism spectrum disorder, developmental delay, or neurological disorder as primary presentation.</Alert></div></Card><Card title="Initiate on Arrival" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}><strong>ESI II</strong> · Full vitals as soon as safely possible<br/>Notify Charge RN, Attending, Social Worker, DPS<br/>Complete age-appropriate suicide risk screen (ASQ 10–17yr, PHQ-2/Columbia ≥18yr)<br/>Search/secure belongings · Remove unsafe items · Lock medications · Paper scrubs<br/>Determine observation level (1:1 PSA for high-risk, PSA/CVM for moderate)<br/>Document legal decision maker · Provide family Welcome Packet</div></Card><Card title="Suicide Screening Tools" color={C.red}><div style={{marginTop:8}}><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>ASQ Acute Positive (HIGH Risk) → 1:1 PSA</div></div><div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>ASQ Non-Acute Positive (Moderate-Low) → PSA or CVM</div></div><div style={{fontSize:12,color:C.muted,marginTop:4}}>Re-evaluate sitter need Q4h. Complete BH Initial/Shift Assessment.</div></div><TeachBox id="screening" teaching={teaching}/></Card></Pad>)}
function RefDecisions({teaching}){return(<Pad><Q text="Legal Framework & Safety"/><Card title="Four Scenarios" color={C.primary}><div style={{marginTop:8}}>{[{n:"1",title:"Not in immediate danger",desc:"Cooperative · Guardian present → Assess and coordinate",c:C.greenMid,bg:C.greenBg,bd:C.greenBorder},{n:"2",title:"Not safe to leave — guardian agrees",desc:"Complete Consent for BH Assessment (CO-4792) · Consult Child Psych",c:C.amberMid,bg:C.amberBg,bd:C.amberBorder},{n:"3",title:"Not safe to leave — guardian absent/disagrees",desc:"NMI → fax to county court · Notify DHS · Consult Child Psych",c:C.red,bg:C.redBg,bd:C.redBorder},{n:"4",title:"Young adult ≥18 — imminent danger",desc:"NMI → fax to county court · Consult Child Psych",c:C.red,bg:C.redBg,bd:C.redBorder}].map(function(s){return <div key={s.n} style={{background:s.bg,border:"1.5px solid "+s.bd,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:s.c}}>{s.n}. {s.title}</div><div style={{fontSize:12,marginTop:2}}>{s.desc}</div></div>})}</div><TeachBox id="legal" teaching={teaching}/></Card><Card title="Seclusion / Restraint Renewal" color={C.muted} defaultOpen={false}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>{"<"}9yr: renew Q1h with face-to-face<br/>9–17yr: renew Q2h<br/>≥18yr: renew Q4h<br/>RN documentation Q1h ({"<"}9yr) or Q2h (≥9yr). Check Q15 min. 1:1 close observation first hour.</div></Card></Pad>)}
function RefMeds({teaching,doses}){return(<Pad><Q text="Agitation Medications" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/><Card title="Mild Agitation" color={C.greenMid}><div style={{marginTop:8}}><DoseRow label="Lorazepam PO (0.025–0.05 mg/kg Q6h, max 2mg)" value={doses?doses.lorazPO_lo+"–"+doses.lorazPO_hi:"—"} unit={doses?"mg":""}/></div></Card><Card title="Moderate Agitation" color={C.amberMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Olanzapine ODT: 2.5 mg (children) · 5 mg (adolescents) · 10 mg ({'>'}16yr) PO Q2h PRN (max 20 mg/day)<br/>Alternative: Risperidone M-Tab 0.25–0.5 mg (children) · 0.5–1 mg (adolescents) BID PRN (max 2 mg/day)</div></Card><Card title="Severe Agitation" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>IM Olanzapine: 5 mg (children) · 10 mg (adolescents) Q1h PRN (max 25 mg/day)<br/><span style={{color:C.red,fontWeight:600}}>DO NOT combine IM olanzapine with IM/IV lorazepam</span><br/>Alternative: Ziprasidone IM 2.5–5 mg (children) · 5–10 mg (adolescents) · 10–20 mg ({'>'}16yr) Q2h (max 40 mg/day)</div></Card><Card title="PRN Sedation Reference" color={C.muted} defaultOpen={false}><div style={{marginTop:8}}><DoseRow label="Lorazepam IM (0.05–0.1 mg/kg, max 2mg)" value={doses?doses.lorazIM_lo+"–"+doses.lorazIM_hi:"—"} unit={doses?"mg":""}/><DoseRow label="Midazolam IM (0.05–0.1 mg/kg, max 5mg)" value={doses?doses.midazIM:"—"} unit={doses?"mg":""}/><DoseRow label="Midazolam IV (0.05–0.1 mg/kg, max 5mg)" value={doses?doses.midazIV:"—"} unit={doses?"mg":""}/><div style={{fontSize:12,color:C.muted,marginTop:6}}>After IM agents: monitor vitals and clinical status at regular intervals. Allow adequate time between doses. Use lower starting doses in children.</div></div></Card><TeachBox id="agitation" teaching={teaching}/></Pad>)}
function RefDispo({teaching}){return(<Pad><Q text="Disposition & References"/><Card title="Disposition" color={C.primary}><div style={{marginTop:8}}><Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🏥" title="ED Observation (Most Patients)">Pediatric behavioral patients are generally NOT admitted to DCH — held in ED pending Child Psychiatry evaluation. Interdisciplinary huddle daily + PRN each shift.</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📋" title="Psychiatric Transfer">All psychiatric inpatient transfers require EMTALA paperwork. Use .EDRNEMTALA dot phrase.</Alert></div><TeachBox id="disposition" teaching={teaching}/></Card><Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>OHSU DCH ED Acute Psychiatric/Behavioral Clinical Pathway, July 2021<br/>Gerson R et al. BETA: Best Practices for Evaluation and Treatment of Agitated Children and Adolescents in the ED. West J Emerg Med 2019;20(2):409-418<br/>Chun TH et al. Evaluation and Management of Children with Acute Mental Health or Behavioral Problems. Pediatrics 2016;138(3):e20161570<br/>Hoffmann JA et al. Trends in Visits and Costs for Mental Health Emergencies in a Pediatric ED. Acad Pediatr 2019;19(4):386-393</div></Card></Pad>)}

function App(){var s1=useState("wizard"),mode=s1[0],setMode=s1[1];var s2=useState("triage"),tab=s2[0],setTab=s2[1];var s3=useState(false),teaching=s3[0],setTeaching=s3[1];var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);var rr=useResponsive(),maxW=rr.maxW;var refTabs=[{key:"triage",label:"Triage"},{key:"decisions",label:"Legal/Safety"},{key:"meds",label:"Agitation Meds"},{key:"dispo",label:"Dispo & Refs"}];return(<div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}><Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>{mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}<div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px"}}><div><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="35" style={{display:"block",width:"50%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div></div>{mode==="wizard"&&<Wizard teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}{mode==="reference"&&tab==="decisions"&&<RefDecisions teaching={teaching}/>}{mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}<div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}><strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.<br/>Doernbecher Children's Hospital · PED · Acute Psychiatric/Behavioral Clinical Pathway · July 2021</div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
