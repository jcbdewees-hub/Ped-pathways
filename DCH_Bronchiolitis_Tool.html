<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bronchiolitis — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useMemo}=React;
const C={primary:"#0e7490",pLight:"#ecfeff",pBorder:"#67e8f9",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"Pathway Rationale",content:"Bronchiolitis is the most common lower respiratory infection in infants 12 weeks to 2 years. It is caused by viral infection (most commonly RSV) and characterized by acute inflammation, airway edema, increased mucus production, and bronchospasm. 90% of children are infected with RSV in the first 2 years of life, and infection does not grant permanent immunity. The cornerstone of this pathway is that fewer interventions are generally better — care is primarily supportive with emphasis on suctioning, positioning, and hydration."},
  pbst:{title:"Pediatric Bronchiolitis Scoring Tool (PBST)",content:"The PBST is a 5-parameter scoring system (respiratory rate, accessory muscle use, breath sounds, alertness, dyspnea) that guides severity classification, assessment frequency, and escalation decisions. Always suction and reposition the patient BEFORE scoring. After two consecutive assessments in the lower range, a patient may be reclassified downward. A single higher score immediately increases severity level."},
  albuterol:{title:"Albuterol — One-Time Trial Only",content:"Bronchodilators should NOT be used routinely in bronchiolitis (AAP recommendation). However, a one-time trial within the first 12 hours of presentation is an option — particularly if there is a high-risk history or severe respiratory distress. The trial requires RN and MD at bedside to evaluate before and after with agreed PBST scoring. Continue ONLY if documented positive clinical response (decreased RR/WOB). This is a common source of unnecessary treatment in bronchiolitis."},
  discouraged:{title:"Discouraged Therapies",content:"The following are NOT recommended for routine bronchiolitis management: racemic epinephrine, corticosteroids (inhaled or systemic), antibiotics, montelukast, and chest physiotherapy. These interventions have not demonstrated benefit in bronchiolitis and may cause harm, increase costs, or delay appropriate supportive care."},
  hfnc:{title:"High-Flow Nasal Cannula (HFNC)",content:"HFNC provides heated, humidified oxygen at flow rates exceeding conventional nasal cannula. Start at 1 L/kg/min and increase to the max of the cannula as needed. Evidence (Franklin 2018, Kepreotes 2017) supports HFNC for moderate-severe bronchiolitis. If HFNC ≥2 L/kg/min, the patient must be admitted to PICU. Always complete the HIP (HFNC Initiation Pause) before starting HFNC for PBST 1–7."},
  hip:{title:"HFNC Initiation Pause (HIP)",content:"The HIP is a structured pause before escalating to HFNC, ensuring simpler interventions have been attempted first. Steps: nasal suctioning, attempt feeding if safe (or sucrose on pacifier), encourage parent holding/dim lights, antipyretic for comfort, address hydration, consider low-flow NC. After 20–30 minutes, RN/LIP huddle to reassess. If the patient has stabilized → remain on RA/low-flow. If not → initiate HFNC and re-huddle 2 hours later."},
  oxygenation:{title:"Oxygen Saturation Thresholds",content:"The AAP recommends supplemental oxygen if saturation falls persistently below 90% in previously healthy infants. Continuous pulse oximetry is NOT needed for all patients — only if initial SpO₂ <92% or the patient is on supplemental O₂. SpO₂ <90% usually requires hospitalization. SpO₂ 90–94% requires supportive care and observation. SpO₂ >94% with mild PBST and tolerating PO may be considered for discharge."},
  riskFactors:{title:"High-Risk Factors",content:"Patients at higher risk of illness progression include: age <3 months (higher apnea risk), gestational age <35 weeks (expect longer/more severe course), congenital heart disease, and chronic lung disease. Former premature infants may be included in this pathway but should be considered for admission or longer observation. Infants <2 months are at high risk for apnea and warrant prolonged observation."},
  diagnosis:{title:"Diagnosis Is Clinical",content:"Bronchiolitis is a clinical diagnosis made by history, physical exam, and seasonality. Lab tests and imaging are NOT routinely indicated. CXR should be considered only if severely ill. Virology testing (RSV) is recommended only if results will change treatment decisions or for inpatient cohorting. High fever (>39°C) warrants evaluation for other causes. Absence of fever does not preclude the diagnosis."},
  discharge:{title:"Discharge Criteria",content:"SpO₂ >92% on room air. If supplemental O₂ was required, monitor 8–12 hours after discontinuation including a sleep period. Tolerating oral intake. Infants <3 months must clear secretions with bulb syringe (not aspirator) and feed without desaturation. If wall suctioning was required, observe through at least one feeding and one sleep period before discharge. Discharge teaching: suctioning, positioning, hydration, hand hygiene, avoid smoke exposure."},
};

const PBST_PARAMS=[
  {name:"Respiratory Rate",ageDependent:true,options:[
    {label:(a)=>a<0.25?"30–60":a<1?"25–50":"20–40",score:0},
    {label:(a)=>a<0.25?"61–69":a<1?"51–59":"41–44",score:1},
    {label:(a)=>a<0.25?"≥70 or ↓":a<1?"≥60 or ↓":"≥45 or ↓",score:2},
  ]},
  {name:"Accessory Muscle Use",ageDependent:false,note:"1 point each (max 3)",options:[
    {label:"None",score:0},
    {label:"Flaring",score:1},
    {label:"Intercostal retractions",score:1},
    {label:"Substernal retractions",score:1},
    {label:"Head bobbing",score:1},
  ],isCheckbox:true},
  {name:"Breath Sounds",ageDependent:false,options:[
    {label:"Normal, no wheeze",score:0},
    {label:"End-expiratory wheeze",score:1},
    {label:"Expiratory wheeze throughout",score:2},
    {label:"Insp + exp wheeze or diminished",score:3},
  ]},
  {name:"Alertness",ageDependent:false,options:[
    {label:"Age-appropriate",score:0},
    {label:"Agitated",score:1},
    {label:"Doesn't arouse appropriately",score:2},
    {label:"Confused or somnolent",score:3},
  ]},
  {name:"Dyspnea",ageDependent:false,options:[
    {label:"None",score:0},
    {label:"SOB with activity",score:1},
    {label:"SOB with talking/feeding",score:2},
    {label:"SOB at rest",score:3},
  ]},
];

function calcDoses(w){const wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,bolus:Math.round(wt*20),hfnc:Math.round(wt*1*10)/10,hfncMax:Math.round(wt*2*10)/10};}

// ── Primitives ──
function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:22,fontWeight:700,marginTop:4,lineHeight:1.2}}>Bronchiolitis</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · Age ≤2 Years · October 2021</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,letterSpacing:"0.03em",marginTop:2,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function Sec({title,color,children}){return(<div style={{marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingBottom:4,borderBottom:`2px solid ${color}`}}>{title}</div>{children}</div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const[ageMonths,setAgeMonths]=useState("");
  const[pbstScores,setPbstScores]=useState({rr:null,acc:[],breath:null,alert:null,dysp:null});

  const wt=parseFloat(weightKg)||0;
  const ageMo=parseFloat(ageMonths)||0;
  const doses=useMemo(()=>calcDoses(weightKg),[weightKg]);

  const ageYr=ageMo/12;
  const pbstTotal=useMemo(()=>{
    const{rr,acc,breath,alert,dysp}=pbstScores;
    if(rr===null||breath===null||alert===null||dysp===null)return null;
    return rr+Math.min(acc.length,3)+breath+alert+dysp;
  },[pbstScores]);

  const pbstSev=useMemo(()=>{
    if(pbstTotal===null)return null;
    if(pbstTotal<=3)return{text:"Mild (0–3)",color:C.greenMid,bg:C.greenBg,border:C.greenBorder,level:"mild"};
    if(pbstTotal<=7)return{text:"Moderate (4–7)",color:C.amberMid,bg:C.amberBg,border:C.amberBorder,level:"moderate"};
    return{text:"Severe (8–14)",color:C.red,bg:C.redBg,border:C.redBorder,level:"severe"};
  },[pbstTotal]);

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"pbst",label:"PBST Score"},
    {key:"decision",label:"Decisions"},
    {key:"meds",label:"Interventions"},
    {key:"special",label:"Dispo & Refs"},
  ];

  return(
    <div style={{maxWidth:520,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      {/* Patient bar */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (mo)</label>
          <input type="number" inputMode="decimal" value={ageMonths} onChange={e=>setAgeMonths(e.target.value)} placeholder="6" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="7" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
        {pbstSev&&<div style={{fontSize:10,fontWeight:700,color:pbstSev.color,alignSelf:"flex-end",paddingBottom:8,whiteSpace:"nowrap"}}>PBST {pbstTotal}</div>}
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Interventions" sub="≤2 years with viral respiratory symptoms"/>
          <TeachBox id="overview" teaching={teaching}/>
          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Age ≤2 years · Viral respiratory symptoms: rhinorrhea, fever, cough, wheezing, difficulty feeding</Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Cardiac disease · Chronic lung disease / home O₂ · Anatomic airway abnormalities · Immunodeficiency · Apnea · Born &lt;32 weeks · Neuromuscular disease</Alert>
            </div>
          </Card>
          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI I, II, or III</strong> (by severity)<br/>
              Eye protection + droplet/contact isolation<br/>
              Full vitals · Document hydration, PBST score, WOB<br/>
              Evaluate positioning and nasal suctioning need<br/>
              Continuous SpO₂ only if initial SpO₂ &lt;92%<br/>
              Low-flow O₂ to maintain SpO₂ ≥92%<br/>
              LMX for IV start if moderate-severe dehydration, RR &gt;60, or severe PBST
            </div>
            <TeachBox id="oxygenation" teaching={teaching}/>
          </Card>
          <Card title="Risk Factors for Severe Course" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              • Age &lt;3 months (high apnea risk)<br/>
              • Gestational age &lt;35 weeks<br/>
              • Congenital heart disease<br/>
              • Chronic lung disease<br/>
              • Exposure to secondhand smoke
            </div>
            <TeachBox id="riskFactors" teaching={teaching}/>
          </Card>
          <Card title="Diagnostics" color={C.primary} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Virology:</strong> Only if results will change treatment or for inpatient cohorting<br/>
              <strong>CXR:</strong> Consider only if severely ill or requires admission<br/>
              <strong style={{color:C.red}}>Diagnosis is clinical</strong> — based on history, exam, and seasonality
            </div>
            <TeachBox id="diagnosis" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── PBST SCORE ── */}
      {tab==="pbst"&&(
        <Pad>
          <Q text="Pediatric Bronchiolitis Scoring Tool" sub="Suction and reposition BEFORE scoring · Score on room air"/>
          <TeachBox id="pbst" teaching={teaching}/>

          {/* RR — age dependent */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:6}}>
              Respiratory Rate
              {ageMo>0&&<span style={{fontWeight:400,color:C.muted,fontSize:11}}> ({ageMo<3?"<3 mo":ageMo<12?"3–12 mo":"12–24 mo"})</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
              {[0,1,2].map(s=>{
                const sel=pbstScores.rr===s;
                const lbl=s===0?(ageMo<3?"30–60":ageMo<12?"25–50":"20–40"):s===1?(ageMo<3?"61–69":ageMo<12?"51–59":"41–44"):(ageMo<3?"≥70 or ↓":ageMo<12?"≥60 or ↓":"≥45 or ↓");
                const bg=s===0?C.greenMid:s===1?C.amberMid:C.red;
                return(<button key={s} onClick={()=>setPbstScores(p=>({...p,rr:s}))} style={{padding:"8px 4px",borderRadius:8,cursor:"pointer",textAlign:"center",border:`1.5px solid ${sel?bg:C.rule}`,background:sel?bg:C.white,color:sel?C.white:C.ink,fontSize:11,fontWeight:sel?700:500,lineHeight:1.3}}><div>{lbl}</div><div style={{fontSize:9,opacity:0.7,marginTop:2}}>{s} pt{s!==1?"s":""}</div></button>);
              })}
            </div>
          </div>

          {/* Accessory muscle use — checkboxes, 1pt each, max 3 */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:4}}>Accessory Muscle Use <span style={{fontWeight:400,color:C.muted,fontSize:11}}>(1 pt each, max 3)</span></div>
            {["Flaring","Intercostal retractions","Substernal retractions","Head bobbing"].map(item=>{
              const checked=pbstScores.acc.includes(item);
              return(<button key={item} onClick={()=>setPbstScores(p=>({...p,acc:checked?p.acc.filter(x=>x!==item):[...p.acc,item]}))} style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"7px 12px",borderRadius:8,border:`1.5px solid ${checked?C.amberMid:C.rule}`,background:checked?`${C.amberMid}08`:C.white,cursor:"pointer",textAlign:"left",marginBottom:4}}>
                <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${checked?C.amberMid:C.rule}`,background:checked?C.amberMid:C.white,display:"flex",alignItems:"center",justifyContent:"center",color:C.white,fontSize:12,fontWeight:700,flexShrink:0}}>{checked?"✓":""}</div>
                <span style={{fontSize:13,fontWeight:checked?600:400,color:C.ink}}>{item}</span>
              </button>);
            })}
          </div>

          {/* Breath sounds, Alertness, Dyspnea — 0-3 grids */}
          {[
            {key:"breath",name:"Breath Sounds",opts:["Normal, no wheeze","End-expiratory wheeze","Expiratory wheeze throughout","Insp+exp wheeze or diminished"]},
            {key:"alert",name:"Alertness",opts:["Age-appropriate","Agitated","Doesn't arouse appropriately","Confused or somnolent"]},
            {key:"dysp",name:"Dyspnea",opts:["None","SOB with activity","SOB with talking/feeding","SOB at rest"]},
          ].map(param=>(
            <div key={param.key} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:6}}>{param.name}</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:4}}>
                {param.opts.map((lbl,s)=>{
                  const sel=pbstScores[param.key]===s;
                  const bg=s===0?C.greenMid:s===1?C.amberMid:s===2?"#ea580c":C.red;
                  return(<button key={s} onClick={()=>setPbstScores(p=>({...p,[param.key]:s}))} style={{padding:"8px 6px",borderRadius:8,cursor:"pointer",textAlign:"center",border:`1.5px solid ${sel?bg:C.rule}`,background:sel?bg:C.white,color:sel?C.white:C.ink,fontSize:10,fontWeight:sel?700:500,lineHeight:1.3}}><div>{lbl}</div><div style={{fontSize:9,opacity:0.7,marginTop:1}}>{s} pt{s!==1?"s":""}</div></button>);
                })}
              </div>
            </div>
          ))}

          {/* Total */}
          {pbstTotal!==null&&pbstSev&&(
            <div style={{background:pbstSev.bg,border:`1.5px solid ${pbstSev.border}`,borderRadius:10,padding:"14px",marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.04em"}}>PBST Total</div><div style={{fontSize:28,fontWeight:700,color:pbstSev.color,fontFamily:"'IBM Plex Mono',monospace"}}>{pbstTotal}</div></div>
              <div style={{background:pbstSev.color,color:C.white,padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:700}}>{pbstSev.text}</div>
            </div>
          )}
          {pbstTotal===null&&(<div style={{background:C.pLight,border:`1.5px solid ${C.pBorder}`,borderRadius:10,padding:"12px 14px",marginTop:8,textAlign:"center",fontSize:13,color:C.muted}}>Complete RR, breath sounds, alertness, and dyspnea to calculate</div>)}
          <button onClick={()=>setPbstScores({rr:null,acc:[],breath:null,alert:null,dysp:null})} style={{marginTop:12,width:"100%",padding:"10px",borderRadius:8,border:`1.5px solid ${C.rule}`,background:C.white,color:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>Reset PBST</button>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Management by PBST Severity" sub="Reassess per frequency below · Suction before each scoring"/>

          <Card title="Mild — PBST 0–3" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Assessment:</strong> Q4h PRN<br/>
              Nasal suction (attempt bulb suction first)<br/>
              No continuous monitoring (unless apnea concern or on O₂)<br/>
              PO trial<br/>
              <strong>Consider discharge</strong>
            </div>
          </Card>

          <Card title="Moderate — PBST 4–7" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Assessment:</strong> At least Q2h<br/>
              Nasal suction (wall suction if clinically indicated)<br/>
              Consider PO vs NG feeds per feeding algorithm<br/>
              <strong>Consider admission vs observation</strong><br/>
              If considering HFNC → perform HIP first
            </div>
          </Card>

          <Card title="Severe — PBST 8–14" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Assessment:</strong> Q1–2h<br/>
              Nasal suction · Continuous SpO₂<br/>
              IV fluid bolus {doses?<strong style={{fontFamily:"'IBM Plex Mono',monospace"}}>{doses.bolus} mL</strong>:"20 mL/kg"}<br/>
              Consider CXR<br/>
              <strong>Consider PICU consult</strong>
            </div>
          </Card>

          <Card title="HFNC Initiation Pause (HIP)" color={C.blue}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Before starting HFNC (PBST 1–7):</strong><br/>
              1. Nasal suctioning<br/>
              2. Attempt feed if safe for PO (or sucrose on pacifier)<br/>
              3. Encourage parent holding, dim lights<br/>
              4. Antipyretic for comfort<br/>
              5. Address hydration, consider bolus PRN<br/>
              6. Consider low-flow NC (for SpO₂ &lt;92% or ↑WOB)<br/><br/>
              <strong>RN/LIP huddle after 20–30 minutes:</strong>
            </div>
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <div style={{flex:1,background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"8px 10px",fontSize:12}}>
                <div style={{fontWeight:700,color:C.greenMid}}>HIP PASS</div>
                <div style={{marginTop:2}}>Stabilized → remain on RA/low-flow · Reassess per PBST</div>
              </div>
              <div style={{flex:1,background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"8px 10px",fontSize:12}}>
                <div style={{fontWeight:700,color:C.red}}>HIP FAIL</div>
                <div style={{marginTop:2}}>Start HFNC {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{doses.hfnc} L/min</span>:"1 L/kg/min"} · Re-huddle 2h · Admit</div>
              </div>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:6}}>Document: <span style={{fontFamily:"'IBM Plex Mono',monospace"}}>.HIGHFLOWPEDIATRICHUDDLE</span></div>
            <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="PICU Required">If HFNC ≥2 L/kg/min{doses?` (≥${doses.hfncMax} L/min for this patient)`:""} → must admit to PICU</Alert>
            <TeachBox id="hip" teaching={teaching}/>
          </Card>

          <Card title="Signs of Clinical Deterioration" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Lethargy · Very high or low respiratory rate · Poor perfusion · Worsening hypoxia
            </div>
            <div style={{marginTop:8,fontSize:13,fontWeight:700,color:C.red}}>PICU Consult Criteria:</div>
            <div style={{fontSize:12,lineHeight:1.6}}>
              Failure to maintain SpO₂ &gt;90% with increasing O₂ · Deteriorating respiratory status with increasing distress or exhaustion · Recurrent apnea · PBST 8–14
            </div>
          </Card>

          <Card title="Discouraged Therapies" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8,color:C.red}}>
              <strong>NOT recommended:</strong> Racemic epinephrine · Corticosteroids (inhaled or systemic) · Antibiotics · Montelukast · Chest physiotherapy
            </div>
            <TeachBox id="discouraged" teaching={teaching}/>
          </Card>

          {/* ── PATHWAY OVERVIEW FLOWCHART ── */}
          {(()=>{
            const sev=pbstSev?pbstSev.level:null;
            const hi=(lvl)=>sev===lvl?1:sev===null?0.6:0.2;
            const hiBorder=(lvl)=>sev===lvl?2.5:1;
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const bC="#0e7490",bBg="#ecfeff",bBd="#67e8f9";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);

            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                {pbstSev&&<div style={{fontSize:11,color:pbstSev.color,fontWeight:600,marginBottom:6}}>● PBST {pbstTotal} — {pbstSev.text} highlighted</div>}
                {!pbstSev&&<div style={{fontSize:11,color:C.muted,marginBottom:6}}>Score PBST to highlight the active branch</div>}
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 340" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={340} fill="#fafaf8" rx={6}/>
                    {/* Triage */}
                    <Box x={115} y={6} w={250} h={28} fill={bBg} stroke={bBd} sw={1.5} radius={14}>
                      <T x={240} y={18} size={9} weight={700} color={bC}>TRIAGE — SUCTION · POSITION · PBST</T>
                      <T x={240} y={28} size={6} color={mC}>Isolation · Vitals · SpO₂ · O₂ ≥92%</T>
                    </Box>
                    <Arrow x1={240} y1={34} x2={240} y2={48}/>
                    <g transform="translate(240,62)">
                      <polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
                      <T x={0} y={1} size={7} weight={700}>PBST Score?</T>
                    </g>
                    <line x1={185} y1={62} x2={80} y2={62} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={80} y1={62} x2={80} y2={86} color={gC}/>
                    <Arrow x1={240} y1={76} x2={240} y2={86} color={aC}/>
                    <line x1={295} y1={62} x2={400} y2={62} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={400} y1={62} x2={400} y2={86} color={rC}/>

                    {/* Mild */}
                    <g opacity={hi("mild")}>
                      <Box x={18} y={86} w={124} h={22} fill={gBg} stroke={gBd} sw={hiBorder("mild")}><T x={80} y={95} size={8} weight={700} color={gC}>MILD 0–3</T><T x={80} y={104} size={6} color={mC}>Q4h assess</T></Box>
                      <Arrow x1={80} y1={108} x2={80} y2={118} color={gC}/>
                      <Box x={18} y={118} w={124} h={34} fill={C.white} stroke={gBd}><T x={80} y={129} size={7}>Nasal suction (bulb first)</T><T x={80} y={139} size={7}>PO trial</T><T x={80} y={148} size={6} color={mC}>No continuous monitoring</T></Box>
                      <Arrow x1={80} y1={152} x2={80} y2={162} color={gC}/>
                      <Box x={18} y={162} w={124} h={20} fill={gBg} stroke={gBd} sw={1.5}><T x={80} y={175} size={8} weight={700} color={gC}>CONSIDER D/C</T></Box>
                    </g>

                    {/* Moderate */}
                    <g opacity={hi("moderate")}>
                      <Box x={160} y={86} w={160} h={22} fill={aBg} stroke={aBd} sw={hiBorder("moderate")}><T x={240} y={95} size={8} weight={700} color={aC}>MODERATE 4–7</T><T x={240} y={104} size={6} color={mC}>≥Q2h assess</T></Box>
                      <Arrow x1={240} y1={108} x2={240} y2={118} color={aC}/>
                      <Box x={160} y={118} w={160} h={34} fill={C.white} stroke={aBd}><T x={240} y={129} size={7}>Wall suction PRN · PO vs NG</T><T x={240} y={139} size={7} weight={600} color={bC}>If HFNC → HIP first</T><T x={240} y={148} size={6} color={mC}>Admission vs observation</T></Box>
                      <Arrow x1={240} y1={152} x2={240} y2={164} color={aC}/>
                      <Box x={170} y={164} w={140} h={18} fill={bBg} stroke={bBd}><T x={240} y={175} size={7} weight={700} color={bC}>HIP PAUSE (20–30 min)</T></Box>
                      <Arrow x1={210} y1={182} x2={190} y2={196} color={gC}/>
                      <Arrow x1={270} y1={182} x2={290} y2={196} color={rC}/>
                      <Box x={155} y={196} w={70} h={20} fill={gBg} stroke={gBd}><T x={190} y={209} size={7} weight={700} color={gC}>PASS</T></Box>
                      <Box x={255} y={196} w={70} h={20} fill={rBg} stroke={rBd}><T x={290} y={209} size={7} weight={700} color={rC}>FAIL → HFNC</T></Box>
                      <Arrow x1={290} y1={216} x2={290} y2={226} color={rC}/>
                      <Box x={248} y={226} w={84} h={18} fill={aBg} stroke={aBd}><T x={290} y={237} size={7} weight={600} color={aC}>ADMIT (Ward/PICU)</T></Box>
                    </g>

                    {/* Severe */}
                    <g opacity={hi("severe")}>
                      <Box x={338} y={86} w={124} h={22} fill={rBg} stroke={rBd} sw={hiBorder("severe")}><T x={400} y={95} size={8} weight={700} color={rC}>SEVERE 8–14</T><T x={400} y={104} size={6} color={mC}>Q1–2h assess</T></Box>
                      <Arrow x1={400} y1={108} x2={400} y2={118} color={rC}/>
                      <Box x={338} y={118} w={124} h={44} fill={C.white} stroke={rBd}><T x={400} y={129} size={7}>Continuous SpO₂</T><T x={400} y={139} size={7}>IV bolus · CXR</T><T x={400} y={149} size={7} weight={600} color={rC}>HFNC 1 L/kg/min</T><T x={400} y={158} size={6} color={mC}>Consider adjuncts</T></Box>
                      <Arrow x1={400} y1={162} x2={400} y2={172} color={rC}/>
                      <Box x={348} y={172} w={104} h={20} fill={rBg} stroke={rBd} sw={2}><T x={400} y={185} size={8} weight={700} color={rC}>PICU CONSULT</T></Box>
                    </g>

                    {/* Discouraged box */}
                    <Box x={18} y={200} w={124} h={40} fill="#fef2f2" stroke={rBd} radius={6}>
                      <T x={80} y={213} size={7} weight={700} color={rC}>DISCOURAGED</T>
                      <T x={80} y={223} size={6} color={rC}>No steroids · No racemic epi</T>
                      <T x={80} y={232} size={6} color={rC}>No abx · No montelukast</T>
                    </Box>

                    {/* SpO2 thresholds */}
                    <Box x={18} y={252} w={444} h={32} fill="#f1f5f9" stroke="#e2e8f0" radius={6}>
                      <T x={100} y={265} size={7} weight={700} color={rC}>SpO₂ &lt;90%</T>
                      <T x={100} y={276} size={6} color={mC}>Usually admit</T>
                      <T x={240} y={265} size={7} weight={700} color={aC}>SpO₂ 90–94%</T>
                      <T x={240} y={276} size={6} color={mC}>Supportive · Observe</T>
                      <T x={380} y={265} size={7} weight={700} color={gC}>SpO₂ &gt;94%</T>
                      <T x={380} y={276} size={6} color={mC}>Mild PBST + PO → D/C</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── INTERVENTIONS ── */}
      {tab==="meds"&&(
        <Pad>
          <Q text="Interventions & Supportive Care" sub={doses?`Calculated for ${doses.w} kg`:"Enter weight for calculations"}/>

          <Card title="Nasal Suctioning" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>First-line:</strong> Bulb syringe (especially &lt;3 months)<br/>
              <strong>If unable to clear:</strong> Wall suction / nasal aspirator<br/>
              Suction and reposition BEFORE each PBST scoring
            </div>
          </Card>

          <Card title="Albuterol — One-Time Trial" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              May consider within <strong>first 12 hours</strong> of presentation<br/>
              RN + MD at bedside for before/after evaluation<br/>
              Agreed PBST scoring to determine clinical response<br/>
              <strong>Continue ONLY if documented positive response</strong> (↓RR / ↓WOB)
            </div>
            <TeachBox id="albuterol" teaching={teaching}/>
          </Card>

          <Card title="HFNC" color={C.blue}>
            <div style={{marginTop:8}}>
              <DoseRow label="Start (1 L/kg/min)" value={doses?doses.hfnc:"—"} unit={doses?"L/min":""}/>
              <DoseRow label="PICU threshold (≥2 L/kg/min)" value={doses?doses.hfncMax:"—"} unit={doses?"L/min":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:6}}>Increase up to max of cannula · Complete HIP before initiating for PBST 1–7</div>
            </div>
            <TeachBox id="hfnc" teaching={teaching}/>
          </Card>

          <Card title="IV Fluids" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:6}}>Encourage oral rehydration first · IV if unable to tolerate ORT</div>
            </div>
          </Card>

          <Card title="Oxygen" color={C.primary} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Low-flow O₂ to maintain SpO₂ ≥92%<br/>
              Supplemental O₂ indicated if SpO₂ persistently &lt;90%<br/>
              Continuous SpO₂ only if initial &lt;92% or on O₂
            </div>
            <TeachBox id="oxygenation" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DISPO & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Disposition & References"/>

          <Card title="Discharge Criteria" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ✓ SpO₂ &gt;92% on room air<br/>
              ✓ If O₂ was required: monitor 8–12h after discontinuation (including sleep)<br/>
              ✓ Tolerating oral intake<br/>
              ✓ &lt;3 months: must clear secretions with bulb syringe and feed without desaturation<br/>
              ✓ If wall suction required: observe through ≥1 feeding and ≥1 sleep period<br/>
              ✓ &lt;2 months: consider prolonged observation (high apnea risk)
            </div>
            <TeachBox id="discharge" teaching={teaching}/>
          </Card>

          <Card title="Discharge Teaching" color={C.primary} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Typical course: profuse rhinorrhea, rapid respirations, retractions, cough, wheeze<br/>
              Supportive care: suctioning, positioning, hydration (pacing of feeds)<br/>
              Hand washing (alcohol-based rub) for all family members<br/>
              Avoid secondhand smoke exposure
            </div>
          </Card>

          <Card title="Admission Criteria" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              SpO₂ &lt;90% · Unable to maintain oral intake · PBST severe (8–14)<br/>
              HFNC ≥2 L/kg/min → PICU<br/>
              Recurrent apnea · Deteriorating respiratory status<br/><br/>
              <strong>High-risk infants for progression:</strong> &lt;3 months · GA &lt;35 wk · CHD · CLD
            </div>
          </Card>

          <Card title="AAP Key Recommendations" color={C.blue} defaultOpen={false}>
            <div style={{fontSize:12,lineHeight:1.7,marginTop:8}}>
              1. Diagnose clinically — no routine labs or imaging<br/>
              2. Assess risk factors when making management decisions<br/>
              3. Do NOT routinely use bronchodilators<br/>
              4. Do NOT routinely use corticosteroids<br/>
              5. Assess hydration and ability to take PO<br/>
              6. Do NOT use chest physiotherapy<br/>
              7. Supplemental O₂ if SpO₂ persistently &lt;90%<br/>
              8. Continuous SpO₂ NOT routinely needed<br/>
              9. Hand hygiene is the most important step in preventing nosocomial RSV spread<br/>
              10. No passive smoking exposure
            </div>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. Ralston SL et al. Clinical practice guideline: diagnosis, management, and prevention of bronchiolitis. <em>Pediatrics</em> 2014; 134:e1474.<br/>
              2. Jacobs JD et al. 7% hypertonic saline in acute bronchiolitis: a randomized controlled trial. <em>Pediatrics</em> 2014; 133:e8.<br/>
              3. Principi T et al. Effect of oxygen desaturations on subsequent medical visits in infants discharged from the ED with bronchiolitis. <em>JAMA Pediatr</em> 2016; 170:602.<br/>
              4. Gadomski AM, Scribani MB. Bronchodilators for bronchiolitis. <em>Cochrane Database Syst Rev</em> 2014; CD001266.<br/>
              5. Kepreotes E et al. High-flow warm humidified oxygen vs standard low-flow nasal cannula oxygen for moderate bronchiolitis. <em>Lancet</em> 2017; 389:930–939.<br/>
              6. Franklin D et al. A randomized trial of high-flow oxygen therapy in infants with bronchiolitis. <em>N Engl J Med</em> 2018; 378:1121–1131.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Bronchiolitis Clinical Pathway · October 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
