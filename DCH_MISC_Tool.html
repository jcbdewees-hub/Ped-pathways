<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS-C — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const C={primary:"#be123c",pLight:"#fff1f2",pBorder:"#fda4af",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"MIS-C Definition",content:"The CDC case definition (May 2020): individual aged <21 years presenting with fever, laboratory evidence of inflammation, and clinically severe illness requiring hospitalization with multisystem (≥2) organ involvement (cardiac, renal, respiratory, hematologic, GI, dermatologic, or neurological); AND no alternative plausible diagnoses; AND positive for current or recent SARS-CoV-2 by RT-PCR, serology, or antigen test, or COVID-19 exposure within 4 weeks prior to symptom onset. MIS-C is a diagnosis of exclusion."},
  cardiac:{title:"Cardiac Involvement (80%)",content:"The most dangerous aspect of MIS-C. Manifestations include hypotension/shock, elevated BNP (>400 pg/mL), elevated troponin, EF <55%, CHF, coronary artery dilatation, pericarditis/effusion, dysrhythmias, need for vasoactive support, or cardiac arrest. If ANY evidence of cardiac dysfunction, exercise caution with fluids and favor early vasoactives. Obtain ECHO ASAP. Consult Peds Cardiology."},
  labs:{title:"Lab Threshold Decision",content:"The pathway uses a two-step lab threshold to determine disposition: First, CRP ≥30 AND ESR ≥40. If met, check for at least 1 of: ALC <1000, ANC >7700, platelets <150K, Na <135, albumin <3, ALT >40, NT-proBNP >400, or elevated troponin. Meeting BOTH criteria makes the lab picture consistent with MIS-C and warrants admission with ID ± Cardiology consultation."},
  fluids:{title:"Fluid Management — Cardiac Caution",content:"Use NS or LR to normalize perfusion (HR, BP, cap refill, pulses, mental status), but carefully evaluate for fluid overload after EACH bolus — check for hepatomegaly, rales, etc. Consider POCUS to evaluate cardiac function and IVC distensibility. If ANY concern for cardiac dysfunction, exercise caution with fluid volume and favor early initiation of vasoactives instead."},
  vasoactives:{title:"Vasoactive Selection",content:"Epinephrine 0.05–1 mcg/kg/min is first-line for 'cold' shock (cool extremities, weak pulses, prolonged cap refill). Norepinephrine 0.05–1 mcg/kg/min is first-line for 'warm' shock (bounding pulses, flash cap refill, wide pulse pressure). Early vasoactive initiation is preferred over aggressive fluid resuscitation when cardiac dysfunction is suspected."},
  treatment:{title:"Definitive Treatment",content:"Treatment for confirmed MIS-C is determined by a multidisciplinary team and may include: corticosteroids, IVIG, biologics (e.g., anakinra, infliximab), and thromboprophylaxis. These are typically initiated after admission — the ED role is recognition, stabilization, initial labs, and appropriate disposition."},
  kawasaki:{title:"MIS-C vs Kawasaki Disease",content:"Key differences: Kawasaki patients tend to be younger (infants/young children). GI symptoms are uncommon in classic Kawasaki. Myocardial dysfunction and shock are less common in Kawasaki (though they are features of Kawasaki Disease Shock Syndrome). Kawasaki usually has normal or elevated platelets and normal ALC. MIS-C tends to present in older children with more pronounced GI symptoms, cytopenias, and cardiac dysfunction."},
  differential:{title:"Differential Diagnosis Approach",content:"MIS-C is a diagnosis of exclusion. The differential includes: sepsis (less cardiac involvement), acute COVID (more respiratory, less cardiac/GI), Kawasaki disease (younger, less GI/cardiac), other viral infections (EBV, CMV, adenovirus — rarely multisystem in immunocompetent), toxic shock syndrome (rapid onset, identifiable source), staph scalded skin (bullae, painful skin), MAS/HLH (more neuro, less cardiac/GI), myocarditis (may be MIS-C feature), drug hypersensitivity, and appendicitis."},
};

function useResponsive(){const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:520);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return{maxW:w>=640?800:520};}

function calcDoses(w){const wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,bolus:Math.round(wt*20),d10:Math.round(wt*5),apap:Math.round(wt*12.5*10)/10,ibu:Math.round(wt*10)};}

function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:22,fontWeight:700,marginTop:4,lineHeight:1.2}}>MIS-C</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Multisystem Inflammatory Syndrome in Children · October 2021</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const{maxW}=useResponsive();
  const doses=useMemo(()=>calcDoses(weightKg),[weightKg]);

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"decision",label:"Decisions"},
    {key:"meds",label:"Meds & Fluids"},
    {key:"special",label:"Differential & Refs"},
  ];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px"}}>
        <div style={{maxWidth:200}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="25" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="Possible MIS-C — diagnosis of exclusion"/>
          <TeachBox id="overview" teaching={teaching}/>

          <Card title="Inclusion Criteria" color={C.primary}>
            <div style={{marginTop:8}}>
              {[
                "Persistent unexplained fever ≥5 days",
                "Fever ≥3 days AND ≥2 organ system involvement (cardiac, renal, respiratory, GI, dermatologic, neurologic)",
                "Fever AND critically ill (shock, respiratory failure)",
              ].map((c,i)=>(<div key={i} style={{background:i===2?C.redBg:C.pLight,border:`1.5px solid ${i===2?C.redBorder:C.pBorder}`,borderRadius:8,padding:"8px 12px",marginBottom:4,fontSize:13}}>{i<2&&<span style={{fontWeight:700,color:C.primary}}>OR </span>}{c}</div>))}
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Age ≤28 days · Sepsis or other explanatory illness (MIS-C is a diagnosis of exclusion)</Alert>
            </div>
          </Card>

          <Card title="Clinical Features of MIS-C" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Two or more of (common → less common):<br/>
              GI symptoms (abd pain, diarrhea, vomiting) · Oral mucosal changes · Rash · Conjunctivitis · Erythema/edema of hands/feet · Lymphadenopathy · Neurologic symptoms
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI Level II</strong><br/>
              Full vitals including <strong>core temperature</strong><br/>
              Cardiac monitor + continuous SpO₂<br/>
              <strong>Establish IV (2 if possible, largest appropriate)</strong><br/>
              Bedside CBG<br/>
              O₂ for hypoxia
            </div>
          </Card>

          <Card title="Initial Labs" color={C.blue}>
            <div style={{marginTop:8}}>
              <div style={{background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,color:C.blue}}>Initial Labs (all patients)</div>
                <div style={{fontSize:12,marginTop:4}}>CBC with diff · CMP · ESR · CRP · Random Troponin · NT-proBNP · COVID RT-PCR · COVID Antibody · Blood culture · Respiratory Pathogen PCR Panel</div>
              </div>
              <div style={{background:C.purpleBg,border:`1.5px solid ${C.purpleBorder}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.purple}}>Additional Labs (high suspicion or critically ill)</div>
                <div style={{fontSize:12,marginTop:4}}>D-Dimer · PT/PTT · Fibrinogen · Ferritin · Triglycerides · LDH · CK · Blood gas with lactate · UA with microscopy</div>
              </div>
            </div>
          </Card>

          <Card title="Additional Studies" color={C.blue} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>CXR · EKG · Echocardiogram (ASAP if cardiac dysfunction suspected)</div>
          </Card>

          <Card title="Nursing Documentation" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Chief complaint · Symptom onset · History of recent COVID exposure or infection · Hemodynamic status (core temp, skin changes, new rash, cap refill, urine output, pulse quality, neuro status)
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Decision Tree" sub="Signs of shock → Lab thresholds → Disposition"/>

          <Card title="Signs of Shock?" color={C.red}>
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <div style={{flex:1,background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.red}}>YES — Shock</div>
                <div style={{fontSize:11,marginTop:4}}>
                  Use ED Sepsis Pathway<br/>
                  Fluid resuscitate — <strong>monitor closely for cardiac dysfunction</strong><br/>
                  Vasopressors early<br/>
                  Empiric antibiotics<br/>
                  Obtain ALL labs (initial + additional)<br/>
                  EKG · CXR · ECHO ASAP
                </div>
              </div>
              <div style={{flex:1,background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.blue}}>NO — Not in shock</div>
                <div style={{fontSize:11,marginTop:4}}>
                  Obtain initial labs<br/>
                  Consider EKG, CXR, cardiac POCUS<br/>
                  → Evaluate lab thresholds below
                </div>
              </div>
            </div>
            <TeachBox id="fluids" teaching={teaching}/>
          </Card>

          <Card title="Lab Threshold — Step 1" color={C.primary}>
            <div style={{marginTop:8,background:C.pLight,border:`1.5px solid ${C.pBorder}`,borderRadius:8,padding:"12px"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.primary,marginBottom:4}}>Both required:</div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,color:C.red}}>CRP ≥30 mg/L</div>
              <div style={{fontSize:12,fontWeight:700,color:C.muted}}>AND</div>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,color:C.red}}>ESR ≥40 mm/h</div>
            </div>
          </Card>

          <Card title="Lab Threshold — Step 2 (if Step 1 met)" color={C.primary}>
            <div style={{marginTop:8}}>
              <div style={{fontSize:12,fontWeight:700,color:C.primary,marginBottom:6}}>At least 1 of the following:</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:4}}>
                {[
                  ["ALC","<1,000"],["ANC",">7,700"],["Platelets","<150K"],["Na","<135"],
                  ["Albumin","<3"],["ALT",">40"],["NT-proBNP",">400"],["Troponin","Elevated"],
                ].map(([lab,val],i)=>(
                  <div key={i} style={{background:C.white,border:`1px solid ${C.rule}`,borderRadius:6,padding:"6px 8px",display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                    <span style={{fontSize:11,fontWeight:600}}>{lab}</span>
                    <span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:11,fontWeight:700,color:C.red}}>{val}</span>
                  </div>
                ))}
              </div>
            </div>
            <TeachBox id="labs" teaching={teaching}/>
          </Card>

          <Card title="Disposition by Lab Results + Exam" color={C.blue}>
            <div style={{marginTop:8}}>
              {[
                {title:"Labs + exam consistent with MIS-C",bg:C.redBg,border:C.redBorder,color:C.red,content:"Admit to inpatient · Consult Peds ID · Consult Peds Cardiology if ANY cardiac dysfunction · PICU if refractory shock, cardiac dysfunction, respiratory failure, or neuro deficits"},
                {title:"Labs or exam concerning but not fully consistent",bg:C.amberBg,border:C.amberBorder,color:C.amberMid,content:"Obtain additional labs · EKG, CXR if not done · Reassess — may evolve into MIS-C picture"},
                {title:"Reassuring exam and labs",bg:C.greenBg,border:C.greenBorder,color:C.greenMid,content:"Consider alternative diagnoses · If alternative dx needs admission → admit · Otherwise discharge with close follow-up"},
              ].map((item,i)=>(
                <div key={i} style={{background:item.bg,border:`1.5px solid ${item.border}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                  <div style={{fontSize:13,fontWeight:700,color:item.color}}>{item.title}</div>
                  <div style={{fontSize:12,marginTop:2}}>{item.content}</div>
                </div>
              ))}
            </div>
          </Card>

          <Card title="PICU Admission Criteria" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              • Refractory shock or hypotension<br/>
              • Evidence of cardiac dysfunction or injury<br/>
              • Concern for respiratory failure<br/>
              • Altered mental status or neurologic deficits
            </div>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const bC="#be123c",bBg="#fff1f2",bBd="#fda4af";
            const blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);
            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Fever + multisystem → Labs → Thresholds → Disposition</div>
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 380" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={380} fill="#fafaf8" rx={6}/>
                    <Box x={80} y={6} w={320} h={24} fill={bBg} stroke={bBd} sw={1.5} radius={12}>
                      <T x={240} y={17} size={9} weight={700} color={bC}>POSSIBLE MIS-C</T>
                      <T x={240} y={26} size={5} color={mC}>Fever + ≥2 organ systems · ESI II · Monitor · 2× IV · Labs</T>
                    </Box>
                    <Arrow x1={240} y1={30} x2={240} y2={44}/>

                    <g transform="translate(240,56)"><polygon points="0,-12 50,0 0,12 -50,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>Shock?</T></g>

                    <line x1={290} y1={56} x2={430} y2={56} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={430} y1={56} x2={430} y2={72} color={rC}/>
                    <Box x={370} y={72} w={104} h={30} fill={rBg} stroke={rBd} sw={2}><T x={422} y={82} size={6} weight={700} color={rC}>SHOCK → Sepsis Pw</T><T x={422} y={91} size={5}>Fluids (watch cardiac)</T><T x={422} y={99} size={5} color={rC}>Vasopressors early · Abx</T></Box>

                    <Arrow x1={240} y1={68} x2={240} y2={82}/>
                    <Box x={120} y={82} w={240} h={16} fill={blBg} stroke={blBd}><T x={240} y={92} size={7} weight={700} color={blC}>INITIAL LABS + Consider EKG/CXR/POCUS</T></Box>
                    <Arrow x1={240} y1={98} x2={240} y2={112}/>

                    <g transform="translate(240,124)"><polygon points="0,-12 60,0 0,12 -60,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>CRP ≥30 AND</T><T x={0} y={7} size={6} weight={700}>ESR ≥40?</T></g>

                    <Arrow x1={300} y1={124} x2={400} y2={148} color={gC}/>
                    <Box x={365} y={148} w={104} h={20} fill={gBg} stroke={gBd}><T x={417} y={157} size={6} weight={700} color={gC}>NO → Reassuring</T><T x={417} y={165} size={5} color={gC}>D/C with close f/u</T></Box>

                    <Arrow x1={240} y1={136} x2={240} y2={150}/>

                    <g transform="translate(240,162)"><polygon points="0,-12 65,0 0,12 -65,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>+ ≥1 of: ALC&lt;1K, ANC&gt;7.7K,</T><T x={0} y={7} size={6} weight={700}>Plt&lt;150K, Na&lt;135, Alb&lt;3, etc?</T></g>

                    <Arrow x1={305} y1={162} x2={400} y2={186} color={aC}/>
                    <Box x={365} y={186} w={104} h={20} fill={aBg} stroke={aBd}><T x={417} y={195} size={6} weight={700} color={aC}>NOT CONSISTENT</T><T x={417} y={203} size={5}>Add'l labs · Reassess</T></Box>

                    <Arrow x1={240} y1={174} x2={240} y2={190}/>
                    <Box x={135} y={190} w={210} h={18} fill={rBg} stroke={rBd} sw={2}><T x={240} y={201} size={8} weight={700} color={rC}>CONSISTENT WITH MIS-C</T></Box>
                    <Arrow x1={240} y1={208} x2={240} y2={222}/>

                    <g transform="translate(240,234)"><polygon points="0,-12 60,0 0,12 -60,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>Refractory shock?</T><T x={0} y={7} size={6} weight={700}>Cardiac/resp/neuro?</T></g>

                    <Arrow x1={180} y1={234} x2={100} y2={260} color={rC}/>
                    <Arrow x1={300} y1={234} x2={370} y2={260} color={aC}/>

                    <Box x={40} y={260} w={120} h={24} fill={rBg} stroke={rBd} sw={2}><T x={100} y={270} size={7} weight={700} color={rC}>PICU</T><T x={100} y={280} size={5}>ID + Cardiology consult</T></Box>
                    <Box x={310} y={260} w={120} h={24} fill={aBg} stroke={aBd}><T x={370} y={270} size={7} weight={700} color={aC}>ADMIT INPATIENT</T><T x={370} y={280} size={5}>Consult Peds ID</T></Box>

                    <Box x={60} y={300} w={360} h={22} fill={blBg} stroke={blBd} radius={8}>
                      <T x={240} y={309} size={6} weight={700} color={blC}>TREATMENT (multidisciplinary): Steroids · IVIG · Biologics · Thromboprophylaxis</T>
                    </Box>

                    <Box x={60} y={334} w={360} h={28} fill="#f1f5f9" stroke="#e2e8f0" radius={8}>
                      <T x={240} y={345} size={6} weight={700} color={rC}>⚠ CARDIAC CAUTION: Monitor for dysfunction after EACH fluid bolus</T>
                      <T x={240} y={356} size={5} color={mC}>POCUS for cardiac function + IVC · Favor vasoactives over aggressive fluids if concern</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── MEDS & FLUIDS ── */}
      {tab==="meds"&&(
        <Pad>
          <Q text="Medications & Fluids" sub={doses?`Calculated for ${doses.w} kg`:"Enter weight for calculations"}/>
          {!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above.</Alert>)}

          <Card title="Fluids — WITH Cardiac Caution" color={C.red}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS or LR bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/>
              <div style={{fontSize:12,lineHeight:1.6,marginTop:6}}>
                Normalize perfusion (HR, BP, cap refill, pulses, mental status)<br/>
                <strong style={{color:C.red}}>After EACH bolus:</strong> check for hepatomegaly, rales, fluid overload<br/>
                <strong>POCUS</strong> to evaluate cardiac function + IVC distensibility<br/>
                <strong style={{color:C.red}}>If cardiac dysfunction → caution with fluids → favor early vasoactives</strong>
              </div>
            </div>
            <TeachBox id="fluids" teaching={teaching}/>
          </Card>

          <Card title="Vasoactives" color={C.red}>
            <div style={{marginTop:8}}>
              <div style={{background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,color:C.blue}}>"Cold" Shock (cool extremities, weak pulses)</div>
                <div style={{fontSize:12,marginTop:2}}>Epinephrine 0.05–1 mcg/kg/min</div>
              </div>
              <div style={{background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.amberMid}}>"Warm" Shock (bounding pulses, flash cap refill)</div>
                <div style={{fontSize:12,marginTop:2}}>Norepinephrine 0.05–1 mcg/kg/min</div>
              </div>
            </div>
            <TeachBox id="vasoactives" teaching={teaching}/>
          </Card>

          <Card title="Antibiotics" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              If concern for possible sepsis → empiric antibiotics per ED Sepsis Pathway<br/>
              <span style={{fontSize:12,color:C.muted}}>MIS-C is a diagnosis of exclusion — treat for sepsis until ruled out</span>
            </div>
          </Card>

          <Card title="Supportive" color={C.primary} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="D10W (5 mL/kg) for CBG <60" value={doses?doses.d10:"—"} unit={doses?"mL":""}/>
              <DoseRow label="Acetaminophen (12.5 mg/kg) PO" value={doses?doses.apap:"—"} unit={doses?"mg":""}/>
              <DoseRow label="Ibuprofen (10 mg/kg) PO" value={doses?doses.ibu:"—"} unit={doses?"mg":""}/>
            </div>
          </Card>

          <Card title="Definitive MIS-C Treatment" color={C.purple} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Determined by multidisciplinary team after admission:<br/>
              Corticosteroids · IVIG · Biologics (anakinra, infliximab) · Thromboprophylaxis
            </div>
            <TeachBox id="treatment" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DIFFERENTIAL & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Differential Diagnosis & References"/>
          <TeachBox id="differential" teaching={teaching}/>

          <Card title="Organ System Involvement" color={C.primary}>
            <div style={{marginTop:8,overflowX:"auto"}}>
              <div style={{fontSize:10,minWidth:360}}>
                <div style={{display:"grid",gridTemplateColumns:"2fr 0.8fr 3fr",background:C.primary,borderRadius:"6px 6px 0 0"}}>
                  {["System","Freq","Key Manifestations"].map(h=>(<div key={h} style={{padding:"5px 6px",color:C.white,fontWeight:700,fontSize:9}}>{h}</div>))}
                </div>
                {[
                  ["GI","92%","Abd pain, diarrhea, vomiting, pancreatitis, hepatitis, GB hydrops"],
                  ["Cardiovascular","80%","Shock, ↑BNP/troponin, EF<55%, coronary dilation, pericarditis, arrhythmia"],
                  ["Hematologic","76%","Cytopenias, coagulopathy, DVT/PE, hemolysis"],
                  ["Mucocutaneous","74%","Conjunctivitis, oral changes, rash, swollen lips, hand/foot edema"],
                  ["Respiratory","70%","Resp insufficiency, bronchospasm, infiltrates, effusion"],
                  ["Neurologic","20–30%","Stroke, seizures, encephalitis, AMS, meningitis"],
                  ["Musculoskeletal","23%","Myositis, myalgias, arthritis"],
                  ["Renal","8%","AKI"],
                ].map((row,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 0.8fr 3fr",background:i%2===0?C.white:"#fafaf7",borderBottom:`1px solid ${C.rule}`}}>
                    {row.map((cell,j)=>(<div key={j} style={{padding:"4px 6px",fontSize:9,fontWeight:j===0?600:400}}>{cell}</div>))}
                  </div>
                ))}
              </div>
            </div>
            <TeachBox id="cardiac" teaching={teaching}/>
          </Card>

          <Card title="Differential Diagnosis" color={C.red}>
            <div style={{marginTop:8,overflowX:"auto"}}>
              <div style={{fontSize:10,minWidth:360}}>
                {[
                  ["Sepsis","Less cardiac involvement · No coronary abnormalities","Antibiotics · Sepsis pathway"],
                  ["Acute COVID","More resp, less cardiac/GI · Lower inflammatory markers","Supportive · Antiviral if severe"],
                  ["Kawasaki","Younger · Less GI/cardiac · Normal platelets/ALC","ASA · IVIG · Consult ID"],
                  ["Toxic Shock","Rapid onset · Identifiable source · Erythroderma","Cx · Clindamycin + Vanco"],
                  ["MAS/HLH","More neuro, less cardiac/GI · Cytopenias, liver dysfunction","Consult Peds Onc"],
                  ["Myocarditis","May be MIS-C feature · ↑Troponin, ↑BNP, arrhythmias","EKG · Echo · Inotropes"],
                ].map((row,i)=>(
                  <div key={i} style={{background:i%2===0?C.white:"#fafaf7",padding:"8px",borderBottom:`1px solid ${C.rule}`}}>
                    <div style={{fontSize:12,fontWeight:700,color:C.red}}>{row[0]}</div>
                    <div style={{fontSize:10,color:C.ink,marginTop:2}}>{row[1]}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:1}}>→ {row[2]}</div>
                  </div>
                ))}
              </div>
            </div>
            <TeachBox id="kawasaki" teaching={teaching}/>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. CDC Health Advisory: MIS-C Associated with COVID-19. May 2020.<br/>
              2. Feldstein LR et al. Multisystem inflammatory syndrome in U.S. children and adolescents. <em>N Engl J Med</em> 2020; 10.1056/NEJMoa2021680.<br/>
              3. Henderson LA et al. ACR Clinical Guidance for MIS-C: Version 2. <em>Arthritis Rheumatol</em> 2021; 73:e13–e29.<br/>
              4. Children's Hospital of Philadelphia. ED/ICU/Inpatient Clinical Pathway for MIS-C.<br/>
              5. Seattle Children's Hospital. COVID-19 Pathway v6.0.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · MIS-C Clinical Pathway · October 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
