<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suspected Pediatric Stroke — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: #f7f6f3; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo } = React;

const C = {
  primary: "#7c2d12", pLight: "#fff7ed", pBorder: "#fed7aa",
  red: "#b91c1c", redBg: "#fef2f2", redBorder: "#fca5a5",
  amber: "#92400e", amberBg: "#fffbeb", amberBorder: "#fcd34d", amberMid: "#d97706",
  green: "#166534", greenBg: "#f0fdf4", greenBorder: "#86efac", greenMid: "#16a34a",
  blue: "#1e40af", blueBg: "#eff6ff", blueBorder: "#93c5fd",
  purple: "#6b21a8", purpleBg: "#faf5ff", purpleBorder: "#c4b5fd",
  muted: "#6b7280", ink: "#1a1d21", paper: "#f7f6f3", white: "#fff", rule: "#e5e2db",
};

const BP_MALE = [
  { age: "1-4 years", p50: 90, p95: 112, p15: 129, p20: 134 },
  { age: "5 years", p50: 95, p95: 113, p15: 130, p20: 136 },
  { age: "6-10 years", p50: 96, p95: 121, p15: 139, p20: 145 },
  { age: "11-18 years", p50: 105, p95: 140, p15: 161, p20: 168 },
  { age: ">18 years", p50: 110, p95: 140, p15: 161, p20: 168 },
];
const BP_FEMALE = [
  { age: "1-4 years", p50: 90, p95: 111, p15: 128, p20: 133 },
  { age: "5 years", p50: 94, p95: 113, p15: 130, p20: 136 },
  { age: "6-10 years", p50: 96, p95: 121, p15: 139, p20: 145 },
  { age: "11-18 years", p50: 105, p95: 131, p15: 151, p20: 157 },
  { age: ">18 years", p50: 110, p95: 140, p15: 161, p20: 168 },
];

const TPA_EXCLUSIONS = [
  "Unknown time of symptom onset",
  "Pregnancy",
  "Clinical presentation suggestive of SAH (even if imaging negative)",
  "Patient who would decline blood transfusion",
  "History of prior intracranial hemorrhage",
  "Known cerebral AVM, aneurysm, or neoplasm",
  "Persistent SBP >15% above 95th percentile for age",
  "Glucose <50 or >400 mg/dL",
  "Bleeding diathesis (platelets <100K, INR >1.4, elevated aPTT)",
  "Clinical presentation consistent with acute MI or post-MI pericarditis",
  "Prior stroke, major head trauma, or intracranial injury within 3 months",
  "Major surgery or parenchymal biopsy within 10 days (relative)",
  "GI or urinary bleeding within 21 days (relative)",
  "Arterial puncture at non-compressible site or LP within 7 days (relative)",
  "Malignancy or within 1 month of cancer treatment completion",
  "Significant underlying bleeding disorder",
];

const TPA_STROKE_EXCLUSIONS = [
  "Mild deficit (PedNIHSS <4) at start of tPA or sedation for neuroimaging",
  "Severe deficit (PedNIHSS >24) suggesting large territory stroke",
  "Stroke due to endocarditis, moyamoya, sickle cell, meningitis, or emboli",
  "Primary angiitis of CNS or secondary CNS vasculitis (focal cerebral arteriopathy NOT excluded)",
];

const TPA_IMAGING_EXCLUSIONS = [
  "Intracranial hemorrhage on pretreatment imaging (even petechial)",
  "Intracranial dissection (at or distal to ophthalmic artery)",
  "Large infarct (≥1/3 MCA territory on MRI)",
  "Absence of occlusion on vascular imaging",
];

const TPA_DRUG_EXCLUSIONS = [
  "Known allergy to tPA",
  "On anticoagulation with INR ≥1.5",
  "Heparin within 4 hours with abnormal aPTT",
  "LMWH within past 24 hours",
];

const DISABLING = [
  "Complete hemianopsia",
  "Severe aphasia",
  "Visual or sensory extinction",
  "Any weakness limiting sustained effort against gravity",
  "Any deficit leading to NIHSS >5",
  "Any remaining deficit considered potentially disabling",
];

// ── Primitives ──
function Header() {
  return (
    <div style={{ background: C.primary, color: C.white, padding: "16px 20px", borderRadius: "12px 12px 0 0" }}>
      <div style={{ fontSize: 13, opacity: 0.8, letterSpacing: "0.05em", textTransform: "uppercase", fontWeight: 600 }}>Doernbecher Children's Hospital · PED</div>
      <div style={{ fontSize: 22, fontWeight: 700, marginTop: 4, lineHeight: 1.2 }}>Suspected Pediatric Stroke</div>
      <div style={{ fontSize: 14, opacity: 0.85, marginTop: 2 }}>Clinical Decision Tool · Age 0–18 · Onset &lt;48hr</div>
    </div>
  );
}

function StepBar({ current, steps }) {
  return (
    <div style={{ display: "flex", gap: 3, padding: "10px 16px", background: C.white, borderBottom: `1px solid ${C.rule}`, overflowX: "auto" }}>
      {steps.map((s, i) => {
        const act = s.key === current;
        const past = steps.findIndex(x => x.key === current) > i;
        return (
          <div key={s.key} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, minWidth: 44 }}>
            <div style={{ width: 22, height: 22, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700, background: act ? C.primary : past ? C.greenMid : C.rule, color: act || past ? C.white : C.muted }}>{i + 1}</div>
            <div style={{ fontSize: 8, fontWeight: 600, color: act ? C.primary : C.muted, textTransform: "uppercase", letterSpacing: "0.03em", textAlign: "center", lineHeight: 1.2 }}>{s.label}</div>
          </div>
        );
      })}
    </div>
  );
}

function Pad({ children }) { return <div style={{ padding: "20px" }}>{children}</div>; }
function Q({ text, sub }) {
  return (<div style={{ marginBottom: 16 }}><div style={{ fontSize: 17, fontWeight: 700, color: C.ink, lineHeight: 1.3 }}>{text}</div>{sub && <div style={{ fontSize: 13, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>{sub}</div>}</div>);
}
function NumInput({ label, value, onChange, placeholder, unit }) {
  return (<div style={{ marginBottom: 12 }}><label style={{ display: "block", fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.04em" }}>{label}</label><div style={{ display: "flex", alignItems: "center", gap: 6 }}><input type="number" inputMode="decimal" value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.rule}`, borderRadius: 8, fontSize: 16, fontWeight: 500, outline: "none", fontFamily: "'IBM Plex Mono', monospace" }} onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.rule} />{unit && <span style={{ fontSize: 13, color: C.muted, fontWeight: 500, whiteSpace: "nowrap" }}>{unit}</span>}</div></div>);
}
function Btn({ onClick, children, color = C.primary, disabled, outline }) {
  return (<button onClick={onClick} disabled={disabled} style={{ width: "100%", padding: "14px 20px", borderRadius: 10, cursor: disabled ? "not-allowed" : "pointer", border: outline ? `2px solid ${color}` : "none", background: outline ? C.white : disabled ? C.rule : color, color: outline ? color : C.white, fontSize: 15, fontWeight: 700, opacity: disabled ? 0.5 : 1, transition: "all 0.2s", marginTop: 8 }}>{children}</button>);
}
function Alert({ color, border, bg, icon, title, children }) {
  return (<div style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 12 }}><div style={{ fontSize: 14, fontWeight: 700, color, display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>{icon} {title}</div><div style={{ fontSize: 13, lineHeight: 1.5, color: C.ink }}>{children}</div></div>);
}
function Toggle({ label, checked, onToggle, color = C.red, sub }) {
  return (<button onClick={onToggle} style={{ display: "flex", alignItems: "flex-start", gap: 10, width: "100%", padding: "9px 12px", borderRadius: 8, border: `1.5px solid ${checked ? color : C.rule}`, background: checked ? `${color}08` : C.white, cursor: "pointer", textAlign: "left", marginBottom: 5 }}><div style={{ width: 20, height: 20, borderRadius: 4, border: `2px solid ${checked ? color : C.rule}`, background: checked ? color : C.white, display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 13, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>{checked ? "✓" : ""}</div><div><span style={{ fontSize: 13, fontWeight: checked ? 600 : 400, color: C.ink }}>{label}</span>{sub && <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{sub}</div>}</div></button>);
}
function Choice({ onClick, color, border, bg, title, sub }) {
  return (<button onClick={onClick} style={{ padding: "13px 16px", borderRadius: 10, border: `2px solid ${border}`, background: bg, cursor: "pointer", textAlign: "left", width: "100%", marginBottom: 8 }}><div style={{ fontSize: 15, fontWeight: 700, color }}>{title}</div>{sub && <div style={{ fontSize: 12, color: C.muted, marginTop: 2, lineHeight: 1.4 }}>{sub}</div>}</button>);
}
function Badge({ text, color }) { return <div style={{ background: color, color: C.white, padding: "12px 16px", borderRadius: 10, fontSize: 16, fontWeight: 700, textAlign: "center", marginBottom: 16 }}>{text}</div>; }
function Sec({ title, color, children }) { return (<div style={{ marginBottom: 14 }}><div style={{ fontSize: 13, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6, paddingBottom: 4, borderBottom: `2px solid ${color}` }}>{title}</div>{children}</div>); }
function DoseRow({ label, value, unit = "" }) { return (<div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: `1px dashed ${C.rule}` }}><span style={{ fontSize: 13, fontWeight: 500 }}>{label}</span><span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 600, color: C.primary }}>{value} {unit}</span></div>); }

// ── Main App ──
function App() {
  const [step, setStep] = useState("demo");
  const [ageYears, setAgeYears] = useState("");
  const [weightKg, setWeightKg] = useState("");
  const [sex, setSex] = useState("");
  const [exclusionsMet, setExclusionsMet] = useState(null);
  const [sxType, setSxType] = useState(null);
  const [onsetHrs, setOnsetHrs] = useState("");
  const [ichConcern, setIchConcern] = useState(null);
  const [ctResult, setCtResult] = useState(null);
  const [revasc, setRevasc] = useState(null);
  const [suspicion, setSuspicion] = useState(null);
  const [canMRI, setCanMRI] = useState(null);
  const [nihss, setNihss] = useState("");
  const [tpaExcl, setTpaExcl] = useState([]);
  const [outcome, setOutcome] = useState(null);
  const [copied, setCopied] = useState(false);

  const age = parseFloat(ageYears) || 0;
  const wt = parseFloat(weightKg) || 20;
  const onset = parseFloat(onsetHrs) || 0;
  const nihssVal = parseInt(nihss) || 0;

  const toggleTpaExcl = useCallback(e => setTpaExcl(p => p.includes(e) ? p.filter(x => x !== e) : [...p, e]), []);

  const doses = useMemo(() => {
    const w = parseFloat(weightKg) || 20;
    const aspMin = Math.round(w * 3 * 10) / 10;
    const aspMax = Math.min(Math.round(w * 5 * 10) / 10, 81);
    const tpa = Math.min(Math.round(w * 0.9 * 10) / 10, 90);
    const tpaBolus = Math.round(tpa * 0.1 * 10) / 10;
    const tpaDrip = Math.round((tpa - tpaBolus) * 10) / 10;
    const hepRate = age < 1 ? Math.round(w * 28 * 10) / 10 : Math.round(w * 20 * 10) / 10;
    const fosphen = Math.round(w * 20 * 10) / 10;
    const phenobarb = Math.round(w * 15 * 10) / 10;
    return { w, aspMin, aspMax, tpa, tpaBolus, tpaDrip, hepRate, fosphen, phenobarb };
  }, [weightKg, age]);

  const bpTable = sex === "F" ? BP_FEMALE : BP_MALE;

  const reset = useCallback(() => {
    setStep("demo"); setAgeYears(""); setWeightKg(""); setSex("");
    setExclusionsMet(null); setSxType(null); setOnsetHrs("");
    setIchConcern(null); setCtResult(null); setRevasc(null);
    setSuspicion(null); setCanMRI(null); setNihss(""); setTpaExcl([]);
    setOutcome(null);
  }, []);

  function goResult(o) { setOutcome(o); setStep("result"); }

  function genSummary() {
    const lines = ["SUSPECTED PEDIATRIC STROKE — CLINICAL SUMMARY"];
    lines.push(`Age: ${ageYears} years | Weight: ${weightKg} kg | Sex: ${sex || "Not specified"}`);
    lines.push(`Symptom type: ${sxType || "Not specified"} | Onset: ${onsetHrs} hours ago`);
    lines.push(`Outcome: ${outcome}`);
    if (outcome === "tpa_candidate") {
      lines.push(`\ntPA dose: ${doses.tpa} mg (0.9 mg/kg, max 90mg)`);
      lines.push(`  Bolus: ${doses.tpaBolus} mg IV push over 1 min (10%)`);
      lines.push(`  Infusion: ${doses.tpaDrip} mg IV over 1 hour (90%)`);
    }
    lines.push(`\nDISPOSITION: Admit to PICU`);
    return lines.join("\n");
  }

  function handleCopy() { navigator.clipboard.writeText(genSummary()).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); }); }

  const stepList = [
    { key: "demo", label: "Patient" },
    { key: "excl", label: "Screen" },
    { key: "sx", label: "Symptoms" },
    { key: "actions", label: "Actions" },
    { key: "imaging", label: "Imaging" },
    { key: "result", label: "Result" },
  ];

  const isRevascAge = age >= 4;
  const anteriorWindow = onset < 24;
  const posteriorWindow = onset < 48;

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", fontFamily: "'IBM Plex Sans', -apple-system, sans-serif", background: C.paper, minHeight: "100vh" }}>
      <Header />
      <StepBar current={step} steps={stepList} />

      {/* ── DEMOGRAPHICS ── */}
      {step === "demo" && (
        <Pad>
          <Q text="Patient Information" sub="Age <18 years with stroke-like symptoms, onset <48 hours" />
          <NumInput label="Age" value={ageYears} onChange={setAgeYears} placeholder="8" unit="years" />
          <NumInput label="Weight" value={weightKg} onChange={setWeightKg} placeholder="25" unit="kg" />
          <div style={{ marginBottom: 12 }}>
            <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 6, textTransform: "uppercase", letterSpacing: "0.04em" }}>Sex (for BP parameters)</label>
            <div style={{ display: "flex", gap: 6 }}>
              {["M", "F"].map(s => (
                <button key={s} onClick={() => setSex(s)} style={{ flex: 1, padding: "10px", borderRadius: 8, border: `1.5px solid ${sex === s ? C.primary : C.rule}`, background: sex === s ? C.primary : C.white, color: sex === s ? C.white : C.ink, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>{s === "M" ? "Male" : "Female"}</button>
              ))}
            </div>
          </div>
          {age >= 18 && <Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚠" title="Age ≥18">This pathway covers patients &lt;18 years. Consider adult stroke protocols.</Alert>}
          <Btn onClick={() => setStep("excl")} disabled={!ageYears || !weightKg || !sex || age >= 18}>Continue →</Btn>
        </Pad>
      )}

      {/* ── EXCLUSIONS ── */}
      {step === "excl" && (
        <Pad>
          <Q text="Exclusion Criteria" sub="Does this patient meet any of the following?" />
          <Choice onClick={() => { setExclusionsMet(true); goResult("excluded"); }} color={C.muted} border={C.rule} bg={C.white}
            title="Recent imaging has excluded stroke" />
          <Choice onClick={() => { setExclusionsMet(true); goResult("excluded"); }} color={C.muted} border={C.rule} bg={C.white}
            title="Clinical determination that stroke is highly unlikely" />
          <Choice onClick={() => { setExclusionsMet(true); goResult("excluded"); }} color={C.muted} border={C.rule} bg={C.white}
            title="Age 6mo–5yr with fever + seizure without persistent focal deficits" />
          <Choice onClick={() => { setExclusionsMet(true); goResult("excluded"); }} color={C.muted} border={C.rule} bg={C.white}
            title="New-onset seizure without focal deficits/hemiparesis" />
          <Choice onClick={() => { setExclusionsMet(true); goResult("excluded"); }} color={C.muted} border={C.rule} bg={C.white}
            title="Known epilepsy with seizure without persistent focal deficits" />
          <Btn onClick={() => { setExclusionsMet(false); setStep("sx"); }} color={C.greenMid}>No Exclusions — Continue →</Btn>
        </Pad>
      )}

      {/* ── SYMPTOM TYPE + ONSET ── */}
      {step === "sx" && (
        <Pad>
          <Q text="Stroke Symptom Type" sub="Select the most likely presentation" />
          <Choice onClick={() => setSxType("AIS")} color={C.red} border={sxType === "AIS" ? C.red : C.rule} bg={sxType === "AIS" ? C.redBg : C.white}
            title="Arterial Ischemic Stroke (AIS)"
            sub="Hemiparesis (face+arm or face/arm/leg), aphasia, visual field cut, ataxia (with HA/dizziness/vomiting), dysarthria, hemisensory loss, new focal seizure with post-ictal deficit" />
          <Choice onClick={() => setSxType("CVST")} color={C.purple} border={sxType === "CVST" ? C.purple : C.rule} bg={sxType === "CVST" ? C.purpleBg : C.white}
            title="Cerebral Venous Sinus Thrombosis (CVST)"
            sub="Unremitting escalating headache, repeated vomiting, decreased mental status (often with 6th nerve palsy, papilledema)" />
          <Choice onClick={() => setSxType("ICH")} color={C.red} border={sxType === "ICH" ? C.red : C.rule} bg={sxType === "ICH" ? C.redBg : C.white}
            title="Primary Intracranial Hemorrhage (ICH)"
            sub="Hyperacute severe headache (esp if followed by decreased mental status), sudden sustained LOC, either with focal neuro deficit" />

          {sxType && (
            <>
              <div style={{ marginTop: 16 }} />
              <NumInput label="Hours since symptom onset" value={onsetHrs} onChange={setOnsetHrs} placeholder="4" unit="hours" />
              <Btn onClick={() => setStep("actions")} disabled={!onsetHrs}>Continue →</Btn>
            </>
          )}
        </Pad>
      )}

      {/* ── IMMEDIATE ACTIONS ── */}
      {step === "actions" && (
        <Pad>
          <Badge text="Immediate Actions — First 15 Minutes" color={C.red} />
          <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⏱" title="Time-Critical Actions">
            <div style={{ lineHeight: 1.7 }}>
              1. Insert IV × 2, place monitors, obtain labs<br />
              2. Consider NS bolus, start maintenance NS<br />
              3. Bedrest, HOB flat, NPO<br />
              4. O₂ to maintain SpO₂ ≥95%<br />
              5. Goal temp &lt;37.5°C (APAP for T &gt;37.5°C)<br />
              6. Consider Peds Code White<br />
              7. <strong>Consult Peds Neurology</strong><br />
              8. Evaluate for braces → consult Peds Dentistry if MRI needed
            </div>
          </Alert>
          <Sec title="Labs" color={C.primary}>
            <div style={{ fontSize: 13, lineHeight: 1.7 }}>POC Chem 8 w/ H&H · CBG · BMP · CBC w/ diff · INR · aPTT · Fibrinogen · T&S · 12-Lead ECG</div>
          </Sec>
          <Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="📞" title="Notifications">
            • ED LIP evaluation within 10 minutes of arrival<br />
            • IP consult Peds Neurology for possible stroke<br />
            • Notify Peds Neurosurgery if CT shows ICH
          </Alert>

          <Q text="Is there strong concern for ICH or worsening mental status?" />
          <Choice onClick={() => { setIchConcern(true); setStep("imaging"); }} color={C.red} border={C.redBorder} bg={C.redBg}
            title="YES — Concern for ICH or worsening AMS"
            sub="→ Stat Head CT · Goal: imaging <15 minutes" />
          <Choice onClick={() => { setIchConcern(false); setStep("imaging"); }} color={C.primary} border={C.blueBorder} bg={C.blueBg}
            title="NO — No immediate ICH concern"
            sub={`→ Imaging goal <120 minutes`} />
        </Pad>
      )}

      {/* ── IMAGING + REVASCULARIZATION DECISION ── */}
      {step === "imaging" && ichConcern && ctResult === null && (
        <Pad>
          <Badge text="Stat Head CT Without Contrast" color={C.red} />
          <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Imaging Goal: <15 Minutes">Transport to imaging immediately for revascularization candidates, worsening GCS, or strong ICH concern.</Alert>
          <Q text="CT Result — Evidence of Hemorrhage?" />
          <Choice onClick={() => setCtResult("hemorrhage")} color={C.red} border={C.redBorder} bg={C.redBg}
            title="YES — Hemorrhage on CT" sub="→ Consult Peds Neurosurgery · Consider ICP interventions" />
          <Choice onClick={() => setCtResult("ischemia")} color={C.amberMid} border={C.amberBorder} bg={C.amberBg}
            title="Evidence of Ischemia/Thrombosis (no hemorrhage)" sub="→ Evaluate for revascularization" />
          <Choice onClick={() => setCtResult("normal")} color={C.primary} border={C.blueBorder} bg={C.blueBg}
            title="Normal CT" sub="→ Continue workup" />
        </Pad>
      )}

      {/* CT shows hemorrhage */}
      {step === "imaging" && ctResult === "hemorrhage" && (
        <Pad>
          <Badge text="Intracranial Hemorrhage Confirmed" color={C.red} />
          <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="Notify Peds Neurosurgery">
            Consider interventions for elevated ICP as appropriate.
          </Alert>
          <Btn onClick={() => goResult("ich_admit")} color={C.red}>→ Consult Neurosurgery + Hematology · Admit to PICU</Btn>
        </Pad>
      )}

      {/* CT normal or ischemia, or no ICH concern — revascularization assessment */}
      {step === "imaging" && ((ichConcern && (ctResult === "ischemia" || ctResult === "normal")) || !ichConcern) && revasc === null && (
        <Pad>
          {!ichConcern && <Badge text="Imaging Assessment" color={C.primary} />}
          {ichConcern && ctResult === "ischemia" && <Badge text="Ischemia on CT — Revascularization Assessment" color={C.amberMid} />}
          {ichConcern && ctResult === "normal" && <Badge text="Normal CT — Continue Workup" color={C.primary} />}

          <Q text="Possible Revascularization Candidate?" sub={`Patient is ${age} years old. ${isRevascAge ? "Age ≥4 years — may qualify." : "Age <4 years — not a standard candidate."}`} />

          {isRevascAge && (
            <>
              <Alert color={C.blue} border={C.blueBorder} bg={C.blueBg} icon="📋" title="Revascularization Criteria">
                <strong>Anterior circulation (hemiparesis, sensory loss, aphasia, focal weakness):</strong> onset &lt;24 hours<br />
                <strong>Posterior circulation (ataxia, vertigo, dizziness, nystagmus, blurry vision, diplopia):</strong> onset &lt;48 hours<br />
                Patient onset: <strong>{onsetHrs} hours ago</strong>
                {sxType === "AIS" && !anteriorWindow && <div style={{ color: C.red, fontWeight: 600, marginTop: 4 }}>⚠ Outside anterior circulation window (&gt;24hr)</div>}
              </Alert>
              <Choice onClick={() => setRevasc("yes_tpa")} color={C.red} border={C.redBorder} bg={C.redBg}
                title="YES — Possible Thrombolysis Candidate"
                sub="Symptom onset <3 hours or within window · In discussion with neurology" />
              <Choice onClick={() => setRevasc("yes_endo")} color={C.amberMid} border={C.amberBorder} bg={C.amberBg}
                title="YES — Possible Endovascular Therapy Candidate (not tPA)"
                sub="Symptom onset 3–8 hours or beyond tPA window" />
            </>
          )}

          <Choice onClick={() => { setRevasc("no"); setSuspicion(null); setStep("imaging_noRevasc"); }} color={C.primary} border={C.blueBorder} bg={C.blueBg}
            title={isRevascAge ? "NOT a revascularization candidate" : "Age <4 — Not a standard candidate"}
            sub="→ Assess stroke suspicion and pursue appropriate imaging" />
        </Pad>
      )}

      {/* NOT revasc candidate → suspicion + imaging */}
      {step === "imaging_noRevasc" && (
        <Pad>
          <Q text="Level of Stroke Suspicion?" sub="In discussion with neurology" />
          <Choice onClick={() => goResult("moderate_high")} color={C.amberMid} border={C.amberBorder} bg={C.amberBg}
            title="Moderate-High Suspicion"
            sub="→ Stroke Team C/S + Stroke Alert by Peds Neuro → CT/CTP/CTA or MRI Rapid Swift (TBD by stroke team)" />
          <Choice onClick={() => setStep("imaging_low")} color={C.primary} border={C.blueBorder} bg={C.blueBg}
            title="Lower Suspicion"
            sub="→ Determine if MRI/MRA can be obtained within 2–3 hours" />
        </Pad>
      )}

      {/* Lower suspicion → MRI timing */}
      {step === "imaging_low" && (
        <Pad>
          <Q text="Can MRI/MRA be obtained within 2–3 hours?" />
          <Choice onClick={() => goResult("mri_full")} color={C.greenMid} border={C.greenBorder} bg={C.greenBg}
            title="YES — Full MRI/MRA"
            sub="MRI w/o contrast · MRA head w/o · MRA neck w/wo (dissection protocol)" />
          <Choice onClick={() => goResult("qbmri")} color={C.amberMid} border={C.amberBorder} bg={C.amberBg}
            title="NO — Quick Brain MRI with DWI"
            sub="qbMRI with DWI as initial imaging" />
        </Pad>
      )}

      {/* REVASC YES → tPA screening */}
      {step === "imaging" && (revasc === "yes_tpa" || revasc === "yes_endo") && (
        <Pad>
          <Badge text={revasc === "yes_tpa" ? "Thrombolysis Candidacy Assessment" : "Endovascular Therapy Assessment"} color={C.red} />

          {revasc === "yes_tpa" && (
            <>
              <Alert color={C.primary} border={C.blueBorder} bg={C.blueBg} icon="🧠" title="In Discussion With Neurology">
                Stroke Team C/S · Stroke Alert by Peds Neurology · CT/CTP/CTA or MRI Rapid Swift · PedNIHSS to be administered by Peds or Adult Neurology
              </Alert>

              <Q text="PedNIHSS Score" sub={age >= 12 ? "Age ≥12: NIHSS ≥4 and ≤24 OR potentially disabling deficits" : "Age 4–12: NIHSS ≥8 OR potentially disabling deficits"} />
              <NumInput label="PedNIHSS" value={nihss} onChange={setNihss} placeholder="6" unit="" />

              {nihssVal > 0 && (
                <Alert color={nihssVal < (age >= 12 ? 4 : 8) ? C.greenMid : nihssVal > 24 ? C.red : C.amberMid}
                  border={nihssVal < (age >= 12 ? 4 : 8) ? C.greenBorder : nihssVal > 24 ? C.redBorder : C.amberBorder}
                  bg={nihssVal < (age >= 12 ? 4 : 8) ? C.greenBg : nihssVal > 24 ? C.redBg : C.amberBg}
                  icon={nihssVal < (age >= 12 ? 4 : 8) ? "✓" : nihssVal > 24 ? "✘" : "⚠"}
                  title={nihssVal < (age >= 12 ? 4 : 8) ? "Below tPA Threshold" : nihssVal > 24 ? "tPA Excluded (PedNIHSS >24)" : "Meets NIHSS Threshold"}>
                  {nihssVal < (age >= 12 ? 4 : 8) && "Mild deficit — tPA generally not indicated unless potentially disabling deficits present."}
                  {nihssVal > 24 && "Severe deficit suggesting large territory stroke. tPA excluded regardless of infarct volume."}
                  {nihssVal >= (age >= 12 ? 4 : 8) && nihssVal <= 24 && `PedNIHSS ${nihssVal} meets threshold for age group. Screen for contraindications.`}
                </Alert>
              )}

              <Q text="tPA Contraindications" sub="Check any that apply — ALL MUST BE ABSENT for tPA candidacy" />
              <div style={{ fontSize: 13, fontWeight: 700, color: C.red, marginBottom: 6 }}>General Exclusions:</div>
              {TPA_EXCLUSIONS.map(e => <Toggle key={e} label={e} checked={tpaExcl.includes(e)} onToggle={() => toggleTpaExcl(e)} color={C.red} />)}
              <div style={{ fontSize: 13, fontWeight: 700, color: C.red, marginBottom: 6, marginTop: 10 }}>Stroke-Related Exclusions:</div>
              {TPA_STROKE_EXCLUSIONS.map(e => <Toggle key={e} label={e} checked={tpaExcl.includes(e)} onToggle={() => toggleTpaExcl(e)} color={C.red} />)}
              <div style={{ fontSize: 13, fontWeight: 700, color: C.red, marginBottom: 6, marginTop: 10 }}>Imaging Exclusions:</div>
              {TPA_IMAGING_EXCLUSIONS.map(e => <Toggle key={e} label={e} checked={tpaExcl.includes(e)} onToggle={() => toggleTpaExcl(e)} color={C.red} />)}
              <div style={{ fontSize: 13, fontWeight: 700, color: C.red, marginBottom: 6, marginTop: 10 }}>Drug-Related Exclusions:</div>
              {TPA_DRUG_EXCLUSIONS.map(e => <Toggle key={e} label={e} checked={tpaExcl.includes(e)} onToggle={() => toggleTpaExcl(e)} color={C.red} />)}

              {tpaExcl.length > 0 ? (
                <Btn onClick={() => goResult("tpa_excluded")} color={C.red}>→ tPA Contraindicated — Admit to PICU</Btn>
              ) : (
                <Btn onClick={() => goResult("tpa_candidate")} color={C.greenMid}>No Contraindications — tPA Candidate (with Neurology)</Btn>
              )}
            </>
          )}

          {revasc === "yes_endo" && (
            <>
              <Alert color={C.primary} border={C.blueBorder} bg={C.blueBg} icon="🧠" title="In Discussion With Neurology + Interventional Radiology">
                Stroke Team C/S · Stroke Alert · CT/CTP/CTA or MRI Rapid Swift · Evaluate for mechanical thrombectomy
              </Alert>
              <Btn onClick={() => goResult("endo_candidate")} color={C.amberMid}>→ Endovascular Candidate — IR + PICU</Btn>
            </>
          )}
        </Pad>
      )}

      {/* ── RESULTS ── */}
      {step === "result" && outcome && (
        <Pad>
          {outcome === "excluded" && (
            <>
              <Badge text="OFF PATHWAY — Exclusion Criteria Met" color={C.muted} />
              <Alert color={C.muted} border={C.rule} bg={C.white} icon="📋" title="Not on Stroke Pathway">Continue to seek and treat cause of presenting symptoms.</Alert>
            </>
          )}

          {outcome === "ich_admit" && (
            <>
              <Badge text="Intracranial Hemorrhage — PICU Admission" color={C.red} />
              <Sec title="Management" color={C.red}>
                <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                  Consult Peds Neurosurgery · Consult Peds Hematology (evaluate for bleeding disorder, reverse anticoagulation if applicable) ·
                  O₂ to maintain SpO₂ &gt;95% · Maintain normothermia (&lt;37.5°C) · Maintain normoglycemia ·
                  Vital signs q1hr · Neuro checks q15 min · Consider intubation, hypertonic saline for elevated ICP
                </div>
              </Sec>
            </>
          )}

          {outcome === "moderate_high" && (
            <>
              <Badge text="Moderate-High Suspicion — Stroke Team" color={C.amberMid} />
              <Sec title="Actions" color={C.amberMid}>
                <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                  1. Stroke Team C/S and Stroke Alert by Peds Neurology<br />
                  2. CT/CT perfusion/CTA OR MRI Rapid Swift (T2, FLAIR, DWI, MRA brain) — TBD by Stroke Team<br />
                  3. Consult Peds Hematology · Consider anticoagulation / antiplatelet therapy
                </div>
              </Sec>
            </>
          )}

          {(outcome === "mri_full" || outcome === "qbmri") && (
            <>
              <Badge text={outcome === "mri_full" ? "Full MRI/MRA Imaging" : "Quick Brain MRI with DWI"} color={C.primary} />
              <Sec title="Imaging" color={C.primary}>
                <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                  {outcome === "mri_full" ? (
                    <>MRI without contrast · MRA head without contrast · MRA neck with/without contrast (dissection protocol)</>
                  ) : (
                    <>qbMRI with DWI as initial imaging · Full MRI/MRA to follow if indicated</>
                  )}
                </div>
              </Sec>
              <Sec title="If Stroke Confirmed" color={C.amberMid}>
                <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                  Consult Peds Hematology · Consider anticoagulation / antiplatelet therapy ·
                  O₂ &gt;95% · Normothermia · Normoglycemia · VS q1hr · Neuro q15min ·
                  Consider intubation, hypertonic saline for large territory stroke · Admit to PICU
                </div>
              </Sec>
              <Sec title="If Normal Imaging" color={C.greenMid}>
                <div style={{ fontSize: 13 }}>Continue to seek and treat cause of presenting symptoms.</div>
              </Sec>
            </>
          )}

          {outcome === "tpa_candidate" && (
            <>
              <Badge text="tPA Candidate — Administer With Neurology" color={C.greenMid} />
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="ALL MEDICATIONS AFTER DISCUSSION WITH NEUROLOGY">
                tPA to be administered only after neurology approval.
              </Alert>
              <Sec title={`tPA Dosing (${doses.w} kg)`} color={C.red}>
                <DoseRow label="Total dose (0.9 mg/kg, max 90 mg)" value={doses.tpa} unit="mg IV" />
                <DoseRow label="Bolus — 10% IV push over 1 min" value={doses.tpaBolus} unit="mg" />
                <DoseRow label="Infusion — 90% IV over 1 hour" value={doses.tpaDrip} unit="mg" />
              </Sec>
              <Sec title="PedNIHSS" color={C.primary}>
                <div style={{ fontSize: 13 }}>Score: <strong>{nihss}</strong> · {age >= 12 ? "Age ≥12" : "Age 4–12"}</div>
              </Sec>
            </>
          )}

          {outcome === "tpa_excluded" && (
            <>
              <Badge text="tPA Contraindicated" color={C.red} />
              <Sec title="Contraindications Identified" color={C.red}>
                <div style={{ fontSize: 13, lineHeight: 1.7 }}>{tpaExcl.map((e, i) => <div key={i}>• {e}</div>)}</div>
              </Sec>
              <Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🧠" title="Discuss With Neurology">
                Consider endovascular therapy if appropriate. Stroke team to determine further management.
              </Alert>
            </>
          )}

          {outcome === "endo_candidate" && (
            <>
              <Badge text="Endovascular Therapy Candidate" color={C.amberMid} />
              <Alert color={C.primary} border={C.blueBorder} bg={C.blueBg} icon="🏥" title="Directly to IR for Thrombectomy">
                Interventional radiology for mechanical thrombectomy if indicated, then PICU admission.
              </Alert>
            </>
          )}

          {/* SHARED SECTIONS for all admit outcomes */}
          {outcome !== "excluded" && (
            <>
              <Sec title={`Medications — All After Discussion With Neurology (${doses.w} kg)`} color={C.primary}>
                {outcome !== "ich_admit" && (
                  <>
                    <DoseRow label="Aspirin (3–5 mg/kg, max 81 mg)" value={`${doses.aspMin}–${doses.aspMax}`} unit="mg PO" />
                    <DoseRow label={`Heparin (${age < 1 ? "28" : "20"} units/kg/hr)`} value={doses.hepRate} unit="units/hr" />
                    {outcome === "tpa_candidate" && <DoseRow label="tPA (0.9 mg/kg, max 90 mg)" value={doses.tpa} unit="mg IV" />}
                  </>
                )}
                {outcome === "ich_admit" && (
                  <div style={{ fontSize: 13, color: C.red, fontWeight: 600, padding: "8px 10px", background: C.redBg, border: `1px solid ${C.redBorder}`, borderRadius: 6, marginBottom: 8 }}>
                    ⚠ Anticoagulation and antiplatelet therapy are contraindicated in hemorrhagic stroke. If patient is on anticoagulation, consult Hematology for reversal.
                  </div>
                )}
                <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginTop: 8, marginBottom: 4 }}>If seizures:</div>
                <DoseRow label={age < 0.08 ? "Phenobarbital (15 mg/kg) — neonate" : "Fosphenytoin (20 mg PE/kg)"} value={age < 0.08 ? doses.phenobarb : doses.fosphen} unit={age < 0.08 ? "mg IV" : "mg PE IV"} />
                <div style={{ fontSize: 11, color: C.muted, marginTop: 4 }}>Max fosphenytoin 1500 mg PE. Phenobarbital 15 mg/kg for neonates.</div>
              </Sec>

              <Sec title="Ongoing Management" color={C.primary}>
                <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                  O₂ to maintain SpO₂ ≥95% · Normothermia &lt;37.5°C (APAP for T &gt;37.5°C) · Normoglycemia (age &lt;2: D5; ≥2: no dextrose unless hypoglycemic) ·
                  Maintain SBP between 50th %ile and 15% above 95th %ile · Normovolemia (isotonic fluids at maintenance, bolus PRN) ·
                  Vital signs q1hr · Neuro checks q15 min · Consider intubation and hypertonic saline for large territory stroke
                </div>
              </Sec>

              <Sec title="BP Parameters" color={C.primary}>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, marginBottom: 4 }}>{sex === "M" ? "Male" : "Female"} — Goal SBP: 50th to 15% above 95th %ile</div>
                <div style={{ fontSize: 12 }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 2, background: C.primary, borderRadius: 6, overflow: "hidden", marginBottom: 2 }}>
                    <div style={{ padding: "5px 8px", color: C.white, fontWeight: 600, fontSize: 11 }}>Age</div>
                    <div style={{ padding: "5px 8px", color: C.white, fontWeight: 600, fontSize: 11 }}>50th</div>
                    <div style={{ padding: "5px 8px", color: C.white, fontWeight: 600, fontSize: 11 }}>95th</div>
                    <div style={{ padding: "5px 8px", color: C.white, fontWeight: 600, fontSize: 11 }}>&gt;15%</div>
                  </div>
                  {bpTable.map((r, i) => (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 2, background: i % 2 === 0 ? C.white : "#fafaf7", borderBottom: `1px solid ${C.rule}` }}>
                      <div style={{ padding: "4px 8px", fontSize: 11, fontWeight: 500 }}>{r.age}</div>
                      <div style={{ padding: "4px 8px", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" }}>{r.p50}</div>
                      <div style={{ padding: "4px 8px", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace" }}>{r.p95}</div>
                      <div style={{ padding: "4px 8px", fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", color: C.red, fontWeight: 600 }}>{r.p15}</div>
                    </div>
                  ))}
                </div>
              </Sec>

              <Sec title="Disposition" color={C.red}>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.red }}>
                  {outcome === "endo_candidate" ? "→ Directly to IR for Thrombectomy, then PICU" : "→ Admit to PICU"}
                </div>
              </Sec>
            </>
          )}

          <div style={{ marginTop: 16, display: "flex", flexDirection: "column", gap: 8 }}>
            <Btn onClick={handleCopy} outline color={copied ? C.greenMid : C.primary}>{copied ? "✓ Copied" : "Copy Summary"}</Btn>
            <Btn onClick={reset} outline color={C.muted}>Start New Patient</Btn>
          </div>
        </Pad>
      )}

      <div style={{ padding: "12px 20px", fontSize: 10, color: C.muted, lineHeight: 1.5, borderTop: `1px solid ${C.rule}` }}>
        <strong style={{ color: C.red }}>DISCLAIMER:</strong> Supports but does not replace clinical judgment. ALL medications to be administered only after discussion with Neurology. tPA and thrombectomy decisions require Stroke Team consensus.
        <br />Doernbecher Children's Hospital · PED · Suspected Pediatric Stroke Pathway · October 2020
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
