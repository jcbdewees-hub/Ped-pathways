<script type="text/babel">
const { useState, useCallback, useMemo, useEffect } = React;

const C = {
  primary: "#166534", pLight: "#f0fdf4", pBorder: "#86efac",
  red: "#b91c1c", redBg: "#fef2f2", redBorder: "#fca5a5",

  green: "#166534", greenBg: "#f0fdf4", greenBorder: "#86efac", greenMid: "#16a34a",

};

const TEACH = {
  epidemiology: {
    title: "Epidemiology & Diagnostic Challenge",
    patho: "Appendicitis is the most common surgical emergency in children, caused by obstruction of the appendiceal lumen — typically by a fecalith, lymphoid hyperplasia, or rarely a foreign body. Obstruction leads to increased intraluminal pressure, venous congestion, bacterial overgrowth, and transmural inflammation. If unrelieved, ischemia and perforation follow.\n\nSymptoms overlap with gastroenteritis, constipation, mesenteric adenitis, and urinary tract infections, making early appendicitis one of the most diagnostically challenging pediatric abdominal conditions.",
    pearls: "Initial misdiagnosis rates range from 28–57% in children ≤12 years and are significantly higher in children under 2. Maintain a high index of suspicion in any child with acute abdominal pain — especially when symptoms are evolving or atypical.\n\nDelayed diagnosis leads to perforation, which is associated with increased morbidity, prolonged hospital stays, and higher complication rates (abscess, wound infection, adhesive bowel obstruction).",
    evidence: "Appendicitis accounts for 1–8% of pediatric ED visits for abdominal pain. Perforation rates at presentation range from 20–35% overall and exceed 80% in children under 5. Delayed diagnosis is the strongest modifiable risk factor for perforation. (Nance 2000, PMID: 10861542; Rothrock 2000, PMID: 10891054)"
  },
  scoring: {
    title: "Why Clinical Scoring?",
    patho: "Clinical scoring tools convert subjective signs and symptoms into a standardized pretest probability, creating reproducible risk categories that map to evidence-based imaging and disposition thresholds.\n\nThis standardization reduces cognitive bias and anchoring errors — particularly important in appendicitis where the classic migration-to-RLQ presentation occurs in fewer than 60% of pediatric cases.",
    pearls: "Experienced clinician judgment has been found to be comparable to the Alvarado and PAS scores. Of the available tools, the pARC appears to have the best test characteristics for both ruling in and ruling out appendicitis.\n\nScoring tools help guide appropriate imaging decisions — avoiding both unnecessary radiation exposure and missed diagnoses. Use scores to supplement, not replace, clinical judgment.",
    evidence: "The Alvarado score and PAS have similar discriminative ability (AUC 0.72–0.82). The pARC demonstrates superior discrimination (AUC 0.85) with better calibration across the full probability spectrum. Structured scoring reduces negative appendectomy rates and unnecessary advanced imaging. (Kharbanda 2018, PMID: 29574359; Goldman 2008, PMID: 18310197)"
  },
  parc: {
    title: "About pARC",
    patho: "The Pediatric Appendicitis Risk Calculator (pARC) uses a multivariable logistic regression model incorporating eight clinical and laboratory variables: sex, age, duration of pain, pain with walking, migration of pain to RLQ, maximal tenderness in RLQ, abdominal guarding, and absolute neutrophil count (ANC).\n\nUnlike the PAS and Alvarado, which assign integer points to create discrete risk tiers, the pARC produces a continuous probability estimate (0–100%), providing more granular risk stratification.",
    pearls: "The pARC's continuous output is most valuable in the intermediate-risk range (15–50%) where imaging decisions are most impactful and where PAS/Alvarado discrete categories lose resolution.\n\nAll eight variables must be available to calculate pARC — if ANC is pending, use PAS or Alvarado for initial stratification and recalculate pARC when labs return.",
    evidence: "In external validation, the pARC outperformed PAS and Alvarado in discrimination (AUC 0.85 vs 0.74–0.78) and calibration across all risk strata. It correctly reclassified 17% of patients compared to PAS, predominantly in the intermediate range. (Kharbanda 2018, PMID: 29574359)"
  },
  ultrasound: {
    title: "Why Ultrasound First?",
    patho: "Ultrasound identifies appendicitis by visualizing a non-compressible, blind-ending tubular structure in the RLQ measuring >6 mm in diameter. Secondary signs include an appendicolith, periappendiceal fluid, echogenic mesenteric fat (fat stranding), and loss of the normal gut signature.\n\nGraded compression technique displaces overlying bowel and reduces the distance between transducer and appendix, improving visualization. However, a retrocecal appendix, obesity, or significant bowel gas can limit the acoustic window.",
    pearls: "Both ACEP and ACR recommend ultrasound as the initial imaging study in pediatric appendicitis to minimize radiation exposure. However, utility depends critically on pretest probability:\n\n• In high-risk PAS patients, 19% of US were falsely negative and 45% with equivocal results had appendicitis.\n• In intermediate-risk patients, 6% with negative US still had appendicitis.\n\nA negative or equivocal US in a high-risk patient should prompt second-line imaging — not reassurance.",
    evidence: "Multicenter data demonstrate US sensitivity of 73% and specificity of 97% for pediatric appendicitis. Sensitivity is highly operator-dependent, ranging from 44–100% across institutions. Specificity is consistently high (>94%). (Mittal 2013, PMID: 24314201; ACR Appropriateness Criteria — RLQ Pain, 2018)"
  },
  mri: {
    title: "MRI as Second-Line",
    patho: "MRI detects appendicitis using T2-weighted sequences that highlight fluid and edema within the appendiceal wall and periappendiceal tissues, and diffusion-weighted imaging (DWI) that shows restricted diffusion in inflamed tissue.\n\nA limited abdominal MRI protocol can be completed in 10–15 minutes without IV contrast, making it a practical second-line study that avoids ionizing radiation entirely.",
    pearls: "At OHSU, deferring CT to obtain a quick abdomen MRI is generally preferred to avoid excess radiation in children. MRI is the preferred second-line study after equivocal or non-diagnostic ultrasound.\n\nCT may be preferred over MRI when:\n• The patient cannot remain still (age <5, autism, severe distress)\n• There is suspected rupture with concern for complex abscess\n• The patient is obese (poor US windows and MRI field limitations)",
    evidence: "Limited abdominal MRI has sensitivity of 96–98% and specificity of 95–97% for appendicitis in children. MRI performs comparably to CT and avoids ionizing radiation. It is increasingly adopted as the second-line imaging modality of choice in pediatric centers. (Moore 2012, PMID: 23084930; Mushtaq 2019, PMID: 30778646)"
  },
  ct: {
    title: "CT Scan — Selective Use",
    patho: "CT provides cross-sectional imaging with excellent soft tissue contrast when IV contrast is used. It identifies appendicitis by demonstrating an enlarged, wall-enhancing appendix with periappendiceal inflammatory fat stranding. CT can also identify complications including perforation, abscess, and phlegmon.\n\nIV contrast improves diagnostic accuracy by highlighting mucosal enhancement and vascular changes in inflamed tissue. Oral contrast does not improve diagnostic accuracy for appendicitis and may delay time to diagnosis.",
    pearls: "CT is the most accurate single imaging study for appendicitis, but radiation exposure limits its role as first-line in children. At OHSU, CT sensitivity is approximately 100% with specificity of 99%.\n\nPrefer CT as first-line imaging in:\n• Obese patients where US is unlikely to be diagnostic and MRI field limitations apply\n• Suspected rupture where delineating abscess anatomy is critical for surgical planning\n\nCT with IV contrast is preferred for suspected rupture.",
    evidence: "CT sensitivity for pediatric appendicitis is 94–100% with specificity of 95–99%, superior to both US and MRI in most comparative studies. However, a single abdominal CT delivers approximately 3–5 mSv of radiation. The ALARA principle mandates using the lowest-radiation modality that answers the clinical question. (Doria 2006, PMID: 16569634; Defined ACR Appropriateness Criteria)"
  },
  antibiotics: {
    title: "Antibiotic Selection Rationale",
    patho: "Appendiceal perforation produces a polymicrobial intra-abdominal infection dominated by enteric gram-negative organisms (Escherichia coli, Klebsiella, Pseudomonas) and anaerobes (Bacteroides fragilis, Peptostreptococcus). The transition from simple to complicated appendicitis involves bacterial translocation through the ischemic appendiceal wall into the peritoneal cavity.\n\nCeftriaxone provides broad gram-negative coverage, while metronidazole specifically targets anaerobes — together they cover the most common organisms in appendiceal perforation and peritonitis.",
    pearls: "Antibiotics are started when surgery requests them or when perforation is detected on imaging. Do not delay antibiotics once perforation is suspected.\n\nFor severe cephalosporin allergy (anaphylaxis, angioedema), ciprofloxacin replaces ceftriaxone for gram-negative coverage while metronidazole is continued for anaerobes.\n\nSimple (non-perforated) appendicitis receives a single pre-operative prophylactic dose. Complicated appendicitis typically requires a multi-day IV course.",
    evidence: "Broad-spectrum coverage targeting gram-negatives and anaerobes is the standard of care for complicated appendicitis. Ceftriaxone + metronidazole is non-inferior to piperacillin-tazobactam for post-operative infectious complications while offering a narrower spectrum. (Solomkin 2010, PMID: 20034345; SIS/IDSA Intra-Abdominal Infection Guidelines)"
  },
  ondansetron: {
    title: "Ondansetron at Triage",
    patho: "Ondansetron is a selective serotonin 5-HT₃ receptor antagonist that blocks serotonin signaling at vagal afferent nerve terminals in the GI tract and at the chemoreceptor trigger zone in the area postrema. This dual action suppresses both peripheral and central emetic pathways.\n\nThe orally disintegrating tablet (ODT) formulation is absorbed via the buccal mucosa and GI tract, bypassing the need for IV access at triage and providing rapid onset of antiemetic effect within 15–30 minutes.",
    pearls: "Administer ondansetron ODT at triage (0.1–0.2 mg/kg, max 8 mg) for any child with suspected appendicitis and vomiting. Benefits include:\n\n• Reduced vomiting improves the quality of abdominal examination\n• Decreased aspiration risk if the patient progresses to the OR\n• Facilitates oral contrast administration if CT is ultimately needed\n• Improves patient comfort during what may be a prolonged ED workup",
    evidence: "Early antiemetic administration in pediatric acute abdomen does not mask clinical findings and improves diagnostic accuracy by enabling better physical examination. Ondansetron has an excellent safety profile with minimal side effects in the pediatric population. (Freedman 2006, PMID: 16614166; DeCamp 2008, PMID: 18762604)"
  },
  painMeds: {
    title: "Analgesia Does NOT Mask Appendicitis",
    patho: "Appendicitis pain involves two distinct pathways. Early visceral pain is transmitted via splanchnic sympathetic afferents — it is poorly localized and perceived as periumbilical or diffuse abdominal discomfort. As inflammation extends to the parietal peritoneum, somatic afferents via intercostal nerves produce well-localized RLQ pain with peritoneal signs (guarding, rebound).\n\nOpioid analgesics modulate central pain perception at the level of the spinal cord and brainstem but do not eliminate the somatic peritoneal irritation that produces guarding and rebound tenderness — the key physical findings in appendicitis.",
    pearls: "Withholding pain medication is not recommended and is considered poor practice. Appropriate analgesia actually improves diagnostic accuracy by enabling cooperative examination.\n\n• Acetaminophen is first-line for mild pain\n• IV fentanyl or morphine is appropriate for moderate-severe pain\n• Fentanyl is often preferred due to its rapid onset (2–3 minutes IV) and shorter duration (30–60 minutes), allowing meaningful serial abdominal exams between doses",
    evidence: "Multiple randomized controlled trials and meta-analyses demonstrate that opioid analgesia does not mask the signs of appendicitis, does not delay diagnosis, and does not increase perforation rates. Adequate analgesia may actually improve diagnostic accuracy. (Green 2005, PMID: 15635308; Poonai 2014, PMID: 25080085; Manterola 2011, PMID: 21328269)"
  },
  youngChildren: {
    title: "Atypical Presentations in Young Children",
    patho: "Children under 3 years have anatomical and immunological features that alter appendicitis presentation and prognosis. The pediatric appendix is shorter and funnel-shaped with a thinner wall that is more susceptible to early perforation. The omentum is underdeveloped and unable to wall off perforation, leading to diffuse peritonitis rather than localized abscess.\n\nThe immature immune system produces an atypical inflammatory response, and young children cannot reliably localize or communicate pain, further delaying diagnosis.",
    pearls: "Children <3 years are excluded from this pathway because appendicitis presents atypically in this age group:\n\n• Infants present predominantly with vomiting (85–90%), with pain being less prominent (35–77%)\n• Perforation rates are extremely high (80–100% in children <3) due to delayed diagnosis\n• Preschool-age children (3–5 years) present more classically but still have high rates of vomiting (66–100%) and fever (80–87%) compared to older children\n\nMaintain very high suspicion in any young child with vomiting, irritability, and abdominal distension.",
    evidence: "Perforation rates in children under 3 years range from 80–100%, compared to 20–35% in older children. The median time from symptom onset to diagnosis is significantly longer in younger children. A high index of suspicion and liberal use of imaging are recommended for this age group. (Nance 2000, PMID: 10861542; Sakellaris 2008, PMID: 18690419)"
  },
  lowRisk: {
    title: "Low-Risk Disposition",
    patho: "The natural history of appendicitis involves progressive inflammation over hours to days. In the early stages, symptoms may be subtle and examination findings equivocal. Serial examination exploits this time course — a truly inflamed appendix will declare itself with evolving tenderness, guarding, and peritoneal signs on repeat exam.\n\nIn genuinely low-risk patients (pretest probability <5%), the negative predictive value of a reassuring serial examination over 6–12 hours is very high, often exceeding that of early imaging.",
    pearls: "Patients with PAS/Alvarado ≤3 or very low pARC (<5%) have an appendicitis rate well under 5%. These patients can generally be safely discharged with:\n• PCP follow-up within 24 hours\n• Clear return precautions (worsening pain, fever, vomiting)\n\nLow-risk pARC (5–14%) patients may benefit from a 6-hour ED observation with serial exams — the evolving exam is often more informative than early imaging in this group. Reassess scoring after the observation period.",
    evidence: "Validated low-risk cutoffs (PAS ≤3, pARC <5%) identify patients with appendicitis rates of 1–3%, supporting safe discharge with structured follow-up. Serial observation strategies reduce advanced imaging by 20–40% without increasing perforation rates or missed diagnoses. (Kharbanda 2018, PMID: 29574359; Goldman 2008, PMID: 18310197)"
  },
  mrResults: {
    title: "Interpreting MRI Results",
    patho: "MRI findings in appendicitis correlate directly with the underlying pathology. Appendiceal wall thickening and enhancement reflect transmural inflammation. An appendix >6 mm in diameter indicates distension from luminal obstruction. Appendicoliths are the obstructing body, visible as signal voids. Periappendiceal fat stranding on T2-weighted images reflects inflammatory exudate spreading into the surrounding mesentery.\n\nFree fluid in the pelvis must be interpreted in clinical context — small volumes of free fluid are physiologic in post-menarchal girls.",
    pearls: "MR positive: wall thickening, appendix >6 mm, appendicolith, or periappendiceal fat stranding — confirms appendicitis, consult surgery.\n\nMR negative: normal appendix visualized OR appendix not seen but no RLQ fat stranding and no free fluid in boys (or only expected physiologic volume in girls) — effectively rules out appendicitis.\n\nMR equivocal: appendix not visualized AND RLQ fat stranding or unexpected free fluid present — diagnosis remains uncertain, surgical consultation is warranted for shared decision-making regarding observation vs. further imaging.",
    evidence: "MRI interpretation criteria using the combination of appendiceal diameter, wall thickening, and periappendiceal inflammation achieve sensitivity of 96–98% and specificity of 95–97%. The 'appendix not visualized with no secondary signs' criterion has a negative predictive value exceeding 98%. (Moore 2012, PMID: 23084930; Mushtaq 2019, PMID: 30778646)"
  },
};

// ── pARC Calculator (Kharbanda et al. Pediatrics 2018;141(4):e20172699, Table 3) ──
function calcPARC({ sex, age, duration, walking, migration, tenderness, guarding, anc }) {
  if (sex === null || age === null || duration === null || walking === null || migration === null || tenderness === null || guarding === null || anc === null) return null;
  const ancCapped = Math.min(parseFloat(anc) || 0, 14);
  const isMale = sex === "male" ? 1 : 0;
  const ageYrs = parseFloat(age) || 0;
  const logit = -4.3232
    + 0.8103 * isMale
    + (isMale ? 0.0050 : -0.0585) * ageYrs
    + (duration === "24-47" ? 0.2867 : duration === "48-96" ? -0.2450 : 0)
    + 0.5765 * (walking ? 1 : 0)
    + 0.4578 * (migration ? 1 : 0)
    + 0.4378 * (tenderness ? 1 : 0)
    + 0.4605 * (guarding ? 1 : 0)
    + 0.1594 * ancCapped;
  const prob = Math.round(1 / (1 + Math.exp(-logit)) * 1000) / 10;
  const stratum = prob < 5 ? "very_low" : prob < 15 ? "low" : prob < 25 ? "int_low" : prob < 50 ? "int_mid" : prob < 75 ? "int_high" : prob < 85 ? "high" : "very_high";
  const riskGroup = prob < 15 ? "low" : prob < 75 ? "intermediate" : "high";
  return { prob, stratum, riskGroup };
}

const PARC_DURATION_OPTS = [
  { value: "<24", label: "< 24 hours" },
  { value: "24-47", label: "24 – 47 hours" },
  { value: "48-96", label: "48 – 96 hours" },
];

function PARCCalculator({ age, onResult, teaching }) {
  const [sex, setSex] = useState(null);
  const [duration, setDuration] = useState(null);
  const [walking, setWalking] = useState(null);
  const [migration, setMigration] = useState(null);
  const [tenderness, setTenderness] = useState(null);
  const [guarding, setGuarding] = useState(null);
  const [anc, setAnc] = useState("");

  const ancVal = anc === "" ? null : parseFloat(anc);
  const allAnswered = sex !== null && duration !== null && walking !== null && migration !== null && tenderness !== null && guarding !== null && anc !== "";
  const result = allAnswered ? calcPARC({ sex, age, duration, walking, migration, tenderness, guarding, anc: ancVal }) : null;

  useEffect(() => { if (onResult) onResult(result); }, [result?.prob]);

  const rBtn = (val, cur, setter, label) => (
    <button onClick={() => setter(val)} style={{
      flex: 1, padding: "7px 6px", borderRadius: 6, fontSize: 12, fontWeight: cur === val ? 700 : 500,
      border: `1.5px solid ${cur === val ? C.primary : C.rule}`,
      background: cur === val ? C.pLight : C.white, color: cur === val ? C.primary : C.ink, cursor: "pointer",
    }}>{label}</button>
  );
  const yesNo = (val, setter) => (
    <div style={{ display: "flex", gap: 4 }}>
      {rBtn(true, val, setter, "Yes")}
      {rBtn(false, val, setter, "No")}
    </div>
  );

  const rColor = !result ? C.muted : result.riskGroup === "low" ? C.greenMid : result.riskGroup === "intermediate" ? C.amberMid : C.red;
  const rBg = !result ? "#f8f8f8" : result.riskGroup === "low" ? C.greenBg : result.riskGroup === "intermediate" ? C.amberBg : C.redBg;
  const rBorder = !result ? C.rule : result.riskGroup === "low" ? C.greenBorder : result.riskGroup === "intermediate" ? C.amberBorder : C.redBorder;

  return (
    <div>
      <TeachBox id="parc" teaching={teaching} />
      <div style={{ display: "grid", gap: 8 }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>Sex</div>
            <div style={{ display: "flex", gap: 4 }}>
              {rBtn("male", sex, setSex, "Male")}
              {rBtn("female", sex, setSex, "Female")}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>Age (years)</div>
            <div style={{ background: "#f0fdf4", border: `1.5px solid ${C.pBorder}`, borderRadius: 6, padding: "7px 10px", fontSize: 13, fontWeight: 600, color: C.primary, fontFamily: "'IBM Plex Mono', monospace" }}>
              {age || "—"}
            </div>
          </div>
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>Duration of Pain</div>
          <div style={{ display: "flex", gap: 4 }}>
            {PARC_DURATION_OPTS.map(o => rBtn(o.value, duration, setDuration, o.label))}
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>Pain with Walking</div>
            {yesNo(walking, setWalking)}
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>Migration to RLQ</div>
            {yesNo(migration, setMigration)}
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>Maximal RLQ Tenderness</div>
            {yesNo(tenderness, setTenderness)}
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>Abdominal Guarding</div>
            {yesNo(guarding, setGuarding)}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, marginBottom: 4 }}>ANC (×10³/μL)</div>
          <input type="number" step="0.1" min="0" max="40" value={anc} onChange={e => setAnc(e.target.value)} placeholder="e.g. 8.5" style={{
            width: "100%", padding: "8px 10px", borderRadius: 6, border: `1.5px solid ${C.rule}`, fontSize: 13,
            fontFamily: "'IBM Plex Mono', monospace", background: C.white, outline: "none",
          }} />
          <div style={{ fontSize: 10, color: C.muted, marginTop: 2 }}>Linear contribution capped at 14 × 10³/μL per model</div>
        </div>
      </div>
      {result && (
        <div style={{ background: rBg, border: `2px solid ${rColor}`, borderRadius: 10, padding: "14px", marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase" }}>pARC Probability</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: rColor, fontFamily: "'IBM Plex Mono', monospace" }}>{result.prob}%</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ background: rColor, color: C.white, padding: "6px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700 }}>
              {result.riskGroup === "low" ? "Low Risk" : result.riskGroup === "intermediate" ? "Intermediate" : "High Risk"}
            </div>
            <div style={{ fontSize: 10, color: C.muted, marginTop: 4 }}>
              {result.prob < 5 ? "Very Low (<5%)" : result.prob < 15 ? "Low (5–14%)" : result.prob < 25 ? "15–24%" : result.prob < 50 ? "25–49%" : result.prob < 75 ? "50–74%" : result.prob < 85 ? "75–84%" : "Very High (≥85%)"}
            </div>
          </div>
        </div>
      )}
      {!allAnswered && (
        <div style={{ fontSize: 12, color: C.muted, textAlign: "center", marginTop: 10, fontStyle: "italic" }}>
          Complete all fields above to calculate pARC risk
        </div>
      )}
    </div>
  );
}

function calcDoses(w, a) {
  const wt = parseFloat(w) || 0;
  const age = parseFloat(a) || 0;
  if (wt <= 0) return null;
  return {
    w: wt,
    apap: Math.min(Math.round(wt * 15), 650),
    fent: Math.min(Math.round(wt * 1 * 10) / 10, 50),
    morph: Math.min(Math.round(wt * 0.1 * 10) / 10, 8),
    ondTriage: `${Math.round(wt * 0.1 * 10) / 10}–${Math.min(Math.round(wt * 0.2 * 10) / 10, 8)}`,
    ondPO: age >= 2 && age < 4 ? "2–4" : age >= 4 && age <= 11 ? "4" : age > 11 ? "4–8" : "—",
    ondIV: Math.min(Math.round(wt * 0.15 * 10) / 10, 4),
    ceftri: Math.min(Math.round(wt * 50), 2000),
    flagyl: Math.min(Math.round(wt * 30), 1500),
    cipro: Math.min(Math.round(wt * 12.5), 400),
    bolus: Math.round(wt * 20),
  };
}

const PAS_ITEMS = [
  { label: "Anorexia", pts: 1 },
  { label: "Nausea or vomiting", pts: 1 },
  { label: "Migration of pain to RLQ", pts: 1 },
  { label: "Fever", pts: 1 },
  { label: "Cough / percussion / hopping tenderness", pts: 2 },
  { label: "RLQ tenderness", pts: 2 },
  { label: "WBC > 10,000", pts: 2 },
  { label: "ANC > 7,500", pts: 1 },
];

const ALV_ITEMS = [
  { label: "Anorexia", pts: 1 },
  { label: "Nausea or vomiting", pts: 1 },
  { label: "Migration of pain to RLQ", pts: 1 },
  { label: "Fever > 37.3°C (99.2°F)", pts: 1 },
  { label: "RLQ rebound tenderness", pts: 1 },
  { label: "RLQ tenderness", pts: 2 },
  { label: "WBC > 10,000", pts: 2 },

];

// ── Responsive Width ──
function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

// ── Primitives ──
function Header({ teaching, onToggleTeach, mode, onToggleMode }) {
  return (
    <div style={{ background: C.primary, color: C.white, padding: "16px 20px", borderRadius: "12px 12px 0 0" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 13, opacity: 0.8, letterSpacing: "0.05em", textTransform: "uppercase", fontWeight: 600 }}>Doernbecher Children's Hospital · PED</div>
          <div style={{ fontSize: 22, fontWeight: 700, marginTop: 4, lineHeight: 1.2 }}>Suspected Acute Appendicitis</div>
          <div style={{ fontSize: 14, opacity: 0.85, marginTop: 2 }}>Clinical Decision Tool · Ages 3–18 · January 2022</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-end" }}>
          <button onClick={onToggleMode} style={{
            background: mode === "wizard" ? "#ffffff30" : "#ffffff15", border: "1.5px solid " + (mode === "wizard" ? "#fff" : "#ffffff40"),

          }}>{mode === "wizard" ? "🔀 Walk-Through" : "📋 Reference"}</button>

function TabBar({ current, tabs, onChange }) {
  return (
    <div style={{ display: "flex", padding: "0 12px", background: C.white, borderBottom: `1px solid ${C.rule}`, overflowX: "auto", gap: 0 }}>
      {tabs.map(t => {
        const act = t.key === current;
        return (
          <button key={t.key} onClick={() => onChange(t.key)} style={{
            padding: "11px 14px", background: "none", border: "none", cursor: "pointer",
            fontSize: 12, fontWeight: act ? 700 : 500, color: act ? C.primary : C.muted,
            borderBottom: act ? `2.5px solid ${C.primary}` : "2.5px solid transparent",
            whiteSpace: "nowrap", transition: "all 0.15s", marginBottom: -1,
          }}>{t.label}</button>
        );
      })}
    </div>
  );
}

function Pad({ children }) { return <div style={{ padding: "20px" }}>{children}</div>; }
function Q({ text, sub }) {
  return (<div style={{ marginBottom: 16 }}><div style={{ fontSize: 17, fontWeight: 700, color: C.ink, lineHeight: 1.3 }}>{text}</div>{sub && <div style={{ fontSize: 13, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>{sub}</div>}</div>);
}
function Alert({ color, border, bg, icon, title, children }) {
  return (<div style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 12 }}><div style={{ fontSize: 14, fontWeight: 700, color, display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>{icon} {title}</div><div style={{ fontSize: 13, lineHeight: 1.5, color: C.ink }}>{children}</div></div>);
}
function Toggle({ label, checked, onToggle, color = C.amberMid, sub }) {
  return (<button onClick={onToggle} style={{ display: "flex", alignItems: "flex-start", gap: 10, width: "100%", padding: "9px 12px", borderRadius: 8, border: `1.5px solid ${checked ? color : C.rule}`, background: checked ? `${color}08` : C.white, cursor: "pointer", textAlign: "left", marginBottom: 5 }}><div style={{ width: 20, height: 20, borderRadius: 4, border: `2px solid ${checked ? color : C.rule}`, background: checked ? color : C.white, display: "flex", alignItems: "center", justifyContent: "center", color: C.white, fontSize: 13, fontWeight: 700, flexShrink: 0, marginTop: 1 }}>{checked ? "✓" : ""}</div><div><span style={{ fontSize: 13, fontWeight: checked ? 600 : 400, color: C.ink }}>{label}</span>{sub && <div style={{ fontSize: 11, color: C.muted, marginTop: 1 }}>{sub}</div>}</div></button>);
}
function Sec({ title, color, children }) { return (<div style={{ marginBottom: 14 }}><div style={{ fontSize: 13, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6, paddingBottom: 4, borderBottom: `2px solid ${color}` }}>{title}</div>{children}</div>); }
function DoseRow({ label, value, unit = "" }) { return (<div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: `1px dashed ${C.rule}` }}><span style={{ fontSize: 13, fontWeight: 500 }}>{label}</span><span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 600, color: C.primary }}>{value} {unit}</span></div>); }

function TeachBox({ id, teaching }) {
  const [tab, setTab] = useState("pearls");
  if (!teaching || !TEACH[id]) return null;
  const t = TEACH[id];
  if (t.content && !t.patho && !t.pearls && !t.evidence) {
    return (
      <div style={{ background: C.tealBg, border: `1.5px solid ${C.tealBorder}`, borderRadius: 10, padding: "12px 14px", marginBottom: 12, borderLeft: `4px solid ${C.teal}` }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.teal, display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>📖 {t.title}</div>
        <div style={{ fontSize: 12, lineHeight: 1.6, color: C.ink, whiteSpace: "pre-wrap" }}>{t.content}</div>
      </div>
    );
  }
  const tabs = [];
  if (t.patho) tabs.push({ key: "patho", label: "🧠 Pathophysiology" });
  if (t.pearls) tabs.push({ key: "pearls", label: "🩺 Clinical Pearls" });
  if (t.evidence) tabs.push({ key: "evidence", label: "📊 Evidence" });
  if (tabs.length === 0) return null;
  const activeTab = t[tab] ? tab : tabs[0].key;
  return (
    <div style={{ background: C.tealBg, border: `1.5px solid ${C.tealBorder}`, borderRadius: 10, marginBottom: 12, overflow: "hidden" }}>
      <div style={{ background: "#ccfbf1", padding: "8px 12px", borderBottom: `1px solid ${C.tealBorder}`, display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ fontSize: 13, fontWeight: 700, color: C.teal }}>📖 {t.title}</span>
      </div>
      {tabs.length > 1 && (
        <div style={{ display: "flex", background: C.white, borderBottom: `1px solid ${C.rule}` }}>
          {tabs.map(tb => {
            const act = activeTab === tb.key;
            return (
              <button key={tb.key} onClick={() => setTab(tb.key)} style={{
                flex: 1, padding: "8px 0", background: act ? C.tealBg : "#f8fafc",
                border: "none", borderBottom: act ? `2.5px solid ${C.teal}` : "2.5px solid transparent",
                cursor: "pointer", fontSize: 11, fontWeight: act ? 700 : 500, color: act ? C.teal : C.muted,
              }}>{tb.label}</button>
            );
          })}
        </div>
      )}
      <div style={{ padding: "12px 14px", fontSize: 12, lineHeight: 1.65, color: C.ink, whiteSpace: "pre-wrap" }}>{t[activeTab]}</div>
    </div>
  );
}

function Card({ title, color, children, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ background: C.white, border: `1.5px solid ${C.rule}`, borderRadius: 10, marginBottom: 12, overflow: "hidden" }}>
      <button onClick={() => setOpen(o => !o)} style={{
        display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%",
        padding: "12px 14px", background: "none", border: "none", cursor: "pointer", textAlign: "left",
      }}>
        <span style={{ fontSize: 14, fontWeight: 700, color }}>{title}</span>
        <span style={{ fontSize: 12, color: C.muted, transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
      </button>
      {open && <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${C.rule}` }}>{children}</div>}
    </div>
  );
}

function WizBtn({ label, sub, color, bg, border, onClick, selected }) {
  return (<button onClick={onClick} style={{ display: "block", width: "100%", textAlign: "left", background: selected ? bg : C.white, border: "2px solid " + (selected ? color : C.rule), borderRadius: 10, padding: "14px 16px", marginBottom: 8, cursor: "pointer", transition: "all 0.15s" }}><div style={{ fontSize: 14, fontWeight: 700, color: selected ? color : C.ink }}>{label}</div>{sub && <div style={{ fontSize: 12, color: selected ? color : C.muted, marginTop: 2, opacity: 0.85 }}>{sub}</div>}</button>);
}

// ── Walk-Through Wizard ──
function AppyWizard({ teaching, doses, ageYears }) {
  const [scoreTool, setScoreTool] = useState("pas");
  const [pasChecked, setPasChecked] = useState([]);
  const [alvChecked, setAlvChecked] = useState([]);
  const [scored, setScored] = useState(false);
  const [parcResult, setParcResult] = useState(null);
  const [usResult, setUsResult] = useState(null);
  const [mrResult, setMrResult] = useState(null);
  const [reassess, setReassess] = useState(null);

  const pasTotal = useMemo(() => pasChecked.reduce((s, i) => s + PAS_ITEMS[i].pts, 0), [pasChecked]);
  const alvTotal = useMemo(() => alvChecked.reduce((s, i) => s + ALV_ITEMS[i].pts, 0), [alvChecked]);
  const togglePas = useCallback(i => setPasChecked(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]), []);
  const toggleAlv = useCallback(i => setAlvChecked(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]), []);

  const activeTotal = scoreTool === "pas" ? pasTotal : scoreTool === "alv" ? alvTotal : 0;
  const parcScored = scoreTool === "parc" && parcResult !== null;
  const risk = !scored && !parcScored ? null
    : scoreTool === "parc" ? (parcResult ? parcResult.riskGroup : null)
    : activeTotal <= 3 ? "low" : activeTotal <= 6 ? "intermediate" : "high";
  const riskInfo = risk === "low" ? { text: scoreTool === "parc" ? "Low Risk (pARC <15%)" : "Low Risk (0–3)", color: C.greenMid, bg: C.greenBg, border: C.greenBorder }
    : risk === "intermediate" ? { text: scoreTool === "parc" ? "Intermediate (pARC 15–74%)" : "Intermediate (4–6)", color: C.amberMid, bg: C.amberBg, border: C.amberBorder }
    : risk === "high" ? { text: scoreTool === "parc" ? "High Risk (pARC ≥75%)" : "High Risk (≥7)", color: C.red, bg: C.redBg, border: C.redBorder }
    : null;

  function reset() { setPasChecked([]); setAlvChecked([]); setScored(false); setParcResult(null); setUsResult(null); setMrResult(null); setReassess(null); }

  return (<Pad>
    <Q text="Walk-Through" sub="Score the patient, then follow the pathway step by step" />
    <TeachBox id="epidemiology" teaching={teaching} />

    {/* ── STEP 1: SCORING ── */}
    <Card title="Step 1 — Clinical Appendicitis Score" color={C.primary}>
      <div style={{ fontSize: 13, marginBottom: 10 }}><strong>Select a scoring tool and check all findings that apply.</strong></div>
      <TeachBox id="scoring" teaching={teaching} />

      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        {[{ id: "pas", label: "PAS" }, { id: "alv", label: "Alvarado" }, { id: "parc", label: "pARC" }].map(t => (
            <button key={t.id} onClick={() => { setScoreTool(t.id); setScored(false); setParcResult(null); }} style={{
              flex: 1, padding: "10px", borderRadius: 8,
              border: `1.5px solid ${scoreTool === t.id ? C.primary : C.rule}`,
              background: scoreTool === t.id ? C.primary : C.white,
              color: scoreTool === t.id ? C.white : C.ink,
              fontSize: 13, fontWeight: 700, cursor: "pointer",
            }}>{t.label}</button>
        ))}
      </div>

      {scoreTool === "pas" && (<>
        {PAS_ITEMS.map((item, i) => (
          <Toggle key={i} label={item.label} sub={`+${item.pts} point${item.pts > 1 ? "s" : ""}`} checked={pasChecked.includes(i)} onToggle={() => { togglePas(i); setScored(false); }} color={C.primary} />
        ))}
        <div style={{ background: "#f8faf8", border: `1.5px solid ${C.rule}`, borderRadius: 10, padding: "14px", marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em" }}>PAS Total</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: C.ink, fontFamily: "'IBM Plex Mono', monospace" }}>{pasTotal}</div>
          </div>
          {!scored && pasChecked.length > 0 && (
            <button onClick={() => setScored(true)} style={{ background: C.primary, color: C.white, border: "none", borderRadius: 8, padding: "10px 20px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Score → Next Step</button>
          )}
        </div>
      </>)}

      {scoreTool === "alv" && (<>
        {ALV_ITEMS.map((item, i) => (
          <Toggle key={i} label={item.label} sub={`+${item.pts} point${item.pts > 1 ? "s" : ""}`} checked={alvChecked.includes(i)} onToggle={() => { toggleAlv(i); setScored(false); }} color={C.primary} />
        ))}
        <div style={{ background: "#f8faf8", border: `1.5px solid ${C.rule}`, borderRadius: 10, padding: "14px", marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em" }}>Alvarado Total</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: C.ink, fontFamily: "'IBM Plex Mono', monospace" }}>{alvTotal}</div>
          </div>
          {!scored && alvChecked.length > 0 && (
            <button onClick={() => setScored(true)} style={{ background: C.primary, color: C.white, border: "none", borderRadius: 8, padding: "10px 20px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Score → Next Step</button>
          )}
        </div>
      </>)}

      {scoreTool === "parc" && (
        <PARCCalculator age={ageYears} teaching={teaching} onResult={(r) => { setParcResult(r); }} />
      )}
    </Card>

    {/* ── RISK RESULT BANNER ── */}
    {(scored || parcScored) && riskInfo && (
      <div style={{ background: riskInfo.bg, border: `2px solid ${riskInfo.color}`, borderRadius: 10, padding: "14px", marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase" }}>Risk Stratification</div>
          <div style={{ fontSize: 18, fontWeight: 700, color: riskInfo.color, marginTop: 2 }}>{riskInfo.text}</div>
        </div>
        <div style={{ background: riskInfo.color, color: C.white, padding: "6px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700 }}>{scoreTool === "parc" ? `pARC ${parcResult.prob}%` : `${scoreTool.toUpperCase()} ${activeTotal}`}</div>
      </div>
    )}

    {/* ── LOW RISK DISPOSITION ── */}
    {(scored || parcScored) && risk === "low" && (<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Low Risk — Discharge">
      <strong>Discharge home</strong> with PCP follow-up within 24 hours.<br />Return precautions: worsening pain, persistent vomiting, fever, inability to tolerate PO.
    </Alert>)}

    {/* ── STEP 2: ULTRASOUND (intermediate + high) ── */}
    {(scored || parcScored) && (risk === "intermediate" || risk === "high") && (<Card title={"Step 2 — Ultrasound Result"} color={C.blue}>
      <div style={{ fontSize: 13, marginBottom: 10 }}>
        <strong>NPO · IV access · {risk === "high" ? "IV pain meds + fluid bolus · " : "Consider IV pain meds · "}Obtain US abdomen</strong>
        {risk === "high" && <><br /><span style={{ fontSize: 12, color: C.red }}>⚠ High-risk caveat: 19% false-neg, 45% equivocal → appy</span></>}
      </div>
      <WizBtn label="US Positive — Appendicitis" color={C.red} bg={C.redBg} border={C.redBorder} selected={usResult === "positive"} onClick={() => { setUsResult("positive"); setMrResult(null); setReassess(null); }} />
      <WizBtn label="US Negative — Appendix seen, normal" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={usResult === "negative"} onClick={() => { setUsResult("negative"); setMrResult(null); setReassess(null); }} />
      <WizBtn label="Inconclusive — Appendix not seen" sub="→ Repeat PE · Reassess before advanced imaging" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={usResult === "inconclusive"} onClick={() => { setUsResult("inconclusive"); setMrResult(null); setReassess(null); }} />
      <TeachBox id="ultrasound" teaching={teaching} />
    </Card>)}

    {usResult === "positive" && (<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Appendicitis Confirmed">
      1. <strong>Consult Pediatric Surgery</strong><br />
      2. Broad-spectrum antibiotics if surgery requests or perforation:<br />
      <strong>Ceftriaxone</strong> {doses ? doses.ceftri + " mg" : "50 mg/kg"} IV q24h + <strong>Metronidazole</strong> {doses ? doses.flagyl + " mg" : "30 mg/kg/day"} IV q24h<br />
      3. Maintenance IV fluids · <strong>→ Admit</strong>
    </Alert>)}

    {usResult === "negative" && (<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Likely NOT Appendicitis">
      1. Repeat PE · Consider alternative diagnoses<br />2. PO challenge<br />3. Consider discharge vs observation
    </Alert>)}

    {/* ── STEP 2B: REASSESSMENT AFTER INCONCLUSIVE US ── */}
    {usResult === "inconclusive" && (<Card title="Step 2B — Reassessment" color={C.amberMid}>
      <div style={{ fontSize: 13, lineHeight: 1.6, marginBottom: 10 }}>
        <strong>US was inconclusive (appendix not seen).</strong><br />
        1. <strong>Repeat physical exam</strong><br />
        2. <strong>Consider alternative diagnoses</strong> (mesenteric adenitis, constipation, ovarian pathology, UTI, etc.)<br />
        3. If appendicitis is still considered likely → proceed to advanced imaging
      </div>
      <WizBtn label="Appendicitis still likely — Proceed to MRI/CT" sub="Clinical suspicion persists after reassessment" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={reassess === "likely"} onClick={() => setReassess("likely")} />
      <WizBtn label="Alternative diagnosis more likely" sub="Exam improved or findings suggest other etiology" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={reassess === "alt"} onClick={() => setReassess("alt")} />
      {reassess === "alt" && (<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Consider Alternative Diagnosis">
        Appendicitis less likely after reassessment.<br />
        Consider PO challenge · Observe or discharge with PCP follow-up in 24 hours.<br />
        Return precautions: worsening pain, fever, vomiting
      </Alert>)}
    </Card>)}

    {/* ── STEP 3: ADVANCED IMAGING ── */}
    {usResult === "inconclusive" && reassess === "likely" && (<Card title="Step 3 — Advanced Imaging" color={C.purple}>
      <div style={{ fontSize: 13, marginBottom: 10 }}><strong>MRI abdomen</strong> (preferred — avoids radiation, 10–15 min)<br /><strong>CT abdomen</strong> if: age {'<'}5, cannot hold still, suspected rupture, obese</div>
      <WizBtn label="MR/CT Positive — Appendicitis confirmed" sub="Wall thickening, appendix >6mm, appendicolith, fat stranding" color={C.red} bg={C.redBg} border={C.redBorder} selected={mrResult === "positive"} onClick={() => setMrResult("positive")} />
      <WizBtn label="MR/CT Negative — No appendicitis" sub="Normal appendix or not seen with no RLQ fat stranding/free fluid" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={mrResult === "negative"} onClick={() => setMrResult("negative")} />
      <WizBtn label="MR/CT Equivocal — Diagnosis uncertain" sub="Appendix not visualized AND RLQ fat stranding or free fluid" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={mrResult === "equivocal"} onClick={() => setMrResult("equivocal")} />
      <TeachBox id="mrResults" teaching={teaching} />
    </Card>)}

    {mrResult === "positive" && (<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Appendicitis Confirmed">
      1. <strong>Consult Pediatric Surgery</strong><br />
      2. Antibiotics: <strong>Ceftriaxone</strong> {doses ? doses.ceftri + " mg" : "50 mg/kg"} + <strong>Metronidazole</strong> {doses ? doses.flagyl + " mg" : "30 mg/kg/day"}<br />
      <strong>→ Admit</strong>
    </Alert>)}
    {mrResult === "negative" && (<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Appendicitis Unlikely">Repeat PE · Consider alternative diagnoses · PO challenge · Consider discharge vs observation</Alert>)}
    {mrResult === "equivocal" && (<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚠️" title="Diagnosis Uncertain">
      <strong>Consult Pediatric Surgery</strong><br />Avoid empiric antibiotics unless suspected perforation.<br />Disposition per surgical recommendation.
    </Alert>)}

    {/* RESET */}
    {(scored || parcScored) && (<div style={{ textAlign: "center", marginTop: 8 }}><button onClick={reset} style={{ padding: "10px 24px", background: C.white, border: "1.5px solid " + C.rule, borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: 600, color: C.muted }}>↻ Reset Walk-Through</button></div>)}

    <PathwayFlowchart />
  </Pad>);
}

// ── Main App ──
function App() {
  const [mode, setMode] = useState("wizard");
  const [tab, setTab] = useState("triage");
  const [teaching, setTeaching] = useState(false);
  const [weightKg, setWeightKg] = useState("");
  const [ageYears, setAgeYears] = useState("");
  const [scoreTab, setScoreTab] = useState("pas");
  const [pasChecked, setPasChecked] = useState([]);
  const [alvChecked, setAlvChecked] = useState([]);

  const wt = parseFloat(weightKg) || 0;
  const age = parseFloat(ageYears) || 0;
  const doses = useMemo(() => calcDoses(weightKg, ageYears), [weightKg, ageYears]);

  const pasTotal = useMemo(() => pasChecked.reduce((s, i) => s + PAS_ITEMS[i].pts, 0), [pasChecked]);
  const alvTotal = useMemo(() => alvChecked.reduce((s, i) => s + ALV_ITEMS[i].pts, 0), [alvChecked]);

  const togglePas = useCallback(i => setPasChecked(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]), []);
  const toggleAlv = useCallback(i => setAlvChecked(p => p.includes(i) ? p.filter(x => x !== i) : [...p, i]), []);

  function riskBadge(total) {
    if (total <= 3) return { text: "Low Risk (0–3)", color: C.greenMid, bg: C.greenBg, border: C.greenBorder };
    if (total <= 6) return { text: "Intermediate (4–6)", color: C.amberMid, bg: C.amberBg, border: C.amberBorder };
    return { text: "High Risk (≥7)", color: C.red, bg: C.redBg, border: C.redBorder };
  }

  const { maxW } = useResponsive();

  const tabs = [
    { key: "triage", label: "Triage" },
    { key: "score", label: "Scoring" },
    { key: "decision", label: "Decisions" },
    { key: "meds", label: "Meds" },
    { key: "imaging", label: "Imaging" },
    { key: "special", label: "Special" },
  ];

  return (
    <div style={{ maxWidth: maxW, margin: "0 auto", fontFamily: "'IBM Plex Sans', -apple-system, sans-serif", background: C.paper, minHeight: "100vh", transition: "max-width 0.2s" }}>
      <Header teaching={teaching} onToggleTeach={() => setTeaching(t => !t)} mode={mode} onToggleMode={() => setMode(m => m === "wizard" ? "reference" : "wizard")} />
      {mode === "reference" && <TabBar current={tab} tabs={tabs} onChange={setTab} />}

      {/* ── PERSISTENT PATIENT BAR ── */}
      <div style={{ background: C.white, borderBottom: `1px solid ${C.rule}`, padding: "10px 20px", display: "flex", gap: 10, alignItems: "center" }}>
        <div style={{ flex: 1 }}>
          <label style={{ fontSize: 10, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Age (yr)</label>
          <input type="number" inputMode="decimal" value={ageYears} onChange={e => setAgeYears(e.target.value)} placeholder="8"
            style={{ display: "block", width: "100%", padding: "6px 8px", border: `1.5px solid ${C.rule}`, borderRadius: 6, fontSize: 15, fontWeight: 500, fontFamily: "'IBM Plex Mono', monospace", outline: "none", marginTop: 2 }}
            onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.rule} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={{ fontSize: 10, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e => setWeightKg(e.target.value)} placeholder="25"
            style={{ display: "block", width: "100%", padding: "6px 8px", border: `1.5px solid ${C.rule}`, borderRadius: 6, fontSize: 15, fontWeight: 500, fontFamily: "'IBM Plex Mono', monospace", outline: "none", marginTop: 2 }}
            onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.rule} />
        </div>
        {wt > 0 && <div style={{ fontSize: 11, color: C.greenMid, fontWeight: 600, alignSelf: "flex-end", paddingBottom: 8 }}>✓</div>}
      </div>

      {mode === "wizard" && <AppyWizard teaching={teaching} doses={doses} ageYears={ageYears} />}

      {/* ── TAB: TRIAGE ── */}
      {mode === "reference" && tab === "triage" && (
        <Pad>
          <Q text="Triage & Initial Interventions" sub="Ages 3–18 with RLQ pain and/or suspected appendicitis" />
          <TeachBox id="epidemiology" teaching={teaching} />

          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{ marginTop: 8 }}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">
                Ages 3–18 with RLQ pain and/or suspected appendicitis
              </Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">
                Known inflammatory GI disease (e.g. IBD) · Age &lt;3 years (atypical presentation)
              </Alert>
            </div>
          </Card>

          <Card title="Nursing Documentation" color={C.blue}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Chief complaint · Onset &amp; duration of pain, nausea, vomiting, diarrhea · Abdominal exam including ambulatory status · Last PO intake · Last bowel movement · Fever history
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{ fontSize: 13, lineHeight: 1.8, marginTop: 8 }}>
              <strong>ESI Triage Level III</strong> · Full vitals<br/>
              Ondansetron ODT {doses ? <strong style={{ fontFamily: "'IBM Plex Mono', monospace" }}>{doses.ondTriage} mg</strong> : <span>0.1–0.2 mg/kg</span>} (max 8 mg) for nausea<br/>
              Topical Lidocaine (LMX) in anticipation of IV start<br/>
              Monitor if toxic appearance or suspected peritonitis
            </div>
            <TeachBox id="ondansetron" teaching={teaching} />
          </Card>

          <Card title="Initial Labs — Place Peripheral IV" color={C.primary}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              CBC with differential · CMP · Lipase · UA · Urine hCG (if indicated)<br/>
              Crystalloid bolus {doses ? <strong style={{ fontFamily: "'IBM Plex Mono', monospace" }}>{doses.bolus} mL</strong> : "20 mL/kg"} if clinically indicated
            </div>
          </Card>
        </Pad>
      )}

      {/* ── TAB: SCORING ── */}
      {mode === "reference" && tab === "score" && (
        <Pad>
          <Q text="Clinical Appendicitis Scoring" sub="Apply a scoring tool to guide risk stratification and imaging" />
          <TeachBox id="scoring" teaching={teaching} />

          <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
            {[{id:"pas",label:"PAS"},{id:"alv",label:"Alvarado"},{id:"parc",label:"pARC"}].map(t => (
              <button key={t.id} onClick={() => setScoreTab(t.id)} style={{
                flex: 1, padding: "10px", borderRadius: 8,
                border: `1.5px solid ${scoreTab === t.id ? C.primary : C.rule}`,
                background: scoreTab === t.id ? C.primary : C.white,
                color: scoreTab === t.id ? C.white : C.ink,
                fontSize: 14, fontWeight: 700, cursor: "pointer",
              }}>{t.label}</button>
            ))}
          </div>

          {scoreTab === "pas" && (() => {
            const r = riskBadge(pasTotal);
            return (
              <>
                {PAS_ITEMS.map((item, i) => (
                  <Toggle key={i} label={item.label} sub={`+${item.pts} point${item.pts > 1 ? "s" : ""}`} checked={pasChecked.includes(i)} onToggle={() => togglePas(i)} color={C.amberMid} />
                ))}
                <div style={{ background: r.bg, border: `1.5px solid ${r.border}`, borderRadius: 10, padding: "14px", marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em" }}>PAS Total</div>
                    <div style={{ fontSize: 28, fontWeight: 700, color: r.color, fontFamily: "'IBM Plex Mono', monospace" }}>{pasTotal}</div>
                  </div>
                  <div style={{ background: r.color, color: C.white, padding: "6px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700 }}>{r.text}</div>
                </div>
              </>
            );
          })()}

          {scoreTab === "alv" && (() => {
            const r = riskBadge(alvTotal);
            return (
              <>
                {ALV_ITEMS.map((item, i) => (
                  <Toggle key={i} label={item.label} sub={`+${item.pts} point${item.pts > 1 ? "s" : ""}`} checked={alvChecked.includes(i)} onToggle={() => toggleAlv(i)} color={C.amberMid} />
                ))}
                <div style={{ background: r.bg, border: `1.5px solid ${r.border}`, borderRadius: 10, padding: "14px", marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em" }}>Alvarado Total</div>
                    <div style={{ fontSize: 28, fontWeight: 700, color: r.color, fontFamily: "'IBM Plex Mono', monospace" }}>{alvTotal}</div>
                  </div>
                  <div style={{ background: r.color, color: C.white, padding: "6px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700 }}>{r.text}</div>
                </div>
              </>
            );
          })()}

          {scoreTab === "parc" && (
            <PARCCalculator age={ageYears} teaching={teaching} onResult={() => {}} />
          )}
        </Pad>
      )}

      {/* ── TAB: DECISIONS ── */}
      {mode === "reference" && tab === "decision" && (
        <Pad>
          <Q text="Decision Tree by Risk" sub="Actions based on clinical scoring result" />

          <Card title="Low Risk — PAS/Alv ≤3 · pARC <5%" color={C.greenMid}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>→ Discharge home</strong> with PCP follow-up within 24 hours.<br/>
              Return precautions: worsening pain, persistent vomiting, fever, inability to tolerate PO.
            </div>
            <TeachBox id="lowRisk" teaching={teaching} />
          </Card>

          <Card title="Low pARC (5–14%) — Observe or Image" color={C.greenMid} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Consider <strong>ED observation for 6 hours</strong> with serial exams vs US abdomen.<br/>
              If symptoms improve → discharge with PCP follow-up.<br/>
              If symptoms persist or worsen → proceed to imaging.
            </div>
          </Card>

          <Card title="Intermediate — PAS/Alv 4–6 · pARC 15–74%" color={C.amberMid}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              1. NPO<br/>
              2. IV access (if not already obtained)<br/>
              3. Consider IV pain medications, fluid bolus<br/>
              4. <strong>Obtain US abdomen</strong> (rule out ovarian torsion in females)
            </div>
            <TeachBox id="painMeds" teaching={teaching} />
          </Card>

          <Card title="High Risk — PAS/Alv ≥7 · pARC ≥75%" color={C.red}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              1. NPO<br/>
              2. IV access (if not already obtained)<br/>
              3. <strong>IV pain medications, fluid bolus</strong><br/>
              4. <strong>Obtain US abdomen</strong> (rule out ovarian torsion in females)
            </div>
            <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="High-Risk US Caveat">
              19% of US falsely negative · 45% with equivocal results have appendicitis. A negative US does NOT rule out appendicitis in high-risk patients.
            </Alert>
          </Card>

          <div style={{ fontSize: 15, fontWeight: 700, color: C.ink, marginTop: 20, marginBottom: 12 }}>US Result Pathways</div>

          <Card title="US Positive → Appendicitis" color={C.red} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>1. Consult Pediatric Surgery</strong><br/>
              2. Start broad-spectrum antibiotics if surgery requests or perforation detected<br/>
              3. Maintenance IV fluids
            </div>
          </Card>

          <Card title="US Negative (Appendix Seen, Normal)" color={C.greenMid} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Likely NOT appendicitis.<br/>
              1. Repeat PE · Consider alternative diagnoses<br/>
              2. PO challenge<br/>
              3. Consider discharge vs observation
            </div>
          </Card>

          <Card title="Appendix Not Seen / Inconclusive" color={C.amberMid} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              1. Repeat PE · Consider alternative diagnoses<br/>
              2. If appendicitis still likely:<br/>
              <div style={{ paddingLeft: 16, marginTop: 4 }}>
                <strong>MRI abdomen</strong> (preferred — avoids radiation)<br/>
                <strong>CT abdomen</strong> if: age &lt;5, cannot hold still 10–15 min, autism, suspected rupture, obese
              </div>
            </div>
            <TeachBox id="mri" teaching={teaching} />
            <TeachBox id="ct" teaching={teaching} />

            <div style={{ fontSize: 14, fontWeight: 700, color: C.ink, marginTop: 14, marginBottom: 8 }}>MRI Result Interpretation</div>
            <div style={{ background: C.redBg, border: `1.5px solid ${C.redBorder}`, borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.red }}>MR Positive → Appendicitis</div>
              <div style={{ fontSize: 12, color: C.ink, marginTop: 2 }}>Wall thickening · Appendix &gt;6 mm · Appendicolith · Fat stranding</div>
            </div>
            <div style={{ background: C.greenBg, border: `1.5px solid ${C.greenBorder}`, borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.greenMid }}>MR Negative → Likely NOT Appendicitis</div>
              <div style={{ fontSize: 12, color: C.ink, marginTop: 2 }}>Normal appendix OR not seen but no RLQ fat stranding, no free fluid in boys (or expected physiologic volume in girls)</div>
            </div>
            <div style={{ background: C.amberBg, border: `1.5px solid ${C.amberBorder}`, borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.amberMid }}>MR Equivocal → Diagnosis Uncertain</div>
              <div style={{ fontSize: 12, color: C.ink, marginTop: 2 }}>Appendix not visualized AND RLQ fat stranding or unexpected free fluid → Consult Peds Surgery · Avoid empiric abx unless suspected perforation</div>
            </div>
            <TeachBox id="mrResults" teaching={teaching} />
          </Card>

          <Card title="High Risk — Appendix Not Seen" color={C.red} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Diagnosis uncertain.<br/>
              1. Repeat PE · Consider alternative diagnoses<br/>
              2. <strong>Consult Pediatric Surgery</strong><br/>
              3. Avoid empiric antibiotics unless suspected perforation
            </div>
          </Card>

          <div style={{ fontSize: 15, fontWeight: 700, color: C.ink, marginTop: 20, marginBottom: 12 }}>Disposition</div>
          <Card title="Confirmed Appendicitis" color={C.red} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              1. Consult Pediatric Surgery<br/>
              2. Start broad-spectrum antibiotics if surgery requests or perforation detected<br/>
              3. Maintenance IV fluids
            </div>
          </Card>

          <PathwayFlowchart />
        </Pad>
      )}

      {/* ── TAB: MEDS ── */}
      {mode === "reference" && tab === "meds" && (
        <Pad>
          <Q text="Medication Dosing" sub={doses ? `Calculated for ${doses.w} kg` : "Enter weight above for calculations"} />

          {!doses && (
            <Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">
              Enter the patient's weight in the bar above to calculate doses.
            </Alert>
          )}

          <Card title="Analgesics" color={C.primary}>
            <div style={{ marginTop: 8 }}>
              <DoseRow label="Acetaminophen PO/PR (15 mg/kg) q4h" value={doses ? doses.apap : "—"} unit={doses ? "mg (max 650)" : ""} />
              <DoseRow label="Fentanyl IV (1 mcg/kg) q10min PRN" value={doses ? doses.fent : "—"} unit={doses ? "mcg (max 50)" : ""} />
              <DoseRow label="Morphine IV (0.1 mg/kg) q10min PRN" value={doses ? doses.morph : "—"} unit={doses ? "mg (max 8)" : ""} />
            </div>
            <TeachBox id="painMeds" teaching={teaching} />
          </Card>

          <Card title="Anti-Emetics" color={C.primary}>
            <div style={{ marginTop: 8 }}>
              <DoseRow label="Ondansetron ODT triage (0.1–0.2 mg/kg)" value={doses ? doses.ondTriage : "—"} unit={doses ? "mg (max 8)" : ""} />
              <DoseRow label="Ondansetron PO (age-based)" value={doses ? doses.ondPO : "—"} unit="mg" />
              <DoseRow label="Ondansetron IV (0.15 mg/kg)" value={doses ? doses.ondIV : "—"} unit={doses ? "mg (max 4)" : ""} />
              {age > 0 && (
                <div style={{ fontSize: 11, color: C.muted, marginTop: 6, padding: "5px 7px", background: C.pLight, borderRadius: 5 }}>
                  PO dosing: 2–4y: 2–4 mg · 4–11y: 4 mg · &gt;11y: 4–8 mg
                </div>
              )}
            </div>
            <TeachBox id="ondansetron" teaching={teaching} />
          </Card>

          <Card title="Antibiotics — If Appendicitis Confirmed" color={C.red}>
            <div style={{ marginTop: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 6 }}>Standard</div>
              <DoseRow label="Ceftriaxone (50 mg/kg) q24h" value={doses ? doses.ceftri : "—"} unit={doses ? "mg IV (max 2g)" : ""} />
              <DoseRow label="Metronidazole (30 mg/kg/day) q24h" value={doses ? doses.flagyl : "—"} unit={doses ? "mg IV (max 1.5g)" : ""} />

              <div style={{ fontSize: 12, fontWeight: 600, color: C.red, textTransform: "uppercase", letterSpacing: "0.04em", marginTop: 12, marginBottom: 6 }}>Severe Cephalosporin Allergy</div>
              <DoseRow label="Ciprofloxacin (12.5 mg/kg) q12h" value={doses ? doses.cipro : "—"} unit={doses ? "mg IV (max 400)" : ""} />
              <DoseRow label="+ Metronidazole (30 mg/kg/day) q24h" value={doses ? doses.flagyl : "—"} unit={doses ? "mg IV (max 1.5g)" : ""} />
            </div>
            <TeachBox id="antibiotics" teaching={teaching} />
          </Card>

          <Card title="IV Fluids" color={C.primary}>
            <div style={{ marginTop: 8 }}>
              <DoseRow label="Crystalloid bolus (20 mL/kg)" value={doses ? doses.bolus : "—"} unit={doses ? "mL" : ""} />
              <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>Maintenance fluids once appendicitis confirmed</div>
            </div>
          </Card>
        </Pad>
      )}

      {/* ── TAB: IMAGING ── */}
      {mode === "reference" && tab === "imaging" && (
        <Pad>
          <Q text="Imaging Evidence Summary" sub="Modality selection and test characteristics" />

          <Card title="Ultrasound — First-Line" color={C.blue}>
            <div style={{ marginTop: 8 }}>
              <div style={{ fontSize: 13, lineHeight: 1.7 }}>
                ACEP &amp; ACR recommend US first to minimize radiation in pediatric patients.
              </div>
              <div style={{ background: C.blueBg, border: `1.5px solid ${C.blueBorder}`, borderRadius: 8, padding: "10px 12px", marginTop: 8 }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, lineHeight: 1.8 }}>
                  Sensitivity: <strong>73%</strong> · Specificity: <strong>97%</strong><br/>
                  <span style={{ fontSize: 11, color: C.muted }}>(Mittal et al. — multicenter)</span>
                </div>
              </div>
              <div style={{ marginTop: 8, fontSize: 12, color: C.ink, lineHeight: 1.6 }}>
                <strong>By pretest probability:</strong><br/>
                High PAS: 19% false-neg · 45% equivocal → appy<br/>
                Intermediate PAS: 13% equivocal → appy · 6% neg → appy
              </div>
            </div>
            <TeachBox id="ultrasound" teaching={teaching} />
          </Card>

          <Card title="MRI — Preferred Second-Line" color={C.purple}>
            <div style={{ marginTop: 8 }}>
              <div style={{ background: C.purpleBg, border: `1.5px solid ${C.purpleBorder}`, borderRadius: 8, padding: "10px 12px" }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, lineHeight: 1.8 }}>
                  Sensitivity: <strong>96–98%</strong> · Specificity: <strong>95–97%</strong><br/>
                  PPV: <strong>89–93%</strong> · NPV: <strong>98–99%</strong>
                </div>
              </div>
              <div style={{ marginTop: 8, fontSize: 12, color: C.ink, lineHeight: 1.6 }}>
                At OHSU, deferring CT to obtain a quick abdomen MRI is generally preferred to avoid radiation. 10–15 min exam.
              </div>
            </div>
            <TeachBox id="mri" teaching={teaching} />
          </Card>

          <Card title="CT — Selective Use" color={C.red}>
            <div style={{ marginTop: 8 }}>
              <div style={{ background: C.redBg, border: `1.5px solid ${C.redBorder}`, borderRadius: 8, padding: "10px 12px" }}>
                <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, lineHeight: 1.8 }}>
                  OHSU Sensitivity: <strong>~100%</strong> · Specificity: <strong>99%</strong>
                </div>
              </div>
              <div style={{ marginTop: 8, fontSize: 12, color: C.ink, lineHeight: 1.6 }}>
                IV contrast useful · Oral contrast does NOT improve accuracy<br/>
                <strong>Prefer CT when:</strong> suspected rupture · age &lt;5 · cannot remain still 10–15 min · obese (poor US windows)
              </div>
            </div>
            <TeachBox id="ct" teaching={teaching} />
          </Card>
        </Pad>
      )}

      {/* ── TAB: SPECIAL ── */}
      {mode === "reference" && tab === "special" && (
        <Pad>
          <Q text="Special Considerations" sub="Atypical presentations in younger children" />
          <TeachBox id="youngChildren" teaching={teaching} />

          <Card title="Infants" color={C.purple}>
            <div style={{ marginTop: 8 }}>
              {[["Vomiting","85–90%"],["Pain","35–77%"],["Diarrhea","18–46%"],["Fever","40–60%"],["Irritability","35–40%"]].map(([s,p],i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: `1px dashed ${C.rule}` }}>
                  <span style={{ fontSize: 13 }}>{s}</span>
                  <span style={{ fontSize: 13, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600 }}>{p}</span>
                </div>
              ))}
              <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>Also: grunting respirations, cough/rhinitis, R hip complaint (3–23%)</div>
            </div>
          </Card>

          <Card title="Preschool (3–5 years)" color={C.purple}>
            <div style={{ marginTop: 8 }}>
              {[["Abdominal pain","89–100%"],["Vomiting","66–100%"],["Fever","80–87%"],["Anorexia","53–60%"]].map(([s,p],i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", borderBottom: `1px dashed ${C.rule}` }}>
                  <span style={{ fontSize: 13 }}>{s}</span>
                  <span style={{ fontSize: 13, fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600 }}>{p}</span>
                </div>
              ))}
            </div>
          </Card>

          <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="Diagnostic Pitfall">
            Initial misdiagnosis rates: 28–57% in children ≤12 years. Much higher in &lt;2 years. Delayed diagnosis and rupture increase morbidity, mortality, and length of stay.
          </Alert>

          <Card title="Disposition Summary" color={C.primary}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>Confirmed appendicitis:</strong> Consult Pediatric Surgery · Broad-spectrum abx if surgery requests or perforation · Maintenance IV fluids<br/><br/>
              <strong>Low risk (PAS/Alv ≤3, pARC &lt;5%):</strong> Discharge · PCP follow-up within 24 hours<br/><br/>
              <strong>Diagnosis uncertain:</strong> Consult Pediatric Surgery · Avoid empiric abx unless suspected perforation
            </div>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{ fontSize: 11, lineHeight: 1.7, marginTop: 8, color: C.muted }}>
              1. Mittal MK et al. <em>Acad Emerg Med</em> 20 (2013): 697-702.<br/>
              2. Bachur RG et al. <em>J Pediatr</em> 166(5) 2015: 1134-39.<br/>
              3. Moore MM et al. <em>Pediatr Radiol</em> 42 (2012): 1056-63.<br/>
              4. Mushtaq R et al. <em>Radiology</em> 29 (2019): 170-7.<br/>
              5. Ebell MH, Shinholser J. <em>Ann Emerg Med</em> 64 (2014): 365-372.<br/>
              6. Kharbanda AB et al. <em>Pediatrics</em> 141 (2018).
            </div>
          </Card>
        </Pad>
      )}

      {/* FOOTER */}
      <div style={{ padding: "12px 20px", fontSize: 10, color: C.muted, lineHeight: 1.5, borderTop: `1px solid ${C.rule}` }}>
        <strong style={{ color: C.red }}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Suspected Acute Appendicitis Clinical Pathway · January 2022
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
