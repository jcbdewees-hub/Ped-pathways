<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIS-C — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useEffect}=React;
const C={primary:"#9f1239",pLight:"#fff1f2",pBorder:"#fda4af",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
overview:{title:"Pathway Rationale — MIS-C",patho:"Multisystem Inflammatory Syndrome in Children (MIS-C) is a post-infectious hyperinflammatory syndrome occurring 2–6 weeks after SARS-CoV-2 infection. The pathophysiology involves a dysregulated adaptive immune response with superantigen-like activation of T cells, cytokine storm (IL-6, IL-1, TNF-α), and autoantibody-mediated endothelial injury. This causes a clinical picture overlapping Kawasaki disease, toxic shock syndrome, and macrophage activation syndrome.\n\nCardiovascular involvement occurs in ~80% of cases and is the most dangerous feature — including myocardial dysfunction (reduced EF), coronary artery dilatation/aneurysm, pericarditis, arrhythmias, and cardiogenic shock. GI symptoms (92%) are the most common presentation, often mimicking acute appendicitis.",pearls:"MIS-C is a diagnosis of exclusion — always consider sepsis, Kawasaki disease, TSS, viral myocarditis, drug reactions, and appendicitis first. Key distinguishing features from KD: older age (school-age vs infant/toddler), prominent GI symptoms, more common cardiac dysfunction/shock, lymphopenia and thrombocytopenia (KD typically has elevated platelets).\n\nCritical ED principle: if shock is present, be cautious with fluids because cardiac dysfunction is common. Assess cardiac function with POCUS before aggressive fluid resuscitation. Favor early vasoactives if concern for cardiac dysfunction.",evidence:"CDC case definition (May 2020). Organ system involvement frequencies from Feldstein (NEJM 2020). ACR clinical guidance v2 (Henderson, Arthritis Rheumatol 2021). (OHSU DCH ED Pathway October 2021)"},
labCriteria:{title:"Laboratory Screening Criteria",patho:"The lab screening criteria identify the inflammatory pattern characteristic of MIS-C. CRP ≥30 mg/L and ESR ≥40 mm/h reflect systemic inflammation. The additional markers capture organ-specific injury: lymphopenia (ALC <1000) reflects T-cell consumption, neutrophilia (ANC >7700) reflects innate immune activation, thrombocytopenia (<150K) suggests consumptive coagulopathy, hyponatremia (<135) indicates cytokine-mediated ADH secretion, hypoalbuminemia (<3) reflects capillary leak, elevated ALT (>40) indicates hepatitis, elevated NT-proBNP (>400) indicates myocardial stretch, and elevated troponin indicates myocardial injury.",pearls:"Two-step screening:\n1. CRP ≥30 AND ESR ≥40\n2. PLUS at least 1 of: ALC <1000, ANC >7700, Plts <150K, Na <135, Albumin <3, ALT >40, NT-proBNP >400, Elevated troponin\n\nIf both criteria met → obtain additional labs (D-dimer, PT/PTT, fibrinogen, ferritin, triglycerides, LDH, CK, blood gas with lactate, UA with micro) + EKG, CXR, ECHO ASAP.\n\nIf neither met with reassuring exam → consider discharge with close follow-up.\nIf borderline → obtain additional labs, EKG, CXR, and observe."},
cardiac:{title:"Cardiac Involvement — The Critical Concern",patho:"Cardiac involvement in MIS-C spans from mild troponin elevation to fulminant cardiogenic shock. The mechanism involves direct myocardial inflammation (myocarditis), coronary artery inflammation (arteritis with potential dilatation or aneurysm), cytokine-mediated myocardial depression, and pericarditis with effusion. The combination of high-output vasodilatory shock AND myocardial dysfunction creates a particularly dangerous hemodynamic situation where aggressive fluid resuscitation can precipitate pulmonary edema.",pearls:"Use POCUS early to assess: cardiac function (EF), IVC distensibility, pericardial effusion, and signs of fluid overload. If concern for cardiac dysfunction: exercise caution with IV fluids and favor early vasoactives (epinephrine for cold shock, norepinephrine for warm shock).\n\nEchocardiogram ASAP if cardiac dysfunction suspected. Consult Peds Cardiology early. Coronary artery assessment is critical — dilatation/aneurysm management mirrors KD (aspirin, IVIG).\n\nMonitor: continuous telemetry, serial troponin, NT-proBNP trending."},
differential:{title:"MIS-C Differential Diagnosis",pearls:"Key differentiating features:\nSepsis: less cardiac involvement, coronary abnormalities rare → antibiotics, aggressive perfusion management\nAcute COVID: sore throat, taste/smell loss, severe pulmonary involvement possible, less shock/cardiac, lower inflammatory markers\nKawasaki Disease: younger (infants/toddlers), GI less common, shock less common, usually normal/elevated platelets, normal ALC → IVIG + high-dose aspirin\nViral myocarditis (EBV/CMV): can cause shock, elevated troponin/BNP, arrhythmias → serology/PCR, inotropic support\nTSS: rapid onset, diffuse erythroderma, identifiable source → cultures, clindamycin + vancomycin\nMAS/HLH: cytopenias, liver dysfunction, more neuro symptoms, less cardiac/GI → special immunologic testing, Oncology consult\nAppendicitis: abd pain + vomiting, but lacks cardiac/respiratory/rash → ED Appendicitis pathway"},
treatment:{title:"Treatment — Multidisciplinary",pearls:"Treatment for confirmed MIS-C is determined by the multidisciplinary team (ID, Cardiology, Rheumatology, PICU) and may include:\n• IVIG (2 g/kg)\n• IV methylprednisolone\n• Biologic agents (anakinra, infliximab) for refractory cases\n• Thromboprophylaxis (enoxaparin or aspirin based on cardiac involvement)\n• Vasoactives for hemodynamic support\n\nThese are NOT ED-initiated — the ED role is recognition, stabilization, and appropriate consultation."},
disposition:{title:"Disposition",pearls:"PICU (Tier 1 or 2 based on stability): refractory shock/hypotension, cardiac dysfunction or injury, respiratory failure, altered mental status or neurologic deficits.\n\nInpatient: labs and exam consistent with MIS-C but hemodynamically stable. Consult Peds ID. Consult Peds Cardiology if any cardiac dysfunction.\n\nDischarge with close follow-up: reassuring exam AND labs not meeting MIS-C screening criteria. Ensure return precautions."}
};

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,bolus:Math.round(wt*20),d10:Math.round(wt*5),apap:Math.round(wt*12.5),ibu:Math.round(wt*10)};}

function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>MIS-C</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · October 2021</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function DoseRow({label,value,unit}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit||""}</span></div>)}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}
function TeachBox({id,teaching}){var s=useState("pearls"),tab=s[0],setTab=s[1];if(!teaching||!TEACH[id])return null;var t=TEACH[id];if(t.content&&!t.patho&&!t.pearls&&!t.evidence){return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:"4px solid "+C.teal}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t.content}</div></div>);}var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>{tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}</div><div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeKey]||""}</div></div>);}

function PathwayFlowchart(){
  var rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5",aC="#d97706",aBg="#fffbeb",aBd="#fcd34d",gC="#16a34a",gBg="#f0fdf4",gBd="#86efac",blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd",pC="#9f1239",pBg="#fff1f2",pBd="#fda4af",mC="#6b7280";
  var Arrow=function(p){var dx=p.x2-p.x1,dy=p.y2-p.y1,len=Math.sqrt(dx*dx+dy*dy);if(len===0)return null;var ux=dx/len,uy=dy/len,px=-uy,py=ux;return <g><line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2} stroke={p.color||"#94a3b8"} strokeWidth={1.5}/><polygon points={p.x2+","+p.y2+" "+(p.x2-ux*6+px*3.5)+","+(p.y2-uy*6+py*3.5)+" "+(p.x2-ux*6-px*3.5)+","+(p.y2-uy*6-py*3.5)} fill={p.color||"#94a3b8"}/></g>};
  var Box=function(p){return <g><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={p.radius||6} fill={p.fill} stroke={p.stroke} strokeWidth={p.sw||1}/>{p.children}</g>};
  var T=function(p){return <text x={p.x} y={p.y} textAnchor={p.anchor||"middle"} fontSize={p.size||9} fontWeight={p.weight||600} fill={p.color||"#1a1d21"} fontFamily="'IBM Plex Sans',sans-serif">{p.children}</text>};
  return(<div style={{marginTop:20}}><div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Full Algorithm</div><div style={{fontSize:11,color:C.muted,marginBottom:6}}>Fever + multi-organ involvement · Lab screening · Shock management with cardiac caution</div><div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,padding:6,overflow:"hidden"}}><svg viewBox="0 0 480 420" style={{width:"100%",display:"block"}}><rect width={480} height={420} fill="#fafaf8" rx={6}/>
    <Box x={80} y={8} w={320} h={30} fill={pBg} stroke={pBd} sw={1.5} radius={14}><T x={240} y={20} size={9} weight={700} color={pC}>SUSPECTED MIS-C</T><T x={240} y={31} size={6} color={mC}>Fever ≥5d, or ≥3d + ≥2 organs, or fever + critically ill</T></Box>
    <Arrow x1={240} y1={38} x2={240} y2={56}/>
    <g transform="translate(240,70)"><polygon points="0,-14 60,0 0,14 -60,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Signs of shock?</T></g>
    <Arrow x1={300} y1={70} x2={410} y2={92} color={rC}/><T x={365} y={80} size={6} weight={600} color={rC}>Yes</T>
    <Box x={345} y={92} w={125} h={40} fill={rBg} stroke={rBd} sw={2}><T x={408} y={104} size={7} weight={700} color={rC}>SEPSIS PATHWAY</T><T x={408} y={115} size={6} color={mC}>Cautious fluids (POCUS)</T><T x={408} y={125} size={6} color={mC}>Early vasoactives · Abx</T></Box>
    <Arrow x1={240} y1={84} x2={240} y2={104}/><T x={250} y={100} size={6} weight={600} color={gC} anchor="start">Stable</T>
    <Box x={110} y={104} w={260} h={22} fill={blBg} stroke={blBd} sw={1.5}><T x={240} y={114} size={7} weight={700} color={blC}>INITIAL LABS + CONSIDER EKG, CXR, POCUS</T><T x={240} y={124} size={5.5} color={mC}>CBC, CMP, ESR, CRP, troponin, NT-proBNP, COVID PCR/Ab, BCx, RVP</T></Box>
    <Arrow x1={240} y1={126} x2={240} y2={146}/>
    <g transform="translate(240,160)"><polygon points="0,-14 80,0 0,14 -80,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>CRP ≥30 AND ESR ≥40</T><T x={0} y={7} size={6} weight={700}>+ ≥1 abnormal marker?</T></g>
    <Arrow x1={160} y1={160} x2={60} y2={190} color={gC}/><T x={98} y={174} size={6} weight={600} color={gC}>No</T>
    <Box x={5} y={190} w={110} h={28} fill={gBg} stroke={gBd}><T x={60} y={202} size={7} weight={700} color={gC}>REASSURING</T><T x={60} y={214} size={6} color={mC}>D/C with close F/U</T></Box>
    <Arrow x1={320} y1={160} x2={400} y2={190} color={rC}/><T x={370} y={174} size={6} weight={600} color={rC}>Yes</T>
    <Box x={330} y={190} w={145} h={28} fill={rBg} stroke={rBd} sw={1.5}><T x={403} y={202} size={7} weight={700} color={rC}>MIS-C LIKELY</T><T x={403} y={214} size={6} color={mC}>Additional labs + EKG + CXR + ECHO</T></Box>
    <Arrow x1={240} y1={174} x2={240} y2={198}/>
    <Box x={145} y={198} w={160} h={22} fill={aBg} stroke={aBd}><T x={225} y={208} size={6} weight={700} color={aC}>BORDERLINE</T><T x={225} y={218} size={6} color={mC}>Additional labs · Observe</T></Box>

    <Arrow x1={403} y1={218} x2={403} y2={240}/>
    <g transform="translate(403,254)"><polygon points="0,-14 70,0 0,14 -70,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>PICU criteria?</T><T x={0} y={7} size={5} color={mC}>Shock · Cardiac · Resp · Neuro</T></g>
    <Arrow x1={333} y1={254} x2={240} y2={280} color={aC}/>
    <Box x={170} y={280} w={140} h={24} fill={aBg} stroke={aBd}><T x={240} y={295} size={7} weight={700} color={aC}>ADMIT INPATIENT</T></Box>
    <Arrow x1={473} y1={254} x2={473} y2={280} color={rC}/>
    <Box x={410} y={280} w={65} h={24} fill={rBg} stroke={rBd}><T x={443} y={295} size={7} weight={700} color={rC}>PICU</T></Box>

    <Box x={10} y={320} w={460} h={34} fill={pBg} stroke={pBd} radius={6}><T x={240} y={332} size={7} weight={700} color={pC}>CONSULT: Peds ID + Peds Cardiology (if cardiac involvement)</T><T x={240} y={346} size={6} color={mC}>Treatment (IVIG, steroids, biologics, thromboprophylaxis) per multidisciplinary team — NOT ED-initiated</T></Box>

    <Box x={10} y={364} w={460} h={44} fill={blBg} stroke={blBd} radius={6}><T x={240} y={376} size={7} weight={700} color={blC}>LAB SCREENING CRITERIA</T><T x={120} y={390} size={6} color={mC}>CRP ≥30 AND ESR ≥40</T><T x={120} y={400} size={6} color={mC}>PLUS ≥1 of:</T><T x={360} y={390} size={6} color={mC}>ALC {"<"}1K · ANC {">"}7.7K · Plt {"<"}150K · Na {"<"}135</T><T x={360} y={400} size={6} color={mC}>Alb {"<"}3 · ALT {">"}40 · NT-proBNP {">"}400 · ↑Troponin</T></Box>
  </svg></div></div>);
}

function Wizard({teaching,doses}){
  var s1=useState(null),excl=s1[0],setExcl=s1[1];
  var s2=useState(null),shock=s2[0],setShock=s2[1];
  var s3=useState(null),labResult=s3[0],setLabResult=s3[1];
  var s4=useState(null),picuCriteria=s4[0],setPicuCriteria=s4[1];
  function reset(){setExcl(null);setShock(null);setLabResult(null);setPicuCriteria(null);}

  return(<Pad>
    <Q text="MIS-C Walk-Through" sub="Systematic evaluation for multisystem inflammatory syndrome"/>
    <TeachBox id="overview" teaching={teaching}/>

    <Card title="Step 1 — Inclusion Screening" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Does the patient meet any inclusion criterion?<br/><span style={{fontSize:12,color:C.muted}}>• Persistent unexplained fever ≥5 days<br/>• Fever ≥3 days AND ≥2 organ systems involved (cardiac, renal, respiratory, GI, dermatologic, neurologic)<br/>• Fever AND critically ill (shock, respiratory failure)</span></div>
      <WizBtn label="Yes — Meets inclusion criteria" sub="ESI II · Monitor · 2 PIVs · CBG · O₂ for hypoxia" color={C.primary} bg={C.pLight} border={C.pBorder} selected={excl==="no"} onClick={function(){setExcl("no")}}/>
      <WizBtn label="No — Does not meet criteria" sub="Off pathway (also exclude age ≤28 days, sepsis with clear source)" color={C.muted} bg={C.white} border={C.rule} selected={excl==="yes"} onClick={function(){setExcl("yes")}}/>
    </Card>

    {excl==="no"&&<Card title="Step 2 — Shock Assessment" color={C.red}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Are there signs of shock? (Tachycardia, hypotension, poor perfusion, altered mental status)</div>
      <WizBtn label="Yes — Signs of shock" sub="Use ED Sepsis Pathway · Cautious fluids · POCUS · Early vasoactives" color={C.red} bg={C.redBg} border={C.redBorder} selected={shock==="yes"} onClick={function(){setShock("yes")}}/>
      <WizBtn label="No — Hemodynamically stable" sub="Proceed to lab evaluation" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={shock==="no"} onClick={function(){setShock("no")}}/>
      {shock==="yes"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Shock — Cautious Resuscitation">
        Use ED Sepsis Pathway for resuscitation framework.<br/>
        <strong>CAUTION:</strong> Cardiac dysfunction is common in MIS-C. Use POCUS to evaluate cardiac function and IVC before aggressive fluids.<br/>
        NS or LR to normalize perfusion — evaluate for fluid overload after each bolus (hepatomegaly, rales).<br/>
        If cardiac dysfunction suspected → <strong>favor early vasoactives</strong> over fluids:<br/>
        Epinephrine 0.05–1 mcg/kg/min (cold shock) · Norepinephrine 0.05–1 mcg/kg/min (warm shock)<br/>
        D10 {doses?doses.d10+" mL":"5 mL/kg"} for CBG {"<"}60 · Empiric antibiotics per Sepsis pathway<br/>
        Obtain ALL initial + additional labs, EKG, CXR, ECHO ASAP
      </Alert>}
      <TeachBox id="cardiac" teaching={teaching}/>
    </Card>}

    {excl==="no"&&(shock==="no"||shock==="yes")&&<Card title="Step 3 — Laboratory Evaluation" color={C.blue}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
        <strong>Initial Labs (all patients):</strong><br/>
        CBC with diff, CMP, ESR, CRP, random troponin, NT-proBNP, COVID-19 RT-PCR, COVID-19 antibody, blood culture, respiratory pathogen PCR panel<br/><br/>
        <strong>Additional Labs (if high suspicion or critically ill):</strong><br/>
        D-dimer, PT/PTT, fibrinogen, ferritin, triglycerides, LDH, CK, blood gas with lactate, UA with microscopy<br/><br/>
        <strong>Additional Studies:</strong> CXR, EKG, Echocardiogram (if indicated)
      </div>
    </Card>}

    {excl==="no"&&(shock==="no"||shock==="yes")&&<Card title="Step 4 — Lab Screening Results" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:6}}>Do the labs meet MIS-C screening criteria?</div>
      <div style={{background:C.blueBg,border:"1.5px solid "+C.blueBorder,borderRadius:8,padding:"10px 12px",marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:700,color:C.blue}}>MIS-C Lab Criteria:</div>
        <div style={{fontSize:12,marginTop:4}}>CRP ≥30 mg/L AND ESR ≥40 mm/h<br/>PLUS at least 1 of: ALC {"<"}1000 · ANC {">"}7700 · Platelets {"<"}150K · Na {"<"}135 · Albumin {"<"}3 · ALT {">"}40 · NT-proBNP {">"}400 · Elevated troponin</div>
      </div>
      <WizBtn label="Labs AND exam consistent with MIS-C" sub="Obtain additional labs + EKG + CXR + ECHO → Admit" color={C.red} bg={C.redBg} border={C.redBorder} selected={labResult==="misc"} onClick={function(){setLabResult("misc")}}/>
      <WizBtn label="Labs concerning but not clearly MIS-C" sub="Obtain additional labs + EKG + CXR → Observe · Review differential" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={labResult==="borderline"} onClick={function(){setLabResult("borderline")}}/>
      <WizBtn label="Reassuring exam and labs" sub="Consider discharge with close follow-up" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={labResult==="reassuring"} onClick={function(){setLabResult("reassuring")}}/>
      {labResult==="reassuring"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Reassuring — Discharge">Labs and exam do not meet MIS-C criteria. Consider alternative diagnoses. Discharge with close follow-up and return precautions (worsening fever, rash, abdominal pain, difficulty breathing, chest pain).</Alert>}
      {labResult==="borderline"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚠️" title="Borderline — Observe & Expand Workup">Obtain additional labs (D-dimer, coags, ferritin, triglycerides, LDH, CK, blood gas, UA). EKG and CXR if not already obtained. Review MIS-C differential diagnosis carefully. Consider admission for observation vs alternative diagnosis requiring admission.</Alert>}
      <TeachBox id="labCriteria" teaching={teaching}/>
    </Card>}

    {excl==="no"&&labResult==="misc"&&<Card title="Step 5 — MIS-C Confirmed: Disposition" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Does the patient meet PICU criteria?<br/><span style={{fontSize:12,color:C.muted}}>Refractory shock/hypotension · Cardiac dysfunction or injury · Respiratory failure · Altered mental status or neurologic deficits</span></div>
      <WizBtn label="Yes — PICU criteria met" sub="Admit PICU (Tier 1 or 2 based on stability)" color={C.red} bg={C.redBg} border={C.redBorder} selected={picuCriteria==="yes"} onClick={function(){setPicuCriteria("yes")}}/>
      <WizBtn label="No — Stable but MIS-C confirmed" sub="Admit to inpatient · Consult Peds ID + Cardiology" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={picuCriteria==="no"} onClick={function(){setPicuCriteria("no")}}/>
      {picuCriteria==="yes"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🏥" title="Admit PICU">PICU Tier 1 or 2 based on stability. Consult Peds ID. Consult Peds Cardiology. Treatment (IVIG, steroids, biologics, thromboprophylaxis) per multidisciplinary team.</Alert>}
      {picuCriteria==="no"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🏥" title="Admit Inpatient">Consult Peds ID. Consult Peds Cardiology if any cardiac dysfunction. Treatment per multidisciplinary team.</Alert>}
      <TeachBox id="treatment" teaching={teaching}/>
    </Card>}

    {excl!==null&&<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>}
    <PathwayFlowchart/>
  </Pad>);
}

function RefTriage({teaching}){return(<Pad><Q text="Triage & Initial Assessment" sub="Fever + multi-organ involvement · Diagnosis of exclusion"/><TeachBox id="overview" teaching={teaching}/><Card title="Inclusion / Exclusion" color={C.primary}><div style={{marginTop:8}}><Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Persistent unexplained fever ≥5 days, OR fever ≥3 days + ≥2 organ systems involved, OR fever + critically ill (shock, respiratory failure).</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Age ≤28 days. Sepsis or other explanatory illness — MIS-C is a diagnosis of exclusion.</Alert></div></Card><Card title="Initiate on Arrival" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}><strong>ESI Triage Level II</strong><br/>Full vitals including core temperature<br/>Cardiac monitor + continuous pulse oximetry<br/>Establish IV (2 if possible, largest size appropriate)<br/>Bedside CBG · O₂ for hypoxia<br/>Document: COVID exposure/infection history, onset of symptoms, hemodynamic assessment (core temp, skin changes, rash, cap refill, urine output, pulse quality, neuro status)</div></Card><Card title="Clinical Features of MIS-C" color={C.primary}><div style={{marginTop:8}}>{[{organ:"GI (92%)",sxs:"Abd pain, diarrhea, vomiting, pancreatitis, hepatitis"},{organ:"Cardiovascular (80%)",sxs:"Shock, elevated BNP/troponin, reduced EF, coronary dilatation, arrhythmia"},{organ:"Hematologic (76%)",sxs:"Lymphopenia, neutrophilia, thrombocytopenia, coagulopathy"},{organ:"Mucocutaneous (74%)",sxs:"Conjunctival injection, oral changes, rash, lip changes, hand/foot edema"},{organ:"Respiratory (70%)",sxs:"Respiratory insufficiency, infiltrates, pleural effusion"},{organ:"Neurologic (20-30%)",sxs:"Stroke, seizures, encephalitis, AMS, aseptic meningitis"},{organ:"Renal (8%)",sxs:"Acute kidney injury"}].map(function(o){return <div key={o.organ} style={{padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:12,fontWeight:700,color:C.primary}}>{o.organ}:</span> <span style={{fontSize:12}}>{o.sxs}</span></div>})}</div></Card></Pad>)}

function RefDecisions({teaching}){return(<Pad><Q text="Decision Tree" sub="Lab screening → shock management → disposition"/><Card title="Lab Screening Criteria" color={C.primary}><div style={{marginTop:8}}><div style={{background:C.pLight,border:"1.5px solid "+C.pBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.primary}}>Step 1: CRP ≥30 mg/L AND ESR ≥40 mm/h</div></div><div style={{background:C.pLight,border:"1.5px solid "+C.pBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.primary}}>Step 2: PLUS at least 1 of:</div><div style={{fontSize:12,marginTop:4}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4}}>{["ALC < 1,000","ANC > 7,700","Platelets < 150K","Na < 135","Albumin < 3","ALT > 40","NT-proBNP > 400","Elevated troponin"].map(function(m){return <div key={m} style={{background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:4,padding:"4px 6px",fontSize:11,fontWeight:500}}>{m}</div>})}</div></div></div></div><TeachBox id="labCriteria" teaching={teaching}/></Card><Card title="Shock Management — Cardiac Caution" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>NS or LR to normalize perfusion — evaluate for fluid overload after each bolus.<br/><strong>Use POCUS:</strong> cardiac function + IVC distensibility before aggressive fluids.<br/>If cardiac dysfunction → <strong>favor early vasoactives:</strong><br/>Epinephrine 0.05–1 mcg/kg/min (cold shock) · Norepinephrine 0.05–1 mcg/kg/min (warm shock)<br/>If concern for sepsis → empiric antibiotics per Sepsis pathway</div><TeachBox id="cardiac" teaching={teaching}/></Card><Card title="Differential Diagnosis" color={C.purple} defaultOpen={false}><div style={{marginTop:8}}>{[{dx:"Sepsis",diff:"Less cardiac involvement, no coronary abnormalities"},{dx:"Kawasaki Disease",diff:"Younger (infant/toddler), GI less common, normal/elevated platelets"},{dx:"Toxic Shock Syndrome",diff:"Rapid onset, erythroderma, identifiable source"},{dx:"Viral Myocarditis",diff:"Elevated troponin/BNP, arrhythmias, can cause shock"},{dx:"MAS/HLH",diff:"Cytopenias, liver dysfunction, more neuro, less cardiac/GI"},{dx:"Appendicitis",diff:"Lacks cardiac, respiratory, rash involvement"},{dx:"Drug Hypersensitivity",diff:"Serum sickness, DRESS, SJS — discontinue agent"}].map(function(d){return <div key={d.dx} style={{padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:12,fontWeight:700}}>{d.dx}:</span> <span style={{fontSize:12,color:C.muted}}>{d.diff}</span></div>})}</div><TeachBox id="differential" teaching={teaching}/></Card><PathwayFlowchart/></Pad>)}

function RefMeds({teaching,doses}){return(<Pad><Q text="ED Medications" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/>{!doses&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above.</Alert>}<Card title="Resuscitation" color={C.primary}><div style={{marginTop:8}}><DoseRow label="NS/LR bolus (20 mL/kg) — cautious" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/><DoseRow label="D10 (5 mL/kg) for CBG <60" value={doses?doses.d10:"—"} unit={doses?"mL":""}/><div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:6}}>Evaluate cardiac function (POCUS) before repeat boluses. Favor early vasoactives if cardiac dysfunction.</div></div></Card><Card title="Vasoactives (if shock)" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Epinephrine 0.05–1 mcg/kg/min (cold shock — first line)<br/>Norepinephrine 0.05–1 mcg/kg/min (warm shock — first line)</div></Card><Card title="Antipyretics" color={C.primary}><div style={{marginTop:8}}><DoseRow label="Acetaminophen PO (12.5 mg/kg)" value={doses?doses.apap:"—"} unit={doses?"mg":""}/><DoseRow label="Ibuprofen PO (10 mg/kg)" value={doses?doses.ibu:"—"} unit={doses?"mg":""}/></div></Card><Card title="MIS-C Definitive Treatment (NOT ED-initiated)" color={C.muted} defaultOpen={false}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Treatment determined by multidisciplinary team (ID, Cardiology, Rheumatology, PICU):<br/>IVIG (2 g/kg) · IV methylprednisolone · Biologics (anakinra, infliximab) for refractory cases · Thromboprophylaxis</div><TeachBox id="treatment" teaching={teaching}/></Card></Pad>)}

function RefDispo({teaching}){return(<Pad><Q text="Disposition & References"/><Card title="Disposition Summary" color={C.primary}><div style={{marginTop:8}}><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>PICU (Tier 1 or 2)</div><div style={{fontSize:12,marginTop:2}}>Refractory shock · Cardiac dysfunction/injury · Respiratory failure · AMS or neuro deficits</div></div><div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>INPATIENT</div><div style={{fontSize:12,marginTop:2}}>Labs/exam consistent with MIS-C but hemodynamically stable · Consult Peds ID + Cardiology</div></div><div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>DISCHARGE</div><div style={{fontSize:12,marginTop:2}}>Reassuring exam AND labs · Close follow-up · Return precautions</div></div></div><TeachBox id="disposition" teaching={teaching}/></Card><Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>OHSU DCH ED MIS-C Clinical Pathway, October 2021<br/>CDC Health Advisory: MIS-C Associated with COVID-19, May 2020<br/>Feldstein LR et al. Multisystem inflammatory syndrome in US children and adolescents. NEJM 2020<br/>Henderson LA et al. ACR Clinical Guidance for MIS-C, Version 2. Arthritis Rheumatol 2021;73:e13-e29<br/>CHOP: ED/ICU/Inpatient Pathway for MIS-C<br/>Seattle Children's: COVID-19 Pathway v6.0</div></Card></Pad>)}

function App(){var s1=useState("wizard"),mode=s1[0],setMode=s1[1];var s2=useState("triage"),tab=s2[0],setTab=s2[1];var s3=useState(false),teaching=s3[0],setTeaching=s3[1];var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];var s5=useState(""),ageYr=s5[0],setAgeYr=s5[1];var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);var rr=useResponsive(),maxW=rr.maxW;var refTabs=[{key:"triage",label:"Triage"},{key:"decisions",label:"Decisions"},{key:"meds",label:"Meds"},{key:"dispo",label:"Dispo & Refs"}];return(<div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}><Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>{mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}<div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}><div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (years)</label><input type="number" inputMode="decimal" value={ageYr} onChange={function(e){setAgeYr(e.target.value)}} placeholder="8" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div><div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="25" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div></div>{mode==="wizard"&&<Wizard teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}{mode==="reference"&&tab==="decisions"&&<RefDecisions teaching={teaching}/>}{mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}<div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}><strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.<br/>Doernbecher Children's Hospital · PED · MIS-C Clinical Pathway · October 2021</div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
