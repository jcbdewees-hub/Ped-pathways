const{useState,useMemo,useEffect}=React;
const C={primary:"#b91c1c",pLight:"#fef2f2",pBorder:"#fca5a5",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
overview:{title:"Anaphylaxis — Pathway Rationale",patho:"Anaphylaxis is an acute, potentially life-threatening systemic hypersensitivity reaction caused by the sudden release of mast cell and basophil mediators. IgE-mediated degranulation triggers histamine, tryptase, prostaglandins, leukotrienes, and platelet-activating factor release, causing vasodilation, increased vascular permeability, bronchoconstriction, and mucosal edema.\n\nUp to 35% of intravascular volume can shift to the extravascular space within minutes. Death results from asphyxiation (upper/lower airway obstruction) or cardiovascular collapse. Median time to arrest: 5 min (iatrogenic), 15 min (venom), 30 min (food).",pearls:"Foods are the most common cause in children; medications and insect stings are more common in adults. Skin symptoms are present in up to 90% of episodes but may be absent or resolve before arrival. Do not wait for hypotension to diagnose anaphylaxis — it is uncommon in children and in food-induced reactions.\n\nAt the onset of an episode, it is impossible to predict how severe it will become. This is why early epinephrine is critical — anaphylaxis is most responsive to treatment in its early phases.",evidence:"Kuppermann N et al. Lancet 2009. Sampson HA et al. NIAID/FAAN criteria. J Allergy Clin Immunol 2006; 117:391. Shaker MS et al. 2020 Practice Parameter Update. J Allergy Clin Immunol 2020; 145:1082. Lifetime prevalence ~1.6% in the US (Wood RA et al. J Allergy Clin Immunol 2014; 133:461)."},
criteria:{title:"Diagnostic Criteria for Anaphylaxis",patho:"The NIAID/FAAN criteria (2006) identify three presentations:\n\nCriterion 1: Acute skin/mucosal involvement + respiratory compromise OR reduced BP.\n\nCriterion 2: Two or more organ systems rapidly after likely allergen exposure (skin, respiratory, reduced BP, persistent GI symptoms).\n\nCriterion 3: Reduced BP alone after exposure to a KNOWN allergen.\n\nThe WAO 2020 simplified criteria combine these into two criteria. Sensitivity 95%, specificity 71% in a prospective validation study.",pearls:"Key point: hypotension is NOT required for diagnosis. Criterion 1 (skin + respiratory OR hypotension) captures the majority of cases. A patient with hives + wheezing after peanut ingestion meets anaphylaxis criteria even with normal BP.\n\nPediatric hypotension thresholds:\n• 1 month–1 year: SBP <70 mmHg\n• 1–10 years: SBP <70 + (2 × age in years)\n• 11–17 years: SBP <90 mmHg\n\nOr >30% decrease from baseline at any age.",evidence:"Sampson HA et al. J Allergy Clin Immunol 2006; 117:391. Loprinzi Brauer CE et al. Prospective validation. J Allergy Clin Immunol Pract 2016; 4:1220. Cardona V et al. WAO Anaphylaxis Guidance 2020. World Allergy Organ J 2020; 13:100472."},
epinephrine:{title:"Epinephrine — First-Line Treatment",patho:"Epinephrine addresses all pathophysiologic mechanisms of anaphylaxis:\n\n• Alpha-1 agonist: vasoconstriction, increased peripheral vascular resistance, decreased mucosal edema\n• Beta-1 agonist: increased inotropy and chronotropy\n• Beta-2 agonist: bronchodilation, decreased mast cell mediator release\n\nThere are NO absolute contraindications to epinephrine in anaphylaxis. The risk of death from untreated anaphylaxis far exceeds the risk of adverse effects from appropriate-dose IM epinephrine.",pearls:"IM into the mid-outer thigh (vastus lateralis) — NOT subcutaneous, NOT deltoid. IM provides faster and higher peak plasma levels than SC.\n\nDose: 0.01 mg/kg (max 0.5 mg) using 1 mg/mL concentration. Repeat Q5 min PRN. ~90% of patients respond to a single dose when given promptly.\n\nAutoinjector dosing:\n• <25 kg: 0.15 mg\n• 25–50 kg: 0.3 mg\n• >50 kg: 0.5 mg\n\nInfants <10 kg: draw up exact weight-based dose when possible. If delay would be dangerous, 0.1 mg autoinjector (or 0.15 mg if 0.1 mg unavailable) is acceptable.",evidence:"Simons FE et al. J Allergy Clin Immunol 2001; 108:871 (IM vs SC pharmacokinetics). Campbell RL et al. J Allergy Clin Immunol Pract 2015; 3:76 (IV bolus vs IM — significantly more cardiovascular complications with IV bolus). In fatal anaphylaxis series, only 14% received epinephrine before arrest (Pumphrey RS. Clin Exp Allergy 2000; 30:1144)."},
adjunctive:{title:"Adjunctive Therapies",patho:"Antihistamines, glucocorticoids, and bronchodilators are second-line therapies and should NEVER replace or delay epinephrine. They do not prevent or reverse airway obstruction or shock.\n\nH1 antihistamines relieve itching and urticaria only. Cetirizine is preferred over diphenhydramine (less sedating). H2 antihistamines (famotidine) may provide additional benefit for urticaria when combined with H1 blockers.\n\nGlucocorticoids have NO proven benefit in preventing biphasic reactions (2020 systematic review). They are reasonable only for persistent bronchospasm or patients requiring >2 doses of epinephrine.",pearls:"Order of priorities:\n1. EPINEPHRINE — always first\n2. IV fluids if hypotensive (20 mL/kg NS boluses)\n3. Albuterol for persistent bronchospasm after epi\n4. Cetirizine or diphenhydramine for residual urticaria/itch\n5. Steroids only if persistent bronchospasm or severe reaction requiring >2 epi doses\n\nDo NOT give diphenhydramine IV push rapidly — can precipitate hypotension. If glucocorticoids are given, an outpatient taper is NOT necessary.",evidence:"Sheikh A et al. Cochrane review: no RCTs support H1 antihistamines in anaphylaxis. Allergy 2007; 62:830. Shaker MS et al. 2020: no evidence glucocorticoids prevent biphasic reactions. Campbell DE. J Allergy Clin Immunol Pract 2019; 7:2239."},
biphasic:{title:"Biphasic Anaphylaxis",patho:"Biphasic anaphylaxis is recurrence of symptoms meeting anaphylaxis criteria within 1–48 hours after resolution of the initial episode without re-exposure to the trigger. It occurs in approximately 5% of cases. Recurrent symptoms typically appear within 12 hours and are usually less severe than the initial episode.\n\nRisk factors: severe initial presentation (hypotension, hypoxia), need for >1 dose of epinephrine, delayed epinephrine administration, unknown trigger.",pearls:"Observation periods after symptom resolution:\n• Low risk (mild reaction, single epi dose, prompt response): minimum 1 hour symptom-free\n• High risk (hypotension/hypoxia, >2 epi doses, severe asthma history, risk factors): minimum 12 hours including 4 hours symptom-free\n\nA retrospective study of 5641 children found <2% hourly increase in cumulative proportion needing additional epi after approximately 2–4 hours. Clinically important biphasic reactions occurred in only 0.4% of adults in one study.",evidence:"Dribin TE et al. J Allergy Clin Immunol 2020; 146:1089. Grunau BE et al. Ann Emerg Med 2014; 63:736 (0.4% clinically important biphasic). Dribin TE et al. Lancet Child Adolesc Health 2025; 9:484."},
refractory:{title:"Refractory Anaphylaxis",patho:"Refractory anaphylaxis is defined as persistent anaphylaxis despite 3 or more appropriate doses of epinephrine (or initiation of IV epi infusion) plus symptom-directed management (IV fluids for hypotension). It accounts for <0.5% of all anaphylaxis cases.\n\nIV epinephrine infusion: 0.1–1 mcg/kg/min titrated to effect with continuous monitoring. For patients on beta-blockers: glucagon 20–30 mcg/kg (max 1 mg) slow IV push over 5 min.",pearls:"IV epi infusion preparation for children: Add 1 mg (1 mL of 1 mg/mL) to 100 mL NS → 10 mcg/mL. Start at 0.1 mcg/kg/min. Example: 20 kg child → 2 mcg/min → 12 mL/hr.\n\nIV bolus epi is associated with significantly more cardiovascular complications — use continuous infusion whenever possible. We avoid IV bolus in infants and children.\n\nIf refractory to maximal epi + fluids: consider vasopressin, norepinephrine, or ECMO consultation.",evidence:"Campbell RL et al. J Allergy Clin Immunol Pract 2015; 3:76. Francuzik W et al. Front Immunol 2019; 10:2482 (European Registry: <0.5% refractory). Whyte AF et al. Clin Med 2022; 22:332."},
discharge:{title:"Discharge Planning",pearls:"All patients discharged after anaphylaxis need:\n1. Epinephrine autoinjector prescription (2-pack) with demonstration of correct use\n2. Written anaphylaxis emergency action plan\n3. Allergen avoidance counseling\n4. Biphasic reaction warning (symptoms may recur up to 48h; return for breathing difficulty or lightheadedness)\n5. Allergist referral (35% of patients had diagnosis/cause altered at follow-up)\n6. Continue antihistamines PRN for residual urticaria; steroid taper NOT needed\n\nFor patients who received epi prior to ED arrival: earlier epi was associated with lower risk of hospitalization (17% vs 43% in one study).",evidence:"Campbell RL et al. J Allergy Clin Immunol Pract 2015; 3:88 (35% diagnosis altered at allergist f/u). Fleming JT et al. J Allergy Clin Immunol Pract 2015; 3:57 (earlier epi → lower hospitalization). Sicherer SH, Simons FER. Pediatrics 2017; 139 (AAP epi prescribing guidance)."},
differential:{title:"Differential Diagnosis",pearls:"Common mimics of anaphylaxis:\n• Acute urticaria/angioedema without systemic involvement\n• Acute asthma exacerbation (no skin findings, no allergen trigger)\n• Vasovagal syncope (bradycardia + pallor vs tachycardia + flushing in anaphylaxis)\n• Anxiety/panic attack (no urticaria, no true bronchospasm, no hypotension)\n• Vocal cord dysfunction (inspiratory stridor without urticaria)\n• Scombroid (histamine fish poisoning — flushing, GI symptoms after fish)\n• Hereditary angioedema (no urticaria, family history, recurrent episodes)\n\nTryptase: obtain within 15 min–3 hours of symptom onset. Often normal in food-induced anaphylaxis. A normal tryptase does NOT exclude anaphylaxis.",evidence:"Simons FE. J Allergy Clin Immunol 2010; 125:S161. Buka RJ et al. J Allergy Clin Immunol Pract 2017; 5:1280 (tryptase sensitivity only 28% in real-world ED use)."},
};

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;var epiDose=Math.round(wt*0.01*1000)/1000;if(epiDose>0.5)epiDose=0.5;var epiVol=epiDose;var autoInj=wt<25?"0.15 mg":wt<=50?"0.3 mg":"0.5 mg";return{w:wt,epiDose:epiDose,epiVol:Math.round(epiVol*100)/100,autoInj:autoInj,bolus:Math.round(wt*20),cetPed:wt<20?"2.5 mg":wt<40?"5 mg":"10 mg",dph:Math.round(wt*1),dphMax:Math.min(Math.round(wt*1),50),famot:Math.round(wt*0.25*10)/10,famotMax:Math.min(Math.round(wt*0.25*10)/10,20),methylpred:Math.round(wt*1),methylpredMax:Math.min(Math.round(wt*1),125),prednis:Math.round(wt*1),prednisMax:Math.min(Math.round(wt*1),60),albuDose:wt<20?"2.5 mg":"5 mg",glucagon:Math.round(wt*0.025*100)/100,glucagonMax:Math.min(Math.round(wt*0.025*100)/100,1),epiInfStart:Math.round(wt*0.1*10)/10};}

function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

// ── PRIMITIVES ──
function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Allergic Reaction / Anaphylaxis</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · 2025</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function DoseRow({label,value,unit}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit||""}</span></div>)}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;var t=TEACH[id];if(t.content&&!t.patho&&!t.pearls&&!t.evidence){return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:"4px solid "+C.teal}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t.content}</div></div>);}var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});var st=useState(t.pearls?"pearls":tabs[0]?tabs[0].key:"patho"),tab=st[0],setTab=st[1];return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 6px"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",borderBottom:"1px solid "+C.tealBorder,padding:"0 10px"}}>{tabs.map(function(tb){return <button key={tb.key} onClick={function(){setTab(tb.key)}} style={{padding:"6px 10px",background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:tab===tb.key?700:500,color:tab===tb.key?C.teal:C.muted,borderBottom:tab===tb.key?"2px solid "+C.teal:"2px solid transparent",marginBottom:-1}}>{tb.label}</button>})}</div><div style={{padding:"10px 14px 12px"}}><div style={{fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[tab]}</div></div></div>);}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}

function PathwayFlowchart(){
  var rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5",aC="#d97706",aBg="#fffbeb",aBd="#fcd34d",gC="#16a34a",gBg="#f0fdf4",gBd="#86efac",blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd",pC="#6b21a8",pBg="#faf5ff",pBd="#c4b5fd",mC="#6b7280";
  var Arrow=function(p){return <g><line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2} stroke={p.color||"#94a3b8"} strokeWidth={1.5}/><polygon points={p.x2+","+p.y2+" "+(p.x2-3.5)+","+(p.y2-6)+" "+(p.x2+3.5)+","+(p.y2-6)} fill={p.color||"#94a3b8"}/></g>};
  var Box=function(p){return <g><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={p.radius||6} fill={p.fill} stroke={p.stroke} strokeWidth={p.sw||1}/>{p.children}</g>};
  var T=function(p){return <text x={p.x} y={p.y} textAnchor={p.anchor||"middle"} fontSize={p.size||9} fontWeight={p.weight||600} fill={p.color||"#1a1d21"} fontFamily="'IBM Plex Sans',sans-serif">{p.children}</text>};
  return(
    <div style={{marginTop:20}}>
      <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Full Algorithm</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Allergic reaction / suspected anaphylaxis · All ages</div>
      <div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,padding:6,overflow:"hidden"}}>
        <svg viewBox="0 0 480 540" style={{width:"100%",display:"block"}}>
          <rect width={480} height={540} fill="#fafaf8" rx={6}/>
          {/* Entry */}
          <Box x={90} y={6} w={300} h={28} fill={rBg} stroke={rBd} sw={1.5} radius={14}><T x={240} y={18} size={9} weight={700} color={rC}>ALLERGIC REACTION PRESENTATION</T><T x={240} y={28} size={6} color={mC}>Assess: skin · respiratory · cardiovascular · GI</T></Box>
          <Arrow x1={240} y1={34} x2={240} y2={52}/>

          {/* Anaphylaxis criteria */}
          <g transform="translate(240,68)"><polygon points="0,-16 75,0 0,16 -75,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-3} size={7} weight={700}>Meets anaphylaxis</T><T x={0} y={7} size={7} weight={700}>criteria?</T></g>

          <Arrow x1={165} y1={68} x2={90} y2={96} color={rC}/>
          <T x={118} y={82} size={6} color={rC} weight={600}>Yes</T>
          <Arrow x1={315} y1={68} x2={390} y2={96} color={aC}/>
          <T x={360} y={82} size={6} color={aC} weight={600}>No</T>

          {/* LEFT: Anaphylaxis */}
          <Box x={10} y={96} w={160} h={56} fill={rBg} stroke={rBd} sw={2}>
            <T x={90} y={108} size={8} weight={700} color={rC}>ANAPHYLAXIS</T>
            <T x={90} y={120} size={6} weight={700}>IM EPINEPHRINE NOW</T>
            <T x={90} y={130} size={6}>0.01 mg/kg (max 0.5 mg)</T>
            <T x={90} y={140} size={6}>Mid-outer thigh · Repeat Q5min</T>
            <T x={90} y={148} size={5.5} color={rC}>O₂ · IV access · Monitor</T>
          </Box>
          <Arrow x1={90} y1={152} x2={90} y2={170}/>

          {/* Hypotension? */}
          <g transform="translate(90,184)"><polygon points="0,-14 50,0 0,14 -50,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>Hypotension or</T><T x={0} y={7} size={6} weight={700}>shock?</T></g>
          <line x1={40} y1={184} x2={10} y2={184} stroke="#94a3b8" strokeWidth={1}/><Arrow x1={10} y1={184} x2={10} y2={206} color={rC}/>
          <T x={22} y={180} size={5.5} color={rC} weight={600}>Yes</T>
          <Box x={2} y={206} w={50} h={34} fill={rBg} stroke={rBd} sw={1.5}><T x={27} y={218} size={5.5} weight={700} color={rC}>IV FLUIDS</T><T x={27} y={228} size={5}>NS 20 mL/kg</T><T x={27} y={236} size={5}>bolus, repeat</T></Box>

          <Arrow x1={90} y1={198} x2={90} y2={216}/>
          <T x={100} y={212} size={5.5} color={gC} weight={600}>Stable</T>

          {/* Response check */}
          <g transform="translate(90,232)"><polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>Response to</T><T x={0} y={7} size={6} weight={700}>epi + fluids?</T></g>
          <Arrow x1={35} y1={232} x2={10} y2={256} color={rC}/>
          <T x={16} y={248} size={5.5} color={rC} weight={600}>No</T>
          <Box x={2} y={256} w={60} h={34} fill={rBg} stroke={rBd}><T x={32} y={268} size={5.5} weight={700} color={rC}>IV EPI</T><T x={32} y={278} size={5}>INFUSION</T><T x={32} y={286} size={5} color={rC}>0.1 mcg/kg/min</T></Box>

          <Arrow x1={145} y1={232} x2={170} y2={256} color={gC}/>
          <T x={164} y={248} size={5.5} color={gC} weight={600}>Yes</T>
          <Box x={130} y={256} w={80} h={28} fill={aBg} stroke={aBd}><T x={170} y={268} size={6} weight={700} color={aC}>ADJUNCTS</T><T x={170} y={278} size={5}>Cetirizine · Albuterol</T></Box>

          {/* RIGHT: Mild allergic reaction */}
          <Box x={310} y={96} w={160} h={44} fill={aBg} stroke={aBd} sw={1.5}>
            <T x={390} y={108} size={7} weight={700} color={aC}>MILD ALLERGIC RXN</T>
            <T x={390} y={120} size={6}>Isolated skin: urticaria, itch, flush</T>
            <T x={390} y={130} size={6}>No respiratory / CV / GI sx</T>
            <T x={390} y={138} size={5.5} color={aC}>Observe for progression</T>
          </Box>
          <Arrow x1={390} y1={140} x2={390} y2={160}/>

            <T x={240} y={396} size={6} color={mC}>✓ Epinephrine autoinjector Rx (2-pack) + demonstration of use</T>

            <T x={370} y={484} size={7} weight={700} color={gC}>MILD REACTION</T>
            <T x={370} y={494} size={6} color={mC}>Isolated skin involvement</T>

            <T x={370} y={514} size={6} color={mC}>Antihistamine + observe</T>
            <T x={370} y={522} size={5.5} color={aC}>Give EPI if any progression</T>

  );
}


// ═══════════════════════════════
// WALK-THROUGH WIZARD
// ═══════════════════════════════
function Wizard({teaching,weightKg,doses}){
  var s1=useState(null),severity=s1[0],setSeverity=s1[1];
  var s2=useState(null),epiGiven=s2[0],setEpiGiven=s2[1];
  var s3=useState(null),hypotensive=s3[0],setHypotensive=s3[1];
  var s4=useState(null),epiResponse=s4[0],setEpiResponse=s4[1];
  var s5=useState(null),obsRisk=s5[0],setObsRisk=s5[1];
  var s6=useState(null),mildProg=s6[0],setMildProg=s6[1];

  function reset(){setSeverity(null);setEpiGiven(null);setHypotensive(null);setEpiResponse(null);setObsRisk(null);setMildProg(null);}

  return(<Pad>
    <Q text="Walk-Through" sub="Answer each question to guide management of allergic reaction / anaphylaxis"/>
    <TeachBox id="overview" teaching={teaching}/>

    {/* STEP 1: Does this meet anaphylaxis criteria? */}
    <Card title="Step 1 — Does This Meet Anaphylaxis Criteria?" color={C.red}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:6}}>
        <strong>Anaphylaxis is highly likely when ANY ONE of the following is met:</strong>
      </div>
      <div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:C.red,marginBottom:4}}>Criterion 1 — Skin/mucosal involvement PLUS:</div>
        <div style={{fontSize:11,lineHeight:1.6}}>Skin findings (hives, flushing, lip/tongue/uvula swelling) <strong>AND</strong><br/>Respiratory compromise (dyspnea, wheeze, stridor, hypoxemia) <strong>OR</strong><br/>Reduced BP or end-organ malperfusion (collapse, syncope, incontinence)</div>
      </div>
      <div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:C.amberMid,marginBottom:4}}>Criterion 2 — Two or more systems after LIKELY allergen:</div>
        <div style={{fontSize:11,lineHeight:1.6}}>Skin/mucosal involvement <strong>+</strong> Respiratory compromise <strong>+</strong> Reduced BP <strong>+</strong> Persistent GI symptoms (crampy pain, vomiting)<br/><em>Any two or more of the above</em></div>
      </div>
      <div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:C.purple,marginBottom:4}}>Criterion 3 — Reduced BP after KNOWN allergen:</div>
        <div style={{fontSize:11,lineHeight:1.6}}>Hypotension alone after exposure to a known allergen<br/>Pediatric: SBP &lt;70 (1mo–1yr) · &lt;70+(2×age) (1–10yr) · &lt;90 (11–17yr) · or &gt;30% drop from baseline</div>
      </div>
      <WizBtn label="Yes — Anaphylaxis Criteria Met" sub="One or more criteria fulfilled → give epinephrine immediately" color={C.red} bg={C.redBg} border={C.redBorder} selected={severity==="anaphylaxis"} onClick={function(){setSeverity("anaphylaxis")}}/>
      <WizBtn label="Likely Anaphylaxis — High Suspicion" sub="History of anaphylaxis to this trigger + developing symptoms, even if criteria not yet fully met" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={severity==="likely"} onClick={function(){setSeverity("likely")}}/>
      <WizBtn label="Mild Allergic Reaction — No Anaphylaxis" sub="Isolated skin findings (hives, itch, flushing) without respiratory, CV, or GI involvement" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={severity==="mild"} onClick={function(){setSeverity("mild")}}/>
      <TeachBox id="criteria" teaching={teaching}/>
    </Card>

    {/* ═══ ANAPHYLAXIS BRANCH ═══ */}
    {(severity==="anaphylaxis"||severity==="likely")&&(<Card title="Step 2 — Epinephrine + Initial Stabilization" color={C.red}>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="💉" title="IM EPINEPHRINE — GIVE NOW">
        <strong>Epinephrine</strong> {doses?doses.epiDose+" mg":"0.01 mg/kg"} <strong>IM mid-outer thigh</strong><br/>
        <span style={{fontSize:11,color:C.muted}}>(= {doses?doses.epiVol+" mL":"volume"} of 1 mg/mL solution{doses?" · Autoinjector: "+doses.autoInj:""})</span><br/>
        Repeat every <strong>5 minutes</strong> if no improvement or worsening<br/><br/>
        <strong>Simultaneously:</strong><br/>
        — Remove inciting agent if possible (stop infusion, etc.)<br/>
        — High-flow O₂ (nonrebreather 15 L/min)<br/>
        — Place supine with legs elevated (if hypotensive)<br/>
        — <strong style={{color:C.red}}>Do NOT sit patient upright if hypotensive</strong> — risk of "empty ventricle" arrest<br/>
        — IV access × 2 · Continuous cardiopulmonary monitoring<br/>
        — Prepare for intubation if stridor or severe upper airway edema
      </Alert>
      <div style={{fontSize:13,marginBottom:10}}><strong>Has epinephrine been administered?</strong></div>
      <WizBtn label="Yes — Epinephrine Given" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={epiGiven==="yes"} onClick={function(){setEpiGiven("yes")}}/>
      <TeachBox id="epinephrine" teaching={teaching}/>
    </Card>)}

    {/* STEP 3: Hypotension? */}
    {(severity==="anaphylaxis"||severity==="likely")&&epiGiven==="yes"&&(<Card title="Step 3 — Assess for Hypotension / Shock" color={C.red}>
      <div style={{fontSize:13,marginBottom:10}}><strong>Is the patient hypotensive or showing signs of shock?</strong></div>
      {doses&&(<div style={{background:C.blueBg,border:"1.5px solid "+C.blueBorder,borderRadius:8,padding:"8px 10px",marginBottom:10}}>
        <div style={{fontSize:11,fontWeight:700,color:C.blue,marginBottom:2}}>Pediatric Hypotension for {doses.w} kg</div>
        <div style={{fontSize:11}}>SBP threshold depends on age — enter age in patient bar for reference</div>
      </div>)}
      <WizBtn label="Yes — Hypotensive / Shock" sub="IV fluid resuscitation needed" color={C.red} bg={C.redBg} border={C.redBorder} selected={hypotensive==="yes"} onClick={function(){setHypotensive("yes")}}/>
      <WizBtn label="No — Hemodynamically Stable" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={hypotensive==="no"} onClick={function(){setHypotensive("no")}}/>
      {hypotensive==="yes"&&(<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="IV Fluid Resuscitation">
        <strong>NS {doses?doses.bolus+" mL":"20 mL/kg"} bolus</strong> over 5–10 min, repeat PRN<br/>
        Large volumes may be required (up to 100 mL/kg in children)<br/>
        <strong>Begin preparing IV epinephrine infusion</strong> in case of refractory hypotension
      </Alert>)}
    </Card>)}

    {/* STEP 4: Response? */}
    {(severity==="anaphylaxis"||severity==="likely")&&epiGiven==="yes"&&(<Card title="Step 4 — Response to Epinephrine" color={C.amberMid}>
      <div style={{fontSize:13,marginBottom:10}}><strong>How is the patient responding after IM epinephrine (± IV fluids)?</strong></div>
      <WizBtn label="Good Response — Symptoms Improving" sub="No further epi needed; consider adjunctive therapies" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={epiResponse==="good"} onClick={function(){setEpiResponse("good")}}/>
      <WizBtn label="Partial Response — Some Improvement" sub="Repeat IM epinephrine Q5 min; add adjunctive therapies" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={epiResponse==="partial"} onClick={function(){setEpiResponse("partial")}}/>
      <WizBtn label="No Response / Worsening" sub="Refractory anaphylaxis — IV epinephrine infusion" color={C.red} bg={C.redBg} border={C.redBorder} selected={epiResponse==="none"} onClick={function(){setEpiResponse("none")}}/>

      {epiResponse==="good"&&(<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Good Response — Adjunctive Therapy">
        <strong>For residual urticaria/itch:</strong> Cetirizine {doses?doses.cetPed:"(age-based)"} PO (preferred) or Diphenhydramine {doses?doses.dphMax+" mg":"1 mg/kg"} IV over 5 min<br/>
        <strong>For persistent bronchospasm:</strong> Albuterol {doses?doses.albuDose:"2.5–5 mg"} nebulized<br/>
        <strong>Famotidine</strong> {doses?doses.famotMax+" mg":"0.25 mg/kg"} IV (optional, for persistent urticaria)<br/>
        <strong>Glucocorticoids: NOT routine.</strong> Consider only if persistent bronchospasm or received &gt;2 epi doses.
      </Alert>)}
      {epiResponse==="partial"&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🟡" title="Partial Response — Repeat Epinephrine">
        <strong>Repeat IM Epinephrine</strong> {doses?doses.epiDose+" mg":"0.01 mg/kg"} Q5 min<br/>
        Continue IV fluids if hypotensive<br/>
        Add adjunctive therapies: cetirizine, albuterol if bronchospasm<br/>
        <strong>Begin preparing IV epi infusion</strong> if 2+ IM doses needed
      </Alert>)}
      {epiResponse==="none"&&(<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="Refractory Anaphylaxis — IV Epinephrine Infusion">
        <strong>IV Epinephrine infusion:</strong> {doses?doses.epiInfStart+" mcg/min":"0.1 mcg/kg/min"} (start), titrate to effect<br/>
        <span style={{fontSize:11,color:C.muted}}>Preparation: 1 mg in 100 mL NS = 10 mcg/mL</span><br/>
        Continuous cardiac monitoring + frequent BP checks<br/>
        If on beta-blocker: <strong>Glucagon</strong> {doses?doses.glucagonMax+" mg":"20–30 mcg/kg"} slow IV push over 5 min (may cause vomiting)<br/>
        Consider vasopressin, norepinephrine if refractory to maximal epi<br/>
        <strong>Prepare for intubation</strong> if upper airway compromise<br/>
        <strong>→ Admit ICU</strong>
      </Alert>)}
      <TeachBox id="adjunctive" teaching={teaching}/>
    </Card>)}

    {/* STEP 5: Observation / Disposition for anaphylaxis */}
    {(severity==="anaphylaxis"||severity==="likely")&&epiGiven==="yes"&&(epiResponse==="good"||epiResponse==="partial")&&(<Card title="Step 5 — Observation & Disposition" color={C.blue}>
      <div style={{fontSize:13,marginBottom:10}}><strong>Risk stratification for observation period:</strong></div>
      <WizBtn label="Lower Risk — Mild initial reaction, single epi dose, prompt response" sub="Observe minimum 1 hour after complete symptom resolution" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={obsRisk==="low"} onClick={function(){setObsRisk("low")}}/>
      <WizBtn label="Higher Risk — Severe initial reaction, >2 epi doses, hypotension/hypoxia, hx severe asthma" sub="Observe minimum 12 hours including 4 hours symptom-free" color={C.red} bg={C.redBg} border={C.redBorder} selected={obsRisk==="high"} onClick={function(){setObsRisk("high")}}/>
      {obsRisk==="low"&&(<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Discharge After Observation">
        Minimum <strong>1 hour symptom-free</strong><br/><br/>
        <strong>Discharge checklist:</strong><br/>
        ✓ Epinephrine autoinjector Rx (2-pack) + demonstrate correct use<br/>
        ✓ Written anaphylaxis action plan<br/>
        ✓ Allergen avoidance counseling<br/>
        ✓ Warn: symptoms may recur without re-exposure (biphasic) for up to 48h<br/>
        ✓ Return for: breathing difficulty, throat tightness, lightheadedness, widespread hives<br/>
        ✓ Allergist referral<br/>
        ✓ Antihistamines PRN for residual hives; steroid taper NOT needed
      </Alert>)}
      {obsRisk==="high"&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🟡" title="Extended Observation / Admission">
        Observe minimum <strong>12 hours</strong> including <strong>4 hours completely symptom-free</strong><br/>
        Appropriate observation unit or inpatient setting<br/>
        Continue monitoring; have epinephrine at bedside<br/>
        Same discharge checklist when criteria met
      </Alert>)}
      <TeachBox id="biphasic" teaching={teaching}/>
      <TeachBox id="discharge" teaching={teaching}/>
    </Card>)}

    {/* ═══ MILD ALLERGIC REACTION BRANCH ═══ */}
    {severity==="mild"&&(<Card title="Step 2 — Mild Allergic Reaction Management" color={C.amberMid}>
      <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>
        <strong>Isolated skin findings without systemic involvement:</strong><br/>
        <span style={{fontSize:12,color:C.muted}}>Urticaria, pruritus, flushing, mild angioedema (lips, face) — no respiratory, cardiovascular, or GI symptoms</span>
      </div>
      <Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="💊" title="Antihistamine Treatment">
        <strong>Cetirizine</strong> {doses?doses.cetPed:"(age-based)"} PO — preferred (less sedating)<br/>
        OR <strong>Diphenhydramine</strong> {doses?doses.dphMax+" mg":"1 mg/kg"} PO/IV<br/>
        Observe for <strong>1–4 hours</strong> for progression to anaphylaxis<br/><br/>
        <strong style={{color:C.red}}>If ANY respiratory, cardiovascular, or GI symptoms develop → this is ANAPHYLAXIS → give epinephrine immediately</strong>
      </Alert>
      <div style={{fontSize:13,marginBottom:10}}><strong>Does the reaction progress beyond skin involvement?</strong></div>
      <WizBtn label="Yes — Progressing to Anaphylaxis" sub="Any respiratory, CV, or GI involvement → give epinephrine" color={C.red} bg={C.redBg} border={C.redBorder} selected={mildProg==="yes"} onClick={function(){setMildProg("yes");setSeverity("anaphylaxis")}}/>
      <WizBtn label="No — Remains Isolated Skin Findings" sub="Improving or stable with antihistamine" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={mildProg==="no"} onClick={function(){setMildProg("no")}}/>
      {mildProg==="no"&&(<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Discharge — Mild Allergic Reaction">
        Observe until symptoms improving (1–4 hours)<br/>
        <strong>Discharge with:</strong><br/>
        Cetirizine or diphenhydramine PRN × 3–5 days<br/>
        Allergen avoidance if trigger identified<br/>
        Return precautions: hives spreading, difficulty breathing, throat tightness, dizziness, vomiting<br/>
        Consider allergist referral if trigger unclear or first significant allergic reaction<br/>
        <strong>Consider prescribing epinephrine autoinjector</strong> if high-risk history or significant reaction
      </Alert>)}
      <TeachBox id="differential" teaching={teaching}/>
    </Card>)}

    {/* RESET */}
    {severity!==null&&(<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>)}
    <PathwayFlowchart/>
  </Pad>);
}

function RefTriage({teaching}){return(<Pad>
<Q text="Triage & Recognition" sub="Rapid identification of anaphylaxis saves lives"/>
<TeachBox id="overview" teaching={teaching}/>
<Card title="NIAID/FAAN Diagnostic Criteria" color={C.red}><div style={{marginTop:8}}>
<div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>Criterion 1 — Skin/Mucosal + One More System</div><div style={{fontSize:12,marginTop:2}}>Acute skin/mucosal involvement (hives, flushing, lip-tongue-uvula swelling) AND respiratory compromise (dyspnea, wheeze, stridor, hypoxemia) OR reduced BP/end-organ malperfusion</div></div>
<div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:8}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>Criterion 2 — Two or More Systems After Likely Allergen</div><div style={{fontSize:12,marginTop:2}}>Skin/mucosal + Respiratory + Reduced BP + Persistent GI symptoms (crampy pain, vomiting). Any two or more after exposure to a likely allergen.</div></div>
<div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.purple}}>Criterion 3 — Reduced BP After Known Allergen</div><div style={{fontSize:12,marginTop:2}}>Hypotension alone after exposure to a KNOWN allergen for that patient.</div></div>
</div><TeachBox id="criteria" teaching={teaching}/></Card>
<Card title="Pediatric Hypotension Thresholds" color={C.blue}><div style={{marginTop:8,fontSize:12,lineHeight:1.6}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:6}}>
<div style={{fontWeight:700,fontSize:10,color:C.muted}}>AGE</div>
<div style={{fontWeight:700,fontSize:10,color:C.muted}}>LOW SBP</div>
</div>
{[["1 month – 1 year","< 70 mmHg"],["1 – 10 years","< 70 + (2 × age) mmHg"],["11 – 17 years","< 90 mmHg"],["Any age","> 30% decrease from baseline"]].map(function(r){return <div key={r[0]} style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,padding:"3px 0",borderBottom:"1px dashed "+C.rule}}><div style={{fontSize:12}}>{r[0]}</div><div style={{fontSize:12,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{r[1]}</div></div>})}
</div></Card>
<Card title="Symptom Frequency in Anaphylaxis" color={C.primary}><div style={{marginTop:8,fontSize:12,lineHeight:1.6}}>
{[["Skin/mucosal","~90%"],["Respiratory","~85%"],["Gastrointestinal","~45%"],["Cardiovascular","~45%"]].map(function(r){return <div key={r[0]} style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:4,padding:"3px 0",borderBottom:"1px dashed "+C.rule}}><div style={{fontSize:12}}>{r[0]}</div><div style={{fontSize:12,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,textAlign:"center"}}>{r[1]}</div></div>})}
<div style={{fontSize:11,color:C.muted,marginTop:6}}>Skin findings may be absent in up to 10% of episodes. Do not require hypotension to diagnose.</div>
</div></Card>
<Card title="Common Triggers in Children" color={C.amberMid}><div style={{marginTop:8}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
{["Peanut / tree nuts","Cow's milk","Hen's egg","Shellfish / fish","Insect stings (Hymenoptera)","Medications (antibiotics, NSAIDs)","Latex","Exercise-induced (FDEIA)"].map(function(item){return <div key={item} style={{background:C.amberBg,border:"1px solid "+C.amberBorder,borderRadius:6,padding:"6px 8px",fontSize:11,fontWeight:500}}>{item}</div>})}
</div>
</div></Card>
</Pad>)}

function RefDecisions({teaching}){return(<Pad>
<Q text="Treatment Algorithm" sub="Epinephrine is first-line · There are NO absolute contraindications"/>
<Card title="Epinephrine — First Line" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
<div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:C.red,fontWeight:600,marginBottom:8}}>IM Epinephrine 0.01 mg/kg (max 0.5 mg) into mid-outer thigh</div>
Use 1 mg/mL concentration · Repeat Q5 min PRN<br/><br/>
<strong>Autoinjector dosing:</strong><br/>
— &lt;25 kg: 0.15 mg · 25–50 kg: 0.3 mg · &gt;50 kg: 0.5 mg<br/>
— Infants &lt;10 kg: draw exact dose when possible; 0.1 mg autoinjector acceptable if delay would be dangerous<br/><br/>
<strong>~90% of patients respond to a single dose when given promptly</strong><br/>
No absolute contraindications including: pregnancy, cardiovascular disease, beta-blocker use, older age
</div><TeachBox id="epinephrine" teaching={teaching}/></Card>
<Card title="Simultaneous Actions" color={C.primary}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
Remove inciting agent if possible<br/>
High-flow O₂ (nonrebreather 15 L/min)<br/>
Position supine with legs elevated (if hypotensive) — <strong>do not sit upright</strong><br/>
IV access × 2 · Continuous monitoring (HR, BP, SpO₂)<br/>
Prepare for intubation if stridor or upper airway edema<br/>
<strong style={{color:C.red}}>NS 20 mL/kg boluses for hypotension</strong> (up to 100 mL/kg may be required)
</div></Card>
<Card title="Adjunctive Therapies — AFTER Epinephrine" color={C.amberMid}><div style={{fontSize:13,lineHeight:1.6,marginTop:8}}>
<div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:8}}><div style={{fontSize:12,fontWeight:700,color:C.amberMid}}>These are SECOND-LINE — never replace or delay epinephrine</div></div>
<strong>H1 Antihistamine (for residual urticaria/itch):</strong> Cetirizine PO preferred (less sedating) or Diphenhydramine IV over 5 min<br/>
<strong>H2 Antihistamine (optional):</strong> Famotidine 0.25 mg/kg IV (max 20 mg)<br/>
<strong>Bronchodilator:</strong> Albuterol 2.5–5 mg nebulized for persistent bronchospasm<br/>
<strong>Glucocorticoids:</strong> NOT routine. No evidence prevents biphasic reactions. Consider only for persistent bronchospasm (with asthma) or reactions requiring &gt;2 epi doses. If given, outpatient taper NOT needed.
</div><TeachBox id="adjunctive" teaching={teaching}/></Card>
<Card title="Refractory Anaphylaxis" color={C.red}><div style={{fontSize:13,lineHeight:1.6,marginTop:8}}>
<div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:C.red,fontWeight:600,marginBottom:6}}>Persistent symptoms despite ≥3 epi doses + IV fluids → &lt;0.5% of cases</div>
<strong>IV Epinephrine infusion:</strong> 0.1–1 mcg/kg/min, titrated to effect<br/>
Preparation (pediatric): 1 mg in 100 mL NS = 10 mcg/mL<br/>
Continuous cardiac + hemodynamic monitoring required<br/><br/>
<strong>Beta-blocker patients:</strong> Glucagon 20–30 mcg/kg (max 1 mg) slow IV over 5 min (caution: causes vomiting)<br/><br/>
<strong>If still refractory:</strong> vasopressin, norepinephrine, methylene blue (1–2 mg/kg), ECMO consultation
</div><TeachBox id="refractory" teaching={teaching}/></Card>
<PathwayFlowchart/>
</Pad>)}

function RefMeds({teaching,doses}){return(<Pad>
<Q text="Medication Dosing" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/>
{!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight in the bar above.</Alert>)}
<Card title="Epinephrine — First Line" color={C.red}><div style={{marginTop:8}}>
<DoseRow label="Epinephrine IM (0.01 mg/kg, max 0.5 mg)" value={doses?doses.epiDose:"—"} unit={doses?"mg":""}/>
<DoseRow label="Volume of 1 mg/mL solution" value={doses?doses.epiVol:"—"} unit={doses?"mL":""}/>
<DoseRow label="Autoinjector dose" value={doses?doses.autoInj:"—"} unit=""/>
<div style={{fontSize:12,color:C.muted,marginTop:6}}>Mid-outer thigh · Repeat Q5 min PRN · ~90% respond to single dose</div>
</div></Card>
<Card title="IV Fluids" color={C.red}><div style={{marginTop:8}}>
<DoseRow label="NS bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/>
<div style={{fontSize:12,color:C.muted,marginTop:6}}>Repeat PRN for hypotension. Up to 100 mL/kg may be required.</div>
</div></Card>
<Card title="Antihistamines" color={C.blue}><div style={{marginTop:8}}>
<DoseRow label="Cetirizine PO (preferred)" value={doses?doses.cetPed:"—"} unit=""/>
<DoseRow label="Diphenhydramine (1 mg/kg) IV over 5 min" value={doses?doses.dphMax:"—"} unit={doses?"mg":""}/>
<DoseRow label="Famotidine (0.25 mg/kg) IV — optional" value={doses?doses.famotMax:"—"} unit={doses?"mg":""}/>
<div style={{fontSize:12,color:C.muted,marginTop:6}}>For residual urticaria/itch AFTER adequate epinephrine. Cetirizine preferred (less sedating). Do not give diphenhydramine IV push rapidly (hypotension risk).</div>
</div></Card>
<Card title="Bronchodilator" color={C.blue}><div style={{marginTop:8}}>
<DoseRow label="Albuterol nebulized" value={doses?doses.albuDose:"—"} unit=""/>
<div style={{fontSize:12,color:C.muted,marginTop:6}}>For bronchospasm not responsive to epinephrine. Does not treat upper airway edema or shock.</div>
</div></Card>
<Card title="Glucocorticoids (Not Routine)" color={C.amberMid}><div style={{marginTop:8}}>
<DoseRow label="Methylprednisolone (1 mg/kg) IV" value={doses?doses.methylpredMax:"—"} unit={doses?"mg":""}/>
<DoseRow label="Prednisolone (1 mg/kg) PO" value={doses?doses.prednisMax:"—"} unit={doses?"mg":""}/>
<div style={{fontSize:12,color:C.muted,marginTop:6}}>Consider only for persistent bronchospasm (especially with asthma) or reactions requiring &gt;2 epi doses. No evidence prevents biphasic reactions. Outpatient taper NOT needed.</div>
</div></Card>
<Card title="Refractory / IV Epinephrine" color={C.red} defaultOpen={false}><div style={{marginTop:8}}>
<DoseRow label="IV Epi infusion start (0.1 mcg/kg/min)" value={doses?doses.epiInfStart:"—"} unit={doses?"mcg/min":""}/>
<DoseRow label="Glucagon (20–30 mcg/kg) slow IV — beta-blocker pts" value={doses?doses.glucagonMax:"—"} unit={doses?"mg":""}/>
<div style={{fontSize:12,color:C.muted,marginTop:6}}>IV epi: titrate 0.1–1 mcg/kg/min. Prep: 1 mg in 100 mL NS = 10 mcg/mL. Requires continuous cardiac monitoring. Avoid IV bolus in children.</div>
</div></Card>
</Pad>)}

function RefDispo({teaching}){return(<Pad>
<Q text="Disposition & References"/>
<Card title="Observation Periods" color={C.primary}><div style={{marginTop:8}}>
<div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>Lower Risk — Minimum 1 Hour Symptom-Free</div><div style={{fontSize:12,marginTop:2}}>Mild-moderate anaphylaxis · Single epi dose · Prompt response · No hypotension/hypoxia</div></div>
<div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>Higher Risk — Minimum 12 Hours (4h Symptom-Free)</div><div style={{fontSize:12,marginTop:2}}>Hypotension or hypoxia · Required &gt;2 epi doses · Delayed epi administration · Unknown trigger · History of severe asthma · Risk factors for biphasic reactions</div></div>
<div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>Mild Allergic Reaction (No Anaphylaxis) — 1–4 Hours</div><div style={{fontSize:12,marginTop:2}}>Isolated urticaria/itch · No systemic involvement · Responding to antihistamine · Monitor for progression</div></div>
</div><TeachBox id="biphasic" teaching={teaching}/></Card>
<Card title="Discharge Checklist — Anaphylaxis" color={C.primary}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
✓ <strong>Epinephrine autoinjector prescription</strong> (2-pack) + demonstration of correct use<br/>
✓ <strong>Written anaphylaxis action plan</strong> (FARE or AAP template)<br/>
✓ <strong>Allergen avoidance counseling</strong> — review suspected trigger<br/>
✓ <strong>Biphasic reaction warning</strong> — symptoms may recur up to 48h without re-exposure<br/>
✓ <strong>Return precautions:</strong> difficulty breathing, throat tightness, lightheadedness, widespread hives, vomiting<br/>
✓ <strong>Allergist referral</strong> — 35% of patients have diagnosis/cause altered at follow-up<br/>
✓ Continue antihistamines PRN for residual hives; glucocorticoid taper NOT needed<br/>
✓ If known asthma: ensure controller medications optimized (asthma is a risk factor for fatal anaphylaxis)
</div><TeachBox id="discharge" teaching={teaching}/></Card>
<Card title="Differential Diagnosis" color={C.blue}><div style={{marginTop:8}}>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
{["Acute urticaria/angioedema (no systemic sx)","Acute asthma exacerbation","Vasovagal syncope (bradycardia vs tachycardia)","Anxiety / panic attack","Vocal cord dysfunction","Scombroid (histamine fish poisoning)","Hereditary angioedema (no urticaria)","Mastocytosis / mast cell activation"].map(function(item){return <div key={item} style={{background:C.blueBg,border:"1px solid "+C.blueBorder,borderRadius:6,padding:"6px 8px",fontSize:11,fontWeight:500}}>{item}</div>})}
</div>
</div><TeachBox id="differential" teaching={teaching}/></Card>
<Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>1. Sampson HA et al. NIAID/FAAN criteria for anaphylaxis. <em>J Allergy Clin Immunol</em> 2006; 117:391.<br/>2. Shaker MS et al. Anaphylaxis: 2020 Practice Parameter Update. <em>J Allergy Clin Immunol</em> 2020; 145:1082.<br/>3. Cardona V et al. WAO Anaphylaxis Guidance 2020. <em>World Allergy Organ J</em> 2020; 13:100472.<br/>4. Campbell RL et al. Emergency department diagnosis and treatment of anaphylaxis: a practice parameter. <em>Ann Allergy Asthma Immunol</em> 2014; 113:599.<br/>5. Simons FE et al. Epinephrine absorption: IM vs SC. <em>J Allergy Clin Immunol</em> 2001; 108:871.<br/>6. Campbell RL et al. IV bolus vs IM epinephrine. <em>J Allergy Clin Immunol Pract</em> 2015; 3:76.<br/>7. Pumphrey RS. Lessons from fatal reactions. <em>Clin Exp Allergy</em> 2000; 30:1144.<br/>8. Dribin TE et al. Lancet Child Adolesc Health 2025; 9:484.<br/>9. Golden DBK et al. Anaphylaxis: 2023 Practice Parameter Update. <em>Ann Allergy Asthma Immunol</em> 2024; 132:124.</div></Card>
</Pad>)}


// ═══════════════════════════════
// APP
// ═══════════════════════════════
function App(){
  var s1=useState("wizard"),mode=s1[0],setMode=s1[1];
  var s2=useState("triage"),tab=s2[0],setTab=s2[1];
  var s3=useState(false),teaching=s3[0],setTeaching=s3[1];
  var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];
  var s5=useState(""),ageYrs=s5[0],setAgeYrs=s5[1];
  var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);
  var rr=useResponsive(),maxW=rr.maxW;

  var refTabs=[{key:"triage",label:"Triage"},{key:"decision",label:"Treatment"},{key:"meds",label:"Medications"},{key:"special",label:"Dispo & Refs"}];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>
      {mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}
      <div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (years)</label><input type="number" inputMode="decimal" value={ageYrs} onChange={function(e){setAgeYrs(e.target.value)}} placeholder="4" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="16" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
      </div>
      {mode==="wizard"&&<Wizard teaching={teaching} weightKg={weightKg} doses={doses}/>}
      {mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}
      {mode==="reference"&&tab==="decision"&&<RefDecisions teaching={teaching}/>}
      {mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="special"&&<RefDispo teaching={teaching}/>}
      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/><strong style={{color:C.amberMid}}>⚠ DRAFT — Not yet reviewed or approved by the OHSU/Doernbecher Department of Emergency Medicine.</strong>
        <br/>Doernbecher Children's Hospital · PED · Allergic Reaction / Anaphylaxis Clinical Pathway · 2025
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
