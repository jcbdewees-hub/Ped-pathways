<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neonatal Hyperbilirubinemia — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const C={primary:"#a16207",pLight:"#fefce8",pBorder:"#fde047",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"Pathway Rationale",content:"This pathway follows the Northern California Neonatal Consortium (NCNC) guidelines, which are less conservative than the traditional AAP 2004 guidelines. The NCNC guidelines are predicated on newer data demonstrating possible associations between phototherapy and increased epilepsy and malignancy risk, and the high NNT to prevent one case of kernicterus. The key decision points are: TSB level relative to age in hours, gestational age, and the presence of neurotoxicity risk factors."},
  tsb:{title:"Total Serum Bilirubin (TSB)",content:"The AAP suggests measurement of total, direct, and indirect bilirubin. If direct bilirubin is <1.5 mg/dL, total bilirubin may be used for nomogram plotting. Capillary TSB (heel stick) may be used to initiate treatment — a venous sample to 'confirm' results is NOT recommended. However, capillary samples can have a high hemolysis rate. Venous TSB remains the gold standard."},
  nomogram:{title:"NCNC Nomograms",content:"The NCNC phototherapy and exchange transfusion nomograms plot TSB against age in hours, stratified by gestational age (≥38 weeks vs 35–37+6 weeks) and presence of neurotoxicity risk factors. The curves define thresholds for initiating phototherapy and for exchange transfusion. Use the online calculator at phototherapyguidelines.com for precise thresholds."},
  riskFactors:{title:"Neurotoxicity Risk Factors",content:"Risk factors that lower the phototherapy and exchange thresholds: isoimmune hemolytic disease, G6PD deficiency or other hemolytic disease, sepsis or suspected sepsis (sufficient to be on antibiotics), acidosis (BE ≤−8 mEq/L or pCO₂ >50 mmHg within 24h), albumin <3.0 mg/dL, and any clinical instability. These factors increase the risk of bilirubin neurotoxicity at lower TSB levels."},
  g6pd:{title:"G6PD Screening",content:"G6PD deficiency is common in Mediterranean, Middle Eastern, and certain African and Asian populations. Screen if patient is male AND from an at-risk ethnic region: Afro-Caribbean, West Africa, India, Pakistan, Bangladesh, East African Asian, Cyprus, Iran, Lebanon, China, or Italy. G6PD deficiency can cause acute hemolytic episodes and significantly worsen hyperbilirubinemia."},
  directBili:{title:"Direct Hyperbilirubinemia",content:"A direct bilirubin >1.5 mg/dL or >20% of TSB is considered pathologic and suggests conjugated hyperbilirubinemia. This warrants further workup including evaluation for biliary atresia, neonatal hepatitis, metabolic disorders, or sepsis. This is distinct from physiologic or breast milk jaundice, which is predominantly indirect (unconjugated) hyperbilirubinemia."},
  phototherapy:{title:"Phototherapy",content:"Must avoid interruptions >30 minutes to ensure effectiveness. The NCNC thresholds are used rather than traditional AAP curves. Fiberoptic 'bili blankets' are less effective than intensive phototherapy and may be an option only for low-risk outpatients. If phototherapy is required and the patient will be admitted, initiate in the ED prior to transfer if resources permit."},
  exchange:{title:"Exchange Transfusion",content:"Exchange transfusion is recommended if the infant remains jaundiced with signs of acute bilirubin encephalopathy (hypertonia, arching, opisthotonos, fever, high-pitched cry), even if TSB has been reduced. If TSB is within 2 mg/dL of exchange threshold, the patient requires a warmer, or is otherwise critically ill → admit to NICU. Consult a neonatologist emergently for exchange transfusion."},
  labInterp:{title:"Lab Interpretation Patterns",content:"Elevated indirect bilirubin + normal reticulocyte count + negative Coombs = physiologic, breast milk, or familial nonhemolytic jaundice. Elevated indirect bilirubin + increased reticulocyte count = hemolysis (ABO/Rh incompatibility, RBC abnormalities). Elevation of both direct AND indirect bilirubin + negative Coombs + normal reticulocyte count = hepatitis, metabolic/obstructive biliary disorders, or sepsis."},
  fluids:{title:"Fluid Resuscitation",content:"NS 10 mL/kg bolus if weight loss >10% since birth or clinical evidence of dehydration. If significantly dehydrated and requiring admission, start maintenance fluids with D10 ½NS + 20 KCl (if potassium WNL). Excessive weight loss is defined as >10% loss from birth weight; infant should be back to birth weight by DOL 10."},
};

function useResponsive(){const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:520);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return{maxW:w>=640?800:520};}

function calcDoses(w){const wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,bolus10:Math.round(wt*10)};}

function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Neonatal Hyperbilirubinemia</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · ≥35 wk GA · ≤14 Days · March 2022</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function Sec({title,color,children}){return(<div style={{marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingBottom:4,borderBottom:`2px solid ${color}`}}>{title}</div>{children}</div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const[ageHours,setAgeHours]=useState("");
  const{maxW}=useResponsive();
  const doses=useMemo(()=>calcDoses(weightKg),[weightKg]);

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"decision",label:"Decisions"},
    {key:"labs",label:"Labs & Nomogram"},
    {key:"special",label:"Dispo & Refs"},
  ];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (hours)</label>
          <input type="number" inputMode="decimal" value={ageHours} onChange={e=>setAgeHours(e.target.value)} placeholder="48" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="3.2" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="Infants ≥35 wk GA, ≤14 days with concern for jaundice"/>
          <TeachBox id="overview" teaching={teaching}/>

          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Infants &gt;35 weeks gestation presenting with concern for jaundice</Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Infants &gt;14 days of life</Alert>
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI Level II</strong><br/>
              Full vitals + <strong>naked weight</strong><br/>
              Evaluate for dehydration<br/>
              Initiate lab draws — <strong>do NOT delay labs for difficult IV</strong><br/>
              <span style={{fontSize:12,color:C.muted}}>May send capillary sample after 2 failed venous attempts</span><br/>
              Infant warmer PRN for temp regulation<br/>
              <strong style={{color:C.red}}>If hypothermia &lt;36.0°C → notify LIP → refer to Fever/Sepsis &lt;29d Pathway</strong>
            </div>
          </Card>

          <Card title="Initial Labs — All Patients" color={C.blue}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Heel stick:</strong> Total serum bilirubin (TSB), indirect, and direct — if well-appearing, not significantly dehydrated
            </div>
            <TeachBox id="tsb" teaching={teaching}/>
          </Card>

          <Card title="Additional Labs — Pathologic Jaundice" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Obtain if:</strong> direct hyperbilirubinemia, TSB &gt; phototherapy threshold, jaundice within first 24h of life, ill-appearing<br/><br/>
              Blood type &amp; screen · CBC · Direct Coombs · CMP · G6PD screen (if male + at-risk ethnicity)<br/>
              Consider rule-out sepsis labs (→ Fever/Sepsis &lt;29d Pathway)
            </div>
            <TeachBox id="g6pd" teaching={teaching}/>
          </Card>

          <Card title="Neurotoxicity Risk Factors" color={C.red}>
            <div style={{marginTop:8}}>
              {["Isoimmune hemolytic disease, G6PD deficiency, or other hemolytic disease","Sepsis or suspected sepsis (sufficient to be on antibiotics)","Acidosis (BE ≤−8 mEq/L or pCO₂ >50 mmHg within 24h)","Albumin <3.0 mg/dL","Any clinical instability"].map((rf,i)=>(
                <div key={i} style={{padding:"4px 0",borderBottom:`1px dashed ${C.rule}`,fontSize:13}}>
                  <span style={{color:C.red,fontWeight:600}}>•</span> {rf}
                </div>
              ))}
              <div style={{fontSize:12,color:C.muted,marginTop:6}}>These factors lower the phototherapy and exchange thresholds on the NCNC nomograms</div>
            </div>
            <TeachBox id="riskFactors" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Decision Tree" sub="Based on TSB, age in hours, clinical appearance, and risk factors"/>

          <Card title="Step 1 — Critical Screening Questions" color={C.red}>
            <div style={{marginTop:8}}>
              {[
                {q:"Jaundice within first 24 hours of life?",action:"Pathologic — obtain full workup (CBC, retic, Coombs, CMP, G6PD, repeat TSB)"},
                {q:"TSB rising >0.2 mg/dL per hour?",action:"Pathologic — obtain full workup"},
                {q:"Bilirubin exceeds phototherapy threshold?",action:"Start phototherapy in ED"},
                {q:"Direct bilirubin >1.5 mg/dL or >20% of TSB?",action:"Direct hyperbilirubinemia — further workup needed"},
              ].map((item,i)=>(
                <div key={i} style={{background:i%2===0?C.redBg:C.amberBg,border:`1.5px solid ${i%2===0?C.redBorder:C.amberBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                  <div style={{fontSize:13,fontWeight:700,color:i%2===0?C.red:C.amberMid}}>{item.q}</div>
                  <div style={{fontSize:12,marginTop:2}}>→ {item.action}</div>
                </div>
              ))}
            </div>
            <TeachBox id="directBili" teaching={teaching}/>
          </Card>

          <Card title="Step 2 — Plot on NCNC Nomograms" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Determine:<br/>
              1. <strong>Age in hours</strong> {ageHours?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>({ageHours}h)</span>:""}<br/>
              2. <strong>Gestational age at birth</strong> (≥38 wk vs 35–37+6 wk)<br/>
              3. <strong>Neurotoxicity risk factors</strong> present?<br/><br/>
              <strong>Figure 1:</strong> Phototherapy threshold<br/>
              <strong>Figure 2:</strong> Exchange transfusion threshold
            </div>
            <div style={{marginTop:8}}>
              <a href="https://www.phototherapyguidelines.com/" target="_blank" rel="noopener" style={{display:"block",background:C.pLight,border:`1.5px solid ${C.pBorder}`,borderRadius:8,padding:"12px",textAlign:"center",textDecoration:"none",color:C.primary,fontWeight:700,fontSize:14}}>
                Open NCNC Nomogram Calculator ↗
              </a>
            </div>
            <TeachBox id="nomogram" teaching={teaching}/>
          </Card>

          <Card title="Step 3 — Ill-Appearing or Critically Ill?" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Ill-appearing, temp instability, hypoxemia, significant dehydration?</strong><br/>
              → Place PIV · Resuscitate · Consider Fever/Sepsis &lt;29d Pathway<br/><br/>
              <strong>TSB within 2 mg/dL of exchange threshold, requires warmer, or critically ill?</strong><br/>
              → NS bolus {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{doses.bolus10} mL</span>:"10 mL/kg"}<br/>
              → Start maintenance (D10 ½NS + 20 KCl if K⁺ WNL)<br/>
              → <strong style={{color:C.red}}>Admit to NICU</strong> (PICU if NICU bed not available)<br/>
              → Consult neonatologist emergently for exchange transfusion
            </div>
            <TeachBox id="exchange" teaching={teaching}/>
          </Card>

          <Card title="Phototherapy" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              If TSB exceeds phototherapy threshold on NCNC nomogram:<br/>
              → <strong>Start phototherapy in ED</strong> if resources permit, prior to admission/transfer<br/>
              → Avoid interruptions &gt;30 minutes
            </div>
            <TeachBox id="phototherapy" teaching={teaching}/>
          </Card>

          <Card title="Fluids" color={C.blue} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS bolus (10 mL/kg)" value={doses?doses.bolus10:"—"} unit={doses?"mL":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>If weight loss &gt;10% from birth or clinical dehydration</div>
              <div style={{fontSize:12,marginTop:4}}>If admitted + dehydrated → D10 ½NS + 20 KCl maintenance</div>
            </div>
            <TeachBox id="fluids" teaching={teaching}/>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const bC="#a16207",bBg="#fefce8",bBd="#fde047";
            const blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd";
            const pC="#6b21a8",pBg="#faf5ff",pBd="#c4b5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);
            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Neonate with jaundice → TSB → NCNC nomogram → Disposition</div>
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 380" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={380} fill="#fafaf8" rx={6}/>

                    <Box x={100} y={6} w={280} h={28} fill={bBg} stroke={bBd} sw={1.5} radius={14}>
                      <T x={240} y={18} size={9} weight={700} color={bC}>NEONATE WITH JAUNDICE</T>
                      <T x={240} y={28} size={6} color={mC}>Vitals · Naked weight · Heel stick TSB (total + direct)</T>
                    </Box>
                    <Arrow x1={240} y1={34} x2={240} y2={48}/>

                    <g transform="translate(240,62)"><polygon points="0,-14 65,0 0,14 -65,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Ill-appearing?</T><T x={0} y={8} size={6} color={mC}>Temp instability?</T></g>

                    <line x1={305} y1={62} x2={420} y2={62} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={420} y1={62} x2={420} y2={82} color={rC}/>
                    <Box x={370} y={82} w={100} h={28} fill={rBg} stroke={rBd} sw={2}><T x={420} y={93} size={7} weight={700} color={rC}>ILL / UNSTABLE</T><T x={420} y={103} size={6}>Resuscitate · Sepsis pw</T></Box>

                    <Arrow x1={240} y1={76} x2={240} y2={92}/>
                    <Box x={115} y={92} w={250} h={18} fill={bBg} stroke={bBd}><T x={240} y={103} size={8} weight={700} color={bC}>PLOT TSB ON NCNC NOMOGRAM</T></Box>
                    <Arrow x1={240} y1={110} x2={240} y2={124}/>

                    <g transform="translate(240,138)"><polygon points="0,-14 70,0 0,14 -70,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Above phototherapy</T><T x={0} y={8} size={7} weight={700}>threshold?</T></g>

                    <Arrow x1={170} y1={138} x2={90} y2={166} color={rC}/>
                    <Arrow x1={310} y1={138} x2={390} y2={166} color={gC}/>

                    {/* Above threshold */}
                    <Box x={20} y={166} w={140} h={22} fill={rBg} stroke={rBd} sw={1.5}><T x={90} y={175} size={8} weight={700} color={rC}>ABOVE THRESHOLD</T></Box>
                    <Arrow x1={90} y1={188} x2={90} y2={200} color={rC}/>
                    <Box x={20} y={200} w={140} h={18} fill={aBg} stroke={aBd}><T x={90} y={211} size={7} weight={700} color={aC}>START PHOTOTHERAPY IN ED</T></Box>
                    <Arrow x1={90} y1={218} x2={90} y2={232}/>

                    <g transform="translate(90,244)"><polygon points="0,-12 50,0 0,12 -50,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-1} size={6} weight={700}>Near exchange?</T></g>

                    <Arrow x1={40} y1={244} x2={20} y2={268} color={rC}/>
                    <Arrow x1={140} y1={244} x2={160} y2={268} color={aC}/>

                    <Box x={-10} y={268} w={80} h={28} fill={rBg} stroke={rBd} sw={2}><T x={30} y={279} size={7} weight={700} color={rC}>NICU</T><T x={30} y={289} size={6}>Neonatology stat</T></Box>
                    <Box x={120} y={268} w={80} h={28} fill={aBg} stroke={aBd}><T x={160} y={279} size={7} weight={700} color={aC}>ADMIT</T><T x={160} y={289} size={6}>MBU/FM/Peds</T></Box>

                    {/* Below threshold */}
                    <Box x={320} y={166} w={140} h={22} fill={gBg} stroke={gBd} sw={1.5}><T x={390} y={175} size={8} weight={700} color={gC}>BELOW THRESHOLD</T></Box>
                    <Arrow x1={390} y1={188} x2={390} y2={202}/>

                    <g transform="translate(390,214)"><polygon points="0,-12 55,0 0,12 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-1} size={6} weight={700}>Feeding/wt issues?</T></g>

                    <Arrow x1={340} y1={218} x2={310} y2={240} color={aC}/>
                    <Arrow x1={440} y1={218} x2={460} y2={240} color={gC}/>

                    <Box x={270} y={240} w={80} h={28} fill={aBg} stroke={aBd}><T x={310} y={251} size={7} weight={700} color={aC}>ADMIT</T><T x={310} y={261} size={6}>Peds Hosp Med</T></Box>
                    <Box x={425} y={240} w={50} h={28} fill={gBg} stroke={gBd}><T x={450} y={251} size={7} weight={700} color={gC}>D/C</T><T x={450} y={261} size={5}>f/u 24h</T></Box>

                    {/* Risk factors */}
                    <Box x={40} y={316} w={400} h={28} fill={rBg} stroke={rBd} radius={8}>
                      <T x={240} y={327} size={7} weight={700} color={rC}>NEUROTOXICITY RISK FACTORS → LOWER THRESHOLDS</T>
                      <T x={240} y={338} size={6} color={mC}>Hemolysis · Sepsis · Acidosis (BE≤−8, pCO₂&gt;50) · Albumin&lt;3.0 · Clinical instability</T>
                    </Box>

                    <Box x={100} y={356} w={280} h={16} fill={blBg} stroke={blBd} radius={4}>
                      <T x={240} y={367} size={6} weight={600} color={blC}>phototherapyguidelines.com — NCNC nomogram calculator</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── LABS & NOMOGRAM ── */}
      {tab==="labs"&&(
        <Pad>
          <Q text="Lab Interpretation & Nomogram"/>

          <Card title="NCNC Nomogram Calculator" color={C.primary}>
            <div style={{marginTop:8}}>
              <a href="https://www.phototherapyguidelines.com/" target="_blank" rel="noopener" style={{display:"block",background:C.pLight,border:`1.5px solid ${C.pBorder}`,borderRadius:8,padding:"14px",textAlign:"center",textDecoration:"none",color:C.primary,fontWeight:700,fontSize:15}}>
                Open NCNC Phototherapy Guidelines ↗
              </a>
              <div style={{fontSize:12,color:C.muted,marginTop:8,textAlign:"center"}}>
                Enter TSB, age in hours, gestational age, and risk factors to determine phototherapy and exchange thresholds
              </div>
            </div>
            <TeachBox id="nomogram" teaching={teaching}/>
          </Card>

          <Card title="Lab Interpretation Patterns" color={C.blue}>
            <div style={{marginTop:8}}>
              <div style={{background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>↑ Indirect + Normal retic + Negative Coombs</div>
                <div style={{fontSize:11,marginTop:2}}>= Physiologic, breast milk, or familial nonhemolytic jaundice</div>
              </div>
              <div style={{background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,color:C.amberMid}}>↑ Indirect + ↑ Reticulocyte count</div>
                <div style={{fontSize:11,marginTop:2}}>= Hemolysis (ABO/Rh incompatibility, RBC abnormalities)</div>
              </div>
              <div style={{background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.red}}>↑ Direct AND Indirect + Negative Coombs + Normal retic</div>
                <div style={{fontSize:11,marginTop:2}}>= Hepatitis, metabolic/obstructive biliary disorders, or sepsis</div>
              </div>
            </div>
            <TeachBox id="labInterp" teaching={teaching}/>
          </Card>

          <Card title="Pathologic Jaundice Labs" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Blood type &amp; screen · CBC · Reticulocyte count · Direct Coombs · CMP<br/>
              G6PD screen (if male + at-risk ethnicity: Afro-Caribbean, West Africa, India, Pakistan, Bangladesh, East African Asian, Cyprus, Iran, Lebanon, China, Italy)<br/>
              Repeat TSB
            </div>
            <TeachBox id="g6pd" teaching={teaching}/>
          </Card>

          <Card title="Direct Hyperbilirubinemia" color={C.purple} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Definition:</strong> Direct bilirubin &gt;1.5 mg/dL or &gt;20% of TSB<br/>
              Suggests conjugated hyperbilirubinemia — evaluate for biliary atresia, neonatal hepatitis, metabolic disorders, sepsis
            </div>
            <TeachBox id="directBili" teaching={teaching}/>
          </Card>

          <Card title="Acute Bilirubin Encephalopathy Signs" color={C.red} defaultOpen={false}>
            <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="Exchange Transfusion Indicated">
              Hypertonia · Arching · Opisthotonos · Fever · High-pitched cry<br/>
              Exchange transfusion recommended even if TSB has been reduced
            </Alert>
            <TeachBox id="exchange" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DISPO & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Disposition & References"/>

          <Card title="Admission Routing" color={C.primary}>
            <div style={{marginTop:8}}>
              {[
                ["NICU (PICU if NICU unavailable)","TSB within 2 mg/dL of exchange threshold · Requires warmer · Critically ill · Exchange transfusion candidate",C.red],
                ["MBU","Requires only phototherapy and/or rehydration · Page MBU attending for placement",C.amberMid],
                ["Family Medicine","Covered by FM or Virginia Garcia",C.blue],
                ["Peds Hospital Medicine","Suspected infection or comorbidities · Feeding inadequate · Excessive weight loss (>10% from birth, not back by DOL 10)",C.purple],
              ].map(([loc,criteria,color],i)=>(
                <div key={i} style={{padding:"8px 0",borderBottom:`1px dashed ${C.rule}`}}>
                  <div style={{fontSize:13,fontWeight:700,color}}>{loc}</div>
                  <div style={{fontSize:12,color:C.ink,marginTop:2}}>{criteria}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:12,color:C.muted,marginTop:8}}>
              NICU/L&D → sign out to NICU resident · 9N → sign out to hospitalist resident<br/>
              If resources permit, start phototherapy in ED prior to admission/transfer
            </div>
          </Card>

          <Card title="Discharge Criteria" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              TSB below phototherapy threshold · No pathologic features · Feeding adequately · No excessive weight loss<br/>
              <strong>Follow-up within 24 hours</strong>
            </div>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. Maisels MJ et al. Management of hyperbilirubinemia in the newborn infant 35 or more weeks of gestation. <em>Pediatrics</em> 2004; 114(1).<br/>
              2. Newman TB et al. Numbers needed to treat with phototherapy according to AAP guidelines. <em>Pediatrics</em> 2009; 123(5).<br/>
              3. Frazier AL et al. Can big data shed light on the origins of pediatric cancer? <em>Pediatrics</em> 2016; 137(6).<br/>
              4. Newman TB et al. Childhood seizures after phototherapy. <em>Pediatrics</em> 2018; 142(4).<br/>
              5. Northern California Neonatal Consortium (NCNC). Phototherapy and Exchange Transfusion Guidelines. <em>phototherapyguidelines.com</em>
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Neonatal Hyperbilirubinemia Clinical Pathway · March 2022
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
