<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acute Psychiatric / Behavioral — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: #f7f6f3; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useMemo } = React;

const C = {
  primary: "#581c87", pLight: "#faf5ff", pBorder: "#c4b5fd",
  red: "#b91c1c", redBg: "#fef2f2", redBorder: "#fca5a5",
  amber: "#92400e", amberBg: "#fffbeb", amberBorder: "#fcd34d", amberMid: "#d97706",
  green: "#166534", greenBg: "#f0fdf4", greenBorder: "#86efac", greenMid: "#16a34a",
  blue: "#1e40af", blueBg: "#eff6ff", blueBorder: "#93c5fd",
  purple: "#581c87", purpleBg: "#faf5ff", purpleBorder: "#c4b5fd",
  teal: "#0f766e", tealBg: "#f0fdfa", tealBorder: "#5eead4",
  muted: "#6b7280", ink: "#1a1d21", paper: "#f7f6f3", white: "#fff", rule: "#e5e2db",
};

const TEACH = {
  overview: {
    title: "Pathway Rationale",
    content: "Pediatric mental health ED visits have increased substantially over the past decade. This pathway standardizes the initial approach to acute psychiatric and behavioral presentations, focusing on safety assessment, appropriate legal frameworks for holding minors, and a tiered agitation management strategy. The emphasis is on least-restrictive interventions first."
  },
  asq: {
    title: "ASQ (Ask Suicide-Screening Questions)",
    content: "The ASQ is a validated 4-item screening tool developed by NIMH for pediatric patients ages 10–17. A positive screen on any item is considered 'non-acute positive' (moderate-low risk). An acutely positive screen (patient endorses current suicidal ideation or recent attempt) is HIGH risk and requires immediate 1:1 PSA. For patients ≥18, the PHQ-2 is used first; if score >3, the Columbia Suicide Severity Rating Scale is completed."
  },
  nmi: {
    title: "Notice of Mental Illness (NMI)",
    content: "An NMI is a legal document that allows a minor to be held for behavioral health assessment when the parent/guardian is not in agreement or is absent. NMIs are good for 72 hours or until a court assessor maintains or drops the hold. An NMI cannot be discontinued — hold withdrawal paperwork must be completed, scanned, and faxed to the court. This is distinct from adult psychiatric holds and does not use the term 'hold' for minors."
  },
  consent: {
    title: "Consent for Behavioral Health Assessment",
    content: "When a parent/guardian agrees to evaluation but the patient is a flight risk or needs to remain in the ED, the Notice of and Consent for Behavioral Health Assessment of Minors (CO-4792) is completed. This gives Public Safety permission to prevent the minor from leaving and to use video monitoring as needed. Parents may rescind consent at any time — if the LIP determines the minor remains dangerous, DHS is notified and an NMI can be completed."
  },
  lorazepam: {
    title: "Why Lorazepam for Undifferentiated Agitation?",
    content: "Lorazepam is preferred for undifferentiated agitation because it provides muscle relaxation, anxiolytic effects, anticonvulsant activity, and generalized sedation. It has predictable pharmacokinetics in the pediatric population and is effective across multiple etiologies of agitation (psychiatric, substance-related, medical). Always rule out medical, substance, and medication causes before attributing agitation solely to a psychiatric disorder."
  },
  olanzapine: {
    title: "Olanzapine Safety",
    content: "Olanzapine is the first-line antipsychotic for moderate-severe agitation in this pathway. Critical safety point: DO NOT administer IM olanzapine concomitantly with IM or IV lorazepam due to significantly increased risk of respiratory depression, hypotension, and death. If initial olanzapine is ineffective and a benzodiazepine is needed, use a different antipsychotic (ziprasidone) or wait adequate time between doses."
  },
  deescalation: {
    title: "De-escalation Principles",
    content: "Verbal de-escalation and behavioral redirection should always be attempted first. Offer oral medication before IM — this restores a sense of control for the patient and may itself be de-escalating. Remove external stimulation (video games, TV, limit visitors). Use the patient's COPE plan if one exists. Seclusion should be used as a time-out with least restrictive means. Restraints are the last resort and require specific documentation and renewal orders by age."
  },
  medClearance: {
    title: "Medical Clearance",
    content: "Before attributing agitation to a psychiatric cause, rule out: hyper/hypoglycemia, electrolyte disturbances, renal or hepatic failure, thyroid or adrenal disorders, Wernicke's encephalopathy, hypotension, heart failure, neurologic disorders (stroke), meningitis/infection, substance intoxication or withdrawal, and medication causes (steroids, anticholinergics, barbiturates, amphetamines, antipsychotic-induced akathisia)."
  },
  seclusion: {
    title: "Seclusion & Restraint Renewal",
    content: "Orders are age-dependent: <9 years: renew every 1 hour with face-to-face. 9–17 years: renew every 2 hours. ≥18 years: renew every 4 hours. RN documentation: Q1h if <9 years, Q2h if ≥9 years. All patients should be checked every 15 minutes with 1:1 close observation for the first hour. A significant event form is required for any initiation of seclusion/restraint."
  },
  disposition: {
    title: "Disposition",
    content: "Pediatric patients with behavioral complaints in the absence of a non-urgent medical condition are generally NOT admitted to DCH and will be held in the Emergency Department pending psychiatric evaluation and placement. All psychiatric inpatient admissions require EMTALA transfer paperwork. The EMTALA form original always stays at OHSU."
  },
};

function calcDoses(w) {
  const wt = parseFloat(w) || 0;
  if (wt <= 0) return null;
  return {
    w: wt,
    lorazPO_lo: Math.min(Math.round(wt * 0.025 * 100) / 100, 2),
    lorazPO_hi: Math.min(Math.round(wt * 0.05 * 100) / 100, 2),
    lorazIM_lo: Math.min(Math.round(wt * 0.05 * 100) / 100, 2),
    lorazIM_hi: Math.min(Math.round(wt * 0.1 * 100) / 100, 2),
    midazIM_lo: Math.min(Math.round(wt * 0.05 * 10) / 10, 5),
    midazIM_hi: Math.min(Math.round(wt * 0.1 * 10) / 10, 5),
    midazIV_lo: Math.min(Math.round(wt * 0.05 * 10) / 10, 5),
    midazIV_hi: Math.min(Math.round(wt * 0.1 * 10) / 10, 5),
  };
}

// ── Primitives ──
function Header({ teaching, onToggleTeach }) {
  return (
    <div style={{ background: C.primary, color: C.white, padding: "16px 20px", borderRadius: "12px 12px 0 0" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ fontSize: 13, opacity: 0.8, letterSpacing: "0.05em", textTransform: "uppercase", fontWeight: 600 }}>Doernbecher Children's Hospital · PED</div>
          <div style={{ fontSize: 20, fontWeight: 700, marginTop: 4, lineHeight: 1.2 }}>Acute Psychiatric / Behavioral</div>
          <div style={{ fontSize: 14, opacity: 0.85, marginTop: 2 }}>Clinical Decision Tool · November 2021</div>
        </div>
        <button onClick={onToggleTeach} style={{
          background: teaching ? "#ffffff30" : "#ffffff15", border: `1.5px solid ${teaching ? "#fff" : "#ffffff40"}`,
          color: C.white, borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 11,
          fontWeight: 700, letterSpacing: "0.03em", marginTop: 2, whiteSpace: "nowrap",
        }}>
          {teaching ? "📖 ON" : "📖 Teach"}
        </button>
      </div>
    </div>
  );
}
function TabBar({ current, tabs, onChange }) {
  return (
    <div style={{ display: "flex", padding: "0 12px", background: C.white, borderBottom: `1px solid ${C.rule}`, overflowX: "auto" }}>
      {tabs.map(t => {
        const act = t.key === current;
        return (
          <button key={t.key} onClick={() => onChange(t.key)} style={{
            padding: "11px 14px", background: "none", border: "none", cursor: "pointer",
            fontSize: 12, fontWeight: act ? 700 : 500, color: act ? C.primary : C.muted,
            borderBottom: act ? `2.5px solid ${C.primary}` : "2.5px solid transparent",
            whiteSpace: "nowrap", marginBottom: -1,
          }}>{t.label}</button>
        );
      })}
    </div>
  );
}
function Pad({ children }) { return <div style={{ padding: "20px" }}>{children}</div>; }
function Q({ text, sub }) { return (<div style={{ marginBottom: 16 }}><div style={{ fontSize: 17, fontWeight: 700, color: C.ink, lineHeight: 1.3 }}>{text}</div>{sub && <div style={{ fontSize: 13, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>{sub}</div>}</div>); }
function Alert({ color, border, bg, icon, title, children }) { return (<div style={{ background: bg, border: `1.5px solid ${border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 12 }}><div style={{ fontSize: 14, fontWeight: 700, color, display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>{icon} {title}</div><div style={{ fontSize: 13, lineHeight: 1.5, color: C.ink }}>{children}</div></div>); }
function Sec({ title, color, children }) { return (<div style={{ marginBottom: 14 }}><div style={{ fontSize: 13, fontWeight: 700, color, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 6, paddingBottom: 4, borderBottom: `2px solid ${color}` }}>{title}</div>{children}</div>); }
function DoseRow({ label, value, unit = "" }) { return (<div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", padding: "4px 0", borderBottom: `1px dashed ${C.rule}` }}><span style={{ fontSize: 13, fontWeight: 500 }}>{label}</span><span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 600, color: C.primary }}>{value} {unit}</span></div>); }
function TeachBox({ id, teaching }) {
  if (!teaching || !TEACH[id]) return null;
  const t = TEACH[id];
  return (<div style={{ background: C.tealBg, border: `1.5px solid ${C.tealBorder}`, borderRadius: 10, padding: "12px 14px", marginBottom: 12, borderLeft: `4px solid ${C.teal}` }}><div style={{ fontSize: 12, fontWeight: 700, color: C.teal, display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>📖 {t.title}</div><div style={{ fontSize: 12, lineHeight: 1.6, color: C.ink }}>{t.content}</div></div>);
}
function Card({ title, color, children, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ background: C.white, border: `1.5px solid ${C.rule}`, borderRadius: 10, marginBottom: 12, overflow: "hidden" }}>
      <button onClick={() => setOpen(o => !o)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%", padding: "12px 14px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
        <span style={{ fontSize: 14, fontWeight: 700, color }}>{title}</span>
        <span style={{ fontSize: 12, color: C.muted, transform: open ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▼</span>
      </button>
      {open && <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${C.rule}` }}>{children}</div>}
    </div>
  );
}

// ── Main App ──
function App() {
  const [tab, setTab] = useState("triage");
  const [teaching, setTeaching] = useState(false);
  const [weightKg, setWeightKg] = useState("");
  const [ageYears, setAgeYears] = useState("");

  const wt = parseFloat(weightKg) || 0;
  const age = parseFloat(ageYears) || 0;
  const doses = useMemo(() => calcDoses(weightKg), [weightKg]);

  const tabs = [
    { key: "triage", label: "Triage" },
    { key: "safety", label: "Safety" },
    { key: "decision", label: "Decisions" },
    { key: "meds", label: "Agitation Meds" },
    { key: "special", label: "Defs & Refs" },
  ];

  return (
    <div style={{ maxWidth: 520, margin: "0 auto", fontFamily: "'IBM Plex Sans', -apple-system, sans-serif", background: C.paper, minHeight: "100vh" }}>
      <Header teaching={teaching} onToggleTeach={() => setTeaching(t => !t)} />
      <TabBar current={tab} tabs={tabs} onChange={setTab} />

      {/* ── PERSISTENT PATIENT BAR ── */}
      <div style={{ background: C.white, borderBottom: `1px solid ${C.rule}`, padding: "10px 20px", display: "flex", gap: 10, alignItems: "center" }}>
        <div style={{ flex: 1 }}>
          <label style={{ fontSize: 10, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Age (yr)</label>
          <input type="number" inputMode="decimal" value={ageYears} onChange={e => setAgeYears(e.target.value)} placeholder="14"
            style={{ display: "block", width: "100%", padding: "6px 8px", border: `1.5px solid ${C.rule}`, borderRadius: 6, fontSize: 15, fontWeight: 500, fontFamily: "'IBM Plex Mono', monospace", outline: "none", marginTop: 2 }}
            onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.rule} />
        </div>
        <div style={{ flex: 1 }}>
          <label style={{ fontSize: 10, fontWeight: 600, color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e => setWeightKg(e.target.value)} placeholder="50"
            style={{ display: "block", width: "100%", padding: "6px 8px", border: `1.5px solid ${C.rule}`, borderRadius: 6, fontSize: 15, fontWeight: 500, fontFamily: "'IBM Plex Mono', monospace", outline: "none", marginTop: 2 }}
            onFocus={e => e.target.style.borderColor = C.primary} onBlur={e => e.target.style.borderColor = C.rule} />
        </div>
      </div>

      {/* ── TAB: TRIAGE ── */}
      {tab === "triage" && (
        <Pad>
          <Q text="Triage & Initial Interventions" sub="Minor presenting with new or acute psychiatric/behavioral complaint" />
          <TeachBox id="overview" teaching={teaching} />

          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{ marginTop: 8 }}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">
                New or acute behavioral or psychiatric complaint: intentional ingestion, self-mutilation/cutting, drug/alcohol use, psychotic behavior
              </Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">
                Underlying autism spectrum disorder · Developmental delay · Neurological disorder · Chronic medical condition as primary driver
              </Alert>
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{ fontSize: 13, lineHeight: 1.8, marginTop: 8 }}>
              <strong>A.</strong> Notify: Charge Nurse, Attending, Social Worker, DPS<br/>
              <strong>B.</strong> Complete age-appropriate suicide risk screen:<br/>
              <div style={{ paddingLeft: 20, fontSize: 12, lineHeight: 1.6 }}>
                ≥18 yr: PHQ-2 → if &gt;3, complete Columbia Scale<br/>
                10–17 yr: ASQ<br/>
                &lt;10 yr or developmentally &lt;10: N/A (defer)
              </div>
              <strong>C.</strong> Determine observation level by risk assessment:<br/>
              <div style={{ paddingLeft: 20, fontSize: 12, lineHeight: 1.6 }}>
                HIGH risk SI → 1:1 PSA required<br/>
                MODERATE risk SI → PSA or CVM
              </div>
              <strong>D.</strong> Search/secure belongings, remove non-permissible items<br/>
              <div style={{ paddingLeft: 20, fontSize: 12, color: C.red, fontWeight: 600 }}>
                Lock ALL medications · Patient in paper scrubs/hospital attire
              </div>
              <strong>E.</strong> Provide family All About Me Poster &amp; Welcome Packet<br/>
              <strong>F.</strong> Initiate multidisciplinary huddle (RN, LIP, Public Safety, SW)
            </div>
            <TeachBox id="asq" teaching={teaching} />
          </Card>

          <Card title="Nursing Documentation" color={C.blue}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              ESI Level II · Full vitals ASAP · ASQ results + PSA need · Substance abuse hx · Prior behavioral admissions · Legal decision maker · Behavioral Health Initial/Shift Assessment · CPG documentation per risk · Re-evaluate sitter need Q4h
            </div>
          </Card>

          <Card title="Diagnostics" color={C.primary} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>EKG:</strong> all suspected overdoses<br/>
              <strong>COVID swab</strong><br/>
              <strong>Labs PRN for medical clearance:</strong> CBC, CMP, Acetaminophen, ASA, ETOH, TSH, UDS, uHCG
            </div>
            <TeachBox id="medClearance" teaching={teaching} />
          </Card>

          <Card title="Huddle Components" color={C.blue} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Daily AM + PRN each shift. Participants: Faculty MD, primary RN, charge nurse, Peds Mental Health SW (0830–1700) or ED SW (after hours), Public Safety.<br/><br/>
              Discuss: plan of care/orders, elopement risk, harm risk, electronics agreement, daily schedule, child life needs, de-escalation plan with patient/family
            </div>
          </Card>
        </Pad>
      )}

      {/* ── TAB: SAFETY ── */}
      {tab === "safety" && (
        <Pad>
          <Q text="Safety & Legal Framework" sub="Consent, holds, and observation requirements" />

          <Card title="Screening Tools" color={C.primary}>
            <div style={{ marginTop: 8 }}>
              <div style={{ background: C.purpleBg, border: `1.5px solid ${C.purpleBorder}`, borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.primary }}>Ages 10–17: ASQ</div>
                <div style={{ fontSize: 12, color: C.ink, marginTop: 2 }}>Non-acute positive → Moderate-Low risk<br/>Acute positive → HIGH risk → 1:1 PSA</div>
              </div>
              <div style={{ background: C.blueBg, border: `1.5px solid ${C.blueBorder}`, borderRadius: 8, padding: "10px 12px", marginBottom: 6 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.blue }}>Ages ≥18: PHQ-2</div>
                <div style={{ fontSize: 12, color: C.ink, marginTop: 2 }}>Score &gt;3 → complete Columbia Suicide Severity Rating Scale</div>
              </div>
            </div>
            <TeachBox id="asq" teaching={teaching} />
          </Card>

          <Card title="Consent for Behavioral Assessment (CO-4792)" color={C.greenMid}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>When:</strong> Patient is flight risk or needs to remain, parent/guardian AGREES<br/>
              <strong>Provides:</strong> Public Safety permission to prevent departure + video monitoring<br/>
              <strong>Note:</strong> Parent may rescind at any time. If LIP deems patient unsafe → notify DHS → NMI
            </div>
            <TeachBox id="consent" teaching={teaching} />
          </Card>

          <Card title="Notice of Mental Illness (NMI)" color={C.red}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>When:</strong> Patient unsafe, parent/guardian NOT in agreement OR unaccompanied minor<br/>
              <strong>Process:</strong><br/>
              1. Complete NMI paperwork<br/>
              2. Fax to county of residence court<br/>
              3. Notify DHS (via SW) to report and establish custody<br/>
              4. NMI valid 72 hours or until court assessor acts<br/>
              <strong style={{ color: C.red }}>NMI cannot be discontinued</strong> — must complete hold withdrawal paperwork, scan, and fax to court
            </div>
            <TeachBox id="nmi" teaching={teaching} />
          </Card>

          <Card title="Seclusion & Restraint" color={C.red} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Least restrictive method first. Face-to-face required after initiation.
            </div>
            <div style={{ background: C.white, border: `1.5px solid ${C.rule}`, borderRadius: 8, overflow: "hidden", marginTop: 8 }}>
              {[["<9 years","Q1h renewal","Q1h RN doc"],["9–17 years","Q2h renewal","Q2h RN doc"],["≥18 years","Q4h renewal","Q2h RN doc"]].map(([a,r,d],i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", borderBottom: i < 2 ? `1px solid ${C.rule}` : "none", background: i%2===0 ? C.white : "#fafaf7" }}>
                  <div style={{ padding: "6px 10px", fontSize: 12, fontWeight: 600 }}>{a}</div>
                  <div style={{ padding: "6px 10px", fontSize: 12 }}>{r}</div>
                  <div style={{ padding: "6px 10px", fontSize: 12 }}>{d}</div>
                </div>
              ))}
            </div>
            <div style={{ fontSize: 12, color: C.muted, marginTop: 6 }}>Check Q15 min · 1:1 close observation for first hour · Significant event form required</div>
            <TeachBox id="seclusion" teaching={teaching} />
          </Card>

          <Card title="Epic Dot Phrases" color={C.muted} defaultOpen={false}>
            <div style={{ marginTop: 8 }}>
              {[[".EDRNPSYCHSIGEVENT","Significant event (seclusion, restraint, hands-on, elopement, self-harm)"],[".EDRNPSYCHDSCHG","Discharge documentation"],[".EDRNEMTALA","EMTALA transfer documentation"]].map(([dp,desc],i) => (
                <div key={i} style={{ display: "flex", gap: 10, padding: "4px 0", borderBottom: `1px dashed ${C.rule}` }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 12, fontWeight: 600, color: C.primary, minWidth: 180 }}>{dp}</span>
                  <span style={{ fontSize: 12, color: C.muted }}>{desc}</span>
                </div>
              ))}
            </div>
          </Card>
        </Pad>
      )}

      {/* ── TAB: DECISIONS ── */}
      {tab === "decision" && (
        <Pad>
          <Q text="Decision Tree" sub="Based on patient safety and guardian cooperation" />

          <Card title="1 — No Immediate Threat · Guardian Cooperating" color={C.greenMid}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              ASQ non-acute positive (moderate-low risk)<br/>
              <strong>A.</strong> Notify SW<br/>
              <strong>B.</strong> Notify Public Safety / CSO of patient placement<br/>
              <strong>C.</strong> Continue to reassess stability and guardian cooperation
            </div>
          </Card>

          <Card title="2 — Not Safe to Leave · Guardian AGREES" color={C.amberMid}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              ASQ acute positive (HIGH risk) → PSA to bedside<br/>
              <strong>A.</strong> Order and complete Consent for Behavioral Health Assessment (CO-4792)<br/>
              <strong>B.</strong> Notify Public Safety / CSO<br/>
              <strong>C.</strong> Belongings search and secured<br/>
              <strong>D.</strong> Consult Peds Mental Health SW (0830–1700) or ED SW (after hours)<br/>
              <strong>E.</strong> Consult Child Psychiatry
            </div>
          </Card>

          <Card title="3 — Not Safe to Leave · Guardian NOT Agreeing or Absent" color={C.red}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>A.</strong> Complete Notice of Mental Illness (NMI) → fax to county of residence<br/>
              <strong>B.</strong> Notify DHS (via SW) to report situation<br/>
              <strong>C.</strong> If patient is ward of state → Oregon Youth Authority / parole officer can sign consent<br/>
              <strong>D.</strong> Notify Public Safety / CSO<br/>
              <strong>E.</strong> Consult Peds Mental Health SW (0830–1700) or ED SW<br/>
              <strong>F.</strong> Consult Child Psychiatry
            </div>
            <TeachBox id="nmi" teaching={teaching} />
          </Card>

          <Card title="4 — Young Adult ≥18, Imminent Danger" color={C.red}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>A.</strong> Complete Notice of Mental Illness → fax to county<br/>
              <strong>B.</strong> Notify Public Safety / CSO<br/>
              <strong>C.</strong> Consult Peds Mental Health SW or ED SW<br/>
              <strong>D.</strong> Consult Child Psychiatry
            </div>
          </Card>

          <Card title="Disposition" color={C.primary} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Pediatric behavioral patients without non-urgent medical complaints are generally <strong>NOT admitted to DCH</strong> — held in ED pending psychiatric evaluation and placement.<br/><br/>
              All psychiatric inpatient transfers require <strong>EMTALA paperwork</strong> (original stays at OHSU).
            </div>
            <TeachBox id="disposition" teaching={teaching} />
          </Card>

          {/* ── PATHWAY OVERVIEW FLOWCHART ── */}
          {(() => {
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const bC="#1d4ed8",bBg="#eff6ff",bBd="#93c5fd";
            const pC="#581c87",pBg="#faf5ff",pBd="#c4b5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);

            return (
              <div style={{ marginTop: 20 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: C.ink, marginBottom: 4 }}>Pathway Overview</div>
                <div style={{ fontSize: 11, color: C.muted, marginBottom: 6 }}>Safety assessment → Legal framework → Consults</div>
                <div style={{ background: C.white, border: `1.5px solid ${C.rule}`, borderRadius: 10, padding: 6, overflow: "hidden" }}>
                  <svg viewBox="0 0 480 330" style={{ width: "100%", display: "block" }}>
                    <rect width={480} height={330} fill="#fafaf8" rx={6}/>
                    {/* Arrival */}
                    <Box x={115} y={6} w={250} h={28} fill={pBg} stroke={pBd} sw={1.5} radius={14}>
                      <T x={240} y={18} size={9} weight={700} color={pC}>ARRIVAL — ESI II · SAFETY SCREEN</T>
                      <T x={240} y={28} size={6} color={mC}>ASQ/PHQ-2 · Belongings · Paper scrubs · Notify team</T>
                    </Box>
                    <Arrow x1={240} y1={34} x2={240} y2={48}/>
                    {/* Diamond */}
                    <g transform="translate(240,64)">
                      <polygon points="0,-16 70,0 0,16 -70,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
                      <T x={0} y={-2} size={7} weight={700}>Safety + Guardian?</T>
                      <T x={0} y={8} size={6} color={mC}>Flight risk? Cooperation?</T>
                    </g>
                    {/* Branches */}
                    <line x1={170} y1={64} x2={72} y2={64} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={72} y1={64} x2={72} y2={90} color={gC}/>
                    <Arrow x1={220} y1={78} x2={205} y2={90} color={aC}/>
                    <Arrow x1={260} y1={78} x2={320} y2={90} color={rC}/>
                    <line x1={310} y1={64} x2={430} y2={64} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={430} y1={64} x2={430} y2={90} color={rC}/>

                    {/* No threat */}
                    <Box x={10} y={90} w={124} h={22} fill={gBg} stroke={gBd} sw={1.5}>
                      <T x={72} y={99} size={7} weight={700} color={gC}>NO IMMEDIATE</T>
                      <T x={72} y={108} size={7} weight={700} color={gC}>THREAT</T>
                    </Box>
                    <Arrow x1={72} y1={112} x2={72} y2={122} color={gC}/>
                    <Box x={10} y={122} w={124} h={38} fill={C.white} stroke={gBd}>
                      <T x={72} y={133} size={6} color={C.ink}>ASQ non-acute positive</T>
                      <T x={72} y={143} size={6}>Notify SW + Public Safety</T>
                      <T x={72} y={153} size={6} color={mC}>Reassess stability</T>
                    </Box>

                    {/* Not safe, guardian agrees */}
                    <Box x={140} y={90} w={130} h={22} fill={aBg} stroke={aBd} sw={1.5}>
                      <T x={205} y={99} size={7} weight={700} color={aC}>NOT SAFE · GUARDIAN</T>
                      <T x={205} y={108} size={7} weight={700} color={aC}>AGREES</T>
                    </Box>
                    <Arrow x1={205} y1={112} x2={205} y2={122} color={aC}/>
                    <Box x={140} y={122} w={130} h={48} fill={C.white} stroke={aBd}>
                      <T x={205} y={133} size={6} weight={600} color={aC}>Consent form CO-4792</T>
                      <T x={205} y={143} size={6}>PSA to bedside</T>
                      <T x={205} y={153} size={6}>Search belongings</T>
                      <T x={205} y={163} size={6} color={pC} weight={600}>Consult Child Psych</T>
                    </Box>

                    {/* Not safe, no guardian */}
                    <Box x={276} y={90} w={120} h={22} fill={rBg} stroke={rBd} sw={1.5}>
                      <T x={336} y={99} size={7} weight={700} color={rC}>NOT SAFE · NO</T>
                      <T x={336} y={108} size={7} weight={700} color={rC}>GUARDIAN CONSENT</T>
                    </Box>
                    <Arrow x1={336} y1={112} x2={336} y2={122} color={rC}/>
                    <Box x={276} y={122} w={120} h={48} fill={C.white} stroke={rBd}>
                      <T x={336} y={133} size={6} weight={700} color={rC}>Complete NMI</T>
                      <T x={336} y={143} size={6}>Fax to county court</T>
                      <T x={336} y={153} size={6}>Notify DHS via SW</T>
                      <T x={336} y={163} size={6} color={pC} weight={600}>Consult Child Psych</T>
                    </Box>

                    {/* Adult ≥18 */}
                    <Box x={400} y={90} w={72} h={22} fill={rBg} stroke={rBd} sw={1.5}>
                      <T x={436} y={99} size={7} weight={700} color={rC}>≥18 YR</T>
                      <T x={436} y={108} size={6} color={mC}>Imminent danger</T>
                    </Box>
                    <Arrow x1={436} y1={112} x2={436} y2={122} color={rC}/>
                    <Box x={400} y={122} w={72} h={38} fill={C.white} stroke={rBd}>
                      <T x={436} y={133} size={6} weight={700} color={rC}>NMI</T>
                      <T x={436} y={143} size={6}>Fax to county</T>
                      <T x={436} y={153} size={6} color={pC} weight={600}>Child Psych</T>
                    </Box>

                    {/* All paths → common bottom */}
                    <Arrow x1={72} y1={160} x2={72} y2={190} color="#94a3b8"/>
                    <Arrow x1={205} y1={170} x2={205} y2={190} color="#94a3b8"/>
                    <Arrow x1={336} y1={170} x2={336} y2={190} color="#94a3b8"/>
                    <Arrow x1={436} y1={160} x2={436} y2={190} color="#94a3b8"/>
                    <line x1={72} y1={190} x2={436} y2={190} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={240} y1={190} x2={240} y2={206} color="#94a3b8"/>

                    {/* Agitation assessment */}
                    <Box x={100} y={206} w={280} h={22} fill={pBg} stroke={pBd} sw={1.5}>
                      <T x={240} y={215} size={8} weight={700} color={pC}>IF AGITATION → TIERED RESPONSE</T>
                      <T x={240} y={224} size={6} color={mC}>See Agitation Meds tab</T>
                    </Box>
                    <Arrow x1={140} y1={228} x2={80} y2={244} color={gC}/>
                    <Arrow x1={240} y1={228} x2={240} y2={244} color={aC}/>
                    <Arrow x1={340} y1={228} x2={400} y2={244} color={rC}/>

                    <Box x={24} y={244} w={110} h={30} fill={gBg} stroke={gBd}>
                      <T x={79} y={255} size={7} weight={700} color={gC}>MILD</T>
                      <T x={79} y={265} size={6}>Behavioral redirect</T>
                      <T x={79} y={272} size={5} color={mC}>± Lorazepam PO</T>
                    </Box>
                    <Box x={175} y={244} w={130} h={30} fill={aBg} stroke={aBd}>
                      <T x={240} y={255} size={7} weight={700} color={aC}>MODERATE</T>
                      <T x={240} y={265} size={6}>De-escalation · Remove stimuli</T>
                      <T x={240} y={272} size={5} color={mC}>Olanzapine ODT or Risperidone</T>
                    </Box>
                    <Box x={346} y={244} w={110} h={30} fill={rBg} stroke={rBd}>
                      <T x={401} y={255} size={7} weight={700} color={rC}>SEVERE</T>
                      <T x={401} y={265} size={6}>Code Green · Seclusion</T>
                      <T x={401} y={272} size={5} color={mC}>Olanzapine IM or Ziprasidone IM</T>
                    </Box>

                    {/* Dispo */}
                    <Arrow x1={240} y1={280} x2={240} y2={296} color="#94a3b8"/>
                    <Box x={130} y={296} w={220} h={22} fill="#f1f5f9" stroke="#e2e8f0" sw={1.5}>
                      <T x={240} y={306} size={7} weight={700} color={mC}>HELD IN ED · CHILD PSYCH EVAL</T>
                      <T x={240} y={314} size={5} color={mC}>Generally not admitted to DCH · EMTALA if transfer</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── TAB: AGITATION MEDS ── */}
      {tab === "meds" && (
        <Pad>
          <Q text="Behavioral Agitation Medications" sub={doses ? `Weight-based doses for ${doses.w} kg` : "Enter weight for calculations"} />
          <TeachBox id="deescalation" teaching={teaching} />

          {!doses && (
            <Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">
              Enter weight above for calculated doses.
            </Alert>
          )}

          <Card title="Mild — Behavioral Redirection First" color={C.greenMid}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>Actions:</strong> Attempt behavioral redirection · Refer to patient-specific COPE plan if available<br/>
              <strong>Behaviors:</strong> Pacing · Overly moody or irritable
            </div>
            <div style={{ marginTop: 8 }}>
              <Sec title="If Medication Needed" color={C.greenMid}>
                <DoseRow label="Lorazepam PO (0.025–0.05 mg/kg) q6h PRN" value={doses ? `${doses.lorazPO_lo}–${doses.lorazPO_hi}` : "—"} unit={doses ? "mg (max 2)" : ""} />
              </Sec>
            </div>
            <TeachBox id="lorazepam" teaching={teaching} />
          </Card>

          <Card title="Moderate — De-escalation + Oral Meds" color={C.amberMid}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>Actions:</strong> Review de-escalation plan · Limited seclusion as time-out · Remove stimuli (games, TV, limit visitors)<br/>
              <strong>Behaviors:</strong> Non-redirectable · Mild impulsive behaviors
            </div>
            <Sec title="First-Line: Olanzapine ODT" color={C.amberMid}>
              <div style={{ fontSize: 12, lineHeight: 1.6 }}>
                {age > 0 ? (
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 700, color: C.primary, padding: "6px 0" }}>
                    {age < 13 ? "2.5 mg" : age <= 16 ? "5 mg" : "10 mg"} PO q2h PRN (max 20 mg/day)
                  </div>
                ) : (
                  <>Children: 2.5 mg · Adolescents: 5 mg · &gt;16 yr: 10 mg · PO q2h PRN (max 20 mg/day)</>
                )}
              </div>
            </Sec>
            <Sec title="Alternative (Olanzapine Allergy): Risperidone M-Tab" color={C.muted}>
              <div style={{ fontSize: 12, lineHeight: 1.6 }}>
                {age > 0 ? (
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 700, color: C.primary, padding: "6px 0" }}>
                    {age < 13 ? "0.25–0.5 mg" : "0.5–1 mg"} PO BID PRN (max 2 mg/day)
                  </div>
                ) : (
                  <>Children: 0.25–0.5 mg · Adolescents: 0.5–1 mg · PO BID PRN (max 2 mg/day)</>
                )}
              </div>
            </Sec>
          </Card>

          <Card title="Severe — Code Green · IM Medications" color={C.red}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              <strong>Actions:</strong> Call Code Green · Remove all stimuli · Evaluate for sitter · Consider seclusion (least restrictive) → restraints if unable · Complete significant event form<br/>
              <strong>Behaviors:</strong> Not redirectable · Impulsive · Threatening · Property damage · Physical aggression
            </div>
            <Sec title="First-Line: Olanzapine IM" color={C.red}>
              <div style={{ fontSize: 12, lineHeight: 1.6 }}>
                {age > 0 ? (
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 700, color: C.primary, padding: "6px 0" }}>
                    {age < 13 ? "5 mg" : "10 mg"} IM q1h PRN (max 25 mg/day)
                  </div>
                ) : (
                  <>Children: 5 mg · Adolescents: 10 mg · IM q1h PRN (max 25 mg/day)</>
                )}
              </div>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="DO NOT give with IM/IV Lorazepam">
                Concurrent IM olanzapine + IM/IV lorazepam → increased respiratory depression risk
              </Alert>
            </Sec>
            <Sec title="Alternative: Ziprasidone IM" color={C.muted}>
              <div style={{ fontSize: 12, lineHeight: 1.6 }}>
                {age > 0 ? (
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, fontWeight: 700, color: C.primary, padding: "6px 0" }}>
                    {age < 13 ? "2.5–5 mg" : age <= 16 ? "5–10 mg" : "10–20 mg"} IM q2h PRN (max 40 mg/day)
                  </div>
                ) : (
                  <>Children: 2.5–5 mg · Adolescents: 5–10 mg · &gt;16 yr: 10–20 mg · IM q2h PRN (max 40 mg/day)</>
                )}
              </div>
            </Sec>
            <TeachBox id="olanzapine" teaching={teaching} />
          </Card>

          <Card title="Elopement / Code Green / Takedown" color={C.red} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              Move patient to seclusion · If unable: consider restraints (least restrictive)<br/>
              Chart significant event note · Debriefing form required for restraints
            </div>
          </Card>

          <Card title="Full Medication Reference Table" color={C.primary} defaultOpen={false}>
            <div style={{ marginTop: 8, overflowX: "auto" }}>
              <div style={{ fontSize: 11, minWidth: 420 }}>
                <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 2fr 1.5fr 1.5fr", background: C.primary, borderRadius: "6px 6px 0 0" }}>
                  {["Medication","Route","Dose (max)","Onset","Duration"].map(h => (
                    <div key={h} style={{ padding: "5px 6px", color: C.white, fontWeight: 700, fontSize: 9 }}>{h}</div>
                  ))}
                </div>
                {[
                  ["Lorazepam","PO",`0.025–0.05 mg/kg (2mg)${doses?` → ${doses.lorazPO_lo}–${doses.lorazPO_hi} mg`:""}`, "30 min","60 min"],
                  ["Lorazepam","IM",`0.05–0.1 mg/kg (2mg)${doses?` → ${doses.lorazIM_lo}–${doses.lorazIM_hi} mg`:""}`, "15–30","45–60"],
                  ["Midazolam","IM",`0.05–0.1 mg/kg (5mg)${doses?` → ${doses.midazIM_lo}–${doses.midazIM_hi} mg`:""}`, "5–15","360"],
                  ["Midazolam","IV",`0.05–0.1 mg/kg (5mg)${doses?` → ${doses.midazIV_lo}–${doses.midazIV_hi} mg`:""}`, "3–5","120"],
                  ["Olanzapine ODT","PO","2.5 / 5 / 10 mg","45–60","60–120"],
                  ["Olanzapine","IM","5 / 10 mg","15–45","60–120"],
                  ["Risperidone","PO","0.25–1 mg","30–60","60"],
                  ["Ziprasidone","IM","2.5–20 mg","15+","60–180"],
                ].map((row,i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 2fr 1.5fr 1.5fr", background: i%2===0 ? C.white : "#fafaf7", borderBottom: `1px solid ${C.rule}` }}>
                    {row.map((cell,j) => (
                      <div key={j} style={{ padding: "5px 6px", fontSize: 10, fontWeight: j===0 ? 600 : 400, color: j===0 ? C.primary : C.ink }}>{cell}</div>
                    ))}
                  </div>
                ))}
              </div>
            </div>
          </Card>

          <Card title="If Initial Treatment Fails (2–4 hours)" color={C.blue} defaultOpen={false}>
            <div style={{ fontSize: 13, lineHeight: 1.7, marginTop: 8 }}>
              • Give another dose of same medication if partially effective<br/>
              • Give a different medication if first was ineffective<br/>
              • Give lorazepam if first medication was an antipsychotic<br/>
              • Give combination antipsychotic + lorazepam (<strong>except olanzapine</strong>)
            </div>
          </Card>
        </Pad>
      )}

      {/* ── TAB: DEFS & REFS ── */}
      {tab === "special" && (
        <Pad>
          <Q text="Definitions & References" />

          <Card title="Key Definitions" color={C.primary}>
            <div style={{ marginTop: 8 }}>
              {[
                ["Behavioral Assessment", "Term used instead of \"hold\" for minors undergoing psychiatric/behavioral evaluation"],
                ["Consent (CO-4792)", "Parent permission form for flight-risk minors needing ED behavioral assessment"],
                ["NMI", "Notice of Mental Illness — legal document for holding a minor without guardian consent; faxed to county court; valid 72h"],
                ["DHS Custody", "When guardian absent/disagreeing, DHS contacted for permission to continue evaluation"],
                ["2-Physician Hold", "Temporary measure for unstable minors while awaiting guardian/state paperwork; part of medical record only, NOT sent to court"],
                ["Huddle", "Daily AM interdisciplinary meeting: MD, RN, charge, SW, Public Safety"],
                ["COPE Plan", "Patient-specific behavioral de-escalation plan"],
              ].map(([term, def], i) => (
                <div key={i} style={{ padding: "6px 0", borderBottom: `1px dashed ${C.rule}` }}>
                  <span style={{ fontSize: 13, fontWeight: 700, color: C.primary }}>{term}: </span>
                  <span style={{ fontSize: 12, color: C.ink }}>{def}</span>
                </div>
              ))}
            </div>
          </Card>

          <Card title="Clinical Pearls — Agitation" color={C.teal} defaultOpen={false}>
            <div style={{ fontSize: 12, lineHeight: 1.7, marginTop: 8, color: C.ink }}>
              • Offer oral medication first — restores patient sense of control<br/>
              • Rule out medical causes before attributing to psychiatric etiology<br/>
              • Rule out substance intoxication or withdrawal<br/>
              • Rule out medication causes (steroids, anticholinergics, barbiturates, amphetamines, akathisia)<br/>
              • After IM agents: monitor vitals and clinical status at regular intervals<br/>
              • Allow adequate time for clinical response between doses<br/>
              • Use lower starting and maximum doses in children/adolescents
            </div>
            <TeachBox id="medClearance" teaching={teaching} />
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{ fontSize: 11, lineHeight: 1.7, marginTop: 8, color: C.muted }}>
              1. Hoffmann JA et al. Trends in visits and costs for mental health emergencies in a pediatric ED, 2010–2016. <em>Acad Pediatr</em> 2019; 19(4):386–393.<br/>
              2. Pediatric Mental Health Emergencies in the Emergency Department. <em>Ann Emerg Med</em> 2019; 73(3):e33–e36.<br/>
              3. Chun TH et al. Evaluation and management of children and adolescents with acute mental health or behavioral problems. Part I. <em>Pediatrics</em> 2016; 138(3):e20161570.<br/>
              4. Gerson R et al. Best practices for evaluation and treatment of agitated children and adolescents (BETA) in the ED. <em>West J Emerg Med</em> 2019; 20(2):409–418.
            </div>
          </Card>
        </Pad>
      )}

      {/* FOOTER */}
      <div style={{ padding: "12px 20px", fontSize: 10, color: C.muted, lineHeight: 1.5, borderTop: `1px solid ${C.rule}` }}>
        <strong style={{ color: C.red }}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Acute Psychiatric / Behavioral Clinical Pathway · November 2021
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
