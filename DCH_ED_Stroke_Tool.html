const TEACH={
overview:{title:"Pediatric Stroke — Why Children Are Different",
patho:"Pediatric stroke differs fundamentally from adult stroke in etiology, anatomy, and diagnosis. While adult stroke is overwhelmingly atherosclerotic, children have diverse etiologies: focal cerebral arteriopathy (FCA, ~25% of AIS), cardiac embolism (~25%), sickle cell disease (~10%), moyamoya (~8%), dissection (~8%), and hypercoagulable states (~5%). Many remain cryptogenic (~15%).\n\nAnatomically, the pediatric circle of Willis is frequently incomplete — autopsy studies show only 42–52% of children have a complete circle, meaning collateral flow is often inadequate. FCA arises from post-infectious arterial inflammation (classically post-varicella): the virus triggers endothelial inflammation in the distal internal carotid or proximal MCA, causing intimal proliferation, progressive stenosis, and ultimately thrombotic occlusion. This process can evolve over weeks to months, explaining why some children present with stroke weeks after chickenpox.\n\nMoyamoya ('puff of smoke' on angiography) involves progressive stenosis of the supraclinoid ICA with development of fragile collateral networks at the base of the brain. These collaterals are prone to hemorrhage, making moyamoya a cause of both ischemic AND hemorrhagic stroke in children.",
pearls:"The single biggest problem in pediatric stroke is diagnostic delay — median time from symptom onset to diagnosis is 22–28 hours in children vs 3–4 hours in adults. This delay occurs because: (1) stroke is not on the differential — providers think 'seizure,' 'migraine,' or 'conversion disorder' first; (2) children present atypically — seizure is the presenting feature in 20–30% of pediatric AIS (vs <5% in adults); (3) posterior circulation strokes mimic migraine or gastroenteritis (headache, vomiting, ataxia); (4) young children cannot articulate symptoms like weakness or visual changes.\n\nCognitive forcing strategy: for any child with acute focal neurological deficit, the differential is 'stroke until proven otherwise' regardless of age. A 3-year-old with new hemiparesis needs the same urgency as a 65-year-old. The 'dizzy child' who can't walk straight deserves posterior circulation imaging, not just reassurance.",
evidence:"Diagnostic delay: median 24h in children vs 3.5h in adults (Srinivasan, Neurology 2009; Rafay, Stroke 2009). FCA accounts for 25% of childhood AIS (Amlie-Lefond, Ann Neurol 2009). Circle of Willis completeness: 42–52% in pediatric autopsy series (Defined, Stroke 2006). Post-varicella arteriopathy incidence: 1 in 15,000 varicella infections (Askalan, Ann Neurol 2001). Seizure as stroke presentation: 20–30% of pediatric AIS vs <5% in adults (Shellhaas, Pediatrics 2006). Overall pediatric stroke incidence: 2–8 per 100,000 children per year (Fullerton, Stroke 2003)."},

ais:{title:"Arterial Ischemic Stroke — Etiologies & Recognition",
patho:"AIS results from occlusion of a cerebral artery, but the mechanism differs by etiology. In focal cerebral arteriopathy (FCA), varicella or other infections trigger endothelial inflammation → intimal smooth muscle proliferation → progressive luminal narrowing → in-situ thrombosis. This is a unilateral, non-progressive (usually) arteriopathy affecting the distal ICA/proximal MCA territory. In cardioembolism, thrombus forms in dysfunctional cardiac chambers (dilated cardiomyopathy, post-Fontan, mechanical valves) and embolizes to cerebral arteries. In dissection (often cervical), an intimal tear creates a false lumen that narrows the true lumen — vertebral dissection from minor neck trauma is underrecognized in children.\n\nRelative frequencies in the VIPS (Vascular Effects of Infection in Pediatric Stroke) study: arteriopathy 53% (FCA 25%, moyamoya 8%, dissection 8%, other 12%), cardiac 25%, hematologic 10%, other/cryptogenic 12%.",
pearls:"Cognitive forcing strategies for recognizing pediatric stroke:\n\n• Posterior circulation mimics migraine: headache + vomiting + ataxia in a child = 'migraine with aura' on most differentials. Red flags for basilar/cerebellar stroke: sudden onset (thunderclap, not gradual), dysarthria, diplopia, nystagmus with directional preponderance, inability to sit unsupported. A child with 'worst headache of life' + ataxia needs vascular imaging.\n\n• Seizure AS stroke presentation: 20–30% of pediatric AIS present with seizure. The critical clue is persistent post-ictal focal deficit. Any 'Todd's paralysis' lasting >30 minutes warrants emergent neuroimaging.\n\n• The 'dizzy child': vertigo in children is almost never BPPV (unlike adults). New-onset vertigo with vomiting, especially if they can't walk, should prompt posterior fossa imaging.\n\n• Neonatal stroke presents as seizure, not hemiparesis — the motor system is too immature for lateralizing signs. Focal seizures in a term neonate = stroke until proven otherwise.",
evidence:"VIPS study etiology breakdown (Mackay, Ann Neurol 2011): arteriopathy 53%, cardiac 25%, hematologic 10%. FCA post-varicella risk: OR 3.5 for AIS within 12 months of varicella (Askalan, Ann Neurol 2001). Neonatal AIS presents as seizure in >90% of cases (Kirton, Pediatrics 2011). Dissection accounts for 7.5% of childhood AIS (Fullerton, Neurology 2001). Todd's paralysis lasting >60 min has >50% positive yield for acute infarct on DWI (Gallmetzer, Neurology 2004)."},

tpa:{title:"tPA & Revascularization — Biochemistry & Limitations",
patho:"Alteplase (tPA) converts plasminogen to plasmin via cleavage of the Arg560-Val561 peptide bond, generating a serine protease that degrades cross-linked fibrin polymers within the thrombus. Its plasma half-life is only 4–5 minutes due to rapid hepatic clearance by LRP-1 receptors, which is why the 1-hour infusion protocol is necessary: the 10% bolus delivers an immediate loading dose to initiate clot surface lysis, while the 90% infusion sustains therapeutic plasmin generation throughout. Premature discontinuation leads to rethrombosis because the fibrin scaffold re-stabilizes.\n\nIn children, the blood-brain barrier has higher permeability than in adults (incomplete tight junction maturation, higher transcytosis rates), which paradoxically may partly explain the lower symptomatic hemorrhage rate observed in pediatric tPA use (4.9% vs 6.4% in adults) — though the more likely explanation is that children have healthier vessels without amyloid angiopathy or chronic hypertensive vasculopathy, both of which predispose adult brains to hemorrhagic transformation.\n\nMechanical thrombectomy physically retrieves the clot using a stent retriever or aspiration catheter. It is most effective for large vessel occlusions (ICA terminus, M1 MCA, basilar) where IV tPA alone has low recanalization rates (~30% for proximal occlusions vs ~70% for distal).",
pearls:"The NIHSS was validated in adults and has critical limitations in children:\n\n• Posterior circulation strokes score deceptively low — a child with isolated ataxia (cerebellar stroke) scores NIHSS 1–2 despite a potentially devastating deficit. The 'potentially disabling deficit' clause in the pathway exists precisely for these cases.\n\n• Children <6 years cannot cooperate with language testing (commands, naming, reading) or neglect testing (double simultaneous stimulation, visual fields by confrontation). A 3-year-old with a large MCA stroke may score NIHSS 4–6 simply because multiple items are 'untestable.'\n\n• The NIHSS does not capture pediatric-specific deficits: a teenager who loses the ability to write (agraphia from angular gyrus stroke) scores 0 on NIHSS but has a profoundly disabling deficit for a student.\n\n• Practical pearl: if the deficit would be disabling regardless of what the NIHSS number says, discuss with neurology. The score is a communication tool, not a gatekeeper.",
evidence:"No pediatric RCT exists for IV tPA in stroke. Largest case series: Nasr (Pediatr Neurol 2014) reviewed 99 children receiving IV tPA — 4.9% symptomatic ICH rate, 0% mortality, 59% good functional outcome. Compare to adult NINDS trial: 6.4% symptomatic ICH, NNT 8 for mRS 0–1 at 90 days. Adult thrombectomy trials (MR CLEAN 2015, ESCAPE 2015, EXTEND-IA 2015, SWIFT PRIME 2015, REVASCAT 2015): pooled NNT 3–7 for functional independence. 2019 AHA/ASA guidelines: thrombectomy 'may be reasonable' for children <18 with large vessel occlusion anterior circulation <6h (Class IIb, Level C-LD). Pediatric thrombectomy case series (Bigi, Neurology 2018): 73 children, 81% successful recanalization, 5.5% symptomatic ICH."},

imaging:{title:"Neuroimaging — Physics & Decision-Making",
patho:"DWI (diffusion-weighted imaging) detects stroke within minutes because cytotoxic edema from ATP-depleted neurons restricts Brownian motion of water molecules. As ischemic neurons lose Na+/K+-ATPase function, intracellular water accumulates (cytotoxic edema), reducing the apparent diffusion coefficient (ADC). This appears bright on DWI and dark on ADC maps — a pattern pathognomonic for acute ischemia. DWI sensitivity for AIS is 88–100% within 6 hours.\n\nCT misses early ischemia because the density difference between normal and edematous brain is subtle in the first 6–12 hours — hypodensity on CT requires 20–30% tissue water increase, which takes hours to develop. However, CT is exquisitely sensitive for acute hemorrhage (hyperdense blood within minutes) and takes <5 minutes vs 30–45 minutes for MRI.\n\nCTA (CT angiography) identifies large vessel occlusion for thrombectomy candidacy. CT perfusion maps the ischemic penumbra — tissue with reduced blood flow but preserved viability (mismatch between CBF and CBV maps). This 'penumbra' is the salvageable tissue that justifies intervention.",
pearls:"The 'braces before MRI' problem is real and time-critical. Fixed orthodontic brackets are MRI-compatible (they distort local signal but are not dangerous), but certain appliances — palatal expanders with ferromagnetic components, magnetic orthodontic attachments, removable retainers with metal clasps — can be unsafe or produce devastating artifacts that obscure the brain region of interest. The pathway calls for Peds Dentistry consult for removal, but this takes time. Decision framework:\n\n• If the patient is a revascularization candidate (time-critical): get CT/CTA first. Don't delay for MRI if braces are an issue.\n• If the patient is stable with moderate suspicion: CT first to rule out hemorrhage, then arrange MRI after bracket evaluation.\n• If braces are simple fixed brackets (most common): MRI is safe, but expect artifact in the oral cavity region.\n\nWhen CT is actually better than MRI: (1) suspected ICH — CT is faster and equally sensitive; (2) unstable patient who can't lie still for 30+ minutes; (3) revascularization candidate where minutes matter; (4) claustrophobic/agitated child who would need sedation for MRI (sedation delays add 30–60 minutes).",
evidence:"DWI sensitivity for AIS: 88–100% within 6h, specificity 95% (Chalela, Lancet 2007). CT sensitivity for AIS <6h: only 12–42% (von Kummer, Radiology 1996). CT sensitivity for ICH: >95% within minutes (Kidwell, JAMA 2004). CTA sensitivity for large vessel occlusion: 97% (Defined, Lancet Neurol 2006). MRI Rapid Swift protocol at OHSU: DWI + T2 + FLAIR + MRA in ~15 minutes (institutional protocol). Penumbra imaging: DAWN trial showed benefit of thrombectomy 6–24h using perfusion mismatch (Nogueira, NEJM 2018)."},

supportive:{title:"Neuroprotective Targets — The Physiology Behind 'Normals'",
patho:"Each 'normal' target in stroke care has specific neurophysiological justification:\n\nHyperglycemia → harm: Ischemic neurons switch to anaerobic glycolysis, producing lactate. Excess glucose accelerates this pathway, worsening intracellular lactic acidosis and pH-dependent calcium influx. In the penumbra (partially perfused tissue), hyperglycemia promotes hemorrhagic transformation by damaging endothelial tight junctions via oxidative stress. The threshold for harm is ~180 mg/dL in adult data; pediatric thresholds are extrapolated.\n\nHyperthermia → harm: Each 1°C rise in brain temperature increases cerebral metabolic rate by 8–10%, creating a supply-demand mismatch in ischemic tissue. Fever also increases glutamate release, blood-brain barrier permeability, and free radical production. Animal models show a 30% increase in infarct volume per 1°C of hyperthermia.\n\nHypertension dilemma: In acute stroke, hypertension may be a compensatory response (Cushing response) maintaining perfusion to the ischemic penumbra through collateral channels. Aggressive lowering → penumbral underperfusion → infarct expansion. Conversely, extreme hypertension → hemorrhagic conversion, especially post-tPA. The target (50th–115% of 95th percentile) balances these competing risks.\n\nHypotension → underperfusion: The penumbra depends on collateral blood flow, which is pressure-dependent. A MAP drop of 20% can convert salvageable penumbra to core infarct. This is why aggressive IV fluid boluses for hypotension are critical — more critical than in most other pediatric emergencies.",
pearls:"Practical neuroprotection checklist that goes beyond 'maintain normals':\n\n• Head of bed: Keep FLAT for suspected AIS (maximizes cerebral perfusion pressure). Elevate to 30° ONLY for suspected elevated ICP or hemorrhagic stroke — this distinction matters.\n\n• NPO status: Maintain NPO until stroke type clarified and swallow evaluation done. Aspiration pneumonia in a stroke patient is a preventable catastrophe.\n\n• Avoid dextrose-containing fluids in children ≥2 years (exacerbates penumbral injury). Use D5 only for age <2 or documented hypoglycemia.\n\n• Temperature: Treat aggressively above 37.5°C — don't wait for 38°C. Acetaminophen is first-line; avoid ibuprofen if tPA is being considered (antiplatelet effect).\n\n• Seizure management: Seizures massively increase metabolic demand in already ischemic tissue. Low threshold for prophylactic levetiracetam if any seizure activity occurs. Avoid phenytoin/fosphenytoin (drug interactions with anticoagulation, cardiac effects).",
evidence:"Hyperglycemia and stroke outcomes: blood glucose >180 mg/dL associated with 3× increased risk of hemorrhagic transformation post-tPA (Bruno, Neurology 2002). Fever and infarct volume: 30% increase per 1°C in animal models (Ginsberg, Stroke 1998). Each 1°C increase in body temperature worsens mRS at 3 months by 0.3 points (Hajat, Stroke 2000). Permissive hypertension: lowering SBP >20% in acute AIS worsens outcomes (AHA/ASA 2019 guidelines). NPO and aspiration: 37–78% of acute stroke patients have dysphagia on formal testing (Martino, Stroke 2005)."},

scd:{title:"SCD Stroke — A Distinct Pathophysiology",
patho:"Stroke in sickle cell disease has a fundamentally different vascular mechanism from typical pediatric AIS. SCD cerebral vasculopathy involves large vessel stenosis (distal ICA, proximal MCA/ACA) from chronic endothelial injury → intimal hyperplasia → progressive narrowing. This is NOT the small vessel occlusion seen in typical vaso-occlusive episodes. The pathophysiology: sickle erythrocytes adhere to activated endothelium via VCAM-1/VLA-4 interactions, triggering inflammatory cascades that cause smooth muscle proliferation in the vessel wall. Over years, this produces moyamoya-like collateral formation.\n\nThis is why tPA is contraindicated in SCD stroke: the occlusion is not an acute thromboembolism sitting on a normal vessel — it's chronic vasculopathy with superimposed in-situ thrombosis on a damaged, stenotic vessel. Thrombolysis risks hemorrhage into fragile moyamoya collaterals without addressing the underlying stenosis.\n\nExchange transfusion works by diluting HbS-containing erythrocytes with normal HbA erythrocytes, reducing HbS% from >90% to <30%. This immediately decreases blood viscosity, improves oxygen delivery to ischemic tissue, and reduces ongoing sickling-mediated endothelial injury. Simple transfusion is inferior because it increases total hemoglobin without reducing HbS%, raising viscosity further.",
pearls:"SCD patients have a 67–410× higher stroke risk than the general pediatric population. Stroke risk without transcranial Doppler (TCD) screening and transfusion therapy is 11% by age 20.\n\nImmediate actions differ from standard stroke pathway:\n1. Contact Hematology IMMEDIATELY — before imaging if possible\n2. Do NOT give tPA (listed as specific exclusion criterion)\n3. Do NOT give aspirin until hematology consulted\n4. Simple transfusion is a temporizing measure — exchange transfusion is definitive\n5. Target HbS <30% by exchange transfusion\n6. Emergent vascular access for exchange (usually dialysis catheter placement by IR or surgery)\n7. Type and cross for sickle-negative, phenotypically matched blood\n\nSilent cerebral infarcts (found on routine MRI) occur in 27% of SCD patients by age 6. These cause progressive cognitive decline without overt clinical stroke. The SIT trial showed chronic transfusion reduces recurrent silent infarcts by 58%.",
evidence:"SCD stroke risk 67–410× general population (Ohene-Frempong, Blood 1998). Stroke risk 11% by age 20 without TCD screening (Adams, NEJM 1998). STOP trial: chronic transfusion reduces first stroke risk by 92% in high TCD-velocity patients (Adams, NEJM 1998). SIT trial: chronic transfusion reduces recurrent silent infarct by 58%, NNT 7 over 3 years (DeBaun, NEJM 2014). Exchange transfusion target HbS <30%: standard of care per 2014 NHLBI guidelines. Silent infarcts in 27% by age 6 (Bernaudin, Blood 2011). tPA contraindicated in SCD per AHA/ASA 2019 guidelines (Class III, Level C-EO)."},

cvst:{title:"Cerebral Venous Sinus Thrombosis (CVST)",
patho:"CVST involves thrombosis of the dural venous sinuses (superior sagittal, transverse, sigmoid, straight sinus) or cortical veins. Virchow's triad applies directly: (1) Stasis — dehydration is the most common precipitant in children, reducing venous flow velocity; (2) Endothelial injury — otitis media, mastoiditis, or sinusitis cause direct inflammatory invasion of adjacent venous sinuses (lateral sinus thrombosis from mastoiditis is a classic but still-occurring presentation); (3) Hypercoagulability — malignancy, oral contraceptives (adolescents), Factor V Leiden, protein C/S deficiency, antiphospholipid syndrome.\n\nThe 6th cranial nerve (abducens) palsy in CVST occurs because it has the longest intracranial subarachnoid course of any cranial nerve (~75mm from brainstem to Dorello's canal). Elevated ICP from impaired venous drainage compresses the nerve against the petrous apex — this is a 'false localizing sign' because the deficit doesn't indicate the location of the thrombus. Papilledema develops via the same mechanism: elevated ICP transmitted to the optic nerve sheath impedes axoplasmic transport and venous drainage of the optic disc.\n\nVenous infarction differs from arterial infarction: venous congestion causes vasogenic (not cytotoxic) edema initially, which is potentially reversible. However, hemorrhagic transformation is more common (~40% of CVST) because elevated venous pressure ruptures capillaries.",
pearls:"CVST presentation differs dramatically from AIS — think 'subacute escalation' rather than 'sudden onset':\n\n• Headache is the dominant symptom (90%), but it escalates over hours to days, often worse in the morning or with Valsalva. Unlike migraine, it doesn't have a clear 'aura → headache → resolution' arc.\n\n• Neonates with CVST present with seizures (70%), not headache — suspect CVST in any neonate with seizures + dehydration + sepsis.\n\n• The constellation of headache + vomiting + 6th nerve palsy (lateral gaze limitation) + papilledema should trigger urgent venous imaging. Don't settle for a negative MRI-brain — you need MRV (MR venography) or CTV (CT venography) specifically.\n\n• MRV vs CTV: MRV is preferred (no radiation, better flow characterization) but takes longer. CTV is faster, excellent sensitivity (95%), and better for cortical vein thrombosis. If CT is being done anyway (hemorrhage concern), add CTV to the same bolus.\n\n• Treatment: anticoagulation with heparin even in the presence of hemorrhagic infarction — this seems counterintuitive but prevents clot propagation, and the hemorrhage is from venous congestion (which anticoagulation relieves), not from an arterial bleed.",
evidence:"CVST in children: dehydration is the most common risk factor (39%), followed by infection (35%) and prothrombotic conditions (22%) (deVeber, NEJM 2001). Hemorrhagic transformation occurs in ~40% of pediatric CVST (Wasay, JNNP 2008). 6th nerve has the longest intracranial course at ~75mm (Umansky, J Neurosurg 1982). CTV sensitivity for CVST: 95% (Defined, Stroke 2004). Anticoagulation in CVST with hemorrhage: ISCVT study showed no increased bleeding risk and improved outcomes (Ferro, Stroke 2004). Neonatal CVST: seizures in 70%, mortality 3–5%, recurrence rate 3% (Moharir, Ann Neurol 2011). Overall pediatric CVST incidence: 0.67 per 100,000 children per year (deVeber, NEJM 2001)."}

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,aspirin_lo:Math.round(wt*3),aspirin_hi:Math.min(Math.round(wt*5),81),tpa:Math.round(wt*0.9*10)/10,tpaBolus:Math.round(wt*0.9*0.1*10)/10,tpaInf:Math.round(wt*0.9*0.9*10)/10,hepInfant:Math.round(wt*28),hepChild:Math.round(wt*20),apap:Math.round(wt*12.5),fosphen:Math.round(wt*20),phenobarb:Math.round(wt*15),bolus:Math.round(wt*20)};}

function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Suspected Stroke</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · October 2020</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function DoseRow({label,value,unit}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit||""}</span></div>)}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}
function TeachBox({id,teaching}){var s=useState("pearls"),tab=s[0],setTab=s[1];if(!teaching||!TEACH[id])return null;var t=TEACH[id];if(t.content&&!t.patho&&!t.pearls&&!t.evidence){return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:"4px solid "+C.teal}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t.content}</div></div>);}var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>{tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}</div><div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeKey]||""}</div></div>);}

function PathwayFlowchart(){
  var rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5",aC="#d97706",aBg="#fffbeb",aBd="#fcd34d",gC="#16a34a",gBg="#f0fdf4",gBd="#86efac",blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd",pC="#6b21a8",pBg="#faf5ff",pBd="#c4b5fd",mC="#6b7280";
  var Arrow=function(p){var dx=p.x2-p.x1,dy=p.y2-p.y1,len=Math.sqrt(dx*dx+dy*dy);if(len===0)return null;var ux=dx/len,uy=dy/len,px=-uy,py=ux;return <g><line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2} stroke={p.color||"#94a3b8"} strokeWidth={1.5}/><polygon points={p.x2+","+p.y2+" "+(p.x2-ux*6+px*3.5)+","+(p.y2-uy*6+py*3.5)+" "+(p.x2-ux*6-px*3.5)+","+(p.y2-uy*6-py*3.5)} fill={p.color||"#94a3b8"}/></g>};
  var Box=function(p){return <g><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={p.radius||6} fill={p.fill} stroke={p.stroke} strokeWidth={p.sw||1}/>{p.children}</g>};
  var T=function(p){return <text x={p.x} y={p.y} textAnchor={p.anchor||"middle"} fontSize={p.size||9} fontWeight={p.weight||600} fill={p.color||"#1a1d21"} fontFamily="'IBM Plex Sans',sans-serif">{p.children}</text>};
  return(<div style={{marginTop:20}}><div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Full Algorithm</div><div style={{fontSize:11,color:C.muted,marginBottom:6}}>Age {"<"}18 · Stroke symptoms {"<"}48h · LIP eval {"<"}10 min · Imaging {"<"}15 min (intervention) or {"<"}120 min</div><div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,padding:6,overflow:"hidden"}}><svg viewBox="0 0 520 420" style={{width:"100%",display:"block"}}><rect width={520} height={420} fill="#fafaf8" rx={6}/>
    <Box x={100} y={8} w={320} h={30} fill={blBg} stroke={blBd} sw={1.5} radius={14}><T x={260} y={20} size={9} weight={700} color={blC}>SUSPECTED PEDIATRIC STROKE</T><T x={260} y={31} size={6} color={mC}>ESI I/II · HOB flat · 2 PIV · Labs · NPO · Consult Neurology</T></Box>
    <Arrow x1={260} y1={38} x2={260} y2={56}/>
    <g transform="translate(260,70)"><polygon points="0,-14 80,0 0,14 -80,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>ICH concern or</T><T x={0} y={7} size={6} weight={700}>worsening GCS?</T></g>
    <Arrow x1={340} y1={70} x2={440} y2={94} color={rC}/><T x={400} y={82} size={6} weight={600} color={rC}>Yes</T>
    <Box x={380} y={94} w={130} h={30} fill={rBg} stroke={rBd} sw={2}><T x={445} y={106} size={7} weight={700} color={rC}>STAT CT {"<"}15 MIN</T><T x={445} y={118} size={6} color={mC}>NSG if hemorrhage</T></Box>
    <Arrow x1={260} y1={84} x2={260} y2={104}/><T x={270} y={100} size={6} weight={600} color={gC} anchor="start">No</T>

    <g transform="translate(260,118)"><polygon points="0,-14 80,0 0,14 -80,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>Revascularization</T><T x={0} y={7} size={6} weight={700}>candidate? (age ≥4)</T></g>
    <Arrow x1={340} y1={118} x2={440} y2={146} color={pC}/><T x={400} y={132} size={6} weight={600} color={pC}>Yes</T>
    <Box x={375} y={146} w={135} h={36} fill={pBg} stroke={pBd} sw={1.5}><T x={442} y={158} size={7} weight={700} color={pC}>STROKE ALERT</T><T x={442} y={169} size={6} color={mC}>CT/CTA/CT perf OR</T><T x={442} y={179} size={6} color={mC}>MRI Rapid Swift</T></Box>

    <Arrow x1={180} y1={118} x2={110} y2={146} color={blC}/><T x={135} y={132} size={6} weight={600} color={blC}>No</T>
    <g transform="translate(110,160)"><polygon points="0,-14 70,0 0,14 -70,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>MRI available</T><T x={0} y={7} size={6} weight={700}>within 2–3h?</T></g>
    <Arrow x1={40} y1={160} x2={20} y2={190} color={blC}/><T x={20} y={178} size={6} weight={600} color={blC} anchor="end">No</T>
    <Box x={5} y={190} w={100} h={28} fill={blBg} stroke={blBd}><T x={55} y={202} size={6} weight={700} color={blC}>Quick brain MRI</T><T x={55} y={212} size={6} color={mC}>DWI + MRA head/neck</T></Box>
    <Arrow x1={180} y1={160} x2={210} y2={190} color={blC}/><T x={202} y={178} size={6} weight={600} color={blC} anchor="start">Yes</T>
    <Box x={175} y={190} w={110} h={28} fill={blBg} stroke={blBd}><T x={230} y={202} size={6} weight={700} color={blC}>MRI Rapid Swift</T><T x={230} y={212} size={6} color={mC}>DWI, T2, FLAIR, MRA</T></Box>

    {/* Imaging results */}
    <Arrow x1={260} y1={218} x2={260} y2={240}/>
    <g transform="translate(260,254)"><polygon points="0,-14 65,0 0,14 -65,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Result?</T></g>

    <Arrow x1={195} y1={254} x2={80} y2={282} color={rC}/>
    <Box x={20} y={282} w={120} h={30} fill={rBg} stroke={rBd} sw={1.5}><T x={80} y={294} size={7} weight={700} color={rC}>HEMORRHAGE</T><T x={80} y={306} size={6} color={mC}>NSG consult · PICU</T></Box>

    <Arrow x1={260} y1={268} x2={260} y2={282} color={aC}/>
    <Box x={190} y={282} w={140} h={30} fill={aBg} stroke={aBd} sw={1.5}><T x={260} y={294} size={7} weight={700} color={aC}>ISCHEMIA / THROMBOSIS</T><T x={260} y={306} size={6} color={mC}>Hem consult · Anticoag/plt</T></Box>

    <Arrow x1={325} y1={254} x2={420} y2={282} color={gC}/>
    <Box x={365} y={282} w={120} h={30} fill={gBg} stroke={gBd}><T x={425} y={294} size={7} weight={700} color={gC}>NORMAL</T><T x={425} y={306} size={6} color={mC}>Seek other cause</T></Box>

    <Box x={20} y={328} w={480} h={34} fill={blBg} stroke={blBd} radius={6}><T x={260} y={340} size={7} weight={700} color={blC}>ALL CONFIRMED STROKE → ADMIT PICU</T><T x={260} y={354} size={6} color={mC}>VS q1h · Neuro Q15min · Maintain normals (O₂, temp, glucose, BP, volume) · Consult Hematology</T></Box>

    <Box x={20} y={370} w={240} h={34} fill={pBg} stroke={pBd} radius={6}><T x={140} y={382} size={6} weight={700} color={pC}>tPA (AFTER Neuro discussion only)</T><T x={140} y={394} size={6} color={mC}>0.9 mg/kg · 10% bolus · 90% over 1h</T></Box>
    <Box x={270} y={370} w={230} h={34} fill={aBg} stroke={aBd} radius={6}><T x={385} y={382} size={6} weight={700} color={aC}>SCD STROKE → NO tPA</T><T x={385} y={394} size={6} color={mC}>Hydration + exchange transfusion</T></Box>
  </svg></div></div>);
}

function Wizard({teaching,doses}){
  var s1=useState(null),excl=s1[0],setExcl=s1[1];
  var s2=useState(null),urgency=s2[0],setUrgency=s2[1];
  var s3=useState(null),imgResult=s3[0],setImgResult=s3[1];
  function reset(){setExcl(null);setUrgency(null);setImgResult(null);}

  return(<Pad>
    <Q text="Suspected Stroke Walk-Through" sub="Time-critical evaluation · LIP eval <10 min · Imaging <15–120 min"/>
    <TeachBox id="overview" teaching={teaching}/>

    <Card title="Step 1 — Inclusion & Immediate Actions" color={C.red}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Age {"<"}18 with stroke-like symptoms, onset {"<"}48 hours?<br/><span style={{fontSize:12,color:C.muted}}>Exclusions: recent imaging excluding stroke, febrile seizure without focal deficits (6mo–5yr), new seizure without focal deficits, epilepsy seizure without persistent focal deficits</span></div>
      <WizBtn label="Yes — Stroke symptoms, meets criteria" sub="ESI I/II · HOB flat · 2 PIV · Labs · NPO · Consult Neurology" color={C.red} bg={C.redBg} border={C.redBorder} selected={excl==="no"} onClick={function(){setExcl("no")}}/>
      <WizBtn label="No — Exclusion criteria met" sub="Off pathway" color={C.muted} bg={C.white} border={C.rule} selected={excl==="yes"} onClick={function(){setExcl("yes")}}/>

      {excl==="no"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⏱️" title="IMMEDIATE — First 15 Minutes">
        <strong>1.</strong> ESI I or II · Bedrest with HOB FLAT · NPO<br/>
        <strong>2.</strong> Place 2 peripheral IVs · Draw labs: POC Chem 8 w/ H&H, CBG, BMP, CBC, INR, aPTT, fibrinogen, T&S; 12-lead ECG<br/>
        <strong>3.</strong> ED LIP evaluation within 10 minutes<br/>
        <strong>4.</strong> IP consult Peds Neurology — possible stroke<br/>
        <strong>5.</strong> O₂ to maintain SpO₂ ≥95% · APAP {doses?doses.apap+" mg":"12.5 mg/kg"} for T {">"} 37.5°C<br/>
        <strong>6.</strong> Check for braces → consult Peds Dentistry for removal before MRI<br/>
        <strong>7.</strong> Consider Peds Code White<br/>
        <strong>8.</strong> Isotonic IV fluids at maintenance · Bolus {doses?doses.bolus+" mL":"20 mL/kg"} PRN<br/>
        <strong>9.</strong> Neuro checks Q15 min · VS Q1 hour
      </Alert>}
    </Card>

    {excl==="no"&&<Card title="Step 2 — Stroke Type Recognition" color={C.primary}>
      <div style={{marginTop:8}}>
        {[{type:"Arterial Ischemic Stroke (AIS)",sxs:"Hemiparesis (face+arm or face+arm+leg) · Aphasia · Visual field cut · Dysarthria · Hemisensory loss · Ataxia with headache/dizziness/vomiting · New focal seizure with post-ictal deficit",c:C.red,bg:C.redBg,bd:C.redBorder},
          {type:"Cerebral Venous Sinus Thrombosis (CVST)",sxs:"Unremitting, escalating headache · Repeated vomiting · Decreased mental status · 6th nerve palsy · Papilledema",c:C.purple,bg:C.purpleBg,bd:C.purpleBorder},
          {type:"Primary Intracranial Hemorrhage (ICH)",sxs:"Hyperacute severe headache · Sudden, sustained LOC · Either with focal neurologic deficit",c:C.red,bg:C.redBg,bd:C.redBorder}
        ].map(function(t){return <div key={t.type} style={{background:t.bg,border:"1.5px solid "+t.bd,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:t.c}}>{t.type}</div><div style={{fontSize:12,marginTop:2}}>{t.sxs}</div></div>})}
      </div>
      <TeachBox id="ais" teaching={teaching}/>
    </Card>}

    {excl==="no"&&<Card title="Step 3 — Imaging Decision" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>What is the clinical urgency?</div>
      <WizBtn label="ICH concern or worsening GCS" sub="STAT CT without contrast < 15 minutes · Consult Neurosurgery if hemorrhage" color={C.red} bg={C.redBg} border={C.redBorder} selected={urgency==="emergent"} onClick={function(){setUrgency("emergent")}}/>
      <WizBtn label="Possible revascularization candidate (age ≥4, known onset)" sub="STROKE ALERT: CT/CTA/CT perfusion OR MRI Rapid Swift — Neurology directs" color={C.purple} bg={C.purpleBg} border={C.purpleBorder} selected={urgency==="revasc"} onClick={function(){setUrgency("revasc")}}/>
      <WizBtn label="Moderate-high suspicion, stable, not revascularization candidate" sub="MRI within 2–3 hours if available · Otherwise quick brain MRI with DWI" color={C.blue} bg={C.blueBg} border={C.blueBorder} selected={urgency==="standard"} onClick={function(){setUrgency("standard")}}/>
      {urgency==="emergent"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="STAT CT < 15 Minutes">Head CT without contrast. If hemorrhage → consult Peds Neurosurgery immediately. Consider interventions for elevated ICP. If no hemorrhage and ischemia suspected → proceed to stroke team evaluation for revascularization.</Alert>}
      {urgency==="revasc"&&<Alert color={C.purple} border={C.purpleBorder} bg={C.purpleBg} icon="🚨" title="STROKE ALERT — Revascularization Candidate">Peds Neurology activates Stroke Alert. Imaging per stroke team: CT/CTA/CT perfusion OR MRI Rapid Swift (DWI, T2, FLAIR, MRA). tPA candidacy assessment by Neurology (see Meds tab for criteria). SCD patients: NO tPA — contact Hematology for exchange transfusion.</Alert>}
      {urgency==="standard"&&<Alert color={C.blue} border={C.blueBorder} bg={C.blueBg} icon="🧠" title="MRI — Standard Evaluation">MRI Rapid Swift if available within 2–3 hours (DWI, T2, FLAIR, MRA brain). Otherwise: quick brain MRI with DWI + MRI w/o contrast + MRA head w/o + MRA neck with/without dissection protocol. Goal: within 120 minutes of presentation.</Alert>}
      <TeachBox id="imaging" teaching={teaching}/>
    </Card>}

    {excl==="no"&&urgency!==null&&<Card title="Step 4 — Imaging Results & Management" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>What do the imaging results show?</div>
      <WizBtn label="Hemorrhage" sub="Consult Neurosurgery · Admit PICU · ICP management" color={C.red} bg={C.redBg} border={C.redBorder} selected={imgResult==="hemorrhage"} onClick={function(){setImgResult("hemorrhage")}}/>
      <WizBtn label="Ischemia / Thrombosis confirmed" sub="Consult Hematology · Consider anticoagulation/antiplatelet · Admit PICU" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={imgResult==="ischemia"} onClick={function(){setImgResult("ischemia")}}/>
      <WizBtn label="Normal imaging" sub="Continue to seek and treat cause of presenting symptoms" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={imgResult==="normal"} onClick={function(){setImgResult("normal")}}/>
      {imgResult==="hemorrhage"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Hemorrhagic Stroke">Consult Peds Neurosurgery. Admit PICU. Consider intubation and hypertonic saline for large territory. Maintain normals. VS Q1h, neuro Q15min. Risk factors: AVM (32%), aneurysm, hemophilia, coagulation disorders.</Alert>}
      {imgResult==="ischemia"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🧠" title="Ischemic Stroke / Thrombosis Confirmed">
        Consult Peds Hematology. Consider anticoagulation/antiplatelet therapy <strong>after discussion with Neurology</strong>.<br/>
        Maintain normals: O₂ SpO₂ ≥95%, normothermia, normoglycemia, normotension (SBP 50th–115% of 95th), normovolemia.<br/>
        VS Q1h, neuro Q15 min. Consider intubation + hypertonic saline for large territory stroke.<br/>
        <strong>Admit PICU.</strong><br/>
        <span style={{fontSize:12,color:C.red,fontWeight:600}}>SCD patients: NO tPA — hydration + exchange transfusion. Contact Hematology immediately.</span>
      </Alert>}
      {imgResult==="normal"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="🔍" title="Normal Imaging">Continue to evaluate for cause of presenting symptoms. Stroke mimics often have significant pathology (PRES, vascular anomalies, tumors). May require NSG attending evaluation if consulted. Consider admission for observation.</Alert>}
      <TeachBox id="supportive" teaching={teaching}/>
    </Card>}

    {excl!==null&&<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>}
    <PathwayFlowchart/>
  </Pad>);
}

function RefTriage({teaching}){return(<Pad><Q text="Triage & Immediate Actions" sub="Age <18 · Stroke symptoms <48h · Time-critical evaluation"/><TeachBox id="overview" teaching={teaching}/><Card title="Inclusion / Exclusion" color={C.primary}><div style={{marginTop:8}}><Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Age {"<"}18 with stroke-like symptoms, onset {"<"}48 hours before presentation.</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Recent imaging excluding stroke · Febrile seizure without persistent focal deficits (6mo–5yr) · New seizure without focal deficits · Epilepsy seizure without persistent focal deficits</Alert></div></Card><Card title="Stroke Symptom Recognition" color={C.red}><div style={{marginTop:8}}>{[{type:"AIS",sxs:"Hemiparesis · Aphasia · Visual field cut · Ataxia with HA/dizziness/vomiting · Dysarthria · Hemisensory loss · Focal seizure with post-ictal deficit"},{type:"CVST",sxs:"Escalating headache · Repeated vomiting · Decreased MS · 6th nerve palsy · Papilledema"},{type:"ICH",sxs:"Hyperacute severe headache · Sudden, sustained LOC · Either with focal deficit"}].map(function(t){return <div key={t.type} style={{padding:"6px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:700,color:C.red}}>{t.type}:</span> <span style={{fontSize:12}}>{t.sxs}</span></div>})}</div><TeachBox id="ais" teaching={teaching}/><TeachBox id="cvst" teaching={teaching}/></Card><Card title="Initiate on Arrival" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}><strong>ESI I or II</strong> · Bedrest with HOB FLAT · NPO<br/>2 peripheral IVs · Labs: POC Chem 8, CBG, BMP, CBC, INR, aPTT, fibrinogen, T&S; 12-lead ECG<br/><strong>ED LIP evaluation within 10 minutes</strong><br/>IP consult Peds Neurology · Consider Peds Code White<br/>Isotonic IV fluids at maintenance · O₂ for SpO₂ ≥95% · Normothermia (APAP for T {'>'}37.5°C)<br/>Neuro checks Q15 min · Check for braces (Peds Dentistry for MRI)<br/><strong>Transport to imaging: {"<"}15 min (intervention candidate), {"<"}120 min (standard)</strong></div></Card></Pad>)}

function RefDecisions({teaching}){return(<Pad><Q text="Decision Tree" sub="Imaging strategy → revascularization candidacy → disposition"/><Card title="Imaging Strategy" color={C.primary}><div style={{marginTop:8}}>{[{label:"ICH concern / worsening GCS",action:"STAT CT w/o contrast <15 min · NSG if hemorrhage",c:C.red,bg:C.redBg,bd:C.redBorder},{label:"Revascularization candidate (age ≥4, known onset)",action:"STROKE ALERT: CT/CTA/CT perfusion OR MRI Rapid Swift",c:C.purple,bg:C.purpleBg,bd:C.purpleBorder},{label:"Moderate-high suspicion, stable",action:"MRI Rapid Swift (DWI, T2, FLAIR, MRA) within 2–3h",c:C.blue,bg:C.blueBg,bd:C.blueBorder},{label:"MRI delayed",action:"Quick brain MRI + DWI + MRA head/neck ± dissection protocol",c:C.blue,bg:C.blueBg,bd:C.blueBorder}].map(function(r){return <div key={r.label} style={{background:r.bg,border:"1.5px solid "+r.bd,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:r.c}}>{r.label}</div><div style={{fontSize:12,marginTop:2}}>{r.action}</div></div>})}</div><TeachBox id="imaging" teaching={teaching}/></Card><Card title="Revascularization Candidacy (tPA)" color={C.purple}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>Age ≥12:</strong> NIHSS ≥4 and ≤24 or potentially disabling deficits<br/><strong>Age 4–12:</strong> NIHSS ≥8 or potentially disabling deficits<br/><strong>{"<"}3 hours:</strong> may be IV tPA candidate<br/><strong>3–8 hours:</strong> may be endovascular therapy candidate<br/><strong>Anterior circulation:</strong> ≤24 hours · <strong>Posterior:</strong> ≤48 hours<br/><span style={{color:C.red,fontWeight:600}}>ALL MEDICATIONS AFTER DISCUSSION WITH NEUROLOGY ONLY</span><br/><span style={{color:C.red,fontWeight:600}}>SCD: NO tPA — hydration + exchange transfusion</span></div><TeachBox id="tpa" teaching={teaching}/></Card><Card title="Post-Stroke Management — The 'Normals'" color={C.blue}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>O₂ SpO₂ ≥95% · Normothermia ({"<"}37.5°C) · Normoglycemia (age {"<"}2: D5; ≥2: no dextrose unless hypoglycemic) · Normotension (SBP 50th–115% of 95th %ile) · Normovolemia (isotonic maintenance + bolus PRN)<br/>VS Q1h · Neuro Q15 min · Consider intubation/hypertonic saline for large territory stroke</div><TeachBox id="supportive" teaching={teaching}/></Card><Card title="Special Populations" color={C.amberMid} defaultOpen={false}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>SCD:</strong> 67–410× higher stroke risk. NO tPA. Hydration + exchange transfusion. Contact Hematology immediately.<br/><strong>Neonatal/Perinatal:</strong> 80% ischemic. Cranial US for hemorrhage, but CT/MRI preferred for ischemia (poor US sensitivity).</div><TeachBox id="scd" teaching={teaching}/></Card><PathwayFlowchart/></Pad>)}

function RefMeds({teaching,doses}){return(<Pad><Q text="Medications" sub={doses?"Calculated for "+doses.w+" kg — ALL given AFTER Neurology discussion ONLY":"Enter weight · ALL medications after Neurology discussion"}/>{!doses&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above.</Alert>}<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠️" title="ALL STROKE MEDICATIONS REQUIRE NEUROLOGY DISCUSSION">Do not administer aspirin, heparin, or tPA without explicit Neurology direction. These are listed for reference and dose calculation only.</Alert><Card title="Antiplatelet / Anticoagulation (Neurology-directed)" color={C.purple}><div style={{marginTop:8}}><DoseRow label="Aspirin PO (3–5 mg/kg, max 81 mg)" value={doses?doses.aspirin_lo+"–"+doses.aspirin_hi:"—"} unit={doses?"mg":""}/><DoseRow label="Heparin infusion — infant (28 units/kg/hr)" value={doses?doses.hepInfant:"—"} unit={doses?"units/hr":""}/><DoseRow label="Heparin infusion — child/adolescent (20 units/kg/hr)" value={doses?doses.hepChild:"—"} unit={doses?"units/hr":""}/></div></Card><Card title="tPA — IV Alteplase (Neurology-directed)" color={C.red}><div style={{marginTop:8}}><DoseRow label="Total dose (0.9 mg/kg, max 90 mg)" value={doses?doses.tpa:"—"} unit={doses?"mg":""}/><DoseRow label="10% bolus over 1 minute" value={doses?doses.tpaBolus:"—"} unit={doses?"mg":""}/><DoseRow label="90% infusion over 1 hour" value={doses?doses.tpaInf:"—"} unit={doses?"mg":""}/><div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:6}}>Extensive exclusion criteria apply — see pathway. SCD, moyamoya, endocarditis are absolute contraindications.</div></div><TeachBox id="tpa" teaching={teaching}/></Card><Card title="Anticonvulsants (if seizures)" color={C.primary}><div style={{marginTop:8}}><DoseRow label="Fosphenytoin (20 mg PE/kg) — infants/children" value={doses?doses.fosphen:"—"} unit={doses?"mg PE":""}/><DoseRow label="Phenobarbital (15 mg/kg) — neonates" value={doses?doses.phenobarb:"—"} unit={doses?"mg":""}/></div></Card><Card title="Supportive" color={C.primary}><div style={{marginTop:8}}><DoseRow label="Acetaminophen (12.5 mg/kg) for T >37.5°C" value={doses?doses.apap:"—"} unit={doses?"mg":""}/><DoseRow label="NS bolus (20 mL/kg) PRN" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/></div></Card></Pad>)}

function RefDispo({teaching}){return(<Pad><Q text="Disposition & References"/><Card title="Disposition" color={C.primary}><div style={{marginTop:8}}><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>ALL CONFIRMED STROKE → PICU</div><div style={{fontSize:12,marginTop:2}}>VS Q1h · Neuro Q15 min · Maintain normals · Hematology consult · If thrombectomy indicated → directly to IR then PICU</div></div><div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>STROKE MIMICS WITH SIGNIFICANT PATHOLOGY</div><div style={{fontSize:12,marginTop:2}}>PRES, vascular anomalies, tumors — admit for appropriate management. Even normal imaging may warrant observation.</div></div></div></Card><Card title="Risk Factors" color={C.muted} defaultOpen={false}><div style={{fontSize:12,lineHeight:1.6,marginTop:8}}><strong>AIS:</strong> SCD · CHD · Hypercoagulable state · Cerebral vasculopathy · CNS/ENT infection<br/><strong>CVST:</strong> Chronic anemia · CHD · Autoimmune · Malignancy · Dehydration · Infection<br/><strong>ICH:</strong> AVM (32%) · Aneurysm · Hemophilia · Coagulation disorders · Neonate</div></Card><Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>OHSU DCH ED Suspected Stroke Clinical Pathway, October 2020<br/>Rivkin MJ et al. Guidelines for Urgent Management of Stroke in Children. Pediatr Neurol 2016;56:8-17<br/>Shellhaas RA et al. Mimics of Childhood Stroke. Pediatrics 2006;118(2):704-709<br/>Ladner TR et al. Pediatric Acute Stroke Protocol Activation. Stroke 2015;46:2328-2331<br/>Chalela JA et al. MRI and CT in emergency assessment of suspected stroke. Lancet 2007;369:293<br/>Roach SE et al. Management of Stroke in Infants and Children. Stroke 2008;39:2644-2691<br/>Authors: Beech Burns, Jenny Wilson, Cydni Williams, Denise Langley</div></Card></Pad>)}

function App(){var s1=useState("wizard"),mode=s1[0],setMode=s1[1];var s2=useState("triage"),tab=s2[0],setTab=s2[1];var s3=useState(false),teaching=s3[0],setTeaching=s3[1];var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];var s5=useState(""),ageYr=s5[0],setAgeYr=s5[1];var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);var rr=useResponsive(),maxW=rr.maxW;var refTabs=[{key:"triage",label:"Triage"},{key:"decisions",label:"Decisions"},{key:"meds",label:"Medications"},{key:"dispo",label:"Dispo & Refs"}];return(<div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}><Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>{mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}<div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}><div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (years)</label><input type="number" inputMode="decimal" value={ageYr} onChange={function(e){setAgeYr(e.target.value)}} placeholder="10" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div><div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="35" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div></div>{mode==="wizard"&&<Wizard teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}{mode==="reference"&&tab==="decisions"&&<RefDecisions teaching={teaching}/>}{mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}{mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}<div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}><strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.<br/>Doernbecher Children's Hospital · PED · Suspected Stroke Clinical Pathway · October 2020</div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
