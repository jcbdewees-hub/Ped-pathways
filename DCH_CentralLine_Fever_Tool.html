<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Line with Fever — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo}=React;
const C={primary:"#9f1239",pLight:"#fff1f2",pBorder:"#fda4af",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"Pathway Rationale",content:"Central line-associated bloodstream infections (CLABSIs) carry significant morbidity. Risk for bacteremia varies by underlying condition — children with intestinal failure on TPN have rates of 2–26.5 infections per 1000 catheter days, with retrospective studies identifying CLABSI rates of 47–69% in intestinal failure children presenting with fever. This pathway standardizes early identification, culture collection, empiric antibiotic selection, and disposition for all CVC patients presenting with signs of possible infection."},
  cultures:{title:"Why Central Line Cultures Only?",content:"Blood cultures from CVCs appear more sensitive with higher negative predictive value for ruling out bloodstream infection, while peripheral cultures are more specific. The workgroup prioritized sensitivity over specificity given the challenges of peripheral phlebotomy in this population (difficult access, multiple attempts, pain). Peripheral cultures are NOT routinely needed. Draw from ALL lumens."},
  cultureVolume:{title:"Culture Volume by Age",content:"<16 years: pediatric blood culture bottle, minimum 1 mL, recommended 4 mL. ≥16 years: aerobic AND anaerobic bottles, minimum 3 mL, recommended 20 mL equally distributed. Adequate volume is critical for culture sensitivity — underfilling bottles is the most common reason for false-negative cultures."},
  priorOrganisms:{title:"Why Review Prior Cultures?",content:"Patients with CVC infections tend to have recurrent infections with the same organisms. Always review culture results from the past 6 months and tailor empiric coverage accordingly. If no prior culture data is available, default to the population-based empiric regimen."},
  vancomycin:{title:"When to Add Vancomycin",content:"Add vancomycin 15 mg/kg IV (max 3g) for: ill appearance (see Sepsis Pathway), history of MRSA, suspected MRSA infection (cellulitis, abscess), concern for CNS infection, or close contact with a person with MRSA history. Vancomycin provides gram-positive coverage including MRSA that ceftriaxone alone does not cover."},
  fluconazole:{title:"When to Consider Fluconazole",content:"Consider fluconazole 12 mg/kg (max 800 mg) if the patient has a history of fungal infection or has been on broad-spectrum antibiotics within the past 2 months. Prolonged broad-spectrum antibiotic use disrupts normal flora and increases Candida colonization risk, particularly in patients dependent on TPN."},
  ethanolLock:{title:"Ethanol Lock Protocol",content:"If the patient is on an ethanol lock protocol and the line does not draw, consult the Vascular Access Team (VAT). Do NOT flush the line. The ethanol lock may need to be dwelling and premature flushing can reduce efficacy or cause complications."},
  sepsis:{title:"Sepsis Screening",content:"All patients should be screened for sepsis/shock on arrival. If meeting huddle criteria or in severe shock, initiate the Sepsis Pathway for fluid resuscitation and stabilization immediately — do not wait for culture results or antibiotic selection. The central line pathway runs in parallel with, not instead of, sepsis management."},
  disposition:{title:"Disposition — Admit All",content:"All patients with indwelling CVCs presenting with fever, malaise, lethargy, vomiting, or other systemic symptoms should have blood cultures drawn AND should be admitted for observation regardless of whether empiric antibiotics are initiated. Ensure stability after antibiotic administration before transfer to the floor."},
  hemeDischarge:{title:"Heme (Non-Onc) Discharge Option",content:"Non-oncology, non-BMT hematology patients (e.g. hemophilia, thalassemia) who are NOT immunocompromised and present with isolated fever while otherwise clinically well — vitals normal, tolerating feeds, no obvious infection source, no soft tissue infection around the line — may receive empiric ceftriaxone and be discharged home. Notify PHO of discharge so family can be contacted for prompt clinic follow-up. If cultures return positive (including coag-negative staph), the patient returns for repeat cultures ± admission."},
};

function calcDoses(w,a){
  const wt=parseFloat(w)||0;const age=parseFloat(a)||0;
  if(wt<=0)return null;
  return{w:wt,
    ceftri:Math.min(Math.round(wt*50),2000),
    cefep:Math.min(Math.round(wt*50),2000),
    vanco:Math.min(Math.round(wt*15),3000),
    fluc:Math.min(Math.round(wt*12),800),
    bolus:Math.round(wt*20),
  };
}

// Primitives
function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Central Line with Fever</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · July 2021</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function Sec({title,color,children}){return(<div style={{marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingBottom:4,borderBottom:`2px solid ${color}`}}>{title}</div>{children}</div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const[ageYears,setAgeYears]=useState("");
  const doses=useMemo(()=>calcDoses(weightKg,ageYears),[weightKg,ageYears]);
  const age=parseFloat(ageYears)||0;

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"decision",label:"Decisions"},
    {key:"meds",label:"Antibiotics"},
    {key:"special",label:"Dispo & Refs"},
  ];

  return(
    <div style={{maxWidth:520,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (yr)</label>
          <input type="number" inputMode="decimal" value={ageYears} onChange={e=>setAgeYears(e.target.value)} placeholder="5" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="20" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="Pediatric patient with indwelling CVC and suspected infection"/>
          <TeachBox id="overview" teaching={teaching}/>

          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">
                Indwelling CVC with suspected infection: fever ≥38.0°C, lethargy, malaise, vomiting, rigors, or other systemic symptoms
              </Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">
                CVC without fever/symptoms · Line dysfunction without systemic symptoms · Malignancy / on chemo (→ Neutropenic Fever pathway) · Apparent line-site/tunnel infection · BMT or solid organ transplant · Sickle cell disease (→ SCD with Fever pathway) · Cystic fibrosis
              </Alert>
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>1. ESI Triage Level II</strong><br/>
              <strong>2. Full vitals + Sepsis/Shock Screen</strong><br/>
              <div style={{paddingLeft:16,fontSize:12,color:C.red,fontWeight:600}}>If meeting huddle criteria or severe shock → Sepsis Pathway immediately</div>
              <strong>3.</strong> If no sepsis concern → notify MD of suspected CLI + abnormal vitals<br/>
              <strong>4. Obtain cultures from ALL catheter lumens</strong><br/>
              <div style={{paddingLeft:16,fontSize:12,color:C.muted}}>Peripheral cultures NOT needed</div>
            </div>
            <TeachBox id="sepsis" teaching={teaching}/>
            <TeachBox id="cultures" teaching={teaching}/>
          </Card>

          <Card title="Culture Collection" color={C.blue}>
            <div style={{marginTop:8}}>
              <div style={{background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:700,color:C.blue}}>&lt;16 years</div>
                <div style={{fontSize:12}}>Pediatric blood culture bottle · Min 1 mL · Recommended 4 mL</div>
              </div>
              <div style={{background:C.purpleBg,border:`1.5px solid ${C.purpleBorder}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.purple}}>≥16 years</div>
                <div style={{fontSize:12}}>Aerobic AND anaerobic bottles · Min 3 mL · Recommended 20 mL equally distributed</div>
              </div>
            </div>
            <TeachBox id="cultureVolume" teaching={teaching}/>
          </Card>

          <Card title="Serum Labs" color={C.primary} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>CBC · CMP · Magnesium · Phosphorus · Procalcitonin</div>
          </Card>

          <Card title="Nursing Documentation" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Vitals · Shock/decompensation signs · Neuro status (alertness) · Onset of fever · CVC type · Last port access · History of line infections or problems · Ethanol lock use · Medications · Allergies · Weight
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Decision Tree by Patient Population" sub="Determine underlying condition → branch to appropriate pathway"/>

          <Card title="Intestinal Failure / Home TPN" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <div style={{fontSize:14,fontWeight:700,color:C.ink,marginBottom:6}}>Presenting with:</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                {["Fever without clear source","Fever with possible source (e.g. URI)","Vomiting/malaise without fever"].map((s,i)=>(
                  <div key={i} style={{background:C.pLight,border:`1px solid ${C.pBorder}`,borderRadius:6,padding:"4px 8px",fontSize:11,fontWeight:500}}>{s}</div>
                ))}
              </div>
            </div>
            <div style={{background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.red}}>Concern for Sepsis? → Sepsis Pathway</div>
            </div>
            <div style={{background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>Fever without clear source or with possible source:</div>
              <div style={{fontSize:12,marginTop:2}}>→ Admit to general medicine (Hood/Kaiser/FM) + empiric antibiotics</div>
            </div>
            <div style={{background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
              <div style={{fontSize:13,fontWeight:700,color:C.blue}}>Vomiting/malaise without fever:</div>
              <div style={{fontSize:12,marginTop:2}}>→ Admit WITHOUT empiric antibiotics · Assess for GI consult need:<br/>Urgent GI issues (bloody stool) → GI consult in ED<br/>Non-urgent or no GI questions → admit directly</div>
            </div>
            <div style={{fontSize:12,color:C.muted,marginTop:6}}>Line dysfunction → consult VAT · Consider Peds Surgery if continued dysfunction</div>
          </Card>

          <Card title="Hemodialysis / Primary Renal Indication" color={C.purple}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              → <strong>Consult Nephrology</strong><br/>
              Follow nephrology-directed evaluation and antibiotic selection
            </div>
          </Card>

          <Card title="Heme (Non-Onc/Non-BMT) — No Immunocompromise" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <em>e.g. hemophilia, thalassemia without immunosuppression</em>
            </div>
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <div style={{flex:1,background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>Isolated fever + well-appearing</div>
                <div style={{fontSize:11,marginTop:4}}>Vitals WNL · Tolerating feeds · No obvious source · No line-site infection</div>
                <div style={{fontSize:12,fontWeight:700,color:C.greenMid,marginTop:6}}>→ Empiric ceftriaxone + DISCHARGE</div>
                <div style={{fontSize:10,color:C.muted,marginTop:2}}>Notify PHO for clinic f/u</div>
              </div>
              <div style={{flex:1,background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.red}}>Ill appearance or concern for deterioration</div>
                <div style={{fontSize:12,fontWeight:700,color:C.red,marginTop:6}}>→ Admit to Hem/Onc + empiric abx</div>
              </div>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:8,background:"#f8fafc",border:`1px solid ${C.rule}`,borderRadius:6,padding:"8px"}}>
              <strong>If cultures positive after discharge</strong> (including coag-neg staph): contact Hem/Onc on call. During clinic hours → facilitate clinic f/u for repeat cultures. After hours → patient returns through ED.
            </div>
            <TeachBox id="hemeDischarge" teaching={teaching}/>
          </Card>

          <Card title="Heme (Non-Onc/Non-BMT) WITH Immunosuppression" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <em>Including mycophenolate, tacrolimus, sirolimus</em><br/><br/>
              → <strong>Admit to Hem/Onc + empiric antibiotics</strong><br/>
              Ceftriaxone if ANC &gt;500 · Cefepime if ANC &lt;500<br/>
              Assess for vancomycin and fluconazole indications
            </div>
          </Card>

          <Card title="Disposition — Key Rule" color={C.primary} defaultOpen={false}>
            <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="Admit All">
              ALL patients with indwelling CVC + fever/malaise/lethargy/vomiting should have cultures drawn AND be admitted for observation, regardless of whether empiric antibiotics are initiated.
            </Alert>
            <TeachBox id="disposition" teaching={teaching}/>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const rC="#9f1239",rBg="#fff1f2",rBd="#fda4af";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const bC="#1e40af",bBg="#eff6ff",bBd="#93c5fd";
            const pC="#6b21a8",pBg="#faf5ff",pBd="#c4b5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);

            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>CVC + fever/malaise/vomiting → cultures → branch by population</div>
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 340" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={340} fill="#fafaf8" rx={6}/>

                    <Box x={95} y={6} w={290} h={28} fill={rBg} stroke={rBd} sw={1.5} radius={14}>
                      <T x={240} y={18} size={9} weight={700} color={rC}>CVC + FEVER / MALAISE / VOMITING</T>
                      <T x={240} y={28} size={6} color={mC}>ESI II · Vitals · Sepsis Screen</T>
                    </Box>
                    <Arrow x1={240} y1={34} x2={240} y2={48}/>

                    <Box x={115} y={48} w={250} h={22} fill={bBg} stroke={bBd} sw={1.5}>
                      <T x={240} y={57} size={8} weight={700} color={bC}>CULTURES FROM ALL LUMENS</T>
                      <T x={240} y={66} size={6} color={mC}>CBC · CMP · Mg · Phos · Procalcitonin</T>
                    </Box>
                    <Arrow x1={240} y1={70} x2={240} y2={82}/>

                    <g transform="translate(240,96)">
                      <polygon points="0,-14 60,0 0,14 -60,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
                      <T x={0} y={-2} size={7} weight={700}>Sepsis?</T>
                      <T x={0} y={8} size={6} color={mC}>Shock screen</T>
                    </g>

                    <line x1={300} y1={96} x2={430} y2={96} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={430} y1={96} x2={430} y2={114} color={rC}/>
                    <Box x={388} y={114} w={84} h={22} fill={rBg} stroke={rBd} sw={2}>
                      <T x={430} y={124} size={8} weight={700} color={rC}>SEPSIS</T>
                      <T x={430} y={133} size={6} color={rC}>PATHWAY</T>
                    </Box>

                    <Arrow x1={240} y1={110} x2={240} y2={124}/>

                    <g transform="translate(240,140)">
                      <polygon points="0,-16 70,0 0,16 -70,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
                      <T x={0} y={-2} size={7} weight={700}>Patient Population?</T>
                    </g>

                    {/* Branches */}
                    <line x1={170} y1={140} x2={68} y2={140} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={68} y1={140} x2={68} y2={166} color={rC}/>
                    <Arrow x1={220} y1={154} x2={205} y2={166} color={aC}/>
                    <Arrow x1={260} y1={154} x2={320} y2={166} color={pC}/>
                    <line x1={310} y1={140} x2={430} y2={140} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={430} y1={140} x2={430} y2={166} color={aC}/>

                    {/* Intestinal Failure */}
                    <Box x={8} y={166} w={120} h={22} fill={rBg} stroke={rBd} sw={1.5}>
                      <T x={68} y={175} size={7} weight={700} color={rC}>INTESTINAL FAILURE</T>
                      <T x={68} y={184} size={6} color={mC}>Home TPN</T>
                    </Box>
                    <Arrow x1={68} y1={188} x2={68} y2={200} color={rC}/>
                    <Box x={8} y={200} w={120} h={28} fill={C.white} stroke={rBd}>
                      <T x={68} y={211} size={7} weight={600} color={rC}>Admit + Empiric Abx</T>
                      <T x={68} y={221} size={6} color={mC}>Gen Med · GI consult PRN</T>
                    </Box>

                    {/* Heme non-immunocompromised */}
                    <Box x={140} y={166} w={130} h={22} fill={aBg} stroke={aBd} sw={1.5}>
                      <T x={205} y={175} size={7} weight={700} color={aC}>HEME (NON-ONC)</T>
                      <T x={205} y={184} size={6} color={mC}>No immunosuppression</T>
                    </Box>
                    <Arrow x1={180} y1={188} x2={160} y2={204} color={gC}/>
                    <Arrow x1={230} y1={188} x2={250} y2={204} color={rC}/>
                    <Box x={130} y={204} w={64} h={30} fill={gBg} stroke={gBd}>
                      <T x={162} y={215} size={6} weight={700} color={gC}>Well + isolated</T>
                      <T x={162} y={224} size={6} weight={700} color={gC}>fever</T>
                      <T x={162} y={232} size={6}>Ceftri → D/C</T>
                    </Box>
                    <Box x={210} y={204} w={64} h={30} fill={rBg} stroke={rBd}>
                      <T x={242} y={215} size={6} weight={700} color={rC}>Ill or</T>
                      <T x={242} y={224} size={6} weight={700} color={rC}>concern</T>
                      <T x={242} y={232} size={6}>→ Admit</T>
                    </Box>

                    {/* Heme immunocompromised */}
                    <Box x={280} y={166} w={110} h={22} fill={pBg} stroke={pBd} sw={1.5}>
                      <T x={335} y={175} size={7} weight={700} color={pC}>HEME + IMMUNO-</T>
                      <T x={335} y={184} size={6} color={pC}>SUPPRESSION</T>
                    </Box>
                    <Arrow x1={335} y1={188} x2={335} y2={204} color={pC}/>
                    <Box x={280} y={204} w={110} h={28} fill={C.white} stroke={pBd}>
                      <T x={335} y={214} size={7} weight={600} color={pC}>Admit Hem/Onc</T>
                      <T x={335} y={224} size={6}>Ceftri (or cefep if ANC&lt;500)</T>
                    </Box>

                    {/* Renal */}
                    <Box x={396} y={166} w={76} h={22} fill={aBg} stroke={aBd} sw={1.5}>
                      <T x={434} y={175} size={7} weight={700} color={aC}>RENAL /</T>
                      <T x={434} y={184} size={6} color={aC}>DIALYSIS</T>
                    </Box>
                    <Arrow x1={434} y1={188} x2={434} y2={204} color={aC}/>
                    <Box x={396} y={204} w={76} h={22} fill={C.white} stroke={aBd}>
                      <T x={434} y={214} size={7} weight={600} color={aC}>Consult</T>
                      <T x={434} y={223} size={7} weight={600} color={aC}>Nephrology</T>
                    </Box>

                    {/* Common bottom */}
                    <Box x={8} y={250} w={464} h={28} fill="#fef2f2" stroke={rBd} sw={1.5} radius={8}>
                      <T x={240} y={262} size={8} weight={700} color={rC}>ALL PATIENTS: CULTURES + ADMIT FOR OBSERVATION</T>
                      <T x={240} y={272} size={6} color={mC}>(Exception: well-appearing non-immunocompromised heme → ceftriaxone + discharge)</T>
                    </Box>

                    {/* Vanc/Fluc box */}
                    <Box x={60} y={292} w={360} h={34} fill="#f1f5f9" stroke="#e2e8f0" radius={6}>
                      <T x={240} y={304} size={7} weight={700} color={rC}>ADD VANCOMYCIN IF:</T>
                      <T x={240} y={314} size={6} color={mC}>Ill appearance · MRSA hx/suspected · CNS concern · MRSA contact</T>
                      <T x={240} y={323} size={6} color={pC}>CONSIDER FLUCONAZOLE: fungal hx · broad-spectrum abx within 2mo</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── ANTIBIOTICS ── */}
      {tab==="meds"&&(
        <Pad>
          <Q text="Empiric Antibiotic Selection" sub={doses?`Calculated for ${doses.w} kg`:"Enter weight for calculations"}/>

          {!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above for calculations.</Alert>)}

          <Alert color={C.blue} border={C.blueBorder} bg={C.blueBg} icon="📋" title="Always Review Prior Cultures">
            Check culture results from the past 6 months and cover appropriately. Patients tend to have recurrent infections with the same organisms. Below are defaults when no prior data is available.
          </Alert>
          <TeachBox id="priorOrganisms" teaching={teaching}/>

          <Card title="Intestinal Failure / Home TPN — Fever, No Source" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="Ceftriaxone (50 mg/kg) IV" value={doses?doses.ceftri:"—"} unit={doses?"mg (max 2g)":""}/>
            </div>
          </Card>

          <Card title="Non-Oncology, Immunosuppressed — ANC >500" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="Ceftriaxone (50 mg/kg) IV" value={doses?doses.ceftri:"—"} unit={doses?"mg (max 2g)":""}/>
            </div>
          </Card>

          <Card title="Non-Oncology, Immunosuppressed — ANC <500" color={C.red}>
            <div style={{marginTop:8}}>
              <DoseRow label="Cefepime (50 mg/kg) IV" value={doses?doses.cefep:"—"} unit={doses?"mg (max 2g)":""}/>
            </div>
          </Card>

          <Card title="Non-Oncology, NOT Immunocompromised" color={C.greenMid}>
            <div style={{marginTop:8}}>
              <DoseRow label="Ceftriaxone (50 mg/kg) IV" value={doses?doses.ceftri:"—"} unit={doses?"mg (max 2g)":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>If well-appearing with isolated fever → may discharge after ceftriaxone</div>
            </div>
          </Card>

          <Card title="Add-On: Vancomycin" color={C.red}>
            <div style={{marginTop:8}}>
              <DoseRow label="Vancomycin (15 mg/kg) IV" value={doses?doses.vanco:"—"} unit={doses?"mg (max 3g)":""}/>
              <div style={{fontSize:12,lineHeight:1.6,marginTop:6}}>
                <strong>Indications:</strong><br/>
                • Ill appearance (Sepsis Pathway)<br/>
                • History of MRSA<br/>
                • Suspected MRSA infection (cellulitis, abscess)<br/>
                • Concern for CNS infection<br/>
                • Close contact with MRSA-positive person
              </div>
            </div>
            <TeachBox id="vancomycin" teaching={teaching}/>
          </Card>

          <Card title="Consider: Fluconazole" color={C.purple} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="Fluconazole (12 mg/kg) IV/PO" value={doses?doses.fluc:"—"} unit={doses?"mg (max 800)":""}/>
              <div style={{fontSize:12,lineHeight:1.6,marginTop:6}}>
                <strong>Indications:</strong><br/>
                • History of fungal infection<br/>
                • Broad-spectrum antibiotics within past 2 months
              </div>
            </div>
            <TeachBox id="fluconazole" teaching={teaching}/>
          </Card>

          <Card title="IV Fluids" color={C.primary} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="Crystalloid bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>As needed for resuscitation — initiate Sepsis Pathway if appropriate</div>
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DISPO & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Disposition, Special Considerations & References"/>

          <Card title="Disposition — Admit All (with one exception)" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>All CVC patients with systemic symptoms → cultures + admit for observation</strong><br/><br/>
              <strong>Exception:</strong> Non-oncology, non-immunocompromised heme patients (hemophilia, thalassemia) with isolated fever who are well-appearing → empiric ceftriaxone + discharge with PHO notification
            </div>
            <div style={{marginTop:8}}>
              <div style={{fontSize:12,fontWeight:600,color:C.muted,marginBottom:4}}>Admission Services:</div>
              <div style={{fontSize:12,lineHeight:1.6}}>
                Intestinal failure / TPN → General Medicine (Hood, Kaiser, FM)<br/>
                Heme patients → Hem/Onc<br/>
                Renal → per Nephrology<br/>
                Contact appropriate service + subspecialty consults as needed
              </div>
            </div>
            <TeachBox id="disposition" teaching={teaching}/>
          </Card>

          <Card title="Ethanol Lock Protocol" color={C.amberMid} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              If on ethanol lock and <strong>line does not draw → consult VAT</strong><br/>
              <strong style={{color:C.red}}>Do NOT flush</strong>
            </div>
            <TeachBox id="ethanolLock" teaching={teaching}/>
          </Card>

          <Card title="Post-Discharge Culture Follow-Up" color={C.blue} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              If cultures return positive after discharge (including coag-negative staph):<br/>
              → Contact Hem/Onc on call<br/>
              → During clinic hours: facilitate clinic f/u for repeat cultures<br/>
              → After hours: patient returns through ED for repeat cultures ± admission
            </div>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. DesJardin JA et al. Clinical utility of blood cultures drawn from indwelling CVCs in hospitalized patients with cancer. <em>Ann Intern Med</em> 1999; 131(9):641–7.<br/>
              2. Chesshyre E et al. Prevention, diagnosis and management of central venous line infections in children. <em>J Infection</em> 2015; 71(1):S59–S75.<br/>
              3. Eisenberg M et al. CLABSI among children with intestinal failure presenting to the ED with fever.<br/>
              4. Jabbour M et al. Best strategies to implement clinical pathways in an ED setting: study protocol for a cluster RCT. <em>Implement Sci</em> 2013; 8:55.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Central Line with Fever Clinical Pathway · July 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
