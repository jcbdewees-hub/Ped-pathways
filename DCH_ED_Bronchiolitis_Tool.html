const C={primary:"#1e40af",pLight:"#eff6ff",pBorder:"#93c5fd",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
overview:{title:"Bronchiolitis — Pathophysiology & Pathway Rationale",
patho:"Bronchiolitis is an acute infection of the lower respiratory tract causing inflammation and obstruction of the small airways (bronchioles). RSV accounts for ~70% of cases, with the remainder caused by rhinovirus, parainfluenza, human metapneumovirus, and adenovirus. The virus invades the bronchiolar epithelium, causing necrosis, ciliary destruction, and peribronchiolar inflammatory infiltration.\n\nThe resulting pathology is mechanical: epithelial debris, mucus plugging, and submucosal edema narrow the already-small infant airways. By Poiseuille's Law (R ∝ 1/r⁴), even 1 mm of mucosal edema in a 4 mm infant bronchiole reduces the effective lumen by 50% and increases resistance 16-fold. This drives the characteristic findings: tachypnea, wheezing, crackles, and air trapping.",
pearls:"Best practice is fewer interventions. The disease is self-limited and supportive care — suctioning, hydration, and oxygen — is the mainstay. Medications (bronchodilators, steroids, antibiotics) have not shown benefit and can cause harm or delay appropriate care.\n\n90% of children are infected with RSV in the first 2 years of life. Infection does not grant permanent immunity — reinfection is common. The typical age is under 2 years, with peak severity at 2–6 months when maternally-derived antibodies are waning and airways are smallest.",
evidence:"The AAP CPG (Ralston 2014) provides the foundation for this pathway, emphasizing supportive care and de-escalation of unnecessary interventions. Institutional adoption of evidence-based bronchiolitis pathways consistently reduces unnecessary diagnostics (CXR, viral testing), medication use, and length of stay without increasing adverse outcomes. (Ralston 2014, Pediatrics 134:e1474)"},
diagnosis:{title:"Diagnosis Is Clinical — No Routine Testing",
patho:"Bronchiolitis is a clinical syndrome, not a laboratory diagnosis. The viral infection produces a characteristic constellation: nasal discharge → cough → wheezing/crackles → tachypnea → feeding difficulty. The pathology is in the small airways (not the alveoli), so chest x-rays typically show hyperinflation and peribronchial thickening rather than focal consolidation.\n\nHigh fever (>39°C) in bronchiolitis is uncommon and should prompt evaluation for a secondary bacterial process (UTI, AOM, pneumonia) rather than assuming it's part of the viral illness.",
pearls:"Chest x-rays are actively discouraged — they frequently show subsegmental atelectasis that mimics pneumonia, leading to unnecessary antibiotic courses. Virology testing is recommended only if results will change treatment (e.g., antiviral therapy consideration) or for inpatient cohorting.\n\nApnea may be the presenting complaint in infants <3 months, even before any respiratory symptoms develop. This is thought to be a central mechanism (viral effect on brainstem respiratory centers) rather than obstructive.",
evidence:"Lab and radiologic studies do not improve outcomes and increase costs. CXR in bronchiolitis leads to antibiotic prescribing in up to 40% of cases where no bacterial infection exists, likely driven by misinterpretation of viral atelectasis as pneumonia. (Schuh 2007; Ralston 2014)"},
pbst:{title:"PBST — Standardizing Bronchiolitis Assessment",
patho:"The Pediatric Bronchiolitis Scoring Tool (PBST) aggregates five parameters: respiratory rate, accessory muscle use (flaring, intercostal retractions, substernal retractions, head bobbing), breath sounds, alertness, and dyspnea. Each captures a different aspect of respiratory compromise:\n\nRespiratory rate reflects the drive to maintain minute ventilation as tidal volume falls from airway obstruction. Accessory muscle use reflects the degree of negative intrathoracic pressure needed to overcome increased resistance. Diminished breath sounds are more concerning than wheezing — they indicate such severe obstruction that minimal air movement is occurring.",
pearls:"Always suction and reposition before scoring — a mucus-obstructed nasopharynx in an obligate nose-breather dramatically worsens the clinical picture and artificially inflates the score. Post-suction assessment is the true baseline.\n\nReclassification rules are asymmetric by design: two consecutive lower scores required to step down (prevents premature de-escalation) but a single higher score immediately steps up (catches deterioration fast). Scores: Mild ≤3, Moderate 4–7, Severe 8–14.",
evidence:"Standardized severity scoring tools improve inter-rater reliability and provide objective benchmarks for escalation and de-escalation decisions. The PBST drives assessment frequency: Mild → Q4H, Moderate → Q2H, Severe → Q1–2H. This tiered monitoring protocol reduces both over- and under-treatment. (DCH institutional validation)"},
albuterol:{title:"Bronchodilators — Why They Usually Don't Work",
patho:"The airway obstruction in bronchiolitis is fundamentally different from asthma. In asthma, the primary mechanism is smooth muscle bronchospasm — which is highly responsive to beta-2 agonists. In bronchiolitis, the obstruction is caused by epithelial debris, inflammatory infiltrate, and mucus plugging within the bronchiolar lumen. There is relatively little smooth muscle in the infant bronchiole to relax.\n\nAdditionally, infant airways have a higher proportion of mucus-secreting glands relative to airway diameter. Beta-2 agonists can paradoxically increase heart rate and metabolic demand without meaningfully improving airflow.",
pearls:"A one-time trial of albuterol within 12 hours of presentation is an option — but the bar for 'positive response' must be high. Both RN and MD should be at bedside before and after the trial with agreed-upon PBST scoring. Continue only if there is a documented decrease in RR and WOB.\n\nThe trial is most likely to show benefit in patients with a strong family history of atopy/asthma or in older infants (>12 months) where a reactive airway component may coexist with the viral bronchiolitis.",
evidence:"A Cochrane review (Gadomski 2014) found no significant improvement in oxygen saturation, hospitalization rate, or duration of illness with bronchodilator use in bronchiolitis. The AAP recommends against routine use. The one-time trial option represents a pragmatic compromise. (Gadomski 2014, Cochrane CD001266)"},
steroids:{title:"Corticosteroids — Not Recommended",
patho:"Unlike asthma, where eosinophilic inflammation and airway hyperresponsiveness respond dramatically to corticosteroids, bronchiolitis is driven by neutrophilic infiltration and direct viral cytopathic effect. The inflammatory pathway does not have the same steroid-responsive components (IL-4/IL-5/IgE axis is not the primary driver).\n\nThe edema in bronchiolitis is largely a consequence of direct epithelial injury and vascular leak, not the steroid-responsive vasodilation and permeability changes seen in allergic inflammation.",
pearls:"Neither inhaled nor systemic corticosteroids improve any meaningful outcome in bronchiolitis: no reduction in hospitalization, length of stay, or time to clinical improvement. The historical practice of prescribing steroids for 'wheezing' conflated bronchiolitis with asthma — they are mechanistically distinct diseases despite overlapping auscultatory findings.",
evidence:"Multiple large RCTs and meta-analyses consistently demonstrate no benefit of corticosteroids in acute bronchiolitis. The AAP specifically recommends against their use. Even the combination of dexamethasone + epinephrine (Plint 2009) showed modest benefit only in the outpatient setting and has not been adopted into standard practice. (Fernandes 2013, Cochrane; Ralston 2014 AAP)"},
hfnc:{title:"High-Flow Nasal Cannula — Mechanism & Application",
patho:"HFNC delivers heated, humidified air/oxygen at flow rates exceeding the patient's peak inspiratory flow. This creates several physiological benefits: (1) washout of nasopharyngeal dead space, improving alveolar ventilation efficiency; (2) delivery of a low level of continuous positive airway pressure (2–5 cmH₂O), providing a pneumatic splint to prevent small airway collapse during exhalation; (3) reduction of inspiratory resistance by meeting the patient's flow demand (the infant doesn't have to generate as much negative pressure to inhale).\n\nThe humidification prevents mucosal drying that exacerbates mucus plugging — a critical advantage over standard dry oxygen delivery.",
pearls:"Start at 1 L/kg/min and titrate up to the max of the cannula for moderate-to-severe bronchiolitis. The PICU threshold is ≥2 L/kg/min — above this, the patient requires ICU-level monitoring and care.\n\nBefore initiating HFNC for PBST 1–7, perform the HFNC Initiation Pause (HIP). Many infants with moderate bronchiolitis improve with simple interventions (suctioning, comfort measures, low-flow NC) and don't actually need HFNC. The HIP prevents unnecessary escalation.",
evidence:"The landmark PARIS trial (Franklin 2018, NEJM) demonstrated that HFNC significantly reduces treatment failure and need for ICU escalation compared to standard oxygen therapy in infants with bronchiolitis. The Kepreotes 2017 (Lancet) trial showed similar findings. HFNC is now considered standard of care for moderate-to-severe bronchiolitis. (Franklin 2018, NEJM 378:1121; Kepreotes 2017, Lancet 389:930)"},
oxygen:{title:"Oxygen Thresholds & Monitoring Philosophy",
patho:"Oxygen saturation in bronchiolitis fluctuates naturally — transient desaturations to the low 90s are common during sleep, feeding, and coughing episodes. The oxyhemoglobin dissociation curve means that at SpO₂ 90%, PaO₂ is approximately 60 mmHg — well above the threshold for tissue hypoxia in a previously healthy infant.\n\nContinuous pulse oximetry creates a 'monitoring artifact': it captures every brief desaturation, triggering alarms and interventions that prolong hospitalization without improving outcomes.",
pearls:"Supplemental O₂ is indicated only if saturations fall persistently below 90% in previously healthy infants. The key word is 'persistently' — brief dips during sleep or feeding are expected and do not require intervention.\n\nContinuous pulse oximetry is NOT necessary for all patients. Use spot-checks for mild disease. Reserve continuous monitoring for patients with SpO₂ <92%, concern for apnea, or those on supplemental O₂. Over-monitoring drives over-treatment.",
evidence:"Principi 2016 (JAMA Pediatr) demonstrated that intermittent oxygen desaturations in discharged bronchiolitis patients did not increase subsequent medical visits or adverse outcomes. The AAP recommends an SpO₂ threshold of 90% rather than the previously used 94–95%, which led to unnecessary oxygen therapy and prolonged hospitalizations. (Principi 2016, JAMA Pediatr 170:602; Ralston 2014)"},
hydration:{title:"Hydration — Enteral Is Always Preferred",
patho:"Tachypnea increases insensible water loss through the respiratory tract. Combined with decreased oral intake (dyspnea makes feeding difficult and unsafe — aspiration risk increases when respiratory rate exceeds 60–70), infants with moderate-to-severe bronchiolitis are at significant risk for dehydration.\n\nHowever, the dehydration is usually mild-to-moderate. Aggressive IV hydration is rarely needed and carries its own risks — including iatrogenic hyponatremia from SIADH, which occurs in a subset of bronchiolitis patients.",
pearls:"Encourage oral rehydration first — always. Small, frequent feeds with pacing (allowing the infant to pause and breathe between sucks) are often tolerated even in moderate disease. NG feeds are the next step before IV — they maintain gut integrity and are more physiologic.\n\nNS bolus 20 mL/kg only if moderate-to-severe dehydration or if RR >60 with inability to feed. The goal is euvolemia, not fluid loading.",
evidence:"The AAP emphasizes enteral hydration as the preferred route. There is no evidence that IV fluids improve outcomes compared to NG feeds in bronchiolitis patients who cannot tolerate oral intake. NG feeding protocols reduce IV line placement and associated complications. (Oakley 2013; Ralston 2014)"},
discharge:{title:"Discharge Readiness — The Sleep Test",
patho:"Bronchiolitis follows a predictable clinical trajectory: symptoms typically peak on days 3–5 of illness, with the worst period often occurring at night (supine positioning, decreased arousal, decreased mucociliary clearance). A patient who appears stable during daytime assessment may deteriorate significantly during the first sleep period.\n\nThe requirement for post-oxygen observation through a sleep period reflects this pathophysiology — if the infant can maintain SpO₂ >92% during sleep without supplemental O₂, they are past the critical risk window.",
pearls:"Discharge criteria: SpO₂ >92% on room air, including through a sleep period if O₂ was required. If supplemental oxygen was needed, observe 8–12 hours after discontinuation.\n\nInfants <3 months must demonstrate they can clear secretions with a bulb syringe (not wall suction) and feed without desaturation before discharge. If wall suction was required, observe through at least one feeding AND one sleep period. This is because parents cannot provide wall suction at home — the infant must be manageable with home-level interventions.",
evidence:"Structured discharge criteria including a period of sleep observation reduce 72-hour return rates and unplanned readmissions. The bulb-suction requirement for young infants is a practical safety check — it confirms the family can manage the infant's secretion burden with tools available at home. (Ralston 2014; DCH institutional protocol)"},
riskfactors:{title:"Risk Factors — Who Gets Sicker",
patho:"Several populations are at higher risk for severe bronchiolitis. Premature infants (<35 weeks) have smaller airways, less developed airway cartilage (more prone to collapse), and diminished surfactant production in the distal airways. Infants with congenital heart disease may not tolerate the increased RV afterload from hypoxic pulmonary vasoconstriction. Those with chronic lung disease (BPD) have baseline airway inflammation and reduced pulmonary reserve.\n\nInfants <3 months are at particular risk for apnea, which is thought to be centrally mediated — RSV may directly affect brainstem respiratory centers, causing apneic episodes before significant lower airway disease develops.",
pearls:"Age <3 months is the most important risk factor in clinical decision-making. These infants have the smallest airways, the highest risk of apnea, and the least physiologic reserve. They are NOT appropriate for ED observation units and should have a low threshold for admission.\n\nFormer premature infants (32–37 weeks) may be included in the pathway but expect a longer and more severe course. They are at higher risk for apnea and should be considered for admission or longer observation periods.",
evidence:"Gestational age <35 weeks, age <3 months, and congenital heart disease are the most consistently identified risk factors for severe bronchiolitis across large multicenter cohorts. These factors predict ICU admission, need for mechanical ventilation, and prolonged hospitalization. (Hasegawa 2013; Ralston 2014)"},
discouraged:{title:"Discouraged Therapies — Why They Don't Work",
pearls:"The following should NOT be used in routine bronchiolitis management: racemic epinephrine (no sustained benefit after initial response wears off), corticosteroids (wrong inflammatory pathway), antibiotics (viral disease), montelukast (leukotriene pathway is not the primary driver), and chest physiotherapy (no evidence of benefit, causes distress).\n\nMist therapy / saline nebulizers are also not recommended — there is no evidence that cool mist or heated mist improves outcomes, and nebulizers add noxious stimuli to an already distressed infant.",
evidence:"Each of these therapies has been evaluated in multiple RCTs and meta-analyses with no demonstrated benefit in acute bronchiolitis. The AAP recommends against their routine use. Hypertonic saline nebs showed initial promise but a definitive RCT (Jacobs 2014, Pediatrics 133:e8) demonstrated no benefit in the ED setting. (Gadomski 2014; Fernandes 2013; Ralston 2014)"},
hip:{title:"HFNC Initiation Pause (HIP) — Avoiding Unnecessary Escalation",
patho:"The HIP protocol is based on the observation that many infants with moderate bronchiolitis who appear to need HFNC actually improve with optimized supportive care. The 'apparent severity' at initial assessment is often driven by reversible factors: nasal obstruction (obligate nose-breathers struggling with mucus), hunger/discomfort (a crying infant has dramatically increased WOB), fever (drives tachypnea and tachycardia independent of respiratory disease), and positioning.\n\nBy systematically addressing each of these factors before initiating HFNC, the HIP protocol separates true respiratory failure from reversible distress.",
pearls:"The HIP checklist: (1) suction, (2) attempt feed or sucrose on pacifier, (3) parent holding with dim lights, (4) antipyretic, (5) address hydration, (6) trial of low-flow NC if SpO₂ <92%. Then RN/LIP huddle at 20–30 min.\n\nHIP PASS → remain on room air or low-flow NC. HIP FAIL → start HFNC, re-huddle 2 hours after initiation to assess for improvement. Document the HIP outcome — this creates an audit trail showing HFNC was appropriately indicated.",
evidence:"Institutional data show that HIP protocols reduce unnecessary HFNC initiation by 20–30% without increasing adverse outcomes. This avoids the cascade of HFNC → admission → prolonged monitoring that drives bronchiolitis length of stay. (DCH institutional protocol; Weiler 2020)"},
};

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,bolus:Math.round(wt*20),hfncStart:Math.round(wt*1*10)/10,hfncMax:Math.round(wt*2*10)/10,apapPO:Math.round(wt*15),apapPR:Math.round(wt*15),ibuPO:Math.round(wt*10),albuterol:wt<10?"2.5":"5"};}

function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Bronchiolitis</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · October 2021</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function DoseRow({label,value,unit}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit||""}</span></div>)}
function TeachBox({id,teaching}){var s=useState("pearls"),tab=s[0],setTab=s[1];if(!teaching||!TEACH[id])return null;var t=TEACH[id];if(t.content&&!t.patho&&!t.pearls&&!t.evidence){return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:"4px solid "+C.teal}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t.content}</div></div>);}var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;var activeTab=tab;if(!t[activeTab])activeTab=tabs[0].key;return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden"}}><div style={{background:"#ccfbf1",padding:"8px 12px",borderBottom:"1px solid "+C.tealBorder,display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13,fontWeight:700,color:C.teal}}>📖 {t.title}</span></div>{tabs.length>1&&(<div style={{display:"flex",background:C.white,borderBottom:"1px solid "+C.rule}}>{tabs.map(function(tb){var act=activeTab===tb.key;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{flex:1,padding:"8px 0",background:act?C.tealBg:"#f8fafc",border:"none",borderBottom:act?"2.5px solid "+C.teal:"2.5px solid transparent",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted}}>{tb.label}</button>)})}</div>)}<div style={{padding:"12px 14px",fontSize:12,lineHeight:1.65,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeTab]}</div></div>);}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}

function PBSTCalculator({onScore,teaching}){
  var s1=useState(null),rr=s1[0],setRR=s1[1];
  var s2=useState([]),acc=s2[0],setAcc=s2[1];
  var s3=useState(null),bs=s3[0],setBS=s3[1];
  var s4=useState(null),alert=s4[0],setAlert=s4[1];
  var s5=useState(null),dysp=s5[0],setDysp=s5[1];

  var total=(rr||0)+acc.reduce(function(s,v){return s+v},0)+(bs||0)+(alert||0)+(dysp||0);
  var severity=total<=3?"mild":total<=7?"moderate":"severe";
  var sevColor=severity==="mild"?C.greenMid:severity==="moderate"?C.amberMid:C.red;
  var sevBg=severity==="mild"?C.greenBg:severity==="moderate"?C.amberBg:C.redBg;
  var sevBorder=severity==="mild"?C.greenBorder:severity==="moderate"?C.amberBorder:C.redBorder;

  function toggleAcc(pts){setAcc(function(p){return p.includes(pts)?p.filter(function(x){return x!==pts}):[].concat(p,[pts])});}

  return(<div>
    <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:8}}>Respiratory Rate</div>
    {PBST_ITEMS[0].options.map(function(o,i){return <WizBtn key={i} label={o.label} sub={o.sub} color={C.primary} bg={C.pLight} border={C.pBorder} selected={rr===o.pts} onClick={function(){setRR(o.pts)}}/>})}

    <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:8,marginTop:12}}>Accessory Muscle Use <span style={{fontSize:11,fontWeight:400,color:C.muted}}>(select all that apply — 1 pt each)</span></div>
    {PBST_ITEMS[1].options.slice(1).map(function(o,i){
      var sel=acc.includes(i+1);
      return <button key={i} onClick={function(){toggleAcc(i+1)}} style={{display:"block",width:"100%",textAlign:"left",background:sel?C.pLight:C.white,border:"2px solid "+(sel?C.primary:C.rule),borderRadius:10,padding:"10px 14px",marginBottom:6,cursor:"pointer"}}><div style={{fontSize:13,fontWeight:sel?700:400,color:sel?C.primary:C.ink}}>{o.label}</div></button>
    })}
    {acc.length===0&&<div style={{fontSize:12,color:C.muted,marginBottom:6,fontStyle:"italic"}}>None selected = 0 points</div>}

    <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:8,marginTop:12}}>Breath Sounds</div>
    {PBST_ITEMS[2].options.map(function(o,i){return <WizBtn key={i} label={o.label} color={C.primary} bg={C.pLight} border={C.pBorder} selected={bs===o.pts} onClick={function(){setBS(o.pts)}}/>})}

    <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:8,marginTop:12}}>Alertness</div>
    {PBST_ITEMS[3].options.map(function(o,i){return <WizBtn key={i} label={o.label} color={C.primary} bg={C.pLight} border={C.pBorder} selected={alert===o.pts} onClick={function(){setAlert(o.pts)}}/>})}

    <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:8,marginTop:12}}>Dyspnea</div>
    {PBST_ITEMS[4].options.map(function(o,i){return <WizBtn key={i} label={o.label} color={C.primary} bg={C.pLight} border={C.pBorder} selected={dysp===o.pts} onClick={function(){setDysp(o.pts)}}/>})}

    <div style={{background:sevBg,border:"2px solid "+sevColor,borderRadius:10,padding:"14px",marginTop:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div>
        <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.04em"}}>PBST Total</div>
        <div style={{fontSize:28,fontWeight:700,color:sevColor,fontFamily:"'IBM Plex Mono',monospace"}}>{total}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{background:sevColor,color:C.white,padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:700}}>{severity==="mild"?"Mild (≤3)":severity==="moderate"?"Moderate (4–7)":"Severe (8–14)"}</div>
        {onScore&&<button onClick={function(){onScore(total,severity)}} style={{marginTop:6,background:C.primary,color:C.white,border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Score → Next Step</button>}
      </div>
    </div>
    <TeachBox id="pbst" teaching={teaching}/>
  </div>);
}

// ═══════════════════════════════
// WALK-THROUGH WIZARD
// ═══════════════════════════════
function Wizard({teaching,weightKg,ageMo,doses}){
  var s1=useState(null),excl=s1[0],setExcl=s1[1];
  var s2=useState(false),scored=s2[0],setScored=s2[1];
  var s3=useState(null),severity=s3[0],setSeverity=s3[1];
  var s4=useState(null),pbstTotal=s4[0],setPbstTotal=s4[1];
  var s5=useState(null),spo2=s5[0],setSpo2=s5[1];
  var s6=useState(null),poTrial=s6[0],setPoTrial=s6[1];
  var s7=useState(null),hipResult=s7[0],setHipResult=s7[1];
  var s8=useState(null),hfncLevel=s8[0],setHfncLevel=s8[1];
  var s9=useState(null),albuTrial=s9[0],setAlbuTrial=s9[1];
  var s10=useState(null),deterior=s10[0],setDeterior=s10[1];

  function handleScore(total,sev){setPbstTotal(total);setSeverity(sev);setScored(true);}

  function reset(){setExcl(null);setScored(false);setSeverity(null);setPbstTotal(null);setSpo2(null);setPoTrial(null);setHipResult(null);setHfncLevel(null);setAlbuTrial(null);setDeterior(null);}

  return(<Pad>
    <Q text="Walk-Through" sub="Answer each question to get a patient-specific recommendation"/>
    <TeachBox id="overview" teaching={teaching}/>

    {/* STEP 1: Exclusion */}
    <Card title="Step 1 — Inclusion Check" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>
        <strong>Does the patient meet inclusion criteria?</strong><br/>
        <span style={{fontSize:12,color:C.muted}}>Age ≤2 years with viral respiratory symptoms (rhinorrhea, fever, cough, wheezing, difficulty feeding)</span>
      </div>
      <WizBtn label="Yes — On Pathway" sub="≤2 years, viral respiratory illness, no exclusions" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={excl==="no"} onClick={function(){setExcl("no")}}/>
      <WizBtn label="Excluded — Off Pathway" sub="Cardiac disease · Chronic lung disease / home O₂ · Airway abnormalities · Immunodeficiency · Apnea · Born <32 weeks · Neuromuscular disease" color={C.red} bg={C.redBg} border={C.redBorder} selected={excl==="yes"} onClick={function(){setExcl("yes")}}/>
      {excl==="yes"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚠️" title="Off Pathway">This patient has exclusion criteria. Manage individually — this tool does not apply.</Alert>}
    </Card>

    {/* STEP 2: PBST Score */}
    {excl==="no"&&(<Card title="Step 2 — PBST Score" color={C.primary}>
      <div style={{fontSize:13,marginBottom:10}}><strong>Suction and reposition patient, then score using the PBST.</strong></div>
      <PBSTCalculator onScore={handleScore} teaching={teaching}/>
    </Card>)}

    {/* STEP 3: SpO₂ check */}
    {excl==="no"&&scored&&(<Card title="Step 3 — Oxygen Saturation" color={severity==="severe"?C.red:C.primary}>
      <div style={{fontSize:13,marginBottom:10}}><strong>Current room-air SpO₂?</strong></div>
      <WizBtn label="SpO₂ >94%" sub="Supportive care — no continuous monitoring needed" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={spo2==="high"} onClick={function(){setSpo2("high")}}/>
      <WizBtn label="SpO₂ 90–94%" sub="Supportive care · Ongoing assessment · May require observation" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={spo2==="mid"} onClick={function(){setSpo2("mid")}}/>
      <WizBtn label="SpO₂ <90%" sub="Supplemental O₂ required · Usually requires hospitalization" color={C.red} bg={C.redBg} border={C.redBorder} selected={spo2==="low"} onClick={function(){setSpo2("low")}}/>
      <TeachBox id="oxygen" teaching={teaching}/>

      {spo2==="low"&&(<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Hypoxemia — Supplemental O₂">
        Start low-flow O₂ to maintain SpO₂ ≥92%<br/>
        Continuous pulse oximetry<br/>
        IV access — NS bolus {doses?doses.bolus+" mL":"20 mL/kg"} if indicated<br/>
        {severity==="severe"&&<><strong>HFNC</strong> at {doses?doses.hfncStart+" L/min":"1 L/kg/min"} (max {doses?doses.hfncMax+" L/min":"2 L/kg/min"} for ward; above → PICU)<br/></>}
        <strong>→ Plan admission</strong> · Consider PICU consult if worsening
      </Alert>)}
    </Card>)}

    {/* MILD pathway */}
    {excl==="no"&&scored&&severity==="mild"&&spo2&&spo2!=="low"&&(<Card title="Step 4 — Mild Bronchiolitis Management" color={C.greenMid}>
      <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>
        <strong>PBST ≤3 — Mild disease</strong><br/>
        Q4H assessments PRN · Nasal suction (bulb syringe first) · No continuous monitoring unless concern for apnea or on O₂
      </div>
      <div style={{fontSize:13,marginBottom:10}}><strong>PO trial — can patient maintain oral intake?</strong></div>
      <WizBtn label="Yes — tolerating PO" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={poTrial==="yes"} onClick={function(){setPoTrial("yes")}}/>
      <WizBtn label="No — unable to tolerate PO" sub="Consider observation, NG feeds, or IV fluids" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={poTrial==="no"} onClick={function(){setPoTrial("no")}}/>

      {poTrial==="yes"&&(<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Consider Discharge">
        SpO₂ adequate · PO tolerated · Mild PBST<br/>
        {parseInt(ageMo||"99")<3&&<><strong style={{color:C.red}}>⚠ Age {'<'}3 months — high apnea risk.</strong> Consider admission or prolonged observation.<br/></>}
        <strong>Discharge teaching:</strong> bulb suction, hydration, pacing feeds, hand hygiene<br/>
        Attempt suctioning with manual device before discharge<br/>
        <strong>If unable to clear with bulb suction → observe through one feeding + one sleep period</strong><br/>
        Return if: worsening breathing, poor feeding, lethargy, color change
      </Alert>)}

      {poTrial==="no"&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚠️" title="Observation / Admit">
        Unable to maintain PO intake<br/>
        Consider NG feeds or IV maintenance fluids<br/>
        NS bolus {doses?doses.bolus+" mL":"20 mL/kg"} if dehydrated<br/>
        Continue Q4H PBST · Observe through feeding and sleep period
      </Alert>)}
      <TeachBox id="discharge" teaching={teaching}/>
    </Card>)}

    {/* MODERATE pathway */}
    {excl==="no"&&scored&&severity==="moderate"&&spo2&&(<Card title="Step 4 — Moderate Bronchiolitis Management" color={C.amberMid}>
      <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>
        <strong>PBST 4–7 — Moderate disease</strong><br/>
        At least Q2H assessments · Nasal suction (wall suction if clinically indicated)<br/>
        Consider PO vs NG feeds per feeding algorithm<br/>
        {spo2==="low"&&<strong style={{color:C.red}}>SpO₂ {'<'}90% — supplemental O₂ in progress</strong>}
      </div>

      <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>Consider HFNC? → Perform HIP first (PBST 1–7)</div>
      <TeachBox id="hip" teaching={teaching}/>

      <div style={{fontSize:13,marginBottom:10}}><strong>HIP result after 20–30 min reassessment?</strong></div>
      <WizBtn label="HIP PASS — Stabilized or improved" sub="Remain on RA/low-flow NC · Continue routine care" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={hipResult==="pass"} onClick={function(){setHipResult("pass")}}/>
      <WizBtn label="HIP FAIL — Not improved" sub="Start HFNC · Re-huddle 2 hours after initiation" color={C.red} bg={C.redBg} border={C.redBorder} selected={hipResult==="fail"} onClick={function(){setHipResult("fail")}}/>
      <WizBtn label="Not applicable — no HFNC considered" sub="Continue observation" color={C.blue} bg={C.blueBg} border={C.blueBorder} selected={hipResult==="na"} onClick={function(){setHipResult("na")}}/>

      {hipResult==="pass"&&(<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="HIP PASS">
        Remain on room air or low-flow NC<br/>
        Continue routine care · Reassess per PBST protocol<br/>
        Consider admission vs continued ED observation
      </Alert>)}

      {hipResult==="fail"&&(<div>
        <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="HIP FAIL — Start HFNC">
          <strong>HFNC</strong> at {doses?doses.hfncStart+" L/min":"1 L/kg/min"} · Can increase to max of cannula<br/>
          Re-huddle 2 hours after initiation to assess improvement<br/>
          <strong>→ Admit</strong>
        </Alert>
        <div style={{fontSize:13,marginBottom:10,marginTop:8}}><strong>HFNC flow rate?</strong></div>
        <WizBtn label="HFNC <2 L/kg/min" sub="Admit to Pediatric Ward" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={hfncLevel==="ward"} onClick={function(){setHfncLevel("ward")}}/>
        <WizBtn label="HFNC ≥2 L/kg/min" sub="Must admit to PICU" color={C.red} bg={C.redBg} border={C.redBorder} selected={hfncLevel==="picu"} onClick={function(){setHfncLevel("picu")}}/>
        {hfncLevel==="picu"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="PICU Admission Required">HFNC ≥2 L/kg/min requires PICU level care.</Alert>}
      </div>)}

      {hipResult==="na"&&(<Alert color={C.blue} border={C.blueBorder} bg={C.blueBg} icon="👁" title="Continue Observation">
        Moderate bronchiolitis without HFNC need<br/>
        Continue Q2H PBST · Support hydration (PO vs NG)<br/>
        Consider admission vs observation based on trajectory
      </Alert>)}
      <TeachBox id="hfnc" teaching={teaching}/>
    </Card>)}

    {/* SEVERE pathway */}
    {excl==="no"&&scored&&severity==="severe"&&spo2&&(<Card title="Step 4 — Severe Bronchiolitis Management" color={C.red}>
      <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>
        <strong>PBST 8–14 — Severe disease</strong><br/>
        Q1–2H assessments · Continuous pulse oximetry<br/>
        IV fluid bolus {doses?doses.bolus+" mL":"20 mL/kg"}<br/>
        Consider CXR
      </div>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="Severe Bronchiolitis — Escalation">
        <strong>HFNC</strong> at {doses?doses.hfncStart+" L/min":"1 L/kg/min"} — increase to max of cannula as needed<br/>
        IV access · NS bolus {doses?doses.bolus+" mL":"20 mL/kg"}<br/>
        Continuous pulse oximetry · Consider CXR<br/>
        {doses&&<><strong>Albuterol trial:</strong> {doses.albuterol} mg neb × 1 (only if high-risk history or severe distress)<br/></>}
        {!doses&&<><strong>Albuterol trial:</strong> 2.5 mg ({'<'}10 kg) or 5 mg (≥10 kg) neb × 1 (only if high-risk history or severe distress)<br/></>}
        <strong>If HFNC ≥2 L/kg/min → PICU</strong><br/>
        <strong>→ Admit (Ward vs PICU based on HFNC needs and clinical trajectory)</strong>
      </Alert>

      <div style={{fontSize:13,marginTop:8,marginBottom:10}}><strong>Signs of clinical deterioration?</strong></div>
      <WizBtn label="Yes — Deteriorating" sub="Lethargy · Very high/low RR · Poor perfusion · Worsening hypoxia" color={C.red} bg={C.redBg} border={C.redBorder} selected={deterior==="yes"} onClick={function(){setDeterior("yes")}}/>
      <WizBtn label="No — Stable on current support" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={deterior==="no"} onClick={function(){setDeterior("no")}}/>

      {deterior==="yes"&&(<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="PICU Consultation">
        Failure to maintain SpO₂ {'>'}90% with increasing O₂<br/>
        Deteriorating respiratory status with signs of exhaustion<br/>
        Recurrent apnea<br/>
        <strong>→ PICU admission</strong>
      </Alert>)}

      {deterior==="no"&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🟡" title="Admit — Continue Monitoring">
        Continue HFNC · Q1–2H PBST scoring<br/>
        Admit to ward if HFNC {'<'}2 L/kg/min · PICU if ≥2 L/kg/min<br/>
        Reassess for improvement or escalation
      </Alert>)}

      <TeachBox id="hfnc" teaching={teaching}/>
      <TeachBox id="riskfactors" teaching={teaching}/>
    </Card>)}

    {/* Albuterol trial section — available for moderate and severe */}
    {excl==="no"&&scored&&(severity==="moderate"||severity==="severe")&&spo2&&(<Card title="Optional — Albuterol Trial" color={C.purple} defaultOpen={false}>
      <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>
        A <strong>one-time trial</strong> of albuterol within 12 hours of presentation is an option.<br/>
        RN and MD must be at bedside before and after with agreed PBST scoring to determine clinical response.<br/>
        <strong>Continue only if documented positive response</strong> (decreased RR/WOB).
      </div>
      <div style={{fontSize:13,marginBottom:10}}><strong>Was albuterol trialed?</strong></div>
      <WizBtn label="Not trialed" color={C.muted} bg={C.white} border={C.rule} selected={albuTrial==="none"} onClick={function(){setAlbuTrial("none")}}/>
      <WizBtn label="Trialed — Positive response" sub="Documented decrease in RR/WOB → may continue" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={albuTrial==="positive"} onClick={function(){setAlbuTrial("positive")}}/>
      <WizBtn label="Trialed — No response" sub="Discontinue — do not repeat" color={C.red} bg={C.redBg} border={C.redBorder} selected={albuTrial==="negative"} onClick={function(){setAlbuTrial("negative")}}/>
      {albuTrial==="positive"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Positive Response">Documented improvement in PBST — may continue albuterol.</Alert>}
      {albuTrial==="negative"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="No Response">Discontinue albuterol. Do not repeat. Return to supportive care.</Alert>}
      <TeachBox id="albuterol" teaching={teaching}/>
    </Card>)}

    {/* RESET */}
    {(excl!==null)&&(<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>)}

    <PathwayFlowchart/>
  </Pad>);
}


// ═══════════════════════════════

// ═══════════════════════════════
function RefTriage({teaching}){return(<Pad>
<Q text="Triage & Initial Assessment" sub="Age ≤2 years with viral respiratory symptoms"/>
<TeachBox id="overview" teaching={teaching}/>
<Card title="Inclusion / Exclusion" color={C.primary}><div style={{marginTop:8}}><Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Age ≤2 years with viral respiratory symptoms including rhinorrhea, fever, cough, wheezing, and difficulty feeding.</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Cardiac disease · Chronic lung disease and/or home oxygen · Anatomic airway abnormalities · Immunodeficiency · Apnea · Born {'<'}32 weeks gestation · Neuromuscular disease</Alert><div style={{fontSize:12,color:C.muted,marginTop:4}}>*Former premature infants (32–37 wk) may be included but expect longer/more severe course. Higher apnea risk — consider admission or longer observation.</div></div></Card>
<Card title="Initiate on Arrival" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}><strong>ESI Triage Level I, II, or III</strong><br/>Initiate <strong>eye protection, droplet and contact isolation</strong><br/>Full set of vitals<br/>Document hydration, <strong>PBST score</strong>, and work of breathing<br/>Evaluate need for positioning and <strong>nasal suctioning</strong><br/>Continuous pulse oximetry if initial SpO₂ {'<'}92% — re-evaluate need as condition warrants<br/>Low-flow O₂ to maintain SpO₂ ≥92%<br/>Document and complete elements of <strong>HFNC Initiation Pause (HIP)</strong> prior to initiation of HFNC<br/>LMX to extremity for IV start if moderate-to-severe dehydration, RR {'>'}60, or severe PBST</div><TeachBox id="diagnosis" teaching={teaching}/></Card>
<Card title="Diagnostics" color={C.blue}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>Virology tests:</strong> recommended only if results will change treatment or for inpatient cohorting<br/><strong>Chest radiograph:</strong> NOT routinely encouraged — consider if patient requires admission or severely ill<br/><strong>Lab work:</strong> NOT routinely indicated — bronchiolitis is a clinical diagnosis<br/><span style={{fontSize:12,color:C.muted}}>High fever ({'>'}39°C) warrants careful evaluation for other causes. Increased RR should arouse suspicion of lower respiratory tract infection.</span></div><TeachBox id="diagnosis" teaching={teaching}/></Card>
<Card title="Risk Factors for Severe Disease" color={C.red}><div style={{marginTop:8}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{["Age <3 months","Born <35 weeks gestation","Congenital heart disease","Chronic lung disease","Exposure to secondhand smoke","Immunodeficiency"].map(function(r){return <div key={r} style={{background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:500}}>{r}</div>})}</div><div style={{fontSize:12,color:C.muted,marginTop:8}}>Infants {'<'}2 months: high risk of apnea — consider admission/transfer/prolonged observation</div></div><TeachBox id="riskfactors" teaching={teaching}/></Card>
</Pad>)}

function RefDecisions({teaching,doses}){return(<Pad>
<Q text="Decision Tree" sub="Driven by PBST score, SpO₂, and clinical trajectory"/>
<Card title="PBST ≤3 — Mild" color={C.greenMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Q4H assessments PRN<br/>Nasal suction — attempt bulb suction first<br/>No continuous monitoring (unless concern for apnea or on O₂)<br/><strong>PO trial</strong><br/><strong>Consider discharge</strong> if SpO₂ {'>'}92%, tolerating PO, can clear secretions</div><TeachBox id="discharge" teaching={teaching}/></Card>
<Card title="PBST 4–7 — Moderate" color={C.amberMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>At least <strong>Q2H assessments</strong><br/>Nasal suction — use wall suction if clinically indicated<br/>Consider PO vs NG feeds per feeding algorithm<br/><strong>If considering HFNC → perform HIP first</strong><br/>Consider admission vs observation</div><TeachBox id="hydration" teaching={teaching}/></Card>
<Card title="PBST 8–14 — Severe" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>Q1–2H assessments</strong><br/>Continuous pulse oximetry<br/>Nasal suction<br/>IV fluid bolus {doses?doses.bolus+" mL":"20 mL/kg"}<br/>Consider CXR<br/><strong>HFNC</strong> — start at {doses?doses.hfncStart+" L/min":"1 L/kg/min"}, increase to max of cannula<br/>Consider one-time albuterol trial if high-risk history or severe distress</div></Card>
<Card title="HFNC Initiation Pause (HIP)" color={C.purple}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Before starting HFNC for PBST 1–7:<br/><div style={{paddingLeft:12,marginTop:4}}>1. Nasal suctioning<br/>2. Attempt feed if safe for PO (or sucrose on pacifier)<br/>3. Encourage parent to hold patient, dim lights<br/>4. Administer antipyretic for comfort<br/>5. Address hydration needs, consider bolus PRN<br/>6. Consider low-flow NC (for SpO₂ {'<'}92% and/or increased WOB)</div><div style={{marginTop:8}}><strong>RN/LIP huddle after 20–30 min</strong> to reassess</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}><div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>HIP PASS</div><div style={{fontSize:12,marginTop:2}}>Remain on RA/low-flow NC · Continue routine care · Reassess per PBST</div></div><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>HIP FAIL</div><div style={{fontSize:12,marginTop:2}}>Start HFNC · Re-huddle 2 hours after initiation · Assess for improvement</div></div></div></div><TeachBox id="hip" teaching={teaching}/></Card>
<Card title="Escalation & PICU Criteria" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>HFNC ≥2 L/kg/min → must admit to PICU</strong><br/>Consider PICU consult for:<br/><div style={{paddingLeft:12}}>• Failure to maintain SpO₂ {'>'}90% with increasing O₂<br/>• Deteriorating respiratory status with signs of exhaustion<br/>• Recurrent apnea<br/>• PBST score 8–14 (severe)</div></div></Card>
<Card title="Discouraged Therapies" color={C.muted}><div style={{marginTop:8}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>{["Racemic epinephrine","Corticosteroids (inhaled or systemic)","Antibiotics","Montelukast","Chest physiotherapy"].map(function(r){return <div key={r} style={{background:"#fef2f2",border:"1px solid "+C.redBorder,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:500,color:C.red}}>✘ {r}</div>})}</div></div><TeachBox id="discouraged" teaching={teaching}/></Card>
<PathwayFlowchart/>
</Pad>)}

function RefMeds({teaching,doses}){return(<Pad>
<Q text="Medications & Dosing" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/>
{!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight in the bar above.</Alert>)}
<Card title="Supportive — Fluids" color={C.primary}><div style={{marginTop:8}}><DoseRow label="NS bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/><div style={{fontSize:12,color:C.muted,marginTop:6}}>Encourage oral rehydration prior to IV. If unable to tolerate ORT → NS bolus. Consider NG feeds for moderate bronchiolitis.</div></div><TeachBox id="hydration" teaching={teaching}/></Card>
<Card title="Respiratory Support — HFNC" color={C.primary}><div style={{marginTop:8}}><DoseRow label="HFNC start (1 L/kg/min)" value={doses?doses.hfncStart:"—"} unit={doses?"L/min":""}/><DoseRow label="HFNC PICU threshold (2 L/kg/min)" value={doses?doses.hfncMax:"—"} unit={doses?"L/min":""}/><div style={{fontSize:12,color:C.muted,marginTop:6}}>Start at 1 L/kg/min. May increase to max of cannula. If ≥2 L/kg/min → PICU admission required.</div></div><TeachBox id="hfnc" teaching={teaching}/></Card>
<Card title="Albuterol — One-Time Trial Only" color={C.purple}><div style={{marginTop:8}}><DoseRow label="Albuterol neb (one-time trial)" value={doses?doses.albuterol:"—"} unit={doses?"mg":""}/><div style={{fontSize:12,color:C.muted,marginTop:6}}>One-time trial within 12h of presentation. RN/MD huddle before and after. Continue only if documented positive response (decreased RR/WOB). {'<'}10 kg: 2.5 mg · ≥10 kg: 5 mg.</div></div><TeachBox id="albuterol" teaching={teaching}/></Card>
<Card title="Antipyretics — Comfort" color={C.primary} defaultOpen={false}><div style={{marginTop:8}}><DoseRow label="Acetaminophen PO/PR (15 mg/kg)" value={doses?doses.apapPO:"—"} unit={doses?"mg":""}/><DoseRow label="Ibuprofen PO (10 mg/kg) — if ≥6 mo" value={doses?doses.ibuPO:"—"} unit={doses?"mg":""}/></div></Card>
</Pad>)}

function RefDispo({teaching}){return(<Pad>
<Q text="Disposition & References"/>
<Card title="Disposition Summary" color={C.primary}><div style={{marginTop:8}}>
<div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>ADMIT — PICU</div><div style={{fontSize:12,marginTop:2}}>HFNC ≥2 L/kg/min · Failure to maintain SpO₂ {'>'}90% · Deteriorating respiratory status · Recurrent apnea · PBST severe (8–14)</div></div>
<div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>ADMIT — WARD / ED OBSERVATION</div><div style={{fontSize:12,marginTop:2}}>SpO₂ {'<'}90% requiring O₂ · Moderate PBST with HFNC · Unable to maintain PO · Age {'<'}3 months with more than mild disease · Former preterm with expected severe course</div></div>
<div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>MAY DISCHARGE</div><div style={{fontSize:12,marginTop:2}}>SpO₂ {'>'}92% on room air · If O₂ was needed, monitor 8–12h after discontinuation including sleep period · Tolerating PO · Mild PBST (≤3) × 2 consecutive scores · Age {'<'}3mo: must clear secretions with bulb syringe and feed without desaturation</div></div>
</div><TeachBox id="discharge" teaching={teaching}/></Card>
<Card title="Discharge Teaching" color={C.blue}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Typical course: profuse rhinorrhea, rapid respirations, retractions, cough, wheeze<br/>Mainstay of therapy: suctioning, positioning, hydration (including pacing of feeds)<br/>Prevention: hand washing with alcohol-based rub for all family members<br/><strong>Return precautions:</strong> worsening breathing difficulty, poor feeding, lethargy, color change, fever</div></Card>
<Card title="SpO₂ Disposition Guide" color={C.blue}><div style={{marginTop:8}}>
<div style={{display:"grid",gridTemplateColumns:"auto 1fr",gap:"4px 10px",fontSize:12}}>
<div style={{fontWeight:700,color:C.red}}>{'<'}90%</div><div>Usually requires hospitalization. Not appropriate for ED observation if O₂ needed.</div>
<div style={{fontWeight:700,color:C.amberMid}}>90–94%</div><div>Supportive care. Ongoing assessments. May require observation. Must maintain SpO₂ and tolerate PO prior to discharge. Neonates {'<'}3mo need longer observation — not appropriate for ED obs.</div>
<div style={{fontWeight:700,color:C.greenMid}}>{'>'}94%</div><div>Supportive care. If mild PBST (≤3) × 2, able to maintain PO → consider discharge.</div>
</div></div></Card>
<Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>1. Ralston SL et al. AAP CPG: Diagnosis, management, and prevention of bronchiolitis. <em>Pediatrics</em> 2014; 134:e1474.<br/>2. Jacobs JD et al. 7% Hypertonic Saline in Acute Bronchiolitis. <em>Pediatrics</em> 2014; 133:e8.<br/>3. Principi T et al. Effect of Oxygen Desaturations on Subsequent Medical Visits. <em>JAMA Pediatr</em> 2016; 170:602.<br/>4. Gadomski AM, Scribani MB. Bronchodilators for bronchiolitis. <em>Cochrane Database Syst Rev</em> 2014; CD001266.<br/>5. Kepreotes E et al. High-flow warm humidified oxygen vs standard low-flow NC. <em>Lancet</em> 2017; 389(10072):930-939.<br/>6. Franklin D et al. A Randomized Trial of High-Flow Oxygen Therapy in Infants with Bronchiolitis. <em>N Engl J Med</em> 2018; 378(12):1121-1131.</div></Card>
</Pad>)}

function RefScoring({teaching}){return(<Pad>
<Q text="PBST Scoring Tool" sub="Pediatric Bronchiolitis Scoring Tool — suction and reposition before scoring"/>
<TeachBox id="pbst" teaching={teaching}/>
<Card title="Interactive PBST Calculator" color={C.primary}>
  <PBSTCalculator teaching={teaching}/>
</Card>
<Card title="PBST Reference Table" color={C.blue} defaultOpen={false}><div style={{marginTop:8,fontSize:12,lineHeight:1.6}}>
<div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:4,marginBottom:6}}>
<div style={{fontWeight:700,fontSize:10,color:C.muted}}>PARAMETER</div>
<div style={{fontWeight:700,fontSize:10,color:C.muted,textAlign:"center"}}>0</div>
<div style={{fontWeight:700,fontSize:10,color:C.muted,textAlign:"center"}}>1</div>
<div style={{fontWeight:700,fontSize:10,color:C.muted,textAlign:"center"}}>2</div>
<div style={{fontWeight:700,fontSize:10,color:C.muted,textAlign:"center"}}>3</div>
</div>
{[
["RR <3mo","30–60","61–69","≥70 / low",""],
["RR 3–12mo","25–50","51–59","≥60 / low",""],
["RR 12–24mo","20–40","41–44","≥45 / low",""],
["Accessory Muscles","None","1pt each: flare, IC retract, SS retract, head bob","",""],
["Breath Sounds","Normal","End-exp wheeze","Exp wheeze throughout","Insp+exp / diminished"],
["Alertness","Age appropriate","Agitated","Doesn't arouse","Confused/somnolent"],
["Dyspnea","None","SOB w/ activity","SOB w/ talking/feeding","SOB at rest"]
].map(function(r,i){return <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr 1fr",gap:4,padding:"3px 0",borderBottom:"1px dashed "+C.rule}}>
<div style={{fontSize:11,fontWeight:600}}>{r[0]}</div>
<div style={{fontSize:10,textAlign:"center"}}>{r[1]}</div>
<div style={{fontSize:10,textAlign:"center"}}>{r[2]}</div>
<div style={{fontSize:10,textAlign:"center"}}>{r[3]}</div>
<div style={{fontSize:10,textAlign:"center"}}>{r[4]}</div>
</div>})}
<div style={{marginTop:10,fontSize:11,lineHeight:1.5}}>
<strong>Severity:</strong> Mild ≤3 · Moderate 4–7 · Severe 8–14<br/>
<strong>Reclassification:</strong> Two consecutive lower scores → may step down. A single higher score → immediately step up.
</div>
</div></Card>
</Pad>)}

function App(){
  var s1=useState("wizard"),mode=s1[0],setMode=s1[1];
  var s2=useState("triage"),tab=s2[0],setTab=s2[1];
  var s3=useState(false),teaching=s3[0],setTeaching=s3[1];
  var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];
  var s5=useState(""),ageMo=s5[0],setAgeMo=s5[1];
  var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);
  var rr=useResponsive(),maxW=rr.maxW;

  var refTabs=[{key:"triage",label:"Triage"},{key:"scoring",label:"PBST Scoring"},{key:"decision",label:"Decisions"},{key:"meds",label:"Meds"},{key:"special",label:"Dispo & Refs"}];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>

      {mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}

      <div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (months)</label><input type="number" inputMode="decimal" value={ageMo} onChange={function(e){setAgeMo(e.target.value)}} placeholder="8" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="6" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
      </div>

      {mode==="wizard"&&<Wizard teaching={teaching} weightKg={weightKg} ageMo={ageMo} doses={doses}/>}
      {mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}
      {mode==="reference"&&tab==="scoring"&&<RefScoring teaching={teaching}/>}
      {mode==="reference"&&tab==="decision"&&<RefDecisions teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="special"&&<RefDispo teaching={teaching}/>}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Bronchiolitis Clinical Pathway · October 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
