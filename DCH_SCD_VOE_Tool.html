<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCD Suspected VOE — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const C={primary:"#991b1b",pLight:"#fef2f2",pBorder:"#fca5a5",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"VOE Pain Assessment",content:"The best method of assessing pain is the patient's report. There is no persuasive evidence that physical exam findings (tachycardia, hypertension) or laboratory tests (decreased hemoglobin) correlate with the degree of pain. VOE pain is intense and may be precipitated by cold, dehydration, stress, alcohol, exercise, illness, menses, pregnancy, or idiopathic causes. Pain may also mask complications including ACS, osteomyelitis, sepsis, or stroke."},
  analgesics:{title:"Analgesic Guidelines",content:"National guidelines recommend rapidly initiating analgesic therapy — ideally within 30 minutes of triage or 60 minutes of registration. For severe pain: initiate parenteral opioids. For mild-moderate pain: NSAIDs first if effective, then add opioids as needed. Follow the patient's personal pain plan from PHO clinic notes when available. If no personal plan exists, use the dosing guidelines in this pathway."},
  fluids:{title:"Fluid Caution in VOE",content:"SCD patients with VOE are frequently volume depleted from decreased PO intake, increased insensible losses, and reduced urinary concentrating ability. Fluid repletion may provide some benefit, BUT there is no evidence for any particular volume, rate, or type. Over-resuscitation can precipitate ACS, worsen cerebral edema in stroke, and cause hemodilution in aplastic crisis. Use fluids judiciously — only for signs of dehydration or hypovolemia."},
  acs:{title:"Screen for ACS",content:"Splinting from pain can lead to atelectasis and vasoocclusive damage in lungs, causing ACS. Diagnostic criteria: new pulmonary infiltrate PLUS any of fever, cough, hypoxia, or tachypnea. If suspicion for ACS: obtain CXR PA & lateral, encourage incentive spirometry, supplemental O₂ if SpO₂ <92%, empiric broad-spectrum antibiotics (see SCD with Fever pathway), and consult PHO."},
  anemia:{title:"Anemia Management",content:"If anemic with inappropriately low/normal reticulocyte count → consult hematology for possible aplastic crisis. If anemia below baseline → consult hematology before considering transfusion. Absolute transfusion indications: aplastic crisis, splenic sequestration, CVA, rapidly progressing ACS. SCD patients are at high risk for alloimmunization and iron overload — always consult PHO PRIOR to RBC transfusion."},
  ketorolac:{title:"Ketorolac Notes",content:"Ketorolac may be given within 1 hour of last PO NSAID dose as escalation of therapy if no history of renal insufficiency. If significant dehydration/volume depletion, consider NS bolus prior to administration. Can be given without HCG results unless the patient is in the 3rd trimester of pregnancy (Class D). Check renal function before dosing."},
  stroke:{title:"Screen for Stroke",content:"If headache or neurologic findings: perform careful neurologic exam, emergently consult Peds Neuro and PHO. CVA in SCD requires emergent RBC apheresis through a dialysis catheter. Do not delay evaluation for pain management."},
};

function useResponsive(){const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:520);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return{maxW:w>=640?800:520};}

function calcDoses(w,ageYrs){
  const wt=parseFloat(w)||0;const age=parseFloat(ageYrs)||0;if(wt<=0)return null;
  const fentIN=Math.min(Math.round(wt*2),100);
  const oxyLo=age<6?Math.min(Math.round(wt*0.15*10)/10,2.5):age<=12?Math.min(Math.round(wt*0.2*10)/10,5):Math.min(Math.round(wt*0.2*10)/10,10);
  return{w:wt,fentIN,ibu:Math.round(wt*10),ketorolac:Math.min(Math.round(wt*0.5*10)/10,30),morphLo:Math.round(wt*0.1*10)/10,morphHi:Math.min(Math.round(wt*0.15*10)/10,8),
  hydroLo:Math.round(wt*0.015*1000)/1000,hydroHi:Math.min(Math.round(wt*0.02*10)/10,2),
  oxy:oxyLo,bolus:Math.round(wt*20)};
}

function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>SCD — Suspected VOE</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Vaso-Occlusive Episode · September 2021</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const[ageYrs,setAgeYrs]=useState("");
  const{maxW}=useResponsive();
  const doses=useMemo(()=>calcDoses(weightKg,ageYrs),[weightKg,ageYrs]);

  const tabs=[{key:"triage",label:"Triage"},{key:"decision",label:"Decisions"},{key:"pain",label:"Pain Algorithm"},{key:"special",label:"Dispo & Refs"}];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>
      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px",display:"flex",gap:10}}>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (yr)</label><input type="number" inputMode="decimal" value={ageYrs} onChange={e=>setAgeYrs(e.target.value)} placeholder="8" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/></div>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="25" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/></div>
      </div>

      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="SCD patient presenting with pain — manage rapidly"/>
          <TeachBox id="overview" teaching={teaching}/>
          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">SCD patients of any age (followed by OHSU PHO or non-OHSU &lt;20 yr) presenting with pain</Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">T ≥38.3°C → SCD with Fever pathway</Alert>
            </div>
          </Card>
          <Card title="Immediate Actions" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI Level II</strong><br/>
              Continuous cardiac + pulse ox · O₂ for SpO₂ &lt;92% and/or comfort<br/>
              PIV or access CVC/port per CLABSI bundle<br/>
              <strong>Offer IN fentanyl immediately</strong> {doses&&doses.w>=10?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{doses.fentIN} mcg</span>:"2 mcg/kg (≥10 kg, max 100 mcg)"}<br/>
              Consider NS bolus if dehydration/hypovolemia signs<br/>
              <strong style={{color:C.red}}>Do NOT over-resuscitate</strong> — can precipitate ACS, worsen CVA, cause hemodilution
            </div>
          </Card>
          <Card title="Diagnostics" color={C.blue}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              CBC with diff · Reticulocyte count · CMP · Type &amp; Screen · LDH total · Direct bili<br/>
              CXR if chest pain, SOB, ↑WOB, or O₂ need<br/>
              HCG in females ≥12 (or younger if menarche)
            </div>
          </Card>
        </Pad>
      )}

      {tab==="decision"&&(
        <Pad>
          <Q text="Complication Screening" sub="Screen for fever, stroke, ACS, anemia BEFORE treating as uncomplicated VOE"/>

          <Card title="Fever ≥38.3°C?" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong style={{color:C.red}}>YES → Go to SCD with Fever pathway</strong><br/>
              All SCD patients are functionally asplenic and can devolve to severe sepsis quickly
            </div>
          </Card>

          <Card title="Headache or Neurologic Findings?" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>YES →</strong> Careful neurologic exam<br/>
              Emergently consult Peds Neuro + PHO<br/>
              <strong style={{color:C.red}}>CVA in SCD requires emergent RBC apheresis through dialysis catheter</strong>
            </div>
            <TeachBox id="stroke" teaching={teaching}/>
          </Card>

          <Card title="Chest Pain or Respiratory Symptoms?" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Evaluate for Acute Chest Syndrome:</strong><br/>
              Splinting from pain → atelectasis → vasoocclusive lung damage<br/><br/>
              <strong>ACS = new pulmonary infiltrate + ANY:</strong> fever, cough, hypoxia, tachypnea<br/><br/>
              If suspicion: obtain CXR PA &amp; lateral · encourage incentive spirometry · O₂ if SpO₂ &lt;92% · empiric broad-spectrum abx · consult PHO
            </div>
            <TeachBox id="acs" teaching={teaching}/>
          </Card>

          <Card title="Anemic Relative to Baseline?" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Anemic + inappropriately low/normal retic count → consult hematology (possible aplastic crisis)<br/>
              Anemia below baseline → consult hematology BEFORE considering transfusion<br/>
              <strong style={{color:C.red}}>Always consult PHO PRIOR to RBC transfusion</strong>
            </div>
            <TeachBox id="anemia" teaching={teaching}/>
          </Card>

          <Card title="None of the Above → Treat as VOE" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Possible causes: infection, cold, stress, extreme exercise, dehydration, alcohol, menses, pregnancy, exacerbation of other medical issues, idiopathic<br/>
              <strong>→ Go to Pain Algorithm tab</strong>
            </div>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";const bC="#991b1b",bBg="#fef2f2",bBd="#fca5a5";const blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd";const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);
            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 340" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={340} fill="#fafaf8" rx={6}/>
                    <Box x={100} y={6} w={280} h={24} fill={bBg} stroke={bBd} sw={1.5} radius={12}><T x={240} y={17} size={9} weight={700} color={bC}>SCD + PAIN — SUSPECTED VOE</T><T x={240} y={26} size={5} color={mC}>ESI II · Monitor · IN Fentanyl · IV · Labs</T></Box>
                    <Arrow x1={240} y1={30} x2={240} y2={44}/>

                    <g transform="translate(240,56)"><polygon points="0,-12 45,0 0,12 -45,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>Fever?</T></g>
                    <Arrow x1={285} y1={56} x2={420} y2={56} color={rC}/><Arrow x1={420} y1={56} x2={420} y2={70} color={rC}/>
                    <Box x={370} y={70} w={100} h={18} fill={rBg} stroke={rBd} sw={2}><T x={420} y={81} size={6} weight={700} color={rC}>→ SCD Fever Pw</T></Box>
                    <Arrow x1={240} y1={68} x2={240} y2={82}/>

                    <g transform="translate(240,94)"><polygon points="0,-12 50,0 0,12 -50,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>Neuro sx?</T></g>
                    <Arrow x1={290} y1={94} x2={420} y2={94} color={rC}/><Arrow x1={420} y1={94} x2={420} y2={108} color={rC}/>
                    <Box x={370} y={108} w={100} h={18} fill={rBg} stroke={rBd}><T x={420} y={119} size={6} weight={700} color={rC}>Stroke eval · PHO</T></Box>
                    <Arrow x1={240} y1={106} x2={240} y2={120}/>

                    <g transform="translate(240,132)"><polygon points="0,-12 50,0 0,12 -50,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>Chest sx?</T></g>
                    <Arrow x1={290} y1={132} x2={420} y2={132} color={aC}/><Arrow x1={420} y1={132} x2={420} y2={146} color={aC}/>
                    <Box x={370} y={146} w={100} h={18} fill={aBg} stroke={aBd}><T x={420} y={157} size={6} weight={700} color={aC}>Eval for ACS</T></Box>
                    <Arrow x1={240} y1={144} x2={240} y2={158}/>

                    <g transform="translate(240,170)"><polygon points="0,-12 50,0 0,12 -50,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>Anemia?</T></g>
                    <Arrow x1={290} y1={170} x2={420} y2={170} color={aC}/><Arrow x1={420} y1={170} x2={420} y2={184} color={aC}/>
                    <Box x={370} y={184} w={100} h={18} fill={aBg} stroke={aBd}><T x={420} y={195} size={6} weight={700} color={aC}>Consult PHO</T></Box>
                    <Arrow x1={240} y1={182} x2={240} y2={198}/>

                    <Box x={120} y={198} w={240} h={18} fill={gBg} stroke={gBd} sw={1.5}><T x={240} y={209} size={8} weight={700} color={gC}>TREAT AS VOE — PAIN ALGORITHM</T></Box>
                    <Arrow x1={240} y1={216} x2={240} y2={230}/>

                    <Arrow x1={180} y1={230} x2={120} y2={248} color={gC}/>
                    <Arrow x1={300} y1={230} x2={360} y2={248} color={rC}/>
                    <Box x={50} y={248} w={140} h={28} fill={gBg} stroke={gBd}><T x={120} y={259} size={7} weight={700} color={gC}>MILD (0–4)</T><T x={120} y={270} size={5}>PO: Ibuprofen + Oxycodone</T></Box>
                    <Box x={290} y={248} w={140} h={28} fill={rBg} stroke={rBd}><T x={360} y={259} size={7} weight={700} color={rC}>MOD/SEVERE (5–10)</T><T x={360} y={270} size={5}>IV: Opioid + Ketorolac</T></Box>
                    <Arrow x1={120} y1={276} x2={120} y2={290} color={gC}/>
                    <Arrow x1={360} y1={276} x2={360} y2={290} color={rC}/>
                    <Box x={60} y={290} w={120} h={18} fill={gBg} stroke={gBd}><T x={120} y={301} size={6} weight={700} color={gC}>Comfortable → D/C</T></Box>
                    <Box x={300} y={290} w={140} h={18} fill={rBg} stroke={rBd}><T x={370} y={299} size={6}>Reassess q15–30 min</T><T x={370} y={307} size={5} color={rC}>Escalate dose +25%→+50%</T></Box>
                    <Box x={100} y={318} w={280} h={14} fill={rBg} stroke={rBd} radius={4}><T x={240} y={328} size={6} weight={700} color={rC}>Persistent pain after 3 IV doses → ADMIT · Consult PHO</T></Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {tab==="pain"&&(
        <Pad>
          <Q text="VOE Pain Management Algorithm" sub={doses?`Calculated for ${doses.w} kg`:"Enter weight + age for dosing"}/>
          {!doses&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight + Age Required">Enter both above.</Alert>}
          <TeachBox id="analgesics" teaching={teaching}/>

          <Card title="Step 1 — IN Fentanyl (Offered on Arrival)" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="IN Fentanyl (2 mcg/kg, ≥10 kg)" value={doses&&doses.w>=10?doses.fentIN:"N/A <10kg"} unit={doses&&doses.w>=10?"mcg (max 100)":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>Single dose · Administer immediately at triage</div>
            </div>
          </Card>

          <Card title="Mild Pain (0–4) or No PO Trial at Home" color={C.greenMid}>
            <div style={{marginTop:8}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>Follow personal pain plan from PHO clinic note if available</div>
              <DoseRow label="Ibuprofen (10 mg/kg)" value={doses?doses.ibu:"—"} unit={doses?"mg":""}/>
              <DoseRow label={`Oxycodone (${parseFloat(ageYrs)<6?"<6yr: 0.15":parseFloat(ageYrs)<=12?"6–12yr: 0.2":">12yr: 0.2"} mg/kg)`} value={doses?doses.oxy:"—"} unit={doses?`mg (max ${parseFloat(ageYrs)<6?"2.5":parseFloat(ageYrs)<=12?"5":"10"})`:""} />
              <div style={{fontSize:13,marginTop:8}}>Reassess after 30–60 min → <strong style={{color:C.greenMid}}>comfortable → discharge</strong> with pain meds to next PHO clinic</div>
            </div>
          </Card>

          <Card title="Moderate/Severe Pain (5–10) or Failed PO at Home" color={C.red}>
            <div style={{marginTop:8}}>
              <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:6}}>IV Bundle</div>
              <DoseRow label="Morphine IV (0.1–0.15 mg/kg)" value={doses?`${doses.morphLo}–${doses.morphHi}`:"—"} unit={doses?"mg (max 8)":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>OR</div>
              <DoseRow label="Hydromorphone IV (0.015–0.02 mg/kg)" value={doses?`${Math.round(doses.w*0.015*100)/100}–${doses.hydroHi}`:"—"} unit={doses?"mg (max 2)":""}/>
              <DoseRow label="Ketorolac IV (0.5 mg/kg)" value={doses?doses.ketorolac:"—"} unit={doses?"mg (max 30)":""}/>
            </div>
            <TeachBox id="ketorolac" teaching={teaching}/>

            <div style={{fontSize:14,fontWeight:700,color:C.ink,marginTop:12,marginBottom:6}}>Escalation Protocol</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
              {[
                {title:"IV Dose #1",sub:"Initial dose",reassess:"Reassess 15–30 min"},
                {title:"IV Dose #2",sub:"Initial + 25%",reassess:"Reassess 15–30 min"},
                {title:"IV Dose #3",sub:"Initial + 50%",reassess:"Reassess 15–30 min"},
              ].map((step,i)=>(
                <div key={i} style={{background:i===2?C.redBg:C.pLight,border:`1.5px solid ${i===2?C.redBorder:C.pBorder}`,borderRadius:8,padding:"8px",textAlign:"center"}}>
                  <div style={{fontSize:11,fontWeight:700,color:C.primary}}>{step.title}</div>
                  <div style={{fontSize:10,marginTop:2}}>{step.sub}</div>
                  <div style={{fontSize:9,color:C.muted,marginTop:2}}>{step.reassess}</div>
                </div>
              ))}
            </div>
            <div style={{fontSize:13,marginTop:8}}>
              After each dose: <strong style={{color:C.greenMid}}>comfortable → discharge</strong> | <strong style={{color:C.red}}>persistent pain → next dose</strong><br/>
              <strong style={{color:C.red}}>After 3 IV doses with persistent pain → ADMIT · Consult PHO</strong>
            </div>
          </Card>

          <Card title="Fluids — Use Judiciously" color={C.amberMid} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS bolus (20 mL/kg) — if dehydrated" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="Do NOT Over-Resuscitate">
                Can precipitate ACS · Worsen cerebral edema in CVA · Cause hemodilution in aplastic crisis
              </Alert>
            </div>
            <TeachBox id="fluids" teaching={teaching}/>
          </Card>

          <Card title="Blood Products" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong style={{color:C.red}}>Consult PHO PRIOR to any RBC transfusion</strong><br/>
              PHO determines units + simple vs exchange transfusion<br/>
              Absolute indications: aplastic crisis, splenic sequestration, CVA, rapidly progressing ACS
            </div>
          </Card>
        </Pad>
      )}

      {tab==="special"&&(
        <Pad>
          <Q text="Disposition & References"/>
          <Card title="Discharge Criteria" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ✓ Well-appearing with stable vital signs<br/>
              ✓ Tolerating PO well · Tolerating PO pain medication<br/>
              ✓ No concern for ACS or sequestration crisis<br/>
              ✓ No new hypoxemia · CXR without infiltrate<br/>
              ✓ Reticulocyte count at baseline<br/>
              ✓ Patient and family comfortable with plan<br/><br/>
              <strong>Discharge with enough pain meds to get to next PHO clinic (usually Thursday)</strong>
            </div>
          </Card>
          <Card title="Admission Criteria" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Persistent pain after 3 IV opioid doses · Toxic/ill-appearing · Oxygen requirement · Multiple recent ED visits for pain · ACS or sequestration<br/>
              <strong>Consult PHO</strong>
            </div>
          </Card>
          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. NHLBI. Evidence-based management of sickle cell disease. Expert panel report, 2014.<br/>
              2. Bernard AW et al. Full blood count and reticulocyte count in painful sickle crisis. <em>Emerg Med J</em> 2006; 23(4):302–3.<br/>
              3. Okomo U, Meremikwu MM. Fluid replacement therapy for acute episodes of pain in people with SCD. <em>Cochrane Database Syst Rev</em> 2012.<br/>
              4. Children's Hospital of Philadelphia. SCD with Pain Clinical Pathway. Accessed 2020.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · SCD Suspected VOE Clinical Pathway · September 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
