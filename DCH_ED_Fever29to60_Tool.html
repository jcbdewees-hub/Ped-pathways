<script type="text/babel">
const{useState,useMemo,useEffect}=React;
const C={primary:"#b45309",pLight:"#fffbeb",pBorder:"#fcd34d",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
overview:{
  title:"Pathway Rationale — Febrile Infant 29–60 Days",
  patho:"Infants 29–60 days with fever ≥38.0°C have lower rates of invasive bacterial infection (bacteremia ~1.8%, meningitis <0.5%) compared to neonates ≤28 days, but the risk remains clinically significant and cannot be assessed by clinical appearance alone. The AAP 2021 guideline established that inflammatory markers — specifically ANC and procalcitonin — can reliably stratify these infants into high-risk and low-risk groups, potentially avoiding lumbar puncture and empiric antibiotics in the low-risk subset.\n\nThe combined negative inflammatory markers (ANC <4000 AND procalcitonin <0.5 ng/mL) have a sensitivity of 97.7% and NPV of 99.6% for invasive bacterial infection per the multicenter PECARN study, making it safe to withhold empiric antibiotics in this subgroup with close follow-up.",
  pearls:"The key inflection point in this pathway is the inflammatory marker result: ANC >4000 OR PCT >0.5 ng/mL triggers further workup (consider LP) and empiric antibiotics. When both markers are negative, the risk of invasive bacterial infection is extremely low (<0.5%), and the pathway allows discharge without antibiotics if the UA is also negative.\n\nCritical exclusions: prematurity <37 weeks, pre-existing medical conditions, indwelling devices, focal bacterial infections (except AOM), clinical bronchiolitis, and immunizations in the last 48 hours. These patients are off-pathway because the inflammatory marker strategy has not been validated in these populations.",
  evidence:"AAP Clinical Practice Guideline 2021 (Pantell et al., Pediatrics 148(2):e2021052228). PECARN febrile infant rule: ANC <4000 + PCT <0.5 → sensitivity 97.7% (95% CI 91.3–99.6%), NPV 99.6% (98.4–99.9%) for invasive bacterial infection. Step-by-Step approach and PECARN both identified zero missed meningitis cases in marker-negative 29–60 day infants. (Kuppermann JAMA Pediatr 2019)"
},
markers:{
  title:"Inflammatory Markers — ANC & Procalcitonin",
  patho:"Absolute neutrophil count (ANC) reflects the acute innate immune response to bacterial invasion — the bone marrow releases immature and mature neutrophils in response to bacterial endotoxin and inflammatory cytokines. ANC >4000 correlates with active bacterial infection in young infants. Procalcitonin (PCT) is a prohormone produced by thyroid C-cells and neuroendocrine cells throughout the body. In bacterial infection, PCT is released within 2–4 hours (faster than CRP) and rises proportionally to infection severity. PCT >0.5 ng/mL is the validated threshold for this age group.\n\nThe combination of ANC and PCT outperforms either marker alone and outperforms WBC and CRP for identifying invasive bacterial infection in this age group.",
  pearls:"Order both ANC (from CBC with differential) and procalcitonin on every febrile 29–60 day infant. Point-of-care procalcitonin is ideal if available (results in ~20 minutes vs 1–2 hours for send-out).\n\nEither marker positive (ANC >4000 OR PCT >0.5) → high-risk: consider LP, give ceftriaxone, admit or observe closely.\nBoth markers negative (ANC <4000 AND PCT <0.5) → low-risk: LP not required, antibiotics discouraged if UA also negative.\n\nRemember: inflammatory markers perform poorly in very early infection (<2 hours from fever onset) — maintain clinical vigilance.",
  evidence:"PECARN multicenter validation: combined ANC + PCT sensitivity 97.7%, NPV 99.6%. No missed meningitis in marker-negative group across PECARN, Step-by-Step, and PROS studies. (Kuppermann JAMA Pediatr 2019, Pantell AAP Guideline 2021)"
},
lp:{
  title:"LP Decision-Making in 29–60 Day Infants",
  patho:"Unlike neonates ≤28 days where LP is nearly universal, infants 29–60 days can safely defer LP when inflammatory markers are negative. The PECARN study and Step-by-Step approach identified zero cases of bacterial meningitis in marker-negative infants 29–60 days. LP should be performed when ANC >4000 or PCT >0.5, as this group has a meningitis risk substantially greater than the 0.25% threshold at which LP becomes beneficial.\n\nTraumatic tap (defined as ≥10,000 RBC/mm³) complicates interpretation — CSF WBC must be corrected and cultures must be followed. A traumatic tap with positive inflammatory markers should be treated as presumptive meningitis until cultures finalize.",
  pearls:"LP is recommended if: ANC >4000 or PCT >0.5, ill/toxic appearance. LP is NOT required if both markers negative — this is the key clinical advance from the AAP 2021 guideline.\n\nCSF pleocytosis defined as ≥10 WBCs → meningitis protocol: ceftriaxone 100 mg/kg/day divided q12h + vancomycin 20 mg/kg. Traumatic tap = ≥10,000 RBC/mm³.\n\nIf LP not obtained and markers are positive → treat with ceftriaxone and either admit or discharge with close follow-up (12–24 hours).",
  evidence:"Zero missed meningitis in marker-negative 29–60 day infants across PECARN, Step-by-Step, and PROS. LP should be considered when risk exceeds 0.25% (marker-positive group). (Pantell AAP 2021, Wang Pediatrics 2019)"
},
antibiotics:{
  title:"Antibiotic Selection",
  patho:"Ceftriaxone is the empiric antibiotic of choice for 29–60 day infants because: (1) it covers the predominant pathogens (E. coli, GBS, Klebsiella) with reliable CNS penetration, (2) its long half-life allows once-daily dosing, and (3) it can be given as a single IM/IV dose for patients being discharged with follow-up. Vancomycin is added when meningitis is suspected (CSF pleocytosis or toxic appearance) to cover potentially resistant organisms including MRSA and penicillin-resistant pneumococcus.\n\nFor positive UA with negative inflammatory markers, oral antibiotics (cephalexin or cefdinir) are appropriate since the risk of concurrent bacteremia or meningitis in this subgroup is extremely low.",
  pearls:"Toxic/ill → Ceftriaxone + Vancomycin + admit (consider PICU)\nPositive markers + CSF pleocytosis → Ceftriaxone 100 mg/kg/day divided q12h + Vancomycin 20 mg/kg → admit\nPositive markers + negative CSF or CSF not obtained → Ceftriaxone 50 mg/kg → admit vs discharge with 12–24h follow-up\nNegative markers + positive UA → Oral antibiotics (cephalexin 50–100 mg/kg/day QID or cefdinir 14 mg/kg/day) → discharge with follow-up\nNegative markers + negative UA → No antibiotics → observe at home, follow-up 24–36 hours",
  evidence:"AAP 2021 guideline antibiotic recommendations. Ceftriaxone monotherapy for non-meningitis presentations. Vancomycin added for CSF pleocytosis. Oral antibiotics sufficient for UTI with negative markers. (Pantell AAP 2021, OHSU DCH ED Pathway March 2022)"
},
urine:{
  title:"Urine Analysis & Collection",
  patho:"UTI is the most common serious bacterial infection in febrile infants 29–60 days, accounting for ~7–9% of cases. Catheterization or suprapubic aspiration is mandatory per AAP guidelines — bag collection has a false-positive rate exceeding 67%, leading to unnecessary antibiotics and hospital admissions. UA with microscopy (leukocyte esterase, nitrites, WBC count, bacteria) has excellent sensitivity (LE ≥94%) when performed properly.",
  pearls:"Catheter specimen for all febrile 29–60 day infants — Pedi UTI Panel includes UA, microscopy, and mandatory culture. UA is positive if any of: LE trace or greater, nitrites positive, or >5 WBC or bacteria on micro.\n\nImportant: a positive UA with negative inflammatory markers (ANC <4000 AND PCT <0.5) carries very low risk of concurrent bacteremia or meningitis. These patients can be treated with oral antibiotics and discharged. A positive UA with positive inflammatory markers requires further evaluation (LP consideration) to rule out concurrent meningitis.",
  evidence:"Bag collection false-positive rate >67% (Tosif 2012). UA with micro sensitivity: LE ≥94% (Tzimenatos Pediatrics 2018). Well-appearing febrile infants with UTI and negative inflammatory markers: very low risk of concurrent bacteremia. (Wang Pediatrics 2019)"
},
disposition:{
  title:"Disposition Strategy",
  patho:"The pathway stratifies disposition by inflammatory markers and CSF results, reflecting the evidence that marker-negative infants have an extremely low risk of invasive bacterial infection and can be safely discharged with close follow-up. The NNT for antibiotics in marker-negative infants is estimated at >200, making routine empiric treatment in this group inefficient and potentially harmful (allergic reactions, microbiome disruption, antibiotic resistance).",
  pearls:"Admit: toxic/ill-appearing, positive markers with CSF pleocytosis\nAdmit vs discharge with close follow-up: positive markers with negative/traumatic CSF or CSF not obtained\nDischarge with oral antibiotics: negative markers with positive UA → cephalexin or cefdinir, follow-up 12–24 hours, complete 9–13 days additional cefdinir if UA positive\nDischarge without antibiotics: negative markers with negative UA → observe at home, follow-up 24–36 hours\n\nAll discharged patients need documented follow-up plan and clear return precautions.",
  evidence:"Multiple validated prediction rules support safe discharge of marker-negative febrile infants 29–60 days. (PECARN 2019, AAP 2021, OHSU DCH ED Pathway March 2022)"
},
temperature:{
  title:"Temperature Measurement",
  pearls:"Rectal thermometry is the gold standard. Studies show greatest discordance in young children between rectal and temporal measurements. Parental report of tactile fever is likely accurate (sensitivity 82–89%, specificity 76–86%). Axillary temperature ≥38.0°C also meets inclusion criteria per this pathway."
}
};

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt,ceftri50:Math.round(wt*50),ceftri100:Math.round(wt*100),vanco20:Math.round(wt*20),bolus:Math.round(wt*20),d10:Math.round(wt*5),apapPO:Math.round(wt*12.5*10)/10,apapPR_lo:Math.round(wt*15),apapPR_hi:Math.round(wt*30),cephalexDay:Math.round(wt*75),cefdinir:Math.round(wt*14)};}

function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Fever / Suspected Sepsis 29–60 Days</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · March 2022</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function DoseRow({label,value,unit}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit||""}</span></div>)}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}
function TeachBox({id,teaching}){
  var s=useState("pearls"),tab=s[0],setTab=s[1];
  if(!teaching||!TEACH[id])return null;var t=TEACH[id];
  if(t.content&&!t.patho&&!t.pearls&&!t.evidence){return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:"4px solid "+C.teal}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t.content}</div></div>);}
  var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;
  var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;
  return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>{tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}</div><div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeKey]||""}</div></div>);
}

function PathwayFlowchart(){
  var rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5",aC="#d97706",aBg="#fffbeb",aBd="#fcd34d",gC="#16a34a",gBg="#f0fdf4",gBd="#86efac",blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd",pC="#6b21a8",pBg="#faf5ff",pBd="#c4b5fd",mC="#6b7280",tC="#0f766e",tBg="#f0fdfa",tBd="#5eead4";
  var Arrow=function(p){var dx=p.x2-p.x1,dy=p.y2-p.y1,len=Math.sqrt(dx*dx+dy*dy);if(len===0)return null;var ux=dx/len,uy=dy/len,px=-uy,py=ux;return <g><line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2} stroke={p.color||"#94a3b8"} strokeWidth={1.5}/><polygon points={p.x2+","+p.y2+" "+(p.x2-ux*6+px*3.5)+","+(p.y2-uy*6+py*3.5)+" "+(p.x2-ux*6-px*3.5)+","+(p.y2-uy*6-py*3.5)} fill={p.color||"#94a3b8"}/></g>};
  var Box=function(p){return <g><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={p.radius||6} fill={p.fill} stroke={p.stroke} strokeWidth={p.sw||1}/>{p.children}</g>};
  var T=function(p){return <text x={p.x} y={p.y} textAnchor={p.anchor||"middle"} fontSize={p.size||9} fontWeight={p.weight||600} fill={p.color||"#1a1d21"} fontFamily="'IBM Plex Sans',sans-serif">{p.children}</text>};
  return(
    <div style={{marginTop:20}}>
      <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Full Algorithm</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Infant 29–60 days · Temp ≥38.0°C · ANC + PCT driven decision tree</div>
      <div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,padding:6,overflow:"hidden"}}>
        <svg viewBox="0 0 480 560" style={{width:"100%",display:"block"}}>
          <rect width={480} height={560} fill="#fafaf8" rx={6}/>
          <Box x={100} y={8} w={280} h={30} fill={aBg} stroke={aBd} sw={1.5} radius={14}><T x={240} y={20} size={9} weight={700} color={aC}>FEBRILE INFANT 29–60 DAYS</T><T x={240} y={31} size={6} color={mC}>Temp ≥38°C rectal/axillary · ESI II</T></Box>
          <Arrow x1={240} y1={38} x2={240} y2={54}/>
          <g transform="translate(240,68)"><polygon points="0,-14 65,0 0,14 -65,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Exclusions?</T></g>
          <line x1={305} y1={68} x2={415} y2={68} stroke="#94a3b8" strokeWidth={1}/><Arrow x1={415} y1={68} x2={415} y2={84} color={mC}/>
          <Box x={370} y={84} w={90} h={24} fill="#f1f5f9" stroke="#e2e8f0"><T x={415} y={93} size={7} weight={600} color={mC}>OFF PATH</T><T x={415} y={103} size={5} color={mC}>Preterm · Devices · Bronch</T></Box>
          <Arrow x1={240} y1={82} x2={240} y2={100}/>
          <g transform="translate(240,114)"><polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Toxic/Ill?</T></g>
          <Arrow x1={295} y1={114} x2={410} y2={136} color={rC}/><T x={362} y={124} size={6} weight={600} color={rC}>Yes</T>
          <Box x={350} y={136} w={120} h={40} fill={rBg} stroke={rBd} sw={2}><T x={410} y={148} size={7} weight={700} color={rC}>RESUSCITATE</T><T x={410} y={159} size={6} color={mC}>Ceftriaxone + Vanco</T><T x={410} y={169} size={6} weight={600} color={rC}>→ Admit, consider PICU</T></Box>
          <Arrow x1={240} y1={128} x2={240} y2={148}/><T x={250} y={144} size={6} weight={600} color={gC} anchor="start">Well</T>
          <Box x={130} y={148} w={220} h={22} fill={tBg} stroke={tBd} sw={1.5}><T x={240} y={158} size={7} weight={700} color={tC}>LABS: CBG, UA, CBC, PCT, BMP, Coags, Blood Cx</T><T x={240} y={168} size={5.5} color={mC}>LMX to LP site · Cath UA with mandatory culture</T></Box>
          <Arrow x1={240} y1={170} x2={240} y2={188}/>
          <g transform="translate(240,202)"><polygon points="0,-14 80,0 0,14 -80,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>ANC {">"} 4000 or PCT {">"} 0.5?</T></g>

          {/* Positive markers branch */}
          <Arrow x1={320} y1={202} x2={400} y2={228} color={rC}/><T x={370} y={214} size={6} weight={600} color={rC}>Yes</T>
          <Box x={330} y={228} w={140} h={22} fill={rBg} stroke={rBd} sw={1.5}><T x={400} y={237} size={7} weight={700} color={rC}>POSITIVE MARKERS</T><T x={400} y={248} size={6} color={mC}>Consider LP · Give ceftriaxone</T></Box>
          <Arrow x1={400} y1={250} x2={400} y2={268}/>
          <g transform="translate(400,282)"><polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>CSF result?</T></g>
          {/* CSF pleocytosis */}
          <Arrow x1={455} y1={282} x2={460} y2={310} color={rC}/>
          <Box x={420} y={310} w={55} h={36} fill={rBg} stroke={rBd}><T x={448} y={322} size={5.5} weight={700} color={rC}>≥10 WBC</T><T x={448} y={332} size={5} color={mC}>Ceftri+Vanc</T><T x={448} y={342} size={5} weight={600} color={rC}>ADMIT</T></Box>
          {/* CSF neg or not obtained */}
          <Arrow x1={345} y1={282} x2={340} y2={310} color={aC}/>
          <Box x={280} y={310} w={100} h={42} fill={aBg} stroke={aBd}><T x={330} y={320} size={5.5} weight={700} color={aC}>Neg/Not done</T><T x={330} y={330} size={5} color={mC}>Ceftriaxone</T><T x={330} y={340} size={5} color={aC}>Admit vs D/C</T><T x={330} y={349} size={4.5} color={mC}>If D/C + pos UA: cefdinir 10–14d</T></Box>

          {/* Negative markers branch */}
          <Arrow x1={160} y1={202} x2={80} y2={228} color={gC}/><T x={108} y={214} size={6} weight={600} color={gC}>No</T>
          <Box x={10} y={228} w={140} h={22} fill={gBg} stroke={gBd} sw={1.5}><T x={80} y={237} size={7} weight={700} color={gC}>NEGATIVE MARKERS</T><T x={80} y={248} size={6} color={mC}>LP not required · Low risk</T></Box>
          <Arrow x1={80} y1={250} x2={80} y2={270}/>
          <g transform="translate(80,284)"><polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>UA positive?</T></g>
          {/* UA positive */}
          <Arrow x1={135} y1={284} x2={190} y2={310} color={aC}/>
          <Box x={150} y={310} w={100} h={36} fill={aBg} stroke={aBd}><T x={200} y={322} size={6} weight={700} color={aC}>UTI</T><T x={200} y={332} size={5.5} color={mC}>Oral antibiotics</T><T x={200} y={342} size={5.5} weight={600} color={gC}>DISCHARGE</T></Box>
          {/* UA negative */}
          <Arrow x1={25} y1={284} x2={40} y2={310} color={gC}/>
          <Box x={5} y={310} w={90} h={36} fill={gBg} stroke={gBd}><T x={50} y={322} size={6} weight={700} color={gC}>NO ABX</T><T x={50} y={332} size={5.5} color={mC}>Observe at home</T><T x={50} y={342} size={5.5} weight={600} color={gC}>F/U 24–36h</T></Box>

          {/* Dispo summary */}
          <Box x={10} y={370} w={460} h={24} fill={blBg} stroke={blBd} radius={6}><T x={240} y={385} size={7} weight={700} color={blC}>KEY: ANC {"<"} 4000 AND PCT {"<"} 0.5 → Sens 97.7% · NPV 99.6% for invasive bacterial infection</T></Box>

          <Box x={10} y={404} w={150} h={40} fill={gBg} stroke={gBd} radius={8}><T x={85} y={418} size={7} weight={700} color={gC}>DISCHARGE</T><T x={85} y={430} size={6} color={mC}>Neg markers + neg UA: no abx</T><T x={85} y={440} size={6} color={mC}>Neg markers + pos UA: oral abx</T></Box>
          <Box x={170} y={404} w={150} h={40} fill={aBg} stroke={aBd} radius={8}><T x={245} y={418} size={7} weight={700} color={aC}>ADMIT vs D/C</T><T x={245} y={430} size={6} color={mC}>Pos markers + neg CSF</T><T x={245} y={440} size={6} color={mC}>Ceftriaxone · Close F/U</T></Box>
          <Box x={330} y={404} w={140} h={40} fill={rBg} stroke={rBd} radius={8}><T x={400} y={418} size={7} weight={700} color={rC}>ADMIT</T><T x={400} y={430} size={6} color={mC}>CSF pleocytosis → Ceftri+Vanc</T><T x={400} y={440} size={6} color={mC}>Toxic/ill → PICU</T></Box>
        </svg>
      </div>
    </div>
  );
}

function Wizard({teaching,doses}){
  var s1=useState(null),excl=s1[0],setExcl=s1[1];
  var s2=useState(null),toxic=s2[0],setToxic=s2[1];
  var s3=useState(null),markers=s3[0],setMarkers=s3[1];
  var s4=useState(null),ua=s4[0],setUA=s4[1];
  var s5=useState(null),csf=s5[0],setCSF=s5[1];
  function reset(){setExcl(null);setToxic(null);setMarkers(null);setUA(null);setCSF(null);}

  return(<Pad>
    <Q text="Fever 29–60 Days Walk-Through" sub="Inflammatory marker-driven decision pathway"/>
    <TeachBox id="overview" teaching={teaching}/>

    <Card title="Step 1 — Exclusion Screening" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Does this infant meet any exclusion criteria?<br/><span style={{color:C.muted,fontSize:12}}>Prematurity {"<"}37 weeks · Pre-existing medical conditions · Indwelling devices · Focal bacterial infections (except AOM) · Clinical bronchiolitis · Immunizations in last 48 hours</span></div>
      <WizBtn label="Yes — Exclusion present" sub="Off pathway" color={C.red} bg={C.redBg} border={C.redBorder} selected={excl==="yes"} onClick={function(){setExcl("yes")}}/>
      <WizBtn label="No — No exclusions" sub="Proceed with pathway" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={excl==="no"} onClick={function(){setExcl("no")}}/>
      {excl==="yes"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠️" title="Off Pathway">This patient has exclusion criteria. Clinical judgment and individual evaluation required — the inflammatory marker strategy has not been validated in these populations.</Alert>}
    </Card>

    {excl==="no"&&<Card title="Step 2 — Clinical Appearance" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Is the infant toxic or ill-appearing?</div>
      <WizBtn label="Yes — Toxic / Ill-appearing" sub="Resuscitate → full workup → ceftriaxone + vancomycin → admit" color={C.red} bg={C.redBg} border={C.redBorder} selected={toxic==="yes"} onClick={function(){setToxic("yes")}}/>
      <WizBtn label="No — Well-appearing" sub="Proceed to labs and inflammatory markers" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={toxic==="no"} onClick={function(){setToxic("no")}}/>
      {toxic==="yes"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Toxic / Ill — Resuscitate">
        Aggressive fluid resuscitation: NS bolus {doses?doses.bolus+" mL":"20 mL/kg"}<br/>
        Full labs: CBC, CMP, coags, VBG/lactate, blood culture, UA + culture<br/>
        Lumbar puncture<br/>
        <strong>Antibiotics within 60 minutes:</strong><br/>
        {doses?<span>Ceftriaxone {doses.ceftri100} mg IV (100 mg/kg/day) + Vancomycin {doses.vanco20} mg IV (20 mg/kg)</span>:<span>Ceftriaxone 100 mg/kg/day + Vancomycin 20 mg/kg</span>}<br/>
        <strong>Admit — consider PICU</strong>
      </Alert>}
    </Card>}

    {excl==="no"&&toxic==="no"&&<Card title="Step 3 — Immediate Labs" color={C.blue}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
        <strong>Order immediately:</strong><br/>
        CBG (if ill-appearing, hypoglycemic symptoms, vomiting, decreased PO)<br/>
        Catheter UA with microscopy and mandatory culture<br/>
        CBC with differential, Procalcitonin, Coags, Blood culture, BMP/CMP<br/>
        LMX to LP site and/or J-tip · LP tray to bedside<br/>
        CXR if tachypnea, hypoxia, respiratory symptoms · Stool sample if diarrhea<br/>
      </div>
      <TeachBox id="urine" teaching={teaching}/>
    </Card>}

    {excl==="no"&&toxic==="no"&&<Card title="Step 4 — Inflammatory Markers" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Are inflammatory markers positive?<br/><span style={{fontSize:14,fontWeight:700,color:C.red}}>ANC {'>'} 4000 OR Procalcitonin {'>'} 0.5 ng/mL</span></div>
      <WizBtn label="Positive — ANC > 4000 or PCT > 0.5" sub="High-risk: consider LP, give ceftriaxone" color={C.red} bg={C.redBg} border={C.redBorder} selected={markers==="pos"} onClick={function(){setMarkers("pos")}}/>
      <WizBtn label="Negative — ANC < 4000 AND PCT < 0.5" sub="Low-risk: LP not required" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={markers==="neg"} onClick={function(){setMarkers("neg")}}/>
      <TeachBox id="markers" teaching={teaching}/>
    </Card>}

    {/* Positive markers branch */}
    {excl==="no"&&toxic==="no"&&markers==="pos"&&<Card title="Step 5A — Positive Markers: CSF Result" color={C.red}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>LP result (if obtained)?</div>
      <WizBtn label="CSF pleocytosis (≥10 WBCs)" sub="Meningitis protocol: ceftriaxone + vancomycin → admit" color={C.red} bg={C.redBg} border={C.redBorder} selected={csf==="pleo"} onClick={function(){setCSF("pleo")}}/>
      <WizBtn label="CSF negative" sub="Ceftriaxone → admit vs discharge with close follow-up" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={csf==="neg"} onClick={function(){setCSF("neg")}}/>
      <WizBtn label="CSF not obtained or traumatic tap" sub="Ceftriaxone → admit vs discharge with close follow-up" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={csf==="notdone"} onClick={function(){setCSF("notdone")}}/>
      {csf==="pleo"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="CSF Pleocytosis — Meningitis Protocol">
        {doses?<div><DoseRow label="Ceftriaxone IV (100 mg/kg/day ÷ q12h)" value={doses.ceftri100} unit="mg/day"/><DoseRow label="Vancomycin IV (20 mg/kg)" value={doses.vanco20} unit="mg"/></div>:<span>Ceftriaxone 100 mg/kg/day IV divided q12h + Vancomycin 20 mg/kg IV</span>}<br/><strong>ADMIT</strong>
      </Alert>}
      {(csf==="neg"||csf==="notdone")&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚠️" title={csf==="neg"?"Positive Markers, Negative CSF":"Positive Markers, CSF Not Obtained"}>
        {doses?<DoseRow label="Ceftriaxone IV (50 mg/kg)" value={doses.ceftri50} unit="mg"/>:<span>Ceftriaxone 50 mg/kg IV</span>}<br/>
        <strong>Admit vs discharge with close follow-up (12–24 hours)</strong><br/>
        {csf==="neg"&&<span>If UA positive: complete additional 9–13 days cefdinir {doses?doses.cefdinir+" mg/day":"14 mg/kg/day"}</span>}
      </Alert>}
      <TeachBox id="lp" teaching={teaching}/>
    </Card>}

    {/* Negative markers branch */}
    {excl==="no"&&toxic==="no"&&markers==="neg"&&<Card title="Step 5B — Negative Markers: UA Result" color={C.greenMid}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Is the UA positive?<br/><span style={{fontSize:12,color:C.muted}}>Positive = LE trace+, nitrites+, or {'>'}5 WBC or bacteria on micro</span></div>
      <WizBtn label="UA positive" sub="Oral antibiotics → discharge with close follow-up" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={ua==="pos"} onClick={function(){setUA("pos")}}/>
      <WizBtn label="UA negative" sub="No antibiotics → observe at home → follow-up 24–36 hours" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={ua==="neg"} onClick={function(){setUA("neg")}}/>
      {ua==="pos"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="💊" title="Negative Markers + Positive UA → UTI">
        <strong>Oral antibiotics:</strong><br/>
        {doses?<div><DoseRow label="Cephalexin PO (50–100 mg/kg/day ÷ QID)" value={doses.cephalexDay} unit="mg/day"/><div style={{fontSize:12,color:C.muted,marginTop:2}}>OR</div><DoseRow label="Cefdinir PO (14 mg/kg/day)" value={doses.cefdinir} unit="mg/day"/></div>:<span>Cephalexin 50–100 mg/kg/day divided QID or Cefdinir 14 mg/kg/day</span>}<br/>
        <strong>Discharge</strong> with close follow-up within 12–24 hours
      </Alert>}
      {ua==="neg"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Negative Markers + Negative UA → Low Risk">
        <strong>No antibiotics needed</strong><br/>
        Observe closely at home<br/>
        <strong>Follow-up within 24–36 hours</strong><br/>
        Return precautions: worsening appearance, persistent fever, poor feeding, lethargy
      </Alert>}
      <TeachBox id="antibiotics" teaching={teaching}/>
    </Card>}

    {excl!==null&&<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>}
    <PathwayFlowchart/>
  </Pad>);
}

function RefTriage({teaching}){return(<Pad>
  <Q text="Triage & Initial Assessment" sub="Infant 29–60 days with rectal/axillary temp ≥38.0°C"/>
  <TeachBox id="overview" teaching={teaching}/>
  <Card title="Inclusion / Exclusion" color={C.primary}><div style={{marginTop:8}}><Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Aged 29–60 days with rectal or axillary temperature ≥38.0°C at home, other healthcare facility, or in ED.</Alert><Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Prematurity {"<"}37 weeks · Pre-existing medical conditions · Indwelling devices (foley, vascular catheter) · Focal bacterial infections (except AOM) · Clinical bronchiolitis · Immunizations in last 48 hours</Alert></div></Card>
  <Card title="Initiate on Arrival" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}><strong>ESI Triage Level II</strong><br/>Full set of vitals including <strong>rectal temperature</strong> and weight<br/>Oxygen to maintain SpO₂ {'>'} 93%<br/>LMX to LP site and/or J-tip<br/>LP tray to bedside<br/>IV placement for all ill/toxic presentations · Consider IO per policy<br/><strong>Immediate labs:</strong> CBG, catheter UA + micro + culture, CBC with differential, procalcitonin, coags, blood culture, BMP/CMP<br/>CXR if tachypnea, hypoxia, respiratory symptoms · Stool if diarrhea<br/>VBG/lactate if ill/toxic appearing</div><TeachBox id="temperature" teaching={teaching}/></Card>
  <Card title="Diagnostics" color={C.blue}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>Core:</strong> CBC with differential, Procalcitonin, Coags, Blood culture, BMP/CMP<br/><strong>Urine:</strong> Catheter specimen — Pedi UTI Panel (UA, microscopy, mandatory culture)<br/><strong>CSF:</strong> Per MD — gram stain, cell count, protein, glucose, culture, hold extra fluid<br/><strong>Consider:</strong> CXR (resp symptoms), stool (diarrhea), VBG/lactate (toxic), CBG<br/><span style={{fontSize:12,color:C.muted}}>UA positive: LE trace+, nitrites+, or {'>'}5 WBC or bacteria on micro. Traumatic tap = ≥10,000 RBC/mm³.</span></div><TeachBox id="urine" teaching={teaching}/></Card>
</Pad>)}

function RefDecisions({teaching}){return(<Pad>
  <Q text="Decision Tree" sub="ANC + PCT → CSF → UA driven management"/>
  <Card title="Inflammatory Markers — The Key Decision Point" color={C.primary}><div style={{marginTop:8}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>POSITIVE MARKERS</div><div style={{fontSize:12,marginTop:2}}>ANC {'>'} 4000 OR PCT {'>'} 0.5 ng/mL<br/>→ Consider LP · Give ceftriaxone<br/>→ Admit or discharge with close F/U</div></div><div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>NEGATIVE MARKERS</div><div style={{fontSize:12,marginTop:2}}>ANC {"<"} 4000 AND PCT {"<"} 0.5 ng/mL<br/>→ LP not required<br/>→ Management based on UA result</div></div></div></div><TeachBox id="markers" teaching={teaching}/></Card>
  <Card title="Positive Markers — CSF-Stratified Management" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>CSF pleocytosis (≥10 WBCs):</strong> Ceftriaxone 100 mg/kg/day IV q12h + Vancomycin 20 mg/kg → ADMIT<br/><strong>CSF negative + negative UA:</strong> Ceftriaxone 50 mg/kg IV → admit vs D/C with F/U 12–24h<br/><strong>CSF negative + positive UA:</strong> Ceftriaxone 50 mg/kg IV → admit vs D/C; if discharging: 9–13 days cefdinir<br/><strong>CSF not obtained or traumatic tap:</strong> Ceftriaxone 50 mg/kg IV → admit vs D/C with F/U</div><TeachBox id="lp" teaching={teaching}/></Card>
  <Card title="Negative Markers — UA-Based Management" color={C.greenMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>Negative UA:</strong> No antibiotics. Observe at home. Follow-up within 24–36 hours.<br/><strong>Positive UA:</strong> Oral antibiotics (cephalexin 50–100 mg/kg/day QID or cefdinir 14 mg/kg/day). Discharge with follow-up 12–24 hours.</div><TeachBox id="antibiotics" teaching={teaching}/></Card>
  <PathwayFlowchart/>
</Pad>)}

function RefMeds({teaching,doses}){return(<Pad>
  <Q text="Medications & Dosing" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/>
  {!doses&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight in the bar above.</Alert>}
  <Card title="Antibiotics — Meningitis (CSF ≥10 WBCs)" color={C.red}><div style={{marginTop:8}}><DoseRow label="Ceftriaxone IV (100 mg/kg/day ÷ q12h)" value={doses?doses.ceftri100:"—"} unit={doses?"mg/day":""}/><DoseRow label="Vancomycin IV (20 mg/kg)" value={doses?doses.vanco20:"—"} unit={doses?"mg":""}/></div></Card>
  <Card title="Antibiotics — Positive Markers, No Meningitis" color={C.amberMid}><div style={{marginTop:8}}><DoseRow label="Ceftriaxone IV (50 mg/kg)" value={doses?doses.ceftri50:"—"} unit={doses?"mg":""}/></div></Card>
  <Card title="Antibiotics — Negative Markers + Positive UA" color={C.greenMid}><div style={{marginTop:8}}><DoseRow label="Cephalexin PO (50–100 mg/kg/day ÷ QID)" value={doses?doses.cephalexDay:"—"} unit={doses?"mg/day":""}/><div style={{fontSize:12,color:C.muted,marginTop:4}}>OR</div><DoseRow label="Cefdinir PO (14 mg/kg/day)" value={doses?doses.cefdinir:"—"} unit={doses?"mg/day":""}/><div style={{fontSize:12,color:C.muted,marginTop:6}}>If discharged with positive markers: complete 9–13 additional days cefdinir if UA was positive.</div></div></Card>
  <Card title="Supportive" color={C.primary}><div style={{marginTop:8}}><DoseRow label="NS bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/><DoseRow label="D10W (5 mL/kg) for CBG <50" value={doses?doses.d10:"—"} unit={doses?"mL":""}/><DoseRow label="Acetaminophen PO (12.5 mg/kg)" value={doses?doses.apapPO:"—"} unit={doses?"mg":""}/><DoseRow label="Acetaminophen PR (15–30 mg/kg)" value={doses?doses.apapPR_lo+"–"+doses.apapPR_hi:"—"} unit={doses?"mg":""}/></div></Card>
</Pad>)}

function RefDispo({teaching}){return(<Pad>
  <Q text="Disposition & References"/>
  <Card title="Disposition Summary" color={C.primary}><div style={{marginTop:8}}>
    <div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>ADMIT (consider PICU)</div><div style={{fontSize:12,marginTop:2}}>Toxic/ill-appearing · Positive markers + CSF pleocytosis (≥10 WBCs, positive gram stain)</div></div>
    <div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>ADMIT vs DISCHARGE with close F/U</div><div style={{fontSize:12,marginTop:2}}>Positive markers + traumatic tap or CSF not obtained<br/>Positive markers + negative CSF ± positive/negative UA</div></div>
    <div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>DISCHARGE</div><div style={{fontSize:12,marginTop:2}}>Negative markers + positive UA → oral antibiotics, F/U 12–24h<br/>Negative markers + negative UA → no antibiotics, F/U 24–36h</div></div>
  </div><TeachBox id="disposition" teaching={teaching}/></Card>
  <Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>OHSU DCH ED Fever/Suspected Sepsis 29–60 Days Clinical Pathway, March 2022<br/>Pantell RH et al. Clinical Practice Guideline: Evaluation and Management of Well-Appearing Febrile Infants 8–60 Days Old. Pediatrics 2021;148(2):e2021052228<br/>Kuppermann N et al. A Clinical Prediction Rule to Identify Febrile Infants 60 Days and Younger at Low Risk for SBI. JAMA Pediatr 2019;173(4):342-351<br/>Wang ME et al. Testing for Meningitis in Febrile Well-Appearing Young Infants With a Positive Urinalysis. Pediatrics 2019;144(3):e20183979<br/>Tzimenatos L et al. Accuracy of the Urinalysis for UTI in Febrile Infants 60 Days and Younger. Pediatrics 2018;141(2):e20173068<br/>Mintegi S et al. Invasive bacterial infections in young afebrile infants with history of fever. Arch Dis Child 2018;103(7):665-669<br/>Tosif S et al. Contamination rates of different urine collection methods. J Paediatr Child Health 2012;48(8):659-664</div></Card>
</Pad>)}

function App(){
  var s1=useState("wizard"),mode=s1[0],setMode=s1[1];
  var s2=useState("triage"),tab=s2[0],setTab=s2[1];
  var s3=useState(false),teaching=s3[0],setTeaching=s3[1];
  var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];
  var s5=useState(""),ageDays=s5[0],setAgeDays=s5[1];
  var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);
  var rr=useResponsive(),maxW=rr.maxW;
  var refTabs=[{key:"triage",label:"Triage"},{key:"decisions",label:"Decisions"},{key:"meds",label:"Antibiotics"},{key:"dispo",label:"Dispo & Refs"}];
  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>
      {mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}
      <div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (days)</label><input type="number" inputMode="decimal" value={ageDays} onChange={function(e){setAgeDays(e.target.value)}} placeholder="45" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="4.5" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
      </div>
      {mode==="wizard"&&<Wizard teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}
      {mode==="reference"&&tab==="decisions"&&<RefDecisions teaching={teaching}/>}
      {mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}
      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}><strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.<br/>Doernbecher Children's Hospital · PED · Fever/Suspected Sepsis 29–60 Days Clinical Pathway · March 2022</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
