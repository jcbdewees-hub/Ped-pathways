<title>Pediatric Sexual Assault — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo,useEffect}=React;
const C={primary:"#475569",pLight:"#f8fafc",pBorder:"#cbd5e1",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};
const TEACH={
overview:{title:"Pathway Rationale — Pediatric Sexual Assault",patho:"Pediatric sexual assault requires a dual framework: medical care for the child AND forensic evidence preservation for potential legal proceedings. The ED must balance the child's emotional safety and trauma minimization with thorough evidence collection. Procedural sedation is rarely needed for the exam — reassurance, emphasis on privacy, and eliciting the child's concerns are usually sufficient.\n\nThe exam is performed by RSI (Registered Sexual Assault Nurse Examiner) or RSI/ED provider, but the SCAN team must be notified and aware of every case. Chain of custody for forensic evidence is legally critical — once opened, the SAFE kit must remain in continuous physical possession of the examining provider.",pearls:"Mandatory notifications for ALL sexual assaults <18 years:\n1. ED Social Worker\n2. SCAN Team\n3. PEM administrator on-call for problem solving\n4. DHS Hotline for appropriate county\n\nBy Karly's Law (ORS 419B.022-024), review by a Designated Medical Professional must occur within 48 hours. Chart must be dictated STAT with cc to CARES NW. Chart and photos sent to CARES NW within 48 hours.\n\nThe exam is completed by RSI or RSI/ED, but SCAN team needs to be notified and aware of patient and final disposition.",evidence:"Oregon Medical Guidelines for Evaluation of Sexual Abuse (Oregon DOJ). AAP Committee on Child Abuse and Neglect (Kellogg, Pediatrics 2005). US DOJ National Protocol for Sexual Assault Medical Forensic Examinations. (OHSU DCH ED Pathway November 2021)"},
forensic:{title:"Forensic Evidence Collection — SAFE Kit",patho:"The Sexual Assault Forensic Evidence (SAFE) kit is a standardized evidence collection package with strict chain-of-custody requirements. Two kit types exist: pubertal (≥8 years or Tanner >I) and pre-pubertal (<8 years or Tanner I). The pubertal kit is more comprehensive with cervical swabs and pubic hair standards. The pre-pubertal kit is simplified with shorter evidence collection windows.\n\nKey biological evidence: DNA from saliva, semen, skin cells. Swabs must be thoroughly dried before packaging. Wet swab first, then dry swab. Each contact area represents a separate crime and must be labeled separately.",pearls:"PUBERTAL (≥8 years or Tanner >I): Evidence collection within 72-96 hours of assault. Steps: clothing collection → oral swabbing (within 12h) → Woods lamp exam → skin swabs after oral contact → skin/hair/nails → anogenital swabbing.\n\nPRE-PUBERTAL (<8 years or Tanner I): Evidence collection generally within 24 hours (may extend for clear penetration/ejaculation with minimal bathing). Simplified kit. Always collect unwashed clothing including underwear beyond 24h mark.\n\nChain of custody: kit in continuous physical possession of examining provider (RSI RN). Transfer immediately to law enforcement upon completion. Never lick envelopes — use tape or adhesive."},
exam:{title:"Physical & Anogenital Examination",pearls:"Procedural sedation is rarely needed. Use reassurance, privacy, and the child's own concerns to guide the process. If sedation is required → consider inpatient admission.\n\nFemale genital exam: supine frog-leg or dorsal lithotomy AND prone knee-to-chest. Gentle labial separation/traction. NO speculum in prepubertal or early pubertal girls. Examine inner thighs, mons pubis, labia, hymen (morphology, edges, notches, clefts, mounds, projections, transection, absence of tissue, acute laceration/ecchymosis, healing injuries), posterior fossa, fourchette, perineum.\n\nMale genital exam: penile, scrotal, perineal — document abrasions, ecchymoses, lacerations, petechiae, edema, discharge, erythema, tenderness.\n\nPerianal/anal: fissures, laxity/dilatation, scarring, abrasions, lacerations, edema, discharge, condylomata. NO digital rectal exam unless foreign body concern.\n\nAll skin: inspect all areas undressed — bruises, petechiae, abrasions, lacerations, bite marks, pattern injuries."},
sti:{title:"STI Prophylaxis & Testing",pearls:"STI prophylaxis NOT routinely recommended for prepubertal children (may interfere with investigation). Post-menarchal patients should be offered prophylaxis for genital-genital contact.\n\nGonorrhea/Chlamydia:\n• ≤45 kg: Ceftriaxone 25-50 mg (max 125mg) IM + Erythromycin ethylsuccinate 50 mg/kg/day PO\n• >45 to <150 kg: Ceftriaxone 500 mg IM + Doxycycline 100 mg PO (if ≥8yr, not pregnant); if <8yr or pregnant → Azithromycin 1000 mg PO\n• >150 kg: Ceftriaxone 1g IM + Doxycycline 100 mg PO\n• Ceftriaxone allergy: Gentamicin 240 mg IM + Azithromycin 2000 mg PO\n\nTrichomonas/BV: Metronidazole 2g PO ×1 (15 mg/kg/day divided TID ×7d if <45 kg)\n\nSTD testing in ED: GC/CT NAAT (urine, rectum, or throat), vaginal pathogens DNA probe (Trich, G.Vag, Candida), syphilis serology. Hep B/C testing as indicated."},
hivpep:{title:"HIV PEP & Emergency Contraception",pearls:"HIV PEP for adolescents/adults ≥35 kg (consult Peds ID if <35 kg):\nIN ED: Truvada 200/300 mg PO + Isentress 400 mg PO + Zofran 4 mg ODT\nDischarge with 1-month supply. Baseline HIV test if starting PEP.\n<18yr: Consult Peds Infectious Disease (page attending before discharge)\n≥18yr: Consult order to IMC HIV\n\nEmergency Contraception: Ella (ulipristal) 30 mg PO ×1. Offer to post-menarchal patients if: assault within 120 hours, not on reliable birth control, undesirable pregnancy, negative pregnancy test.\n\nVaccines: Hepatitis B vaccine if not fully immunized and secretion-mucosal contact. HPV vaccine for ages 9-26 if not fully immunized."},
disposition:{title:"Disposition & Follow-up",pearls:"Admit if: in consultation with DHS, patient cannot be discharged to a safe environment.\n\nDischarge with follow-up:\n• Multnomah/Washington County: Referral to CARES NW (503-276-9000)\n• Other Oregon counties: Refer to local Child Abuse Intervention Center (CAIC) — see childabuseintervention.org\n• Washington state: local CAIC (360-397-6002)\n\nEnsure: DHS/law enforcement calls made and documented. Medical follow-up arranged for STDs, pregnancy, physical injuries, and counseling.\n\nKarly's Law: chart dictated STAT with cc to CARES NW within 48 hours. Photos sent to CARES NW within 48 hours."},
strangulation:{title:"Oregon Strangulation Kit (SKIT)",pearls:"IP Consult to RSI/SANE RN for Oregon Strangulation Forensic Evidence Kit. Can be part of sexual assault workup or standalone. Each kit contains documentation, forensic evidence collection swabs, and imaging recommendations. Just-in-time training video available if SANE RN unavailable."}
};

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt};}
function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Pediatric Sexual Assault</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · November 2021</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}
function TeachBox({id,teaching}){var s=useState("pearls"),tab=s[0],setTab=s[1];if(!teaching||!TEACH[id])return null;var t=TEACH[id];var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>{tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}</div><div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeKey]||""}</div></div>);}

function Wizard({teaching}){
  var s1=useState(0),step=s1[0],setStep=s1[1];
  function reset(){setStep(0);}
  return(<Pad>
    <Q text="Sexual Assault Walk-Through" sub="Systematic evaluation · Forensic evidence · STI prophylaxis · Mandatory notifications"/>
    <TeachBox id="overview" teaching={teaching}/>
    <Card title="Step 1 — Mandatory Notifications" color={C.red}>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📞" title="MANDATORY — ALL Sexual Assaults <18 Years">
        <strong>1.</strong> Notify ED Social Worker<br/>
        <strong>2.</strong> Notify SCAN Team<br/>
        <strong>3.</strong> PEM administrator on-call for problem solving<br/>
        <strong>4.</strong> Alert DHS Hotline for appropriate county of residence<br/><br/>
        <strong>Karly's Law:</strong> Designated Medical Professional review within 48 hours. Chart dictated STAT with cc to CARES NW. Chart and photos to CARES NW within 48 hours.
      </Alert>
    </Card>
    <Card title="Step 2 — Physical Examination" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
        <strong>Full undressed exam:</strong> inspect all skin for bruises, petechiae, abrasions, lacerations, pattern injuries, bite marks.<br/>
        <strong>Oral exam:</strong> mucosa, palate, frenula, tongue, gums, lips, teeth.<br/>
        <strong>Eyes:</strong> fundoscopy if AHT suspected.<br/>
        <strong>Abdomen:</strong> bruises, abrasions; consider intra-abdominal injury.<br/>
        <strong>Anogenital exam:</strong> performed by RSI or RSI/ED provider.<br/>
        <span style={{fontSize:12,color:C.muted}}>Procedural sedation is rarely needed — try reassurance, privacy, and eliciting the child's concerns first.</span>
      </div>
      <TeachBox id="exam" teaching={teaching}/>
    </Card>
    <Card title="Step 3 — Forensic Evidence Collection (SAFE Kit)" color={C.primary}>
      <div style={{marginTop:8}}>
        <div style={{background:C.blueBg,border:"1.5px solid "+C.blueBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.blue}}>Pubertal (≥8 yr or Tanner {'>'}I): collect within 72–96 hours</div>
          <div style={{fontSize:12,marginTop:2}}>Clothing → oral swabs (within 12h) → Woods lamp → skin swabs → hair/nails → anogenital swabs (external + internal)</div>
        </div>
        <div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.purple}}>Pre-pubertal ({"<"}8 yr or Tanner I): collect within 24 hours</div>
          <div style={{fontSize:12,marginTop:2}}>Simplified kit. Same collection procedure. Always collect unwashed clothing/underwear beyond 24h. May extend for clear penetration/ejaculation with minimal bathing.</div>
        </div>
      </div>
      <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:8}}>Chain of custody: kit in continuous possession of RSI RN. Transfer to law enforcement immediately upon completion.</div>
      <TeachBox id="forensic" teaching={teaching}/>
    </Card>
    <Card title="Step 4 — Diagnostic Testing" color={C.blue}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
        <strong>All patients:</strong> GC/CT NAAT (urine, rectum, or throat) · Vaginal pathogens DNA probe · Syphilis serology · CMP<br/>
        <strong>Pregnancy test:</strong> females ≥10 years or any Tanner stage 3+/menstrual periods<br/>
        <strong>HIV screening:</strong> if PEP to be started → baseline HIV Ag/Ab Rapid (≥12yr) or HIV Ag/Ab Screening ({"<"}12yr). Generally defer HIV test if no PEP.<br/>
        <strong>Toxicology:</strong> for drug-endangered children (10–20 mL urine, chain of custody for medical-legal purposes)<br/>
        <strong>EKG:</strong> for suspected overdose<br/>
        <strong>Hep B/C:</strong> as indicated by history
      </div>
    </Card>
    <Card title="Step 5 — Treatment" color={C.primary}>
      <div style={{marginTop:8}}>
        <div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>Emergency Contraception (post-menarchal, within 120h)</div>
          <div style={{fontSize:12,marginTop:2}}>Ella (ulipristal) 30 mg PO ×1. Offer if: not on reliable birth control, undesirable pregnancy, negative pregnancy test.</div>
        </div>
        <div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.red}}>STI Prophylaxis (post-menarchal, genital-genital contact)</div>
          <div style={{fontSize:12,marginTop:2}}>GC/CT: Ceftriaxone IM + Doxycycline 100mg PO (or Azithromycin if {"<"}8yr/pregnant)<br/>Trich/BV: Metronidazole 2g PO ×1<br/>NOT routinely for prepubertal children (may interfere with investigation)</div>
        </div>
        <div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.purple}}>HIV PEP (≥35 kg; consult Peds ID if {"<"}35 kg)</div>
          <div style={{fontSize:12,marginTop:2}}>Truvada 200/300 mg PO + Isentress 400 mg PO + Zofran 4 mg ODT<br/>Discharge with 1-month supply. {"<"}18yr → Peds ID consult before discharge. ≥18yr → IMC HIV consult.</div>
        </div>
        <div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>Vaccines</div>
          <div style={{fontSize:12,marginTop:2}}>Hepatitis B vaccine if not fully immunized + secretion-mucosal contact. HPV vaccine for ages 9–26 if not fully immunized.</div>
        </div>
      </div>
      <TeachBox id="sti" teaching={teaching}/>
      <TeachBox id="hivpep" teaching={teaching}/>
    </Card>
    <Card title="Step 6 — Disposition" color={C.primary}>
      <div style={{marginTop:8}}>
        <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🏥" title="Admit">If, in consultation with DHS, patient cannot be discharged to safe environment.</Alert>
        <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Discharge with Follow-up">
          Multnomah/Washington County → CARES NW (503-276-9000)<br/>
          Other Oregon → local CAIC (childabuseintervention.org)<br/>
          Washington state → local CAIC (360-397-6002)<br/><br/>
          Ensure DHS/LE calls documented. Arrange medical follow-up for STDs, pregnancy, injuries, and counseling.
        </Alert>
      </div>
      <TeachBox id="disposition" teaching={teaching}/>
    </Card>
    <Card title="Strangulation — Oregon SKIT" color={C.muted} defaultOpen={false}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>If strangulation concern: IP consult to RSI/SANE RN for Oregon Strangulation Forensic Evidence Kit. Can be part of sexual assault workup or standalone.</div>
      <TeachBox id="strangulation" teaching={teaching}/>
    </Card>
  </Pad>);
}

function RefTriage({teaching}){return(<Pad><Q text="Triage & Notifications" sub="Mandatory notifications · SCAN · DHS · CARES NW"/><TeachBox id="overview" teaching={teaching}/><Card title="Mandatory Notifications" color={C.red}><div style={{marginTop:8}}>{["ED Social Worker","SCAN Team","PEM administrator on-call","DHS Hotline (county of residence)"].map(function(c){return <div key={c} style={{background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:600,color:C.red,marginBottom:4}}>{c}</div>})}<div style={{fontSize:12,color:C.muted,marginTop:6}}>Karly's Law: Designated Medical Professional review within 48 hours. Chart + photos to CARES NW within 48 hours.</div></div></Card><Card title="Physical Examination" color={C.primary}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Full undressed skin survey · Oral exam · Abdomen · Anogenital exam by RSI or RSI/ED provider. Procedural sedation rarely needed. Photograph all injuries per policy (attending MD takes photos, media card secured per chain of custody).</div><TeachBox id="exam" teaching={teaching}/></Card></Pad>)}
function RefDecisions({teaching}){return(<Pad><Q text="Forensic Evidence & Testing"/><Card title="SAFE Kit — Evidence Collection" color={C.primary}><div style={{marginTop:8}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div style={{background:C.blueBg,border:"1.5px solid "+C.blueBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:12,fontWeight:700,color:C.blue}}>Pubertal Kit (≥8yr/Tanner {'>'}I)</div><div style={{fontSize:11,marginTop:4}}>Collect within 72–96h<br/>Vaginal/cervical swabs<br/>Oral swabs · Pubic hair<br/>Head hair · 2 slides</div></div><div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:12,fontWeight:700,color:C.purple}}>Pre-pubertal Kit ({"<"}8yr/Tanner I)</div><div style={{fontSize:11,marginTop:4}}>Collect within 24h<br/>Inner/outer genital swabs<br/>Rectal/perianal · Oral<br/>Body swab ×2 · 2 slides</div></div></div></div><TeachBox id="forensic" teaching={teaching}/></Card><Card title="Diagnostic Testing" color={C.blue}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>GC/CT NAAT · Vaginal pathogens DNA probe · Syphilis serology · CMP<br/>Pregnancy test (≥10yr or Tanner 3+) · HIV screening if PEP indicated<br/>Toxicology for drug-endangered children (chain of custody) · EKG if overdose · Hep B/C as indicated</div></Card></Pad>)}
function RefMeds({teaching}){return(<Pad><Q text="Treatment & Prophylaxis"/><Card title="Emergency Contraception" color={C.amberMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Ella (ulipristal) 30 mg PO ×1 · Within 120 hours · Post-menarchal · Not on reliable birth control · Pregnancy test negative</div></Card><Card title="STI Prophylaxis (post-menarchal, genital contact)" color={C.primary}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>GC/CT:</strong><br/>≤45 kg: Ceftriaxone 25-50 mg (max 125mg) IM + Erythromycin 50 mg/kg/day PO<br/>{'>'}45–{"<"}150 kg: Ceftriaxone 500 mg IM + Doxycycline 100 mg PO (or Azithromycin 1g if {"<"}8yr/pregnant)<br/>{'>'}150 kg: Ceftriaxone 1g IM + Doxycycline 100 mg PO<br/>Allergy: Gentamicin 240 mg IM + Azithromycin 2g PO<br/><br/><strong>Trich/BV:</strong> Metronidazole 2g PO ×1 (15 mg/kg/day ÷ TID ×7d if {"<"}45 kg)<br/><br/><span style={{color:C.red,fontWeight:600}}>NOT routinely for prepubertal children</span></div><TeachBox id="sti" teaching={teaching}/></Card><Card title="HIV PEP (≥35 kg)" color={C.purple}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>IN ED: Truvada 200/300 mg PO + Isentress 400 mg PO + Zofran 4 mg ODT<br/>Discharge with 1-month supply<br/>{"<"}18yr: Peds ID consult (page attending before discharge)<br/>≥18yr: IMC HIV consult (503-494-8562)<br/>{"<"}35 kg: consult Peds ID for alternative regimens<br/>Baseline HIV test if starting PEP</div><TeachBox id="hivpep" teaching={teaching}/></Card><Card title="Vaccines" color={C.greenMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Hepatitis B vaccine if not fully immunized + secretion-mucosal contact<br/>HPV vaccine for ages 9–26 if not fully immunized</div></Card></Pad>)}
function RefDispo({teaching}){return(<Pad><Q text="Disposition & References"/><Card title="Disposition" color={C.primary}><div style={{marginTop:8}}><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>ADMIT</div><div style={{fontSize:12,marginTop:2}}>Cannot discharge to safe environment (DHS consultation)</div></div><div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>DISCHARGE WITH FOLLOW-UP</div><div style={{fontSize:12,marginTop:2}}>Multnomah/Washington County → CARES NW (503-276-9000)<br/>Other Oregon → local CAIC<br/>Washington state → local CAIC (360-397-6002)<br/>DHS/LE calls documented · Medical + counseling F/U arranged</div></div></div><TeachBox id="disposition" teaching={teaching}/></Card><Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>OHSU DCH ED Pediatric Sexual Assault Clinical Pathway, November 2021<br/>Oregon Medical Guidelines for Evaluation of Sexual Abuse (Oregon DOJ)<br/>Kellogg N, AAP Committee on Child Abuse and Neglect. Evaluation of sexual abuse in children. Pediatrics 2005;116:506-12<br/>US DOJ National Protocol for Sexual Assault Medical Forensic Examinations, 2004<br/>CDC STD Treatment Guidelines 2006: Sexual Assault<br/>Authors: Melinda Hartenstein RN, Beech Burns MD. Reviewed: Thomas Valvano MD, Noelle Gibson NP</div></Card></Pad>)}
