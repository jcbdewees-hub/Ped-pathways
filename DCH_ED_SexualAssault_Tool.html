const TEACH={
overview:{title:"Trauma-Informed Care — The Neurobiology",
patho:"The pediatric sexual assault exam exists at the intersection of medical care and forensic investigation, but the child's emotional safety must take absolute precedence. Understanding why requires knowledge of the neurobiology of trauma in children.\n\nDuring sexual assault, the amygdala activates the hypothalamic-pituitary-adrenal (HPA) axis, flooding the brain with cortisol and norepinephrine. In children, whose prefrontal cortex (the 'brake' on amygdala reactivity) is still maturing, this produces more intense and less modulated stress responses than in adults. The hippocampus — responsible for contextual memory encoding — is particularly vulnerable to cortisol-mediated neurotoxicity. This explains why traumatized children often have fragmented, non-linear recall: the emotional memory (amygdala-mediated) is intact and overwhelming, but the narrative memory (hippocampus-mediated) is disjointed. This is NOT evidence of fabrication.\n\nDissociation — emotional numbing, depersonalization, seeming 'not bothered' — is a protective parasympathetic response (dorsal vagal shutdown per polyvagal theory). A child who appears calm or indifferent during the exam may be deeply traumatized. Delayed disclosure is normative: only 20–30% of children disclose abuse at the time it occurs; median delay to disclosure is 1–5 years.",
pearls:"The ED exam itself can be re-traumatizing if conducted without trauma-informed principles. Key approaches:\n\n• Give the child control wherever possible — let them choose the order of exam components, take breaks, have a comfort item. Loss of control is the defining feature of sexual assault; restoring agency is therapeutic.\n\n• Explain everything before touching. Use developmentally appropriate language. 'I'm going to look at your body to make sure you're healthy' — not 'I need to examine you for evidence of assault.'\n\n• Procedural sedation is rarely needed and should be a red flag that the approach needs modification. If a child is too distressed for the exam, it can be deferred to CARES NW (within 24–72h depending on evidence window) in a purpose-built child-friendly environment.\n\n• Don't promise confidentiality you can't deliver. DHS reporting is mandatory. Instead: 'I will share what you tell me only with people who need to know to keep you safe.'\n\n• Document verbatim when possible. Use the child's exact words in quotes. Avoid interpretive language ('the child alleged' → 'the child stated'). Avoid leading questions — open-ended prompts only ('Tell me what happened' not 'Did someone touch you?').",
evidence:"Delayed disclosure: median 1–5 years; only 20–30% disclose at the time of abuse (London, Child Abuse Negl 2005; Alaggia, Child Abuse Negl 2004). Amygdala-hippocampal dissociation in trauma: cortisol impairs hippocampal function while enhancing amygdala encoding (McEwen, Ann NY Acad Sci 2006). Dissociative responses in children: dorsal vagal activation as protective mechanism (Porges, Psychophysiology 1995). Re-traumatization by medical exam: 30% of children report significant distress during forensic exam without trauma-informed modifications (Walsh, Child Maltreat 2012). AAP Clinical Report on evaluation of sexual abuse in children (Jenny, Pediatrics 2013). Oregon DOJ Medical Guidelines for Evaluation of Sexual Abuse (2020 revision)."},

forensic:{title:"Forensic Evidence — DNA Degradation & Collection Science",
patho:"Understanding DNA evidence degradation kinetics explains why time windows differ by specimen type and why collection technique matters:\n\nSemen DNA is relatively stable: spermatozoa have highly condensed chromatin (protamine-packaged, not histone-packaged), making DNA resistant to environmental nucleases. Sperm can be recovered from vaginal/cervical swabs up to 72–96 hours post-assault in post-pubertal patients. In prepubertal children, the shorter vaginal canal and absence of cervical mucus (which normally traps spermatozoa) mean evidence persists for shorter periods — hence the 24-hour pre-pubertal window.\n\nSaliva DNA degrades much faster (6–12 hours on skin) because salivary epithelial cells lack the protective chromatin condensation of sperm. Salivary amylase degrades even faster and is detectable only 4–6 hours on skin. Skin-to-skin 'touch DNA' (transferred epithelial cells) is highly variable: detectable 2–48 hours depending on contact pressure, skin moisture, and whether the area was washed.\n\nBathing reduces recovery by 50–75% for skin surface DNA but has less impact on internal (vaginal/rectal) specimens. Clothing — especially underwear — retains DNA for weeks to months if unwashed, making clothing collection valuable even well beyond the swab evidence window.",
pearls:"Common evidence collection errors that compromise forensic value:\n\n• Using the same swab for multiple sites — cross-contamination creates reasonable doubt. Each anatomic site = separate swab = separate crime element.\n\n• Not drying swabs completely — wet swabs in sealed containers promote bacterial growth and DNA degradation. Air-dry all swabs 60 minutes before packaging. Never use heat (hair dryers) — this denatures DNA.\n\n• Breaking chain of custody — the kit must remain in continuous physical possession of the examining provider. If you set it down to use the restroom, the defense can challenge every piece of evidence in the kit.\n\n• Forgetting fingernail scrapings — assailant skin cells under the child's fingernails (from scratching during assault) provide direct DNA evidence. Wooden sticks, not metal, to avoid DNA contamination.\n\n• When to extend the pre-pubertal 24h window: clear history of ejaculation/penetration + minimal bathing + clothing available = extend to 72h. The 24h guideline is conservative — discuss with CARES NW if uncertain. Always collect unwashed clothing (especially underwear) regardless of time elapsed.\n\n• Woods lamp examination: contrary to popular belief, semen does not reliably fluoresce. Many other substances fluoresce (lint, soap, lotion). Use the Woods lamp to guide swab collection but don't rely on it for screening — swab all reported contact areas regardless of fluorescence.",
evidence:"Sperm recovery timelines: vaginal up to 72–96h post-pubertal, rectal up to 24h, oral up to 12h (Astrup, Forensic Sci Int 2012). Touch DNA detection: 2–48h on skin depending on conditions (van Oorschot, Forensic Sci Int 2010). Bathing reduces skin DNA recovery 50–75% (Kenna, J Forensic Sci 2011). Woods lamp sensitivity for semen: only 43–69%, specificity poor due to false positives from fibers, soaps, lotions (Santucci, Ann Emerg Med 1999). Fingernail DNA evidence recovery: positive in 14–25% of assault cases where scratching occurred (Cook, J Forensic Leg Med 2007). Clothing DNA stability: months to years if unwashed (Breathnach, Forensic Sci Int Genet 2016)."},

exam:{title:"Physical Examination — Normal Variants & Evidence Interpretation",
patho:"The most critical teaching point in sexual assault examination is that the majority of sexually abused children have NORMAL physical examinations. Adams (2018) reviewed studies of confirmed abuse cases and found normal or non-specific findings in 95% of girls and 99% of boys. This occurs because: (1) most childhood sexual abuse involves fondling, oral contact, or digital penetration that does not cause mucosal tearing; (2) the hymen and anogenital tissues in children have remarkable healing capacity — complete mucosal healing can occur in 10–21 days without residual scarring; (3) the prepubertal hymen is elastic and estrogen-poor (thinner) but can accommodate digital contact without tearing depending on the mechanism.\n\nTherefore: a normal exam does NOT exclude abuse, and should NEVER be communicated as such to the child, family, or investigators. The clinical significance of the exam is asymmetric — positive findings are diagnostic, but negative findings are uninformative.",
pearls:"Normal variants that mimic abuse findings — misidentification of these leads to false accusations and unnecessary child removals:\n\n• Periurethral/perivestibular bands: thin tissue bridges within the vestibule that look like healed lacerations. Key difference: bands are smooth, symmetric, and bilateral; true healed lacerations are irregular and unilateral.\n\n• Labial adhesions: occur in 1.8% of prepubertal girls. Due to low estrogen, not trauma. Gently separate with traction — they are thin and translucent, not scarred.\n\n• Diastasis ani (smooth perianal area): an area of decreased anal sphincter tone that can mimic chronic penetrating trauma. It's a normal variant, especially visible in the left lateral position.\n\n• Erythema: non-specific. Can be from irritation (soaps, bubble baths, poor hygiene, dermatitis), not just trauma. Isolated erythema without other findings is NOT diagnostic of abuse.\n\n• Hymenal examination technique: supine frog-leg AND prone knee-to-chest positions are both required. The hymen appearance changes dramatically with positioning — a 'suspicious' finding in one position may be normal in another. Use gentle labial traction, not separation alone. Clefts at 3 and 9 o'clock are normal (where the hymen attaches to the vestibular wall); clefts below 3–9 o'clock extending to the base of the hymen are concerning.\n\n• Photography is part of the medical record: document all findings and specifically document normal anatomy. Photos protect against both missed findings AND false allegations.",
evidence:"Normal exam in confirmed abuse: 95% of girls, 99% of boys (Adams, J Pediatr Adolesc Gynecol 2018). Hymenal healing without scarring: complete by 10–21 days (McCann, Pediatrics 2007). Labial adhesions prevalence: 1.8% of prepubertal girls (Bacon, J Pediatr Adolesc Gynecol 2015). Adams classification of findings: 'diagnostic,' 'suggestive,' 'non-specific,' and 'normal variant' categories now standard (Adams, J Pediatr Adolesc Gynecol 2018). Prone knee-to-chest position changes hymenal diameter by 2–3mm vs supine (Berenson, Pediatrics 1995)."},

sti:{title:"STI Prophylaxis — Why Prepubertal Is Different",
patho:"STI prophylaxis is NOT routinely given to prepubertal children for evidence-based reasons distinct from post-pubertal patients:\n\n1. Lower transmission risk: The prepubertal vaginal epithelium is thin (non-estrogenized), non-cornified, and has a neutral-to-alkaline pH — paradoxically, this actually increases susceptibility to some organisms (N. gonorrhoeae, C. trachomatis) but most prepubertal abuse does not involve penetrative genital-to-genital contact, reducing overall transmission.\n\n2. Forensic interference: If prosecution is pursued, positive cultures for GC/CT from the child are powerful corroborative evidence. Empiric antibiotics given before cultures are obtained eliminate this evidence forever. In prepubertal children, GC/CT NAAT must be confirmed by culture for legal proceedings — prophylaxis prevents this.\n\n3. Different pathogen susceptibility: Prepubertal children are more susceptible to non-STI vaginitis (Group A Strep, Shigella, respiratory flora) that can mimic STI. Empiric treatment may mask the true diagnosis.\n\nIn post-pubertal patients, the calculus shifts: higher likelihood of penetrative contact, lower forensic weight of positive cultures (could be from prior consensual activity), and CDC guidelines recommend empiric prophylaxis.",
pearls:"STI testing strategy by development:\n\n• Prepubertal: Collect cultures (NOT just NAAT) from all sites of reported contact. GC/CT NAAT is a screening tool, but positive results require culture confirmation for legal admissibility in most jurisdictions. Do not give empiric antibiotics before cultures are obtained.\n\n• Post-pubertal: NAAT is sufficient for clinical decision-making. Offer full prophylaxis: ceftriaxone (GC) + doxycycline or azithromycin (CT) + metronidazole (trich/BV). Weight-based dosing matters for ceftriaxone: ≤45 kg uses 25–50 mg/kg (max 125 mg IM), >45 kg uses 500 mg IM, >150 kg uses 1g IM.\n\n• Ceftriaxone allergy: Gentamicin 240 mg IM + Azithromycin 2g PO is the alternative regimen.\n\n• Don't forget syphilis serology (RPR/VDRL), Hepatitis B/C serology, and baseline HIV testing — these are easily missed in the acute setting but critical for both the medical and legal record.\n\n• Hepatitis B vaccine should be given if the child is not fully immunized and there was secretion-mucosal contact. HPV vaccine for ages 9–26 if not fully immunized.",
evidence:"CDC STI Treatment Guidelines (2021 update): empiric prophylaxis recommended for post-pubertal sexual assault survivors. NAAT vs culture for legal proceedings: most jurisdictions require culture confirmation for GC/CT in prepubertal children (Hammerschlag, Clin Infect Dis 2011). STI prevalence in prepubertal sexual abuse: GC 2–5%, CT 1–4%, syphilis <1%, HIV <1% (Girardet, Pediatrics 2009). Post-pubertal assault STI rates: GC 6–12%, CT 10–14%, Trichomonas 15–20% (Jenny, Pediatrics 2013). Ceftriaxone dosing updates per 2020 CDC guidelines: increased from 250 mg to 500 mg for adults >45 kg due to rising MICs."},

hivpep:{title:"HIV Post-Exposure Prophylaxis — Pharmacology & Risk",
patho:"HIV transmission risk varies dramatically by exposure type, which guides the urgency and necessity of post-exposure prophylaxis (PEP):\n\nReceptive anal intercourse: 1.38% per act (highest mucosal risk — single-layer columnar rectal epithelium, rich lymphoid tissue in GALT, micro-tears from penetration expose subepithelial CD4+ T cells and dendritic cells to viral inoculum). Receptive vaginal intercourse: 0.08% per act (multi-layer squamous epithelium provides more barrier protection). Insertive intercourse: 0.04–0.11%. Oral: <0.04% (intact oral mucosa is relatively resistant; salivary enzymes have antiviral properties).\n\nThe 3-drug PEP regimen (2 NRTIs + integrase inhibitor) works by establishing intracellular drug concentrations before HIV establishes a latent reservoir. After mucosal exposure, HIV initially infects local dendritic cells and CD4+ T cells, then migrates to regional lymph nodes over 24–72 hours before systemic dissemination. PEP must be initiated within this window — ideally <24 hours, acceptable up to 72 hours, diminishing benefit beyond 72 hours.\n\nThe standard adult/adolescent regimen (Truvada + Isentress/raltegravir) was chosen for tolerability: integrase inhibitors have fewer GI side effects than protease inhibitors, improving the 28-day completion rate from ~40% (PI-based regimens) to ~60% (INSTI-based regimens).",
pearls:"Pediatric PEP challenges:\n\n• Children <35 kg: Consult Peds Infectious Disease BEFORE discharge. Truvada is NOT approved for children <25 kg (~age 7–8). Younger children need individual NRTI dosing (emtricitabine + tenofovir DF or abacavir + lamivudine) with age-appropriate formulations (liquids). Raltegravir has chewable tablets for ≥11 kg.\n\n• The 72-hour window is not a cliff — it's a gradient. PEP started at 48 hours is less effective than at 4 hours, but still more effective than no PEP. If the child presents at 60 hours, start PEP while discussing with ID.\n\n• Anti-emetic co-prescription is essential: Zofran (ondansetron) 4 mg ODT in the ED and for the first week. GI side effects are the #1 reason for PEP non-completion.\n\n• Baseline HIV testing before starting PEP (rapid test if available). If baseline positive → PEP becomes treatment, and 3-drug therapy is appropriate regardless.\n\n• Follow-up HIV testing: 4–6 weeks, 3 months, and 6 months post-exposure. 4th generation Ag/Ab testing can detect infection as early as 2–4 weeks.\n\n• Adolescents ≥18: consult IMC HIV program (not Peds ID) for ongoing management and prescription refills.",
evidence:"HIV transmission risk per act: receptive anal 1.38%, receptive vaginal 0.08%, insertive 0.04–0.11%, oral <0.04% (Patel, AIDS 2014). PEP efficacy: 81% risk reduction in occupational exposure studies (Cardo, NEJM 1997). 72-hour window: animal models show near-complete loss of benefit beyond 72h (Tsai, J Virol 1998). INSTI-based PEP completion rates ~60% vs PI-based ~40% (Ford, Clin Infect Dis 2014). Truvada not approved <25 kg; raltegravir chewable available ≥11 kg (HHS Updated Guidelines for PEP, 2016). 4th generation Ag/Ab test window period: 2–4 weeks (Delaney, Ann Intern Med 2017)."},

disposition:{title:"Disposition, Follow-up & Mandatory Reporting",
patho:"The legal framework for pediatric sexual assault reporting in Oregon involves mandatory reporting, specialized follow-up centers, and specific statutory requirements that ED providers must understand:\n\nKarly's Law (ORS 419B.022-024) was enacted after the 2005 death of Karly Sheehan, a 3-year-old whose abuse was missed despite multiple medical encounters. The law requires: (1) Any child presenting with suspicious injury must be seen by a Designated Medical Professional (DMP) within 48 hours of the DHS report; (2) The medical chart must be dictated STAT with cc to CARES NW; (3) All documentation and photographs must be transmitted to CARES NW within 48 hours. The 48-hour requirement exists because evidence from the Sheehan case showed that delays in specialized medical evaluation allowed continued abuse.\n\nCARES NW (Child Abuse Response and Evaluation Services at OHSU/DCH) is the regional child abuse medical assessment center. Their role extends beyond the ED: comprehensive medical evaluation (head-to-toe, developmental screening, growth assessment), forensic interview by trained professionals (not repeated ED questioning), connection to advocacy services, and longitudinal follow-up (medical, psychological, legal coordination).",
pearls:"ED-specific disposition pearls:\n\n• Admit if: DHS determines the child cannot be safely discharged to the current environment. The ED provider does NOT make this determination — DHS does, with input from the medical team.\n\n• Before discharge, ensure ALL of the following are completed and documented: DHS hotline call made (document call time, case number, intake worker name), law enforcement notified, CARES NW referral submitted, follow-up appointment scheduled, safety plan discussed with non-offending caregiver.\n\n• Documentation in the ED: use the child's exact words in quotation marks. Document what you observed, not your interpretation. 'Child stated: I don't want to go back to daddy's house because he does bad touches' is far more powerful — medically and legally — than 'child reports history consistent with sexual abuse by father.'\n\n• Avoid repeated forensic interviews in the ED — each re-telling increases trauma and introduces memory contamination. Get enough history for medical decision-making (mechanism, timing, pain, bleeding). Leave the formal forensic interview to CARES NW's trained forensic interviewers.\n\n• The 'safe caregiver' question: identify a non-offending caregiver who can provide emotional support. If the offender is in the home and the non-offending caregiver is unaware or unsupportive, this escalates the DHS safety assessment significantly.",
evidence:"Karly's Law: ORS 419B.022-024, enacted 2007 following the death of Karly Sheehan (Karly's Law Task Force Report, 2006). CARES NW model: multi-disciplinary team approach reduces child re-traumatization and improves prosecution rates (Cross, Child Abuse Negl 2007). Repeated forensic interviews: each re-telling increases inconsistencies without improving accuracy (La Rooy, Dev Rev 2010). Documentation of verbatim statements: improves forensic utility of medical records in 78% of cases (Adams, Child Abuse Negl 2007). Oregon mandatory reporting statute: ORS 419B.010 — medical providers are mandatory reporters and failure to report is a Class A violation."},

strangulation:{title:"Strangulation — Delayed Lethality & Forensic Evaluation",
patho:"Strangulation follows a specific pathophysiological sequence that explains both the clinical findings and the risk of delayed death:\n\nVenous obstruction occurs first (2–4 lbs of pressure): jugular veins are compressed before carotid arteries, causing venous congestion above the level of compression. Blood enters the head via the still-patent carotid arteries but cannot exit → elevated venous pressure → petechiae (conjunctival, facial, behind ears), facial plethora, lip/tongue cyanosis. This explains why petechiae are the most common physical finding (present in 50% of strangulation cases) and why they appear ABOVE the ligature line.\n\nArterial obstruction occurs next (11 lbs of pressure): carotid compression reduces cerebral blood flow, producing lightheadedness, visual changes, and loss of consciousness within 10–15 seconds. Carotid body stimulation can trigger reflex bradycardia and vasovagal syncope.\n\nAirway obstruction requires the most force (33 lbs of pressure) and produces hoarseness, stridor, dysphagia, and dyspnea. Critical delayed risks: laryngeal edema can progress over 24–48 hours to complete airway obstruction (this is the mechanism of delayed death), and carotid intimal dissection can cause delayed thrombosis → stroke hours to days later.",
pearls:"Strangulation is a high-lethality mechanism that is frequently under-documented in the ED:\n\n• Visible external injuries are present in only 50% of cases. A normal neck exam does NOT exclude significant internal injury. Document the absence of findings as carefully as you would document their presence.\n\n• Always ask about and document: loss of consciousness (even briefly — implies carotid compression), incontinence (implies prolonged cerebral hypoxia), voice changes (implies laryngeal injury), dysphagia (implies pharyngeal/esophageal injury), and vision changes (implies retinal vessel congestion).\n\n• When to image: CT angiography of the neck for ANY of: loss of consciousness, focal neurological deficit, carotid bruit, expanding hematoma, significant mechanism. Standard CT neck (non-contrast) for laryngeal/hyoid fracture concern (neck tenderness, crepitus, voice change, stridor).\n\n• Admit for observation if: any alteration in consciousness, stridor, voice change, progressive neck swelling, abnormal imaging, or high-risk mechanism. Delayed airway compromise from progressive laryngeal edema can occur up to 36 hours post-strangulation.\n\n• The Oregon Strangulation Kit (SKIT) is a standardized forensic evidence collection kit — IP consult to RSI/SANE RN. It can be combined with the SAFE kit or used standalone. Just-in-time training video is available if SANE RN is unavailable.\n\n• In the context of sexual assault, strangulation elevates the lethality risk assessment significantly — prior strangulation is the strongest predictor of subsequent homicide in intimate partner violence (OR 7.48).",
evidence:"Strangulation pressure thresholds: venous 2–4 lbs, carotid 11 lbs, airway 33 lbs (Plattner, J Forensic Sci 2005). Petechiae present in 50% of strangulation cases (Strack, J Emerg Med 2001). External injuries absent in 50% of cases (Strack, J Emerg Med 2001). Delayed death from laryngeal edema: case reports up to 36 hours post-strangulation (Iserson, J Emerg Med 1984). Carotid dissection from strangulation: 0.4–1% of cases, stroke risk 60% if untreated (Malek, J Trauma 2000). Prior strangulation as predictor of homicide: OR 7.48 (Glass, J Interpers Violence 2008). Loss of consciousness in <10 seconds with bilateral carotid occlusion (Reay, Ann Emerg Med 1982)."}

function calcDoses(w){var wt=parseFloat(w)||0;if(wt<=0)return null;return{w:wt};}

function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Pediatric Sexual Assault</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · November 2021</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}
function TeachBox({id,teaching}){var s=useState("pearls"),tab=s[0],setTab=s[1];if(!teaching||!TEACH[id])return null;var t=TEACH[id];var tabs=[];if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});if(tabs.length===0)return null;var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}><div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div><div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>{tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}</div><div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t[activeKey]||""}</div></div>);}

function Wizard({teaching}){
  var s1=useState(0),step=s1[0],setStep=s1[1];
  function reset(){setStep(0);}
  return(<Pad>
    <Q text="Sexual Assault Walk-Through" sub="Systematic evaluation · Forensic evidence · STI prophylaxis · Mandatory notifications"/>
    <TeachBox id="overview" teaching={teaching}/>
    <Card title="Step 1 — Mandatory Notifications" color={C.red}>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📞" title="MANDATORY — ALL Sexual Assaults <18 Years">
        <strong>1.</strong> Notify ED Social Worker<br/>
        <strong>2.</strong> Notify SCAN Team<br/>
        <strong>3.</strong> PEM administrator on-call for problem solving<br/>
        <strong>4.</strong> Alert DHS Hotline for appropriate county of residence<br/><br/>
        <strong>Karly's Law:</strong> Designated Medical Professional review within 48 hours. Chart dictated STAT with cc to CARES NW. Chart and photos to CARES NW within 48 hours.
      </Alert>
    </Card>
    <Card title="Step 2 — Physical Examination" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
        <strong>Full undressed exam:</strong> inspect all skin for bruises, petechiae, abrasions, lacerations, pattern injuries, bite marks.<br/>
        <strong>Oral exam:</strong> mucosa, palate, frenula, tongue, gums, lips, teeth.<br/>
        <strong>Eyes:</strong> fundoscopy if AHT suspected.<br/>
        <strong>Abdomen:</strong> bruises, abrasions; consider intra-abdominal injury.<br/>
        <strong>Anogenital exam:</strong> performed by RSI or RSI/ED provider.<br/>
        <span style={{fontSize:12,color:C.muted}}>Procedural sedation is rarely needed — try reassurance, privacy, and eliciting the child's concerns first.</span>
      </div>
      <TeachBox id="exam" teaching={teaching}/>
    </Card>
    <Card title="Step 3 — Forensic Evidence Collection (SAFE Kit)" color={C.primary}>
      <div style={{marginTop:8}}>
        <div style={{background:C.blueBg,border:"1.5px solid "+C.blueBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.blue}}>Pubertal (≥8 yr or Tanner {'>'}I): collect within 72–96 hours</div>
          <div style={{fontSize:12,marginTop:2}}>Clothing → oral swabs (within 12h) → Woods lamp → skin swabs → hair/nails → anogenital swabs (external + internal)</div>
        </div>
        <div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.purple}}>Pre-pubertal ({"<"}8 yr or Tanner I): collect within 24 hours</div>
          <div style={{fontSize:12,marginTop:2}}>Simplified kit. Same collection procedure. Always collect unwashed clothing/underwear beyond 24h. May extend for clear penetration/ejaculation with minimal bathing.</div>
        </div>
      </div>
      <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:8}}>Chain of custody: kit in continuous possession of RSI RN. Transfer to law enforcement immediately upon completion.</div>
      <TeachBox id="forensic" teaching={teaching}/>
    </Card>
    <Card title="Step 4 — Diagnostic Testing" color={C.blue}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
        <strong>All patients:</strong> GC/CT NAAT (urine, rectum, or throat) · Vaginal pathogens DNA probe · Syphilis serology · CMP<br/>
        <strong>Pregnancy test:</strong> females ≥10 years or any Tanner stage 3+/menstrual periods<br/>
        <strong>HIV screening:</strong> if PEP to be started → baseline HIV Ag/Ab Rapid (≥12yr) or HIV Ag/Ab Screening ({"<"}12yr). Generally defer HIV test if no PEP.<br/>
        <strong>Toxicology:</strong> for drug-endangered children (10–20 mL urine, chain of custody for medical-legal purposes)<br/>
        <strong>EKG:</strong> for suspected overdose<br/>
        <strong>Hep B/C:</strong> as indicated by history
      </div>
    </Card>
    <Card title="Step 5 — Treatment" color={C.primary}>
      <div style={{marginTop:8}}>
        <div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>Emergency Contraception (post-menarchal, within 120h)</div>
          <div style={{fontSize:12,marginTop:2}}>Ella (ulipristal) 30 mg PO ×1. Offer if: not on reliable birth control, undesirable pregnancy, negative pregnancy test.</div>
        </div>
        <div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.red}}>STI Prophylaxis (post-menarchal, genital-genital contact)</div>
          <div style={{fontSize:12,marginTop:2}}>GC/CT: Ceftriaxone IM + Doxycycline 100mg PO (or Azithromycin if {"<"}8yr/pregnant)<br/>Trich/BV: Metronidazole 2g PO ×1<br/>NOT routinely for prepubertal children (may interfere with investigation)</div>
        </div>
        <div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
          <div style={{fontSize:13,fontWeight:700,color:C.purple}}>HIV PEP (≥35 kg; consult Peds ID if {"<"}35 kg)</div>
          <div style={{fontSize:12,marginTop:2}}>Truvada 200/300 mg PO + Isentress 400 mg PO + Zofran 4 mg ODT<br/>Discharge with 1-month supply. {"<"}18yr → Peds ID consult before discharge. ≥18yr → IMC HIV consult.</div>
        </div>
        <div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>Vaccines</div>
          <div style={{fontSize:12,marginTop:2}}>Hepatitis B vaccine if not fully immunized + secretion-mucosal contact. HPV vaccine for ages 9–26 if not fully immunized.</div>
        </div>
      </div>
      <TeachBox id="sti" teaching={teaching}/>
      <TeachBox id="hivpep" teaching={teaching}/>
    </Card>
    <Card title="Step 6 — Disposition" color={C.primary}>
      <div style={{marginTop:8}}>
        <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🏥" title="Admit">If, in consultation with DHS, patient cannot be discharged to safe environment.</Alert>
        <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Discharge with Follow-up">
          Multnomah/Washington County → CARES NW (503-276-9000)<br/>
          Other Oregon → local CAIC (childabuseintervention.org)<br/>
          Washington state → local CAIC (360-397-6002)<br/><br/>
          Ensure DHS/LE calls documented. Arrange medical follow-up for STDs, pregnancy, injuries, and counseling.
        </Alert>
      </div>
      <TeachBox id="disposition" teaching={teaching}/>
    </Card>
    <Card title="Strangulation — Oregon SKIT" color={C.muted} defaultOpen={false}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>If strangulation concern: IP consult to RSI/SANE RN for Oregon Strangulation Forensic Evidence Kit. Can be part of sexual assault workup or standalone.</div>
      <TeachBox id="strangulation" teaching={teaching}/>
    </Card>
  </Pad>);
}

function RefTriage({teaching}){return(<Pad><Q text="Triage & Notifications" sub="Mandatory notifications · SCAN · DHS · CARES NW"/><TeachBox id="overview" teaching={teaching}/><Card title="Mandatory Notifications" color={C.red}><div style={{marginTop:8}}>{["ED Social Worker","SCAN Team","PEM administrator on-call","DHS Hotline (county of residence)"].map(function(c){return <div key={c} style={{background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:600,color:C.red,marginBottom:4}}>{c}</div>})}<div style={{fontSize:12,color:C.muted,marginTop:6}}>Karly's Law: Designated Medical Professional review within 48 hours. Chart + photos to CARES NW within 48 hours.</div></div></Card><Card title="Physical Examination" color={C.primary}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Full undressed skin survey · Oral exam · Abdomen · Anogenital exam by RSI or RSI/ED provider. Procedural sedation rarely needed. Photograph all injuries per policy (attending MD takes photos, media card secured per chain of custody).</div><TeachBox id="exam" teaching={teaching}/></Card></Pad>)}
function RefDecisions({teaching}){return(<Pad><Q text="Forensic Evidence & Testing"/><Card title="SAFE Kit — Evidence Collection" color={C.primary}><div style={{marginTop:8}}><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><div style={{background:C.blueBg,border:"1.5px solid "+C.blueBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:12,fontWeight:700,color:C.blue}}>Pubertal Kit (≥8yr/Tanner {'>'}I)</div><div style={{fontSize:11,marginTop:4}}>Collect within 72–96h<br/>Vaginal/cervical swabs<br/>Oral swabs · Pubic hair<br/>Head hair · 2 slides</div></div><div style={{background:C.purpleBg,border:"1.5px solid "+C.purpleBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:12,fontWeight:700,color:C.purple}}>Pre-pubertal Kit ({"<"}8yr/Tanner I)</div><div style={{fontSize:11,marginTop:4}}>Collect within 24h<br/>Inner/outer genital swabs<br/>Rectal/perianal · Oral<br/>Body swab ×2 · 2 slides</div></div></div></div><TeachBox id="forensic" teaching={teaching}/></Card><Card title="Diagnostic Testing" color={C.blue}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>GC/CT NAAT · Vaginal pathogens DNA probe · Syphilis serology · CMP<br/>Pregnancy test (≥10yr or Tanner 3+) · HIV screening if PEP indicated<br/>Toxicology for drug-endangered children (chain of custody) · EKG if overdose · Hep B/C as indicated</div></Card></Pad>)}
function RefMeds({teaching}){return(<Pad><Q text="Treatment & Prophylaxis"/><Card title="Emergency Contraception" color={C.amberMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Ella (ulipristal) 30 mg PO ×1 · Within 120 hours · Post-menarchal · Not on reliable birth control · Pregnancy test negative</div></Card><Card title="STI Prophylaxis (post-menarchal, genital contact)" color={C.primary}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}><strong>GC/CT:</strong><br/>≤45 kg: Ceftriaxone 25-50 mg (max 125mg) IM + Erythromycin 50 mg/kg/day PO<br/>{'>'}45–{"<"}150 kg: Ceftriaxone 500 mg IM + Doxycycline 100 mg PO (or Azithromycin 1g if {"<"}8yr/pregnant)<br/>{'>'}150 kg: Ceftriaxone 1g IM + Doxycycline 100 mg PO<br/>Allergy: Gentamicin 240 mg IM + Azithromycin 2g PO<br/><br/><strong>Trich/BV:</strong> Metronidazole 2g PO ×1 (15 mg/kg/day ÷ TID ×7d if {"<"}45 kg)<br/><br/><span style={{color:C.red,fontWeight:600}}>NOT routinely for prepubertal children</span></div><TeachBox id="sti" teaching={teaching}/></Card><Card title="HIV PEP (≥35 kg)" color={C.purple}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>IN ED: Truvada 200/300 mg PO + Isentress 400 mg PO + Zofran 4 mg ODT<br/>Discharge with 1-month supply<br/>{"<"}18yr: Peds ID consult (page attending before discharge)<br/>≥18yr: IMC HIV consult (503-494-8562)<br/>{"<"}35 kg: consult Peds ID for alternative regimens<br/>Baseline HIV test if starting PEP</div><TeachBox id="hivpep" teaching={teaching}/></Card><Card title="Vaccines" color={C.greenMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Hepatitis B vaccine if not fully immunized + secretion-mucosal contact<br/>HPV vaccine for ages 9–26 if not fully immunized</div></Card></Pad>)}
function RefDispo({teaching}){return(<Pad><Q text="Disposition & References"/><Card title="Disposition" color={C.primary}><div style={{marginTop:8}}><div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>ADMIT</div><div style={{fontSize:12,marginTop:2}}>Cannot discharge to safe environment (DHS consultation)</div></div><div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>DISCHARGE WITH FOLLOW-UP</div><div style={{fontSize:12,marginTop:2}}>Multnomah/Washington County → CARES NW (503-276-9000)<br/>Other Oregon → local CAIC<br/>Washington state → local CAIC (360-397-6002)<br/>DHS/LE calls documented · Medical + counseling F/U arranged</div></div></div><TeachBox id="disposition" teaching={teaching}/></Card><Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>OHSU DCH ED Pediatric Sexual Assault Clinical Pathway, November 2021<br/>Oregon Medical Guidelines for Evaluation of Sexual Abuse (Oregon DOJ)<br/>Kellogg N, AAP Committee on Child Abuse and Neglect. Evaluation of sexual abuse in children. Pediatrics 2005;116:506-12<br/>US DOJ National Protocol for Sexual Assault Medical Forensic Examinations, 2004<br/>CDC STD Treatment Guidelines 2006: Sexual Assault<br/>Authors: Melinda Hartenstein RN, Beech Burns MD. Reviewed: Thomas Valvano MD, Noelle Gibson NP</div></Card></Pad>)}

function App(){var s1=useState("wizard"),mode=s1[0],setMode=s1[1];var s2=useState("triage"),tab=s2[0],setTab=s2[1];var s3=useState(false),teaching=s3[0],setTeaching=s3[1];var rr=useResponsive(),maxW=rr.maxW;var refTabs=[{key:"triage",label:"Triage"},{key:"decisions",label:"Forensics"},{key:"meds",label:"Treatment"},{key:"dispo",label:"Dispo & Refs"}];return(<div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}><Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>{mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}{mode==="wizard"&&<Wizard teaching={teaching}/>}{mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}{mode==="reference"&&tab==="decisions"&&<RefDecisions teaching={teaching}/>}{mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching}/>}{mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}<div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}><strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.<br/>Doernbecher Children's Hospital · PED · Pediatric Sexual Assault Clinical Pathway · November 2021</div></div>);}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
