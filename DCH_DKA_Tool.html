<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric DKA — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo}=React;
const C={primary:"#7c2d12",pLight:"#fff7ed",pBorder:"#fed7aa",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"DKA Pathophysiology",content:"DKA is a complex metabolic state of hyperglycemia, ketosis, and acidosis. Hyperglycemia causes osmotic diuresis leading to excessive free water and electrolyte losses. Resultant hypovolemia causes tissue hypoperfusion and lactic acidosis. Treatment goals: correct dehydration and hyperglycemia, anticipate and resolve electrolyte abnormalities, identify precipitating illness, and monitor closely. Target glucose decrease is 50–100 mg/dL/hour — NOT faster."},
  cerebralEdema:{title:"Cerebral Edema",content:"DKA-associated cerebral edema occurs in ~1% of episodes. Overly rapid correction of serum hyperglycemia and osmolarity may create a gradient between intracerebral and serum osmolarity. However, recent evidence (Kuppermann 2018) shows no association between rates/volumes of fluid resuscitation and cerebral edema development. Our approach: use fluid judiciously if no dehydration signs, but resuscitate per standard practice if dehydration is present. Warning signs: headache, bradycardia, irritability, AMS, incontinence, focal neuro deficits."},
  potassium:{title:"Potassium in DKA",content:"Despite often severe total body potassium depletion, apparent serum hyperkalemia is frequently observed before volume resuscitation due to transcellular shift (acidosis drives K⁺ out of cells, insulin drives K⁺ into cells). As insulin is started and acidosis corrects, serum K⁺ will drop — sometimes precipitously. Continuous cardiac monitoring is required. Do NOT add potassium until K⁺ <5 mmol/L AND urine output is established. Use combined KAcetate + KPhos (20 mEq each) to also replace phosphorus losses."},
  bicarbonate:{title:"Bicarbonate — NOT Recommended",content:"Supplemental bicarbonate is NOT recommended in DKA. A pediatric trial of bicarbonate in severe metabolic acidosis (pH <7.15) showed no benefit over placebo. Multiple studies suggest bicarbonate may cause paradoxical intracellular acidosis, worsen tissue perfusion, cause hypokalemia, and contribute to cerebral edema. Acidosis resolves with isotonic fluid replenishment and insulin therapy. Only consider if pH <7.0 AND endocrinology/PICU specifically recommends it."},
  insulin:{title:"Insulin in DKA",content:"Start insulin ONLY after consulting endocrinology. Use Regular insulin 0.05 units/kg/hr IV — do NOT bolus insulin. Critical: flush Microbore syringe tubing with 10–20 mL of insulin solution before starting (or flush 1–2 mL and allow to dwell 20 minutes) because insulin adsorbs to tubing. Alaris 25 mL tubing requires 50 mL flush. Do NOT use patient's personal pump. Continue insulin infusion until pH >7.3 and HCO₃ >15, then transition to SQ insulin per endocrinology."},
  twoBag:{title:"Two-Bag Fluid System",content:"The two-bag system allows rapid glucose-responsive fluid adjustment without changing bags. Bag A: NS + 40 mEq K (no dextrose). Bag B: D10 NS + 40 mEq K. The sum of both rates always equals 1.5× maintenance. As glucose drops below 300 or falls >100 mg/dL/hr, shift rate from Bag A to Bag B to add dextrose while maintaining the same total rate. Target glucose 200–300 mg/dL until acidosis corrects."},
  hhs:{title:"Hyperosmolar Hyperglycemic State (HHS)",content:"HHS may coexist with or mimic DKA. Features: glucose >600 mg/dL, serum osmolarity >320 mOsm/L, may have bicarbonate >15 (mild acidosis only). HHS patients may develop hypotension if serum osmolarity falls rapidly because their BP is supported by hyperosmolality in the context of severe dehydration. Contact endocrinology immediately if HHS is suspected."},
  fluids:{title:"Fluid Resuscitation Evidence",content:"The FLUID trial (Kuppermann, NEJM 2018) found no significant difference in neurologic outcomes between rapid (20 mL/kg) and slow (10 mL/kg) fluid administration, nor between 0.9% and 0.45% saline. This pathway uses NS 20 mL/kg if signs of dehydration are present (faster if shock), and 10 mL/kg over 60 minutes if no dehydration signs. Avoid excessive fluid administration beyond what is needed for resuscitation."},
  picu:{title:"PICU Admission Criteria",content:"Any one of: hemodynamically unstable, altered mental status, requiring insulin drip, or hypokalemia. In practice, nearly all DKA patients meeting pathway inclusion criteria will require PICU admission for insulin drip management. New-onset DKA, HCO₃ <12, or K⁺ <3.5 should also prompt early PICU involvement."},
};

function calcMaint(w){
  if(w<=10)return w*4;
  if(w<=20)return 40+(w-10)*2;
  return 60+(w-20)*1;
}

function calcDoses(w){
  const wt=parseFloat(w)||0;if(wt<=0)return null;
  const maint=calcMaint(wt);
  const maint15=Math.round(maint*1.5*10)/10;
  const maint075=Math.round(maint*0.75*10)/10;
  return{w:wt,
    bolus20:Math.round(wt*20),bolus10:Math.round(wt*10),
    insulin:Math.round(wt*0.05*100)/100,
    hyper3:Math.round(wt*5),
    mannitol05:Math.round(wt*0.5*10)/10,mannitol1:Math.round(wt*1*10)/10,
    maint,maint15,maint075,
  };
}

// Primitives
function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:22,fontWeight:700,marginTop:4,lineHeight:1.2}}>Diabetic Ketoacidosis</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · Ages 1–18 · August 2021</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function Sec({title,color,children}){return(<div style={{marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingBottom:4,borderBottom:`2px solid ${color}`}}>{title}</div>{children}</div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const doses=useMemo(()=>calcDoses(weightKg),[weightKg]);

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"decision",label:"Decisions"},
    {key:"meds",label:"Fluids & Insulin"},
    {key:"cerebral",label:"Cerebral Edema"},
    {key:"special",label:"Dispo & Refs"},
  ];

  return(
    <div style={{maxWidth:520,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="30" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
        {doses&&<div style={{alignSelf:"flex-end",paddingBottom:8}}>
          <div style={{fontSize:9,color:C.muted,textTransform:"uppercase"}}>Insulin</div>
          <div style={{fontSize:13,fontWeight:700,color:C.primary,fontFamily:"'IBM Plex Mono',monospace"}}>{doses.insulin} u/hr</div>
        </div>}
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="Ages 1–18 presenting in DKA"/>
          <TeachBox id="overview" teaching={teaching}/>

          <Card title="DKA Definition — Inclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔬" title="All 3 Required">
                <strong>Glucose &gt;250 mg/dL</strong> AND<br/>
                <strong>Venous pH &lt;7.3 OR HCO₃ &lt;15 mmol/L</strong> AND<br/>
                <strong>Ketonuria</strong>
              </Alert>
              <Alert color={C.muted} border={C.rule} bg={C.white} icon="✘" title="Exclusion">Age &lt;1 year · Hyperglycemia without acidosis</Alert>
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI Level II</strong><br/>
              Full vitals · Weight · Strict I/O<br/>
              <strong>IV access — 2 peripheral sites in separate extremities</strong> (PICU admission anticipated)<br/>
              <span style={{fontSize:12,color:C.muted}}>If unable to get PIV → consider central line or IO · Avoid arterial access</span><br/>
              Venous blood glucose + UA for ketones<br/>
              Cardiac/pulse ox monitoring<br/>
              <strong>Q1h vitals · Q1h neuro checks</strong><br/>
              <strong style={{color:C.red}}>NPO</strong> · Strict I/O
            </div>
          </Card>

          <Card title="Diagnostics" color={C.blue}>
            <div style={{marginTop:8}}>
              <Sec title="All Patients" color={C.blue}>
                <div style={{fontSize:13,lineHeight:1.7}}>
                  Hourly capillary or venous glucose<br/>
                  Serum: glucose, CMP, phosphorus, POC VBG w/ lactate, Chem8<br/>
                  Then <strong>Chem8 + POC VBG/lactate Q2–4h</strong> until acidosis resolved + transitioned to SQ insulin<br/>
                  UA with micro (culture if indicated)<br/>
                  Urine ketones Q void until ketosis resolves
                </div>
              </Sec>
              <Sec title="New-Onset Diabetics — Consider" color={C.purple}>
                <div style={{fontSize:13}}>A1C · TTG · IgA</div>
              </Sec>
            </div>
          </Card>

          <Card title="Evaluate For" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              • Hydration status<br/>
              • Comorbid condition / precipitating illness<br/>
              • Signs of cerebral edema (see Cerebral Edema tab)<br/>
              • Signs of HHS (glucose &gt;600, osm &gt;320)
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Treatment Algorithm"/>

          <Card title="Initial Fluid Resuscitation" color={C.primary}>
            <div style={{marginTop:8}}>
              <div style={{display:"flex",gap:6}}>
                <div style={{flex:1,background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.red}}>Signs of Dehydration or Shock</div>
                  <div style={{fontSize:12,marginTop:4}}>NS {doses?<strong style={{fontFamily:"'IBM Plex Mono',monospace"}}>{doses.bolus20} mL</strong>:"20 mL/kg"} over 30 min<br/><span style={{fontSize:11,color:C.muted}}>Faster if shock</span></div>
                </div>
                <div style={{flex:1,background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.blue}}>No Dehydration Signs</div>
                  <div style={{fontSize:12,marginTop:4}}>NS {doses?<strong style={{fontFamily:"'IBM Plex Mono',monospace"}}>{doses.bolus10} mL</strong>:"10 mL/kg"} over 60 min</div>
                </div>
              </div>
              <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:8}}>Avoid excessive fluid administration</div>
            </div>
            <TeachBox id="fluids" teaching={teaching}/>
          </Card>

          <Card title="Insulin — After Endocrine Consult" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="Regular insulin (0.05 u/kg/hr)" value={doses?doses.insulin:"—"} unit={doses?"units/hr":""}/>
              <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:6}}>Do NOT bolus insulin · Do NOT use patient's personal pump</div>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>Flush Microbore tubing with 10–20 mL insulin solution before starting (or 1–2 mL + dwell 20 min). Alaris 25 mL tubing: flush with 50 mL.</div>
            </div>
            <TeachBox id="insulin" teaching={teaching}/>
          </Card>

          <Card title="Potassium Replacement" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>After initial hydration, if K⁺ &lt;5 mmol/L AND urine output established:</strong><br/>
              NS 0.9% with <strong>20 mEq KAcetate + 20 mEq KPhos</strong> at 1.5× maintenance rate
              {doses&&<div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,color:C.primary,marginTop:6}}>1.5× maint = {doses.maint15} mL/hr</div>}
              <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:6}}>No urine output? → Consult endocrine/PICU BEFORE adding K⁺</div>
            </div>
            <TeachBox id="potassium" teaching={teaching}/>
          </Card>

          <Card title="Two-Bag Fluid System (on insulin drip)" color={C.blue}>
            <div style={{fontSize:13,lineHeight:1.6,marginTop:8}}>
              <strong>Rate Bag A + Rate Bag B = 1.5× maintenance</strong>
              {doses&&<div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,fontWeight:600,color:C.primary,margin:"4px 0"}}>= {doses.maint15} mL/hr total</div>}
              Add dextrose (via Bag B) when glucose &lt;300 OR drops &gt;100 mg/dL/hr.<br/>
              <strong>Keep glucose 200–300 mg/dL until acidosis corrects.</strong>
            </div>
            <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:8,overflow:"hidden",marginTop:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1.5fr 1.5fr 1.5fr 1fr",background:C.primary,borderRadius:"6px 6px 0 0"}}>
                {["Glucose","Bag A (no dex)","Bag B (D10+K)","Final Dex"].map(h=>(<div key={h} style={{padding:"5px 8px",color:C.white,fontWeight:700,fontSize:9}}>{h}</div>))}
              </div>
              {[
                ["≥300","1.5× maint","0","D0"],
                ["200–300","0.75× maint","0.75× maint","D5"],
                ["150–200","0","1.5× maint","D10"],
                ["<150","Contact provider","",""],
              ].map((row,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1.5fr 1.5fr 1.5fr 1fr",background:i%2===0?C.white:"#fafaf7",borderBottom:`1px solid ${C.rule}`}}>
                  {row.map((cell,j)=>(<div key={j} style={{padding:"6px 8px",fontSize:11,fontWeight:j===0?700:500,color:j===0?(i===3?C.red:C.ink):C.ink}}>{cell}{j>0&&j<3&&doses&&cell&&i<3?<span style={{display:"block",fontFamily:"'IBM Plex Mono',monospace",fontSize:10,color:C.primary,fontWeight:600}}>{j===1?(i===0?doses.maint15:i===1?doses.maint075:0):j===2?(i===0?0:i===1?doses.maint075:doses.maint15):""} mL/hr</span>:null}</div>))}
                </div>
              ))}
            </div>
            <div style={{fontSize:11,color:C.red,fontWeight:600,marginTop:6}}>Notify provider if glucose drops &gt;100 mg/dL/hr</div>
            <TeachBox id="twoBag" teaching={teaching}/>
          </Card>

          <Card title="Bicarbonate" color={C.muted} defaultOpen={false}>
            <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="NOT Recommended">
              If pH &lt;7.0, repeat VBG after initial fluid bolus. Give HCO₃ ONLY if PICU/endocrinology specifically recommends it.
            </Alert>
            <TeachBox id="bicarbonate" teaching={teaching}/>
          </Card>

          <Card title="Transition to SQ Insulin" color={C.greenMid} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Continue insulin infusion until <strong>pH &gt;7.3 AND HCO₃ &gt;15</strong><br/>
              Transition to SQ insulin per endocrinology dosing<br/>
              Monitor CBG Q1h · Chem8 + VBG Q2h until resolved
            </div>
          </Card>

          <Card title="Identify HHS" color={C.purple} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Glucose &gt;600 mg/dL · Serum osm &gt;320 mOsm/L</strong><br/>
              May have HCO₃ &gt;15 (mild acidosis only)<br/>
              May develop hypotension if osm falls rapidly<br/>
              <strong style={{color:C.purple}}>Contact Endocrinology immediately</strong>
            </div>
            <TeachBox id="hhs" teaching={teaching}/>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const bC="#7c2d12",bBg="#fff7ed",bBd="#fed7aa";
            const blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);
            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>BG &gt;250 + pH &lt;7.3 or HCO₃ &lt;15 + ketonuria</div>
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 360" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={360} fill="#fafaf8" rx={6}/>
                    <Box x={95} y={6} w={290} h={28} fill={bBg} stroke={bBd} sw={1.5} radius={14}>
                      <T x={240} y={18} size={9} weight={700} color={bC}>DKA CONFIRMED — IMMEDIATE ACTIONS</T>
                      <T x={240} y={28} size={6} color={mC}>CBG · CMP · VBG · Monitoring · 2× IV · NPO</T>
                    </Box>
                    <Arrow x1={240} y1={34} x2={240} y2={48}/>
                    <g transform="translate(240,62)"><polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Dehydrated?</T><T x={0} y={8} size={6} color={mC}>Shock?</T></g>
                    <Arrow x1={195} y1={65} x2={120} y2={86} color={rC}/>
                    <Arrow x1={285} y1={65} x2={360} y2={86} color={blC}/>

                    <Box x={55} y={86} w={130} h={22} fill={rBg} stroke={rBd}><T x={120} y={95} size={7} weight={700} color={rC}>YES — NS 20 mL/kg</T><T x={120} y={104} size={6} color={mC}>Over 30 min (faster if shock)</T></Box>
                    <Box x={295} y={86} w={130} h={22} fill={blBg} stroke={blBd}><T x={360} y={95} size={7} weight={700} color={blC}>NO — NS 10 mL/kg</T><T x={360} y={104} size={6} color={mC}>Over 60 min</T></Box>

                    <Arrow x1={120} y1={108} x2={200} y2={126}/>
                    <Arrow x1={360} y1={108} x2={280} y2={126}/>

                    <Box x={130} y={126} w={220} h={18} fill={bBg} stroke={bBd} sw={1.5}><T x={240} y={137} size={8} weight={700} color={bC}>CONSULT ENDOCRINE + PICU</T></Box>
                    <Arrow x1={240} y1={144} x2={240} y2={156}/>

                    {/* Three parallel tracks */}
                    <Arrow x1={160} y1={156} x2={80} y2={172} color={bC}/>
                    <Arrow x1={240} y1={156} x2={240} y2={172} color={bC}/>
                    <Arrow x1={320} y1={156} x2={400} y2={172} color={bC}/>

                    <Box x={20} y={172} w={120} h={34} fill={C.white} stroke={bBd}><T x={80} y={184} size={7} weight={700} color={bC}>INSULIN</T><T x={80} y={194} size={6}>0.05 u/kg/hr</T><T x={80} y={202} size={5} color={rC}>No bolus · Flush tubing</T></Box>
                    <Box x={180} y={172} w={120} h={34} fill={C.white} stroke={bBd}><T x={240} y={184} size={7} weight={700} color={bC}>FLUIDS</T><T x={240} y={194} size={6}>Two-bag system</T><T x={240} y={202} size={5} color={mC}>Bag A (NS) + Bag B (D10)</T></Box>
                    <Box x={340} y={172} w={120} h={34} fill={C.white} stroke={bBd}><T x={400} y={184} size={7} weight={700} color={bC}>POTASSIUM</T><T x={400} y={194} size={6}>K&lt;5 + UO established</T><T x={400} y={202} size={5} color={mC}>KAcet 20 + KPhos 20</T></Box>

                    <Arrow x1={80} y1={206} x2={80} y2={224}/>
                    <Arrow x1={240} y1={206} x2={240} y2={224}/>
                    <Arrow x1={400} y1={206} x2={400} y2={224}/>

                    {/* Monitoring */}
                    <Box x={20} y={224} w={440} h={22} fill={blBg} stroke={blBd}>
                      <T x={240} y={233} size={7} weight={700} color={blC}>MONITOR: CBG Q1h · Chem8+VBG Q2–4h · Neuro Q1h · Urine ketones Q void</T>
                    </Box>
                    <Arrow x1={240} y1={246} x2={240} y2={260}/>

                    <g transform="translate(240,274)"><polygon points="0,-14 60,0 0,14 -60,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>BG &lt;300?</T><T x={0} y={8} size={6} color={mC}>or drop &gt;100/hr</T></g>
                    <Arrow x1={180} y1={274} x2={120} y2={296} color={aC}/>
                    <Arrow x1={300} y1={274} x2={360} y2={296} color={gC}/>

                    <Box x={55} y={296} w={130} h={22} fill={aBg} stroke={aBd}><T x={120} y={305} size={7} weight={700} color={aC}>ADD DEXTROSE</T><T x={120} y={314} size={6} color={mC}>Shift to Bag B · Target 200–300</T></Box>
                    <Box x={295} y={296} w={130} h={22} fill={gBg} stroke={gBd}><T x={360} y={305} size={7} weight={700} color={gC}>pH&gt;7.3 + HCO₃&gt;15</T><T x={360} y={314} size={6} color={gC}>→ SQ insulin transition</T></Box>

                    {/* Cerebral edema warning */}
                    <Box x={160} y={332} w={160} h={18} fill={rBg} stroke={rBd} sw={2} radius={4}>
                      <T x={240} y={344} size={7} weight={700} color={rC}>⚠ NEURO CHANGE → SEE CEREBRAL EDEMA TAB</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── FLUIDS & INSULIN ── */}
      {tab==="meds"&&(
        <Pad>
          <Q text="Fluids, Insulin & Electrolytes" sub={doses?`Calculated for ${doses.w} kg · Maintenance ${doses.maint} mL/hr`:"Enter weight for calculations"}/>
          {!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above.</Alert>)}

          <Card title="Initial Fluid Resuscitation" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS bolus — dehydrated (20 mL/kg)" value={doses?doses.bolus20:"—"} unit={doses?"mL over 30 min":""}/>
              <DoseRow label="NS bolus — not dehydrated (10 mL/kg)" value={doses?doses.bolus10:"—"} unit={doses?"mL over 60 min":""}/>
            </div>
          </Card>

          <Card title="Insulin Drip" color={C.red}>
            <div style={{marginTop:8}}>
              <DoseRow label="Regular insulin (0.05 u/kg/hr)" value={doses?doses.insulin:"—"} unit={doses?"units/hr":""}/>
              <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:6}}>Start AFTER endocrine consult · No bolus · No personal pump</div>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>Flush Microbore with 10–20 mL before starting · Continue until pH &gt;7.3 + HCO₃ &gt;15</div>
            </div>
            <TeachBox id="insulin" teaching={teaching}/>
          </Card>

          <Card title="Two-Bag Fluid System" color={C.blue}>
            <div style={{marginTop:8}}>
              {doses&&(
                <div style={{background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.blue}}>Maintenance: {doses.maint} mL/hr · 1.5× = {doses.maint15} mL/hr</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>Bag A + Bag B always = {doses.maint15} mL/hr</div>
                </div>
              )}
              <div style={{fontSize:12,lineHeight:1.6}}>
                <strong>Bag A:</strong> NS + 40 mEq K (no dextrose)<br/>
                <strong>Bag B:</strong> D10 NS + 40 mEq K
              </div>
              <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:8,overflow:"hidden",marginTop:8}}>
                <div style={{display:"grid",gridTemplateColumns:"1.2fr 1.5fr 1.5fr 0.8fr",background:C.primary}}>
                  {["Glucose","Bag A","Bag B","Final"].map(h=>(<div key={h} style={{padding:"5px 6px",color:C.white,fontWeight:700,fontSize:9}}>{h}</div>))}
                </div>
                {[["≥300",doses?`${doses.maint15}`:"1.5×",doses?"0":"0","D0"],
                  ["200–300",doses?`${doses.maint075}`:"0.75×",doses?`${doses.maint075}`:"0.75×","D5"],
                  ["150–200",doses?"0":"0",doses?`${doses.maint15}`:"1.5×","D10"],
                  ["<150","CALL PROVIDER","",""],
                ].map((row,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"1.2fr 1.5fr 1.5fr 0.8fr",background:i%2===0?C.white:"#fafaf7",borderBottom:`1px solid ${C.rule}`}}>
                    {row.map((cell,j)=>(<div key={j} style={{padding:"5px 6px",fontSize:11,fontWeight:j===0?700:500,color:i===3&&j>0?C.red:C.ink}}>{cell}{j>0&&j<3&&doses&&cell&&i<3?" mL/hr":""}</div>))}
                  </div>
                ))}
              </div>
            </div>
            <TeachBox id="twoBag" teaching={teaching}/>
          </Card>

          <Card title="Potassium Replacement" color={C.amberMid}>
            <div style={{marginTop:8,fontSize:13,lineHeight:1.7}}>
              <strong>When:</strong> K⁺ &lt;5 mmol/L AND urine output established<br/>
              NS 0.9% + 20 mEq KAcetate + 20 mEq KPhos at 1.5× maintenance
              {doses&&<div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,color:C.primary,marginTop:4}}>{doses.maint15} mL/hr</div>}
              <div style={{fontSize:12,color:C.red,fontWeight:600,marginTop:4}}>No UO → consult endocrine/PICU before K⁺</div>
            </div>
            <TeachBox id="potassium" teaching={teaching}/>
          </Card>

          <Card title="Insulin Comparison Table" color={C.muted} defaultOpen={false}>
            <div style={{marginTop:8,overflowX:"auto"}}>
              <div style={{fontSize:10,minWidth:360}}>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1.5fr 1.5fr",background:C.primary,borderRadius:"6px 6px 0 0"}}>
                  {["Insulin","Onset","Peak","Duration"].map(h=>(<div key={h} style={{padding:"5px 6px",color:C.white,fontWeight:700,fontSize:9}}>{h}</div>))}
                </div>
                {[["Lispro/Aspart/Glulisine","5–15 min","1–2 hr","3–5 hr"],["Regular","30–45 min","2–3 hr","5–8 hr"],["NPH","1–2 hr","4–8 hr","12–18 hr"],["Detemir","~2 hr","3–9 hr*","12–24 hr"],["Glargine","~2 hr","Peakless","~24 hr"]].map((row,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1.5fr 1.5fr",background:i%2===0?C.white:"#fafaf7",borderBottom:`1px solid ${C.rule}`}}>
                    {row.map((cell,j)=>(<div key={j} style={{padding:"4px 6px",fontSize:10,fontWeight:j===0?600:400}}>{cell}</div>))}
                  </div>
                ))}
              </div>
            </div>
          </Card>
        </Pad>
      )}

      {/* ── CEREBRAL EDEMA ── */}
      {tab==="cerebral"&&(
        <Pad>
          <Q text="Neurologic Deterioration" sub="Consider hypoglycemia or cerebral edema"/>
          <TeachBox id="cerebralEdema" teaching={teaching}/>

          <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="Warning Signs of Cerebral Edema">
            Headache · Slow heart rate · Irritability · Altered mental status · Incontinence · Focal neurologic deficits
          </Alert>

          <Card title="Immediate Interventions" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>1.</strong> Elevate head of bed<br/>
              <strong>2.</strong> <strong>3% NaCl</strong> {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700}}>{doses.hyper3} mL</span>:"5 mL/kg"} IV over 30 min<br/>
              <strong>3.</strong> Consider decreasing IV fluids by 1/3<br/>
              <strong>4.</strong> Consider <strong>Mannitol</strong> {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:700}}>{doses.mannitol05}–{doses.mannitol1} g</span>:"0.5–1 g/kg"} over 10–15 min<br/>
              <strong>5.</strong> Consider intracranial imaging (CT head)
            </div>
          </Card>

          <Card title="PICU Admission Criteria" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Any one of:</strong><br/>
              • Hemodynamically unstable<br/>
              • Altered mental status<br/>
              • Requiring insulin drip<br/>
              • Hypokalemia
            </div>
            <div style={{fontSize:12,color:C.muted,marginTop:6}}>Also strongly consider for: new-onset DKA, HCO₃ &lt;12, K⁺ &lt;3.5</div>
            <TeachBox id="picu" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DISPO & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Disposition & References"/>

          <Card title="PICU Admission Criteria" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Any one: hemodynamically unstable · AMS · insulin drip · hypokalemia<br/>
              Consider: new-onset DKA · HCO₃ &lt;12 · K⁺ &lt;3.5 · signs of cerebral edema
            </div>
          </Card>

          <Card title="Ward Admission (with Hospitalist)" color={C.greenMid} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Consult hospitalist + endocrinology for patients who may be managed with SQ insulin on the ward (mild DKA with rapid resolution, known diabetic with clear precipitant)
            </div>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. Kuppermann N et al. Clinical trial of fluid infusion rates for pediatric DKA. <em>N Engl J Med</em> 2018; 378:2275.<br/>
              2. Nallasamy K et al. Low-dose vs standard-dose insulin in pediatric DKA. <em>JAMA Pediatr</em> 2014; 168(11):999–1005.<br/>
              3. Chua HR et al. Bicarbonate in DKA — a systematic review. <em>Ann Intensive Care</em> 2011; 1(1):23.<br/>
              4. Glaser N et al. Risk factors for cerebral edema in children with DKA. <em>N Engl J Med</em> 2001; 344:264.<br/>
              5. Knopp JL et al. Capacity of infusion lines for insulin adsorption: effect of flow rate. <em>J Diabetes Sci Technol</em> 2021; 15(1):109–120.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Diabetic Ketoacidosis Clinical Pathway · August 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
