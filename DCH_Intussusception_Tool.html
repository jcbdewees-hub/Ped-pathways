<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intussusception — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useMemo}=React;
const C={primary:"#4338ca",pLight:"#eef2ff",pBorder:"#a5b4fc",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"Pathway Rationale",content:"Intussusception is the most common cause of bowel obstruction in children 6 months to 3 years. After successful enema reduction, recurrence occurs in only ~10% of patients, and the minority recur within 48 hours. Multiple institutions have shown that ED observation (rather than routine 24-hour admission) for selected patients reduces length of stay and costs without safety events. This pathway defines which patients can be observed in the ED for 4 hours and discharged vs which require admission."},
  ultrasound:{title:"Diagnostic Imaging",content:"Ultrasound is the test of choice with sensitivity and specificity approaching 100% with experienced sonographers and NPV close to 100%. Intussusception identified outside the RLQ or with lesion size ≤3 cm suggests ileoileal intussusception. Plain radiography is clearly inferior to US for diagnosis, but 2-view abdominal XR should be obtained if there is any concern for perforation (persistent tachycardia, bloody stool, peritoneal signs). If diagnosed by outside US, repeat at DCH to confirm."},
  airEnema:{title:"Air Contrast Enema",content:"Air-contrast enema is the most widely used method for non-operative reduction of ileocolic intussusception with an excellent safety profile and low complication rate. It should NOT be attempted in patients with evidence of perforation or acutely ill with unstable hemodynamics. Absolute contraindication: peritonitis and/or instability during first attempt. Relative: 2 of the following 3 — elevated WBC, high fever, symptoms >72 hours."},
  transport:{title:"Transport to Radiology",content:"Peds ED RN accompanies patient to Radiology with cardiac monitor, BP cuff, pulse ox, fluid bolus, and oxygen delivery apparatus. RN monitors for distress, vital sign and mental status changes, calls for emergency help, and provides family support. If staffing doesn't allow, the charge RN escalates through: adult ED charge → PANDA → Peds RRT RN → AOD."},
  observation:{title:"4-Hour ED Observation",content:"After successful, easy enema reduction, patients who are well-appearing with stable vitals can be observed in the ED for a minimum of 4 hours rather than admitted. Protocol: NPO for 3 hours, then 1-hour PO challenge. Discharge if: tolerating PO, vitals stable, well-appearing, no pain, afebrile, no rectal bleeding, live close to hospital, reliable family."},
  admission:{title:"Admission Criteria",content:"Admit to Peds Surgery if: fever, bloody stool, lethargy, ill-appearing with persistent pain/vomiting, high WBC, remote residence or unreliable access to care, ongoing rectal bleeding, lead point found, incomplete or failed reduction, or ED cannot accommodate observation patient. Also admit if reduction was unsuccessful — surgical reduction may be needed."},
  painMgmt:{title:"Pain & Anxiolysis",content:"IN/IV Fentanyl 1 mcg/kg for pain while in the ED. For anxiolysis prior to air contrast enema: IN Versed 0.3–0.4 mg/kg OR IV Versed 0.05–0.1 mg/kg. Administer midazolam before leaving the ED for Radiology. Consider ondansetron 0.15 mg/kg for nausea/vomiting."},
  contraindications:{title:"Enema Contraindications",content:"Absolute: peritonitis and/or hemodynamic instability during first attempt. Relative (2 of 3): elevated WBC, high fever, symptom duration >72 hours. If any absolute contraindication → surgical consultation for operative reduction. If perforation suspected → 2-view abdominal XR first."},
};

function useResponsive(){const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:520);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return{maxW:w>=640?800:520};}

function calcDoses(w){
  const wt=parseFloat(w)||0;if(wt<=0)return null;
  return{w:wt,
    bolus:Math.round(wt*20),
    fentanyl:Math.round(wt*1*10)/10,
    midazIN_lo:Math.round(wt*0.3*10)/10,midazIN_hi:Math.round(wt*0.4*10)/10,
    midazIV_lo:Math.round(wt*0.05*100)/100,midazIV_hi:Math.round(wt*0.1*10)/10,
    zofran:Math.round(wt*0.15*10)/10,
  };
}

function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:22,fontWeight:700,marginTop:4,lineHeight:1.2}}>Intussusception</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · September 2021</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const{maxW}=useResponsive();
  const doses=useMemo(()=>calcDoses(weightKg),[weightKg]);

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"decision",label:"Decisions"},
    {key:"meds",label:"Meds & Fluids"},
    {key:"special",label:"Dispo & Refs"},
  ];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px"}}>
        <div style={{maxWidth:200}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="10" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="Confirmed intussusception in patients <20 years"/>
          <TeachBox id="overview" teaching={teaching}/>

          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Patients &lt;20 years with <strong>confirmed intussusception</strong></Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Abdominal pain from alternative etiology · Hemodynamically unstable (→ resuscitate first)</Alert>
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI Level II</strong><br/>
              Continuous cardiac + pulse ox monitoring<br/>
              Full vitals including <strong>blood pressure</strong> (evaluate for hypovolemic shock)<br/>
              Insert and maintain peripheral IV<br/>
              <strong>NPO</strong><br/>
              NS bolus if dehydration/hypovolemia signs or confirmed intussusception on US<br/>
              Consider ondansetron for nausea/vomiting<br/>
              Consider IN midazolam prior to air contrast enema
            </div>
          </Card>

          <Card title="Diagnostics" color={C.blue}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Ultrasound (abdomen complete)</strong> — test of choice to confirm diagnosis<br/>
              <span style={{fontSize:12,color:C.muted}}>If outside US demonstrates intussusception → repeat at DCH to confirm</span><br/><br/>
              <strong>2-view abdominal XR</strong> — if any concern for perforation (persistent tachycardia, bloody stool, peritoneal signs)<br/><br/>
              <strong>Labs:</strong> CMP · If concern for blood loss: CBC, Type &amp; Screen
            </div>
            <TeachBox id="ultrasound" teaching={teaching}/>
          </Card>

          <Card title="Nursing Documentation" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Chief complaint · Symptom onset · Mental status (fussiness, lethargy) · Hydration/nutrition status + last PO · # wet diapers · Bloody stools? · Cap refill · Vitals · Pain level · Recent illness · Medications · Allergies · Height + weight
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Decision Tree" sub="Confirmed intussusception → enema → disposition"/>

          <Card title="Step 1 — Evaluate for Perforation" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Concern for perforation?</strong> (bloody stool, abnormal hemodynamics, peritonitis)<br/>
              → <strong>2-view abdominal XR</strong><br/>
              → If perforation confirmed → <strong>Peds Surgery consult → operative management</strong>
            </div>
          </Card>

          <Card title="Step 2 — Air Contrast Enema" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Pre-procedure:</strong> IN midazolam for anxiolysis · Fentanyl for pain<br/>
              <strong>Transport:</strong> Peds ED RN accompanies with cardiac monitor, BP cuff, pulse ox, fluid bolus, O₂
            </div>
            <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Enema Contraindications">
              <strong>Absolute:</strong> Peritonitis and/or instability during first attempt<br/>
              <strong>Relative (2 of 3):</strong> Elevated WBC · High fever · Symptoms &gt;72 hours
            </Alert>
            <TeachBox id="airEnema" teaching={teaching}/>
            <TeachBox id="transport" teaching={teaching}/>
          </Card>

          <Card title="Step 3 — After Successful Reduction" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Reduction successful AND easily reduced?</strong>
            </div>
            <div style={{display:"flex",gap:6,marginTop:8}}>
              <div style={{flex:1,background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.red}}>Any of: fever, bloody stool, lethargy?</div>
                <div style={{fontSize:11,marginTop:4}}><strong>→ Admit to Peds Surgery</strong></div>
              </div>
              <div style={{flex:1,background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>Well-appearing, stable vitals?</div>
                <div style={{fontSize:11,marginTop:4}}><strong>→ 4-Hour ED Observation</strong></div>
              </div>
            </div>
          </Card>

          <Card title="4-Hour ED Observation Protocol" color={C.blue}>
            <div style={{marginTop:8,background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"12px"}}>
              <div style={{fontSize:14,fontWeight:700,color:C.blue,marginBottom:6}}>Observation Timeline</div>
              <div style={{display:"flex",gap:4}}>
                <div style={{flex:3,background:C.amberBg,border:`1px solid ${C.amberBorder}`,borderRadius:6,padding:"8px",textAlign:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.amberMid}}>NPO × 3 Hours</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>Monitor vitals, appearance, pain</div>
                </div>
                <div style={{flex:1,background:C.greenBg,border:`1px solid ${C.greenBorder}`,borderRadius:6,padding:"8px",textAlign:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>PO × 1h</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>Challenge</div>
                </div>
              </div>
            </div>
            <div style={{fontSize:13,marginTop:8}}>
              <strong>If tolerating PO, vitals stable, well-appearing:</strong><br/>
              <strong style={{color:C.greenMid}}>→ Discharge</strong>
            </div>
            <div style={{fontSize:13,marginTop:6}}>
              <strong>If recurrence of symptoms during observation:</strong><br/>
              <strong style={{color:C.red}}>→ Admit to Peds Surgery</strong>
            </div>
            <TeachBox id="observation" teaching={teaching}/>
          </Card>

          <Card title="Reduction Unsuccessful" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>→ Admit to Peds Surgery</strong> for operative reduction<br/>
              Consult surgery immediately
            </div>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const bC="#4338ca",bBg="#eef2ff",bBd="#a5b4fc";
            const blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);
            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>US-confirmed intussusception → Enema → 4h observation vs admit</div>
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 420" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={420} fill="#fafaf8" rx={6}/>

                    <Box x={100} y={6} w={280} h={24} fill={bBg} stroke={bBd} sw={1.5} radius={12}>
                      <T x={240} y={17} size={9} weight={700} color={bC}>INTUSSUSCEPTION — US CONFIRMED</T>
                      <T x={240} y={26} size={5} color={mC}>ESI II · IV · NPO · Monitor · NS bolus</T>
                    </Box>
                    <Arrow x1={240} y1={30} x2={240} y2={44}/>

                    <g transform="translate(240,56)"><polygon points="0,-12 55,0 0,12 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-1} size={6} weight={700}>Perforation concern?</T></g>

                    <line x1={295} y1={56} x2={430} y2={56} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={430} y1={56} x2={430} y2={72} color={rC}/>
                    <Box x={385} y={72} w={90} h={24} fill={rBg} stroke={rBd} sw={2}><T x={430} y={82} size={6} weight={700} color={rC}>2-VIEW XR</T><T x={430} y={91} size={5} color={rC}>If perf → Surgery</T></Box>

                    <Arrow x1={240} y1={68} x2={240} y2={82}/>

                    <Box x={120} y={82} w={240} h={20} fill={bBg} stroke={bBd} sw={1.5}>
                      <T x={240} y={90} size={7} weight={700} color={bC}>AIR CONTRAST ENEMA</T>
                      <T x={240} y={98} size={5} color={mC}>Midazolam + Fentanyl · RN escort with monitor</T>
                    </Box>
                    <Arrow x1={240} y1={102} x2={240} y2={116}/>

                    <g transform="translate(240,128)"><polygon points="0,-12 50,0 0,12 -50,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>Successful?</T></g>

                    {/* Failed */}
                    <line x1={290} y1={128} x2={430} y2={128} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={430} y1={128} x2={430} y2={146} color={rC}/>
                    <Box x={385} y={146} w={90} h={20} fill={rBg} stroke={rBd} sw={2}><T x={430} y={159} size={7} weight={700} color={rC}>SURGERY</T></Box>

                    {/* Successful */}
                    <Arrow x1={240} y1={140} x2={240} y2={156}/>

                    <g transform="translate(240,168)"><polygon points="0,-12 60,0 0,12 -60,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={6} weight={700}>Fever, bloody stool,</T><T x={0} y={7} size={6} weight={700}>lethargy?</T></g>

                    <Arrow x1={180} y1={168} x2={100} y2={194} color={rC}/>
                    <Arrow x1={300} y1={168} x2={360} y2={194} color={gC}/>

                    {/* Admit */}
                    <Box x={40} y={194} w={120} h={20} fill={rBg} stroke={rBd} sw={2}><T x={100} y={207} size={8} weight={700} color={rC}>ADMIT SURGERY</T></Box>

                    {/* Observe */}
                    <Box x={300} y={194} w={140} h={20} fill={gBg} stroke={gBd} sw={1.5}><T x={370} y={207} size={8} weight={700} color={gC}>4-HOUR ED OBSERVATION</T></Box>
                    <Arrow x1={370} y1={214} x2={370} y2={228}/>

                    <Box x={300} y={228} w={140} h={34} fill={blBg} stroke={blBd}>
                      <T x={370} y={239} size={7} weight={700} color={blC}>NPO × 3 hours</T>
                      <T x={370} y={249} size={7} weight={700} color={gC}>PO challenge × 1 hour</T>
                      <T x={370} y={258} size={5} color={mC}>Monitor vitals, appearance, pain</T>
                    </Box>
                    <Arrow x1={370} y1={262} x2={370} y2={276}/>

                    <g transform="translate(370,288)"><polygon points="0,-12 55,0 0,12 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-1} size={6} weight={700}>Tolerating PO + stable?</T></g>

                    <Arrow x1={315} y1={288} x2={260} y2={310} color={gC}/>
                    <Arrow x1={425} y1={288} x2={440} y2={310} color={rC}/>

                    <Box x={210} y={310} w={100} h={20} fill={gBg} stroke={gBd} sw={2}><T x={260} y={323} size={8} weight={700} color={gC}>DISCHARGE</T></Box>
                    <Box x={400} y={310} w={76} h={20} fill={rBg} stroke={rBd}><T x={438} y={323} size={7} weight={700} color={rC}>ADMIT</T></Box>

                    {/* Remote / ED capacity */}
                    <g transform="translate(100,228)">
                      <Box x={-60} y={0} w={120} h={28} fill={aBg} stroke={aBd} radius={6}>
                        <T x={0} y={11} size={6} weight={600} color={aC}>Also admit if:</T>
                        <T x={0} y={21} size={5} color={mC}>Remote · Unreliable access</T>
                        <T x={0} y={28} size={5} color={mC}>ED can't accommodate obs</T>
                      </Box>
                    </g>

                    {/* Contraindications */}
                    <Box x={40} y={350} w={400} h={28} fill={rBg} stroke={rBd} radius={8}>
                      <T x={240} y={361} size={6} weight={700} color={rC}>ENEMA CONTRAINDICATIONS</T>
                      <T x={240} y={371} size={5} color={rC}>Absolute: peritonitis or instability during 1st attempt</T>
                      <T x={240} y={379} size={5} color={mC}>Relative (2/3): elevated WBC · high fever · symptoms &gt;72h</T>
                    </Box>

                    <Box x={80} y={392} w={320} h={16} fill={blBg} stroke={blBd} radius={4}>
                      <T x={240} y={403} size={6} weight={600} color={blC}>Recurrence ~10% after successful reduction · Minority within 48h</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── MEDS & FLUIDS ── */}
      {tab==="meds"&&(
        <Pad>
          <Q text="Medications & Fluids" sub={doses?`Calculated for ${doses.w} kg`:"Enter weight for calculations"}/>
          {!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above.</Alert>)}

          <Card title="Pain — Fentanyl" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="Fentanyl IN/IV (1 mcg/kg)" value={doses?doses.fentanyl:"—"} unit={doses?"mcg":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>For pain while in the emergency department</div>
            </div>
          </Card>

          <Card title="Anxiolysis — Midazolam (Pre-Enema)" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="Midazolam IN (0.3–0.4 mg/kg)" value={doses?`${doses.midazIN_lo}–${doses.midazIN_hi}`:"—"} unit={doses?"mg":""}/>
              <DoseRow label="Midazolam IV (0.05–0.1 mg/kg)" value={doses?`${doses.midazIV_lo}–${doses.midazIV_hi}`:"—"} unit={doses?"mg":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>Administer before leaving ED for air contrast enema</div>
            </div>
            <TeachBox id="painMgmt" teaching={teaching}/>
          </Card>

          <Card title="Anti-Emetic" color={C.primary} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="Ondansetron (0.15 mg/kg)" value={doses?doses.zofran:"—"} unit={doses?"mg":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>Consider for nausea/vomiting</div>
            </div>
          </Card>

          <Card title="IV Fluids" color={C.primary}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>If dehydration, hypovolemia, and/or confirmed intussusception on US</div>
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DISPO & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Disposition & References"/>

          <Card title="Discharge Criteria (after 4h ED observation)" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ✓ Tolerating PO after 1-hour challenge<br/>
              ✓ Vital signs stable · Afebrile<br/>
              ✓ Well-appearing · No pain<br/>
              ✓ Normal physical exam<br/>
              ✓ Idiopathic intussusception (no lead point)<br/>
              ✓ Lives close to hospital · Reliable family/access to care
            </div>
            <TeachBox id="observation" teaching={teaching}/>
          </Card>

          <Card title="Admission Criteria — Peds Surgery" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              • Fever · Bloody stool · Lethargy<br/>
              • Ill-appearing with persistent pain/vomiting<br/>
              • High WBC and/or fever<br/>
              • Lives remotely or without access to care<br/>
              • Ongoing rectal bleeding<br/>
              • Lead point found<br/>
              • Incomplete reduction or unable to reduce<br/>
              • ED without capacity to observe
            </div>
            <TeachBox id="admission" teaching={teaching}/>
          </Card>

          <Card title="Transport to Radiology" color={C.blue} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Peds ED RN accompanies patient (if able per charge RN)<br/>
              <strong>Bring:</strong> cardiac monitor · BP cuff · pulse ox · fluid bolus · O₂ apparatus<br/>
              <strong>RN role:</strong> monitor for distress, VS/mental status changes, call for emergency help, family support<br/><br/>
              <strong>Staffing escalation if RN unavailable:</strong><br/>
              1. Adult ED charge for coverage<br/>
              2. PANDA team<br/>
              3. Peds RRT RN<br/>
              4. Call AOD for additional resources
            </div>
            <TeachBox id="transport" teaching={teaching}/>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. Stein-Wexler R et al. Current methods for reducing intussusception: survey results. <em>Pediatr Radiol</em> 2015; 45(5):667.<br/>
              2. Sujka J. ED discharge following successful radiologic reduction of ileocolic intussusception: a protocol-based prospective observational study. <em>J Pediatr Surg</em> 2018 (in press).<br/>
              3. Mallicote M et al. Hospital admission unnecessary for successful uncomplicated radiographic reduction of pediatric intussusception. <em>Am J Surg</em> 2017.<br/>
              4. Raval MV et al. Improving quality and efficiency for intussusception management after successful enema reduction. <em>Pediatrics</em> 2015; 136(5).<br/>
              5. Burns R. Improving high-value care of ileocolic intussusception in a pediatric ED. <em>ACS Quality and Safety Case Studies</em> 2018.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Intussusception Clinical Pathway · September 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
