<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Accidental Trauma — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;
const C={primary:"#44403c",pLight:"#f5f5f4",pBorder:"#d6d3d1",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"Pathway Purpose",content:"This pathway defines a clear workflow for suspected or confirmed pediatric non-accidental trauma (NAT). It standardizes the evaluation including history, undressed physical exam with skin survey, age-appropriate imaging, laboratory studies, mandatory consultations (Pediatric Surgery, Social Work, SCAN Team), and disposition decisions. Clinically unstable patients should be resuscitated PRIOR to using this pathway."},
  imaging:{title:"Age-Based Imaging Rationale",content:"Skeletal survey is mandatory for all children <6 months and for children 6–24 months. For ages 24 months–5 years, skeletal survey is obtained selectively (severe injury, high suspicion, severe developmental delay, FTT, or at request of abuse specialist). Skeletal survey requires daytime radiology — admit if presenting at night. Neuroimaging is mandatory <6 months, strongly recommended 6–24 months. Do NOT use PECARN for head imaging decisions in NAT — PECARN was not validated for abuse. CT is often obtained initially; MRI may be needed later."},
  skinSurvey:{title:"Skin Survey",content:"Undressed exam documenting all bruises, petechiae, abrasions, lacerations, scarring, pattern injuries (bite marks, suction bruises), and other marks. Note distinct shapes of recognizable objects, patterns, distribution, and concerning areas (non-exposed areas: buttocks, thighs, genitals, ears, frenulum). Photograph with measurement reference whenever possible. Use Haiku for isolated findings viewable remotely by SCAN. Use digital camera + OnBase for sensitive areas."},
  labs:{title:"Laboratory Studies",content:"Initial: CBC with diff, CMP, lipase, UA, urine toxicology screen. If bruising or intracranial injury concern: coagulation panel (consider von Willebrand panel, Factor IX, PFA; add Factor XIII if intracranial hemorrhage). If fracture: calcium, phosphorus, PTH, vitamin D 25-OH. If chest/abdominal injury OR ill appearance AND >3 months: troponin. If altered mentation: consider ETOH, acetaminophen, salicylates. All labs should be discussed with the SCAN provider."},
  consults:{title:"Mandatory Consultations",content:"ALL suspected or confirmed NAT <18 years requires: Pediatric Surgery, Social Work, and SCAN Team. PEM administrator is on call for problem solving. Alert DHS Hotline for the appropriate county of residence (social work may assist). These consults are mandatory regardless of the severity of injury or certainty of diagnosis."},
  ophthalmology:{title:"Ophthalmology Consult",content:"Dilated ophthalmologic exam should be performed selectively for children with suspected abusive head trauma in high suspicion or unclear situations. Patients at highest risk for retinal findings most commonly have intracranial injury on neuroimaging, particularly subdural hemorrhage. Isolated skull fracture does not correlate with risk for retinal findings. Low-risk children (no intracranial hemorrhage, normal mental status, no head/facial bruising) do not automatically require dilated exam. When indicated, retinal exam should occur within 24–48 hours."},
  ftt:{title:"Failure to Thrive",content:"AAP defines FTT as significantly prolonged cessation of appropriate weight gain compared with norms for age/gender after achieving a stable pattern (weight-for-age crossing ≥2 major percentile channels). Often accompanied by normal height velocity. Actual weight <70% of predicted weight-for-length requires urgent attention. Caution: growth variants are common, so percentile shifts alone may not indicate FTT."},
  disposition:{title:"Disposition",content:"Admit if clinically indicated OR if, in consultation with DHS and SCAN, a patient cannot be discharged to a safe environment. Admit to Pediatric Surgery when the injury warrants inpatient care; otherwise admit to Pediatric Hospitalist with Peds Surgery consult. If discharging: ensure DHS/law enforcement calls documented, arrange medical follow-up for primary care, physical injuries, and counseling, and discuss with SCAN whether patient referral to county Child Advocacy Center is needed."},
};

function useResponsive(){const[w,setW]=useState(typeof window!=='undefined'?window.innerWidth:520);useEffect(()=>{const h=()=>setW(window.innerWidth);window.addEventListener('resize',h);return()=>window.removeEventListener('resize',h);},[]);return{maxW:w>=640?800:520};}

function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Non-Accidental Trauma</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · Birth–18 Years · January 2025</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const{maxW}=useResponsive();
  const tabs=[{key:"triage",label:"Triage"},{key:"decision",label:"Decisions"},{key:"imaging",label:"Imaging & Labs"},{key:"special",label:"Dispo & Refs"}];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="Suspected or confirmed NAT — birth through age 18"/>
          <TeachBox id="overview" teaching={teaching}/>
          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Birth through age 18 with suspected or confirmed non-accidental trauma</Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Clinically unstable → resuscitate FIRST, then use pathway<br/>Suspected sexual assault → use Pediatric Sexual Assault pathway</Alert>
            </div>
          </Card>
          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI Level II</strong> (if NAT known or suspected)<br/>
              Full vitals including temperature<br/>
              <strong>Document legal decision maker</strong><br/>
              <strong>Undress and gown patient</strong> to facilitate thorough exam<br/>
              Place IV and collect urine PRN
            </div>
          </Card>
          <Card title="Physical Examination" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Undressed exam with complete skin survey:</strong><br/>
              <strong>Skin:</strong> all areas unclothed — document bruises, petechiae, abrasions, lacerations, scarring, pattern injuries (bite marks, suction bruises), shapes, patterns, distribution. Note non-exposed areas (buttocks, thighs, genitals, ears, frenulum). <strong>Photograph with measurement reference</strong><br/>
              <strong>Eyes:</strong> if abusive head trauma suspected → fundoscopic/ultrasound or consult ophthalmology<br/>
              <strong>Oral:</strong> lacerations, abrasions, petechiae — check mucosa, palate, frenula, tongue, gums, lips, teeth<br/>
              <strong>Abdomen:</strong> bruises, abrasions; consider intra-abdominal injury<br/>
              <strong>Anogenital:</strong> external anterior + posterior exam. If sexual assault concern → Sexual Assault Pathway
            </div>
            <TeachBox id="skinSurvey" teaching={teaching}/>
          </Card>
          <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="📋" title="Mandatory Consults — ALL Suspected NAT">
            <strong>Pediatric Surgery</strong> · <strong>Social Work</strong> · <strong>SCAN Team</strong><br/>
            PEM administrator on call for problem solving<br/>
            Alert <strong>DHS Hotline</strong> for appropriate county of residence
          </Alert>
          <TeachBox id="consults" teaching={teaching}/>
        </Pad>
      )}

      {tab==="decision"&&(
        <Pad>
          <Q text="Evaluation & Decision Tree"/>

          <Card title="History — Key Elements" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Chief complaint · Onset · Mechanism described · Developmental capabilities of child<br/>
              Consistency of history with injury pattern · Changes in story over time<br/>
              Caregiver history vs child's account (if verbal) · Witnesses<br/>
              Prior injuries or ED visits · Social history and risk factors
            </div>
          </Card>

          <Card title="Labs — Discuss with SCAN Provider" color={C.blue}>
            <div style={{marginTop:8}}>
              <div style={{background:C.blueBg,border:`1.5px solid ${C.blueBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,color:C.blue}}>Initial Labs (all patients)</div>
                <div style={{fontSize:12,marginTop:2}}>CBC with diff · CMP · Lipase · Urinalysis · Urine toxicology screen</div>
              </div>
              <div style={{fontSize:13,fontWeight:700,color:C.ink,marginTop:8,marginBottom:4}}>Additional Labs by Presentation:</div>
              {[
                ["Bruising or intracranial injury concern","Coag panel · Consider vWF panel, Factor IX, PFA · If ICH: add Factor XIII"],
                ["Fracture","Calcium · Phosphorus · PTH · Vitamin D 25-OH"],
                ["Chest/abd injury OR ill + age >3 months","Troponin"],
                ["Altered mentation","Consider ETOH · Acetaminophen · Salicylates"],
              ].map(([trigger,labs],i)=>(
                <div key={i} style={{padding:"6px 0",borderBottom:`1px dashed ${C.rule}`}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.amberMid}}>{trigger}</div>
                  <div style={{fontSize:12,marginTop:2}}>{labs}</div>
                </div>
              ))}
            </div>
            <TeachBox id="labs" teaching={teaching}/>
          </Card>

          <Card title="CT Abdomen/Pelvis" color={C.amberMid} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Obtain if concern based on H&P, <strong>AST or ALT &gt;80</strong>, or <strong>Lipase &gt;100</strong>
            </div>
          </Card>

          <Card title="Ophthalmology Consult" color={C.purple} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Selectively for suspected abusive head trauma (high suspicion or unclear)<br/>
              Highest risk: intracranial injury on neuroimaging, especially subdural hemorrhage<br/>
              Isolated skull fracture → low correlation with retinal findings<br/>
              Low risk (no ICH, normal mental status, no head/face bruising) → not automatic<br/>
              When indicated: within 24–48 hours, may still add value later
            </div>
            <TeachBox id="ophthalmology" teaching={teaching}/>
          </Card>

          <Card title="Strangulation — Oregon SKIT" color={C.red} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              IP Consult to RSI/SANE RN<br/>
              Can be part of sexual assault workup or standalone<br/>
              Kit contains documentation, forensic evidence collection swabs, and imaging recommendations
            </div>
          </Card>

          <Card title="Failure to Thrive Criteria" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Weight-for-age crossing ≥2 major percentile channels from established pattern<br/>
              Weight-for-length &lt;80% ideal → concerning<br/>
              <strong>Actual weight &lt;70% predicted weight-for-length → urgent attention</strong><br/>
              Expected: back to birth weight by DOL 10 · max 10% loss from birth weight
            </div>
            <TeachBox id="ftt" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {tab==="imaging"&&(
        <Pad>
          <Q text="Age-Based Imaging" sub="Discuss with SCAN provider · Skeletal survey requires daytime radiology"/>
          <TeachBox id="imaging" teaching={teaching}/>

          <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠" title="Do NOT Use PECARN for Head Imaging in NAT">
            PECARN was not validated for abuse. Discuss head imaging with SCAN.
          </Alert>

          {[
            {age:"< 6 Months",color:C.red,skel:"MANDATORY Skeletal Survey",neuro:"MANDATORY Neuroimaging",note:"CT initially; MRI may be needed later"},
            {age:"6–24 Months",color:C.amberMid,skel:"MANDATORY Skeletal Survey",neuro:"STRONGLY Consider Neuroimaging",note:""},
            {age:"24 Months – 5 Years",color:C.blue,skel:"Skeletal Survey IF: severe injury, high suspicion, severe developmental delay, FTT, or at request of abuse specialist",neuro:"Consider if facial/head bruising, abnormal neuro exam, seizure, recurrent vomiting, fussiness, respiratory compromise, or high suspicion",note:""},
          ].map((tier,i)=>(
            <Card key={i} title={tier.age} color={tier.color}>
              <div style={{marginTop:8}}>
                <div style={{background:tier.color===C.red?C.redBg:tier.color===C.amberMid?C.amberBg:C.blueBg,border:`1.5px solid ${tier.color===C.red?C.redBorder:tier.color===C.amberMid?C.amberBorder:C.blueBorder}`,borderRadius:8,padding:"8px 12px",marginBottom:4}}>
                  <div style={{fontSize:12,fontWeight:700,color:tier.color}}>Skeletal Survey</div>
                  <div style={{fontSize:12,marginTop:2}}>{tier.skel}</div>
                </div>
                <div style={{background:C.purpleBg,border:`1.5px solid ${C.purpleBorder}`,borderRadius:8,padding:"8px 12px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.purple}}>Neuroimaging</div>
                  <div style={{fontSize:12,marginTop:2}}>{tier.neuro}</div>
                </div>
                {tier.note&&<div style={{fontSize:11,color:C.muted,marginTop:4}}>{tier.note}</div>}
              </div>
            </Card>
          ))}

          <Card title="Any Age — Additional Imaging" color={C.primary} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Head imaging:</strong> Consider for facial/head bruising or swelling, abnormal neuro exam/seizure, recurrent vomiting, fussiness, respiratory compromise, or high suspicion. Often CT initially, MRI later. Discuss with SCAN.<br/><br/>
              <strong>C-Spine imaging:</strong> For head injury, inability to clinically clear, or high suspicion<br/><br/>
              <strong>CT Abdomen/Pelvis:</strong> If concern based on H&P, AST or ALT &gt;80, or Lipase &gt;100<br/><br/>
              <strong style={{color:C.red}}>Skeletal survey requires daytime radiology. Admit for skeletal survey if presenting at night.</strong>
            </div>
          </Card>
        </Pad>
      )}

      {tab==="special"&&(
        <Pad>
          <Q text="Disposition, Consults & References"/>
          <Card title="Mandatory Consults — ALL Cases" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Pediatric Surgery</strong> · <strong>Social Work</strong> · <strong>SCAN Team</strong><br/>
              PEM administrator on call for problem solving<br/>
              <strong>Alert DHS Hotline</strong> for appropriate county of residence (SW may help)
            </div>
          </Card>
          <Card title="Admit" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              If clinically indicated OR if, in consultation with DHS and SCAN, patient cannot be discharged to a safe environment<br/><br/>
              <strong>Injury warrants inpatient care →</strong> Admit to Pediatric Surgery<br/>
              <strong>Otherwise →</strong> Admit to Pediatric Hospitalist (with Peds Surgery consult)
            </div>
          </Card>
          <Card title="Discharge" color={C.greenMid} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              If, in consultation with DHS, patient CAN be discharged to a safe environment:<br/>
              ✓ Ensure DHS and/or law enforcement calls documented in chart<br/>
              ✓ Arrange medical follow-up (primary care, injuries, counseling)<br/>
              ✓ Discuss with SCAN whether referral to county Child Advocacy Center is needed
            </div>
            <TeachBox id="disposition" teaching={teaching}/>
          </Card>
          <Card title="Photography Requirements" color={C.amberMid} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Photograph all suspected/confirmed physical abuse documentation<br/>
              Sensitive areas (genitals) → digital camera + OnBase (not patient chart)<br/>
              Extensive bruising → digital camera + OnBase preferred<br/>
              Isolated findings → Haiku (viewable remotely by SCAN)<br/>
              Include measurement reference in all images
            </div>
          </Card>
          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. Rosen NG et al. Child physical abuse trauma evaluation and management: WTA/PTS critical decisions algorithm. <em>J Trauma Acute Care Surg</em> 2021; 90(4):641–651.<br/>
              2. Schermerhorn SMV et al. Identification and evaluation of NAT in the pediatric population: a clinical review. <em>Children (Basel)</em> 2024; 11(4):413.<br/>
              3. Escobar MA et al. Child abuse and the pediatric surgeon: APSA position statement. <em>J Pediatr Surg</em> 2019; 54(7):1277–1285.<br/>
              4. Christian CW et al. The eye examination in the evaluation of child abuse. <em>Pediatrics</em> 2018; 142(2).<br/>
              5. ACR Appropriateness Criteria: Suspected Physical Abuse — Child. <em>JACR</em> 2017; 14(5S):S338–S349.<br/>
              6. Riney LC et al. Standardizing the evaluation of NAT in a large pediatric ED. <em>Pediatrics</em> 2018; 141(1):e20171994.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Non-Accidental Trauma Clinical Pathway · January 2025
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
