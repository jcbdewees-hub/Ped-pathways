<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pediatric Dehydration — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useMemo}=React;
const C={primary:"#1e3a5f",pLight:"#eff6ff",pBorder:"#93c5fd",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"Pathway Rationale",content:"Gastroenteritis accounts for >1.5 million pediatric outpatient visits and 200,000 hospitalizations annually. ORT is the preferred method of rehydration — it is widely available, effective, safe, cost-effective, and has even been demonstrated to be faster than IV therapy. However, ORT continues to be underutilized, with IV fluids often initiated before adequate ORT attempts. This pathway prioritizes aggressive oral rehydration with ondansetron to reduce IV use and admissions."},
  ondansetron:{title:"Ondansetron for ORT Success",content:"Vomiting is the primary barrier to successful ORT, and physicians are more likely to choose IV over ORT when vomiting is prominent. Ondansetron is a safe, effective antiemetic that improves ORT success. Children receiving ondansetron vomit less often, have greater oral intake, and are less likely to require IV rehydration. Do NOT give to infants <6 months. Can redose once if vomiting recurs during ORT trial."},
  ort:{title:"ORT Protocol Design",content:"The weight-based ORT protocol uses graduated volumes starting with small frequent aliquots (5–30 mL every 5 minutes) for 20–40 minutes, then advancing to double volumes if tolerated. This graduated approach prevents gastric distension-triggered vomiting while achieving effective rehydration. If emesis occurs during the first 20 minutes, hold PO for 20 minutes, consider a second ondansetron dose, then restart. ORT failure is defined as emesis after the second ondansetron dose OR refusal to take from syringe/cup for >30 minutes."},
  dehydrationScore:{title:"Clinical Dehydration Score",content:"The 4-parameter dehydration score (appearance, eyes, mucous membranes, tears) provides a standardized severity assessment. Score 0: no dehydration. Score 1–4: mild-moderate (5–9% weight loss). Score 5–8: severe (>9% weight loss). The score correlates with percent weight loss and guides the intensity of rehydration — ORT for mild-moderate, IV for severe. Adapted from Hendrickson et al. (Pediatric Emergency Care 2018) and Friedman et al. (J Pediatrics 2004)."},
  ivFluids:{title:"IV Fluid Strategy",content:"NS bolus 20 mL/kg, may repeat ×2 with reassessment between boluses. For neonates, cardiac patients, frail or malnourished infants, start with 10 mL/kg boluses and reassess between each. The goal is to restore perfusion and then transition to ORT as soon as possible. IV therapy should not replace adequate ORT attempts in moderate dehydration."},
  hypoglycemia:{title:"Hypoglycemia Management",content:"Hypoglycemia is defined as glucose <70 mg/dL in children and infants >6 months. Treat with D10W 4–5 mL/kg bolus, recheck glucose in 30 minutes. If hypoglycemia persists, start glucose-containing maintenance fluids (D5 0.45–0.9% NaCl + 20 mEq KCl). Always check CBG in moderate-severe dehydration, altered mental status, or lethargy."},
  riskFactors:{title:"Risk Factors for Severe Illness",content:"Age <6 months or weight <8.5 kg, premature birth, chronic medical conditions, concurrent illness, fever >38°C if <3 months or >39°C if 3–36 months, visible blood in stool, high-output diarrhea with frequent/substantial volumes, persistent vomiting, caregiver-reported dehydration signs, mental status changes, suboptimal ORT response, or caregiver inability to administer ORT."},
  discharge:{title:"Discharge Criteria",content:"Demonstrated ability to tolerate adequate PO fluids, parents instructed on and able to continue oral rehydration at home, vital signs stable with no clinical signs of shock or hypovolemia, and assessment at or near baseline for level of consciousness. Children with no or mild dehydration can be discharged after successful PO trial and education."},
};

const DEHY_PARAMS=[
  {name:"Appearance",options:[{label:"Normal",score:0},{label:"Thirsty, restless, or lethargic but irritable when touched",score:1},{label:"Drowsy, limp, cold, sweaty, ± comatose",score:2}]},
  {name:"Eyes",options:[{label:"Normal",score:0},{label:"Slightly sunken",score:1},{label:"Very sunken",score:2}]},
  {name:"Mucous Membranes",options:[{label:"Moist",score:0},{label:"Sticky",score:1},{label:"Dry",score:2}]},
  {name:"Tears",options:[{label:"Present",score:0},{label:"Decreased",score:1},{label:"Absent",score:2}]},
];

function calcDoses(w){
  const wt=parseFloat(w)||0;if(wt<=0)return null;
  let ortStart,ortAdvance,ortDuration;
  if(wt<10){ortStart=5;ortAdvance=10;ortDuration=20;}
  else if(wt<30){ortStart=10;ortAdvance=20;ortDuration=20;}
  else{ortStart=30;ortAdvance=60;ortDuration=40;}
  return{w:wt,bolus20:Math.round(wt*20),bolus10:Math.round(wt*10),d10lo:Math.round(wt*4),d10hi:Math.round(wt*5),ortStart,ortAdvance,ortDuration,
    ondPO:wt<15?"1–2":wt<=26?"2–4":"8",
    ondIVlo:Math.round(wt*0.1*10)/10,ondIVhi:Math.min(Math.round(wt*0.2*10)/10,8),
  };
}

// Primitives
function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:22,fontWeight:700,marginTop:4,lineHeight:1.2}}>Pediatric Dehydration</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · Age ≥6 Months · February 2021</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function Sec({title,color,children}){return(<div style={{marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingBottom:4,borderBottom:`2px solid ${color}`}}>{title}</div>{children}</div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const[dehyScores,setDehyScores]=useState([null,null,null,null]);
  const doses=useMemo(()=>calcDoses(weightKg),[weightKg]);

  const dehyTotal=useMemo(()=>{
    if(dehyScores.some(s=>s===null))return null;
    return dehyScores.reduce((a,b)=>a+b,0);
  },[dehyScores]);

  const dehySev=useMemo(()=>{
    if(dehyTotal===null)return null;
    if(dehyTotal<=1)return{text:"Minimal/None (0–1)",color:C.greenMid,bg:C.greenBg,border:C.greenBorder,level:"none"};
    if(dehyTotal<=4)return{text:"Moderate (2–4)",color:C.amberMid,bg:C.amberBg,border:C.amberBorder,level:"moderate"};
    return{text:"Severe (5–8)",color:C.red,bg:C.redBg,border:C.redBorder,level:"severe"};
  },[dehyTotal]);

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"score",label:"Dehy Score"},
    {key:"decision",label:"Decisions"},
    {key:"meds",label:"Fluids & Meds"},
    {key:"special",label:"Dispo & Refs"},
  ];

  return(
    <div style={{maxWidth:520,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="12" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
        {dehySev&&<div style={{fontSize:10,fontWeight:700,color:dehySev.color,alignSelf:"flex-end",paddingBottom:8,whiteSpace:"nowrap"}}>Score {dehyTotal}</div>}
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="≥6 months with vomiting or diarrhea"/>
          <TeachBox id="overview" teaching={teaching}/>

          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Pediatric patients &lt;20 years with reported vomiting or diarrhea</Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">&lt;6 months old · Bloody diarrhea · Bilious emesis · Hypo/hypernatremia · Comorbid conditions (metabolic, cardiac) · Suspected surgical process</Alert>
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              ESI I–IV (by severity)<br/>
              Isolation: contact or contact-plus<br/>
              Full vitals<br/>
              <strong>Ondansetron ODT/PO</strong> (do NOT give if &lt;6 months)<br/>
              Initiate ORT if moderate dehydration<br/>
              LMX or J-tip for anticipated IV start<br/>
              Monitor if ill-appearing<br/>
              <strong>Weigh all diapers · Document I/O</strong>
            </div>
          </Card>

          <Card title="Diagnostics" color={C.primary} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>CBG:</strong> moderate-severe dehydration, altered mental status, or lethargy<br/>
              <strong>BMP, UA, stool culture:</strong> if indicated
            </div>
          </Card>

          <Card title="Nursing Documentation" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              Chief complaint · Onset of N/V/D · Type and amount PO intake · # episodes V/D in 24h · # wet diapers in 24h · General appearance/LOC · Cap refill · Skin turgor · Mucous membranes/tears · Respiratory pattern · Fontanel · Sunken eyes · Isolation status
            </div>
          </Card>

          <Card title="Risk Factors" color={C.red} defaultOpen={false}>
            <div style={{fontSize:12,lineHeight:1.7,marginTop:8}}>
              • Age &lt;6 months or weight &lt;8.5 kg<br/>
              • Premature birth, chronic conditions, concurrent illness<br/>
              • Fever &gt;38°C if &lt;3 months · &gt;39°C if 3–36 months<br/>
              • Visible blood in stool · High-output diarrhea<br/>
              • Persistent vomiting · Mental status changes<br/>
              • Suboptimal ORT response or caregiver unable to administer ORT
            </div>
            <TeachBox id="riskFactors" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DEHYDRATION SCORE ── */}
      {tab==="score"&&(
        <Pad>
          <Q text="Clinical Dehydration Score" sub="4 parameters · Score 0–8"/>
          <TeachBox id="dehydrationScore" teaching={teaching}/>

          {DEHY_PARAMS.map((param,pIdx)=>(
            <div key={pIdx} style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:6}}>{param.name}</div>
              <div style={{display:"grid",gridTemplateColumns:`repeat(${param.options.length},1fr)`,gap:4}}>
                {param.options.map((opt,oIdx)=>{
                  const sel=dehyScores[pIdx]===opt.score;
                  const bg=opt.score===0?C.greenMid:opt.score===1?C.amberMid:C.red;
                  return(
                    <button key={oIdx} onClick={()=>setDehyScores(p=>{const n=[...p];n[pIdx]=opt.score;return n;})} style={{padding:"8px 6px",borderRadius:8,cursor:"pointer",textAlign:"center",border:`1.5px solid ${sel?bg:C.rule}`,background:sel?bg:C.white,color:sel?C.white:C.ink,fontSize:10,fontWeight:sel?700:500,lineHeight:1.3}}>
                      <div>{opt.label}</div>
                      <div style={{fontSize:9,opacity:0.7,marginTop:2}}>{opt.score} pt{opt.score!==1?"s":""}</div>
                    </button>
                  );
                })}
              </div>
            </div>
          ))}

          {dehyTotal!==null&&dehySev&&(
            <div style={{background:dehySev.bg,border:`1.5px solid ${dehySev.border}`,borderRadius:10,padding:"14px",marginTop:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.04em"}}>Dehydration Score</div><div style={{fontSize:28,fontWeight:700,color:dehySev.color,fontFamily:"'IBM Plex Mono',monospace"}}>{dehyTotal}</div></div>
              <div style={{textAlign:"right"}}><div style={{background:dehySev.color,color:C.white,padding:"6px 14px",borderRadius:8,fontSize:13,fontWeight:700}}>{dehySev.text}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:4}}>{dehySev.level==="none"?"<5% weight loss":dehySev.level==="moderate"?"5–9% weight loss":">9% weight loss"}</div></div>
            </div>
          )}
          {dehyTotal===null&&(<div style={{background:C.pLight,border:`1.5px solid ${C.pBorder}`,borderRadius:10,padding:"12px 14px",marginTop:8,textAlign:"center",fontSize:13,color:C.muted}}>Select all 4 parameters to calculate score</div>)}
          <button onClick={()=>setDehyScores([null,null,null,null])} style={{marginTop:12,width:"100%",padding:"10px",borderRadius:8,border:`1.5px solid ${C.rule}`,background:C.white,color:C.muted,fontSize:12,fontWeight:600,cursor:"pointer"}}>Reset Score</button>

          {/* Additional assessment table */}
          <Card title="Further Signs by Severity" color={C.primary} defaultOpen={false}>
            <div style={{marginTop:8,overflowX:"auto"}}>
              <div style={{fontSize:10,minWidth:380}}>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1.5fr 1.5fr",background:C.primary,borderRadius:"6px 6px 0 0"}}>
                  {["Sign","Minimal","Moderate","Severe"].map(h=>(<div key={h} style={{padding:"5px 6px",color:C.white,fontWeight:700,fontSize:9}}>{h}</div>))}
                </div>
                {[
                  ["Mental status","Well, alert","Fatigued, restless, irritable","Apathetic, lethargic"],
                  ["Thirst","Normal","Thirsty, eager to drink","Drinks poorly"],
                  ["Heart rate","Normal","Normal-increased","Increased"],
                  ["Pulses","Normal","Normal-decreased","Weak, thready"],
                  ["Skin fold","Instant recoil","Recoil <2s","Recoil >2s"],
                  ["Cap refill","Normal","Prolonged","Prolonged, minimal"],
                  ["Extremities","Warm","Cool","Cold, mottled"],
                  ["Urine output","Normal-decreased","Decreased","Minimal"],
                ].map((row,i)=>(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 1.5fr 1.5fr 1.5fr",background:i%2===0?C.white:"#fafaf7",borderBottom:`1px solid ${C.rule}`}}>
                    {row.map((cell,j)=>(<div key={j} style={{padding:"4px 6px",fontSize:9,fontWeight:j===0?600:400}}>{cell}</div>))}
                  </div>
                ))}
              </div>
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Management by Severity"/>

          <Card title="Minimal/None — Score 0–1 (<5%)" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ESI IV · Consider ondansetron + PO challenge<br/>
              <strong style={{color:C.greenMid}}>→ Discharge after successful PO trial + education</strong>
            </div>
          </Card>

          <Card title="Moderate — Score 2–4 (5–9%)" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ESI III or IV<br/>
              <strong>Ondansetron</strong> + CBG + Begin <strong>ORT per protocol</strong>
            </div>
            {doses&&(
              <div style={{background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"10px 12px",marginTop:8}}>
                <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:700,color:C.amberMid}}>
                  ORT: {doses.ortStart} mL q5min × {doses.ortDuration} min
                </div>
                <div style={{fontSize:12,marginTop:4}}>If tolerated → advance to <strong>{doses.ortAdvance} mL q5min</strong> · Reassess 30–60 min</div>
              </div>
            )}
            <div style={{fontSize:14,fontWeight:700,color:C.ink,marginTop:12,marginBottom:6}}>Tolerating ORT?</div>
            <div style={{display:"flex",gap:6}}>
              <div style={{flex:1,background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>YES</div>
                <div style={{fontSize:11,marginTop:4}}>Double volume · Reassess 30–60 min · Prepare for discharge</div>
              </div>
              <div style={{flex:1,background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px"}}>
                <div style={{fontSize:12,fontWeight:700,color:C.red}}>NO — Emesis</div>
                <div style={{fontSize:11,marginTop:4}}>Hold PO 20 min · 2nd ondansetron · Retry ORT</div>
              </div>
            </div>
            <div style={{background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"8px 12px",fontSize:12,marginTop:8}}>
              <strong style={{color:C.red}}>ORT Failure:</strong> Emesis after 2nd ondansetron OR refusal to take from syringe/cup &gt;30 min → IV bolus {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{doses.bolus20} mL</span>:"20 mL/kg"} · Get BMP
            </div>
            <TeachBox id="ort" teaching={teaching}/>
          </Card>

          <Card title="Severe / Shock — Score 5–8 (>9%)" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ESI I or II<br/>
              <strong>Immediate:</strong> CBG, BMP, monitor, room placement<br/>
              <strong>IV NS {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace"}}>{doses.bolus20} mL</span>:"20 mL/kg"}</strong> · Reassess between boluses · May repeat<br/>
              <span style={{fontSize:12,color:C.muted}}>Neonates/cardiac/frail: start with {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace"}}>{doses.bolus10} mL</span>:"10 mL/kg"}</span>
            </div>
            <div style={{fontSize:13,marginTop:8}}>After resuscitation → if tolerating PO and well-appearing → ORT trial · Otherwise → <strong>admit</strong></div>
            <TeachBox id="ivFluids" teaching={teaching}/>
          </Card>

          <Card title="Hypoglycemia (CBG <70)" color={C.purple} defaultOpen={false}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>D10W</strong> {doses?<span style={{fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{doses.d10lo}–{doses.d10hi} mL</span>:"4–5 mL/kg"} bolus<br/>
              Recheck glucose in 30 minutes<br/>
              If persists → start D5 0.45–0.9% NaCl + 20 KCl maintenance
            </div>
            <TeachBox id="hypoglycemia" teaching={teaching}/>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const sev=dehySev?dehySev.level:null;
            const hi=(lvl)=>sev===lvl?1:sev===null?0.6:0.2;
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const bC="#1e3a5f",bBg="#eff6ff",bBd="#93c5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);

            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                {dehySev&&<div style={{fontSize:11,color:dehySev.color,fontWeight:600,marginBottom:6}}>● Score {dehyTotal} — {dehySev.text} highlighted</div>}
                {!dehySev&&<div style={{fontSize:11,color:C.muted,marginBottom:6}}>Score dehydration to highlight the active branch</div>}
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 320" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={320} fill="#fafaf8" rx={6}/>

                    <Box x={115} y={6} w={250} h={28} fill={bBg} stroke={bBd} sw={1.5} radius={14}>
                      <T x={240} y={18} size={9} weight={700} color={bC}>ASSESS DEHYDRATION SCORE</T>
                      <T x={240} y={28} size={6} color={mC}>Vitals · Appearance · Eyes · Mucous membranes · Tears</T>
                    </Box>
                    <Arrow x1={240} y1={34} x2={240} y2={48}/>
                    <g transform="translate(240,62)">
                      <polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
                      <T x={0} y={1} size={7} weight={700}>Score?</T>
                    </g>

                    <line x1={185} y1={62} x2={72} y2={62} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={72} y1={62} x2={72} y2={86} color={gC}/>
                    <Arrow x1={240} y1={76} x2={240} y2={86} color={aC}/>
                    <line x1={295} y1={62} x2={408} y2={62} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={408} y1={62} x2={408} y2={86} color={rC}/>

                    {/* None/Mild */}
                    <g opacity={hi("none")}>
                      <Box x={12} y={86} w={120} h={22} fill={gBg} stroke={gBd} sw={1.5}><T x={72} y={95} size={8} weight={700} color={gC}>NONE/MILD 0–1</T><T x={72} y={104} size={6} color={mC}>ESI IV · &lt;5%</T></Box>
                      <Arrow x1={72} y1={108} x2={72} y2={118} color={gC}/>
                      <Box x={12} y={118} w={120} h={28} fill={C.white} stroke={gBd}><T x={72} y={129} size={7}>Ondansetron + PO trial</T><T x={72} y={139} size={6} color={mC}>Education</T></Box>
                      <Arrow x1={72} y1={146} x2={72} y2={156} color={gC}/>
                      <Box x={12} y={156} w={120} h={20} fill={gBg} stroke={gBd} sw={1.5}><T x={72} y={169} size={8} weight={700} color={gC}>DISCHARGE</T></Box>
                    </g>

                    {/* Moderate */}
                    <g opacity={hi("moderate")}>
                      <Box x={150} y={86} w={180} h={22} fill={aBg} stroke={aBd} sw={1.5}><T x={240} y={95} size={8} weight={700} color={aC}>MODERATE 2–4</T><T x={240} y={104} size={6} color={mC}>ESI III-IV · 5–9%</T></Box>
                      <Arrow x1={240} y1={108} x2={240} y2={118} color={aC}/>
                      <Box x={150} y={118} w={180} h={28} fill={C.white} stroke={aBd}><T x={240} y={129} size={7} weight={600} color={aC}>Ondansetron + ORT Protocol</T><T x={240} y={139} size={6} color={mC}>Graduated volumes q5min</T></Box>
                      <Arrow x1={240} y1={146} x2={240} y2={158} color={aC}/>
                      <g transform="translate(240,170)"><polygon points="0,-12 45,0 0,12 -45,0" fill={aBg} stroke={aBd} strokeWidth={1}/><T x={0} y={1} size={6} weight={700} color={aC}>Tolerating?</T></g>
                      <Arrow x1={205} y1={174} x2={175} y2={192} color={gC}/>
                      <Arrow x1={275} y1={174} x2={305} y2={192} color={rC}/>
                      <Box x={140} y={192} w={70} h={28} fill={gBg} stroke={gBd}><T x={175} y={203} size={7} weight={700} color={gC}>YES</T><T x={175} y={213} size={6}>Advance → D/C</T></Box>
                      <Box x={270} y={192} w={70} h={28} fill={rBg} stroke={rBd}><T x={305} y={203} size={7} weight={700} color={rC}>NO</T><T x={305} y={213} size={6}>2nd Zofran/IV</T></Box>
                    </g>

                    {/* Severe */}
                    <g opacity={hi("severe")}>
                      <Box x={348} y={86} w={120} h={22} fill={rBg} stroke={rBd} sw={1.5}><T x={408} y={95} size={8} weight={700} color={rC}>SEVERE 5–8</T><T x={408} y={104} size={6} color={mC}>ESI I-II · &gt;9%</T></Box>
                      <Arrow x1={408} y1={108} x2={408} y2={118} color={rC}/>
                      <Box x={348} y={118} w={120} h={34} fill={C.white} stroke={rBd}><T x={408} y={129} size={7} weight={600} color={rC}>IV NS 20 mL/kg</T><T x={408} y={139} size={7}>CBG · BMP · Monitor</T><T x={408} y={148} size={6} color={mC}>Reassess between boluses</T></Box>
                      <Arrow x1={408} y1={152} x2={408} y2={164} color={rC}/>
                      <g transform="translate(408,176)"><polygon points="0,-12 45,0 0,12 -45,0" fill={rBg} stroke={rBd} strokeWidth={1}/><T x={0} y={1} size={6} weight={700} color={rC}>Tolerating PO?</T></g>
                      <Arrow x1={375} y1={180} x2={365} y2={198} color={gC}/>
                      <Arrow x1={440} y1={180} x2={450} y2={198} color={rC}/>
                      <Box x={330} y={198} w={68} h={20} fill={gBg} stroke={gBd}><T x={364} y={211} size={6} weight={700} color={gC}>ORT trial</T></Box>
                      <Box x={416} y={198} w={56} h={20} fill={rBg} stroke={rBd} sw={2}><T x={444} y={211} size={7} weight={700} color={rC}>ADMIT</T></Box>
                    </g>

                    {/* ORT protocol box */}
                    <Box x={40} y={248} w={400} h={34} fill="#f1f5f9" stroke="#e2e8f0" radius={8}>
                      <T x={240} y={260} size={7} weight={700} color={bC}>ORT PROTOCOL (by weight)</T>
                      <T x={240} y={272} size={6} color={mC}>&lt;10kg: 5→10 mL q5min · 10–30kg: 10→20 mL q5min · ≥30kg: 30→60 mL q5min</T>
                      <T x={240} y={280} size={5} color={rC}>ORT FAILURE: emesis after 2nd ondansetron OR refusal &gt;30min → IV</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── FLUIDS & MEDS ── */}
      {tab==="meds"&&(
        <Pad>
          <Q text="Fluids & Medications" sub={doses?`Calculated for ${doses.w} kg`:"Enter weight for calculations"}/>
          {!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above.</Alert>)}

          <Card title="ORT Protocol" color={C.amberMid}>
            <div style={{marginTop:8}}>
              {doses&&(
                <div style={{background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"12px",marginBottom:8}}>
                  <div style={{fontSize:14,fontWeight:700,color:C.amberMid}}>For {doses.w} kg ({doses.w<10?"<10 kg":doses.w<30?"10–30 kg":"≥30 kg"}):</div>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:13,marginTop:6,lineHeight:1.8}}>
                    Start: <strong>{doses.ortStart} mL</strong> q5min × {doses.ortDuration} min<br/>
                    Advance: <strong>{doses.ortAdvance} mL</strong> q5min · Reassess 30–60 min
                  </div>
                </div>
              )}
              <div style={{fontSize:12,lineHeight:1.6,marginTop:6}}>
                <strong>If emesis during first 20 min:</strong> hold PO 20 min → consider 2nd ondansetron → restart ORT<br/>
                <strong style={{color:C.red}}>ORT Failure:</strong> emesis after 2nd ondansetron OR refusal &gt;30 min → IV
              </div>
            </div>
            <TeachBox id="ort" teaching={teaching}/>
          </Card>

          <Card title="Ondansetron" color={C.primary}>
            <div style={{marginTop:8}}>
              <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",marginBottom:4}}>Oral (by weight)</div>
              {doses?<DoseRow label={`${doses.w} kg`} value={doses.ondPO} unit="mg"/>:
              <div style={{fontSize:12}}>7–14 kg: 1–2 mg · 15–26 kg: 2–4 mg · &gt;27 kg: 8 mg</div>}
              <div style={{fontSize:12,fontWeight:600,color:C.muted,textTransform:"uppercase",marginTop:8,marginBottom:4}}>IV (0.1–0.2 mg/kg, max 8 mg)</div>
              {doses&&<DoseRow label="Ondansetron IV" value={`${doses.ondIVlo}–${doses.ondIVhi}`} unit="mg"/>}
              <div style={{fontSize:11,color:C.red,fontWeight:600,marginTop:6}}>Do NOT give to infants &lt;6 months</div>
            </div>
            <TeachBox id="ondansetron" teaching={teaching}/>
          </Card>

          <Card title="IV Fluids" color={C.red}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS bolus (20 mL/kg) ×2" value={doses?doses.bolus20:"—"} unit={doses?"mL":""}/>
              <DoseRow label="NS bolus (10 mL/kg) — neonates/cardiac/frail" value={doses?doses.bolus10:"—"} unit={doses?"mL":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>Reassess between boluses for effectiveness</div>
            </div>
            <TeachBox id="ivFluids" teaching={teaching}/>
          </Card>

          <Card title="Hypoglycemia (CBG <70)" color={C.purple} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="D10W bolus (4–5 mL/kg)" value={doses?`${doses.d10lo}–${doses.d10hi}`:"—"} unit={doses?"mL":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>Recheck glucose in 30 min · If persists → D5 0.45–0.9% NaCl + 20 KCl maintenance</div>
            </div>
            <TeachBox id="hypoglycemia" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DISPO & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Disposition & References"/>

          <Card title="Discharge Criteria" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ✓ Demonstrated ability to tolerate adequate PO fluids<br/>
              ✓ Parents instructed on and able to continue ORT at home<br/>
              ✓ Vital signs stable · No clinical signs of shock/hypovolemia<br/>
              ✓ LOC at or near baseline
            </div>
            <TeachBox id="discharge" teaching={teaching}/>
          </Card>

          <Card title="Admission Criteria" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              ORT failure after 2 ondansetron doses<br/>
              Requiring ongoing IV fluids<br/>
              Unable to maintain adequate PO intake<br/>
              Persistent hemodynamic instability<br/>
              Altered mental status
            </div>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. Bellemare S et al. Oral rehydration vs IV therapy for treating dehydration due to gastroenteritis in children. <em>Cochrane Database Syst Rev</em> 2003.<br/>
              2. Freedman SB et al. Treatment of acute gastroenteritis in children: overview of systematic reviews. <em>Evid Based Child Health</em> 2013; 8:1123–1137.<br/>
              3. Friedman JN et al. Development of a clinical dehydration scale for use in children 1–36 months. <em>J Pediatrics</em> 2004; 145:201–207.<br/>
              4. Hendrickson MA et al. Use of a triage-based protocol for oral rehydration in a pediatric ED. <em>Pediatr Emerg Care</em> 2018; 34:227–232.<br/>
              5. Rutman L et al. Clinical pathway produces sustained improvement in acute gastroenteritis care. <em>Pediatrics</em> 2017; 140(4):e20164310.<br/>
              6. Steiner MJ et al. Is this child dehydrated? <em>JAMA</em> 2004; 291(22):2746–54.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Pediatric Dehydration Clinical Pathway · February 2021
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
