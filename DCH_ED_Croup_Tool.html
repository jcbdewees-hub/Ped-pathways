const TEACH={
overview:{title:"Croup — Subglottic Pathophysiology",
patho:"Croup (laryngotracheobronchitis) is caused by viral infection — most commonly parainfluenza types 1 and 3 — of the subglottic airway. The subglottis is the narrowest portion of the pediatric airway, bounded by the rigid cricoid ring. Viral inflammation causes mucosal edema within this fixed cartilaginous framework, and even 1 mm of circumferential edema reduces the cross-sectional area by ~50% in a child (vs ~20% in an adult).\n\nThe characteristic barky cough is produced by turbulent airflow through the narrowed subglottis. Stridor — the hallmark of croup — is an inspiratory sound generated by high-velocity airflow through a critically narrowed extrathoracic airway. As severity increases, stridor becomes biphasic (inspiratory AND expiratory), indicating near-critical obstruction.",
pearls:"Croup is a clinical diagnosis — labs and imaging are NOT necessary. The classic triad is barky cough, hoarse voice, and inspiratory stridor, typically preceded by 1–2 days of URI symptoms. Symptoms classically worsen at night (cool air, supine positioning, decreased cortisol levels).\n\nThe child's degree of agitation directly impacts the clinical assessment. An agitated, crying child generates more turbulent airflow through the narrowed airway, dramatically amplifying stridor and retractions. Always minimize noxious stimuli — examine on the parent's lap, avoid unnecessary procedures.",
evidence:"Standardized croup pathways reduce unnecessary diagnostics, standardize steroid administration, and decrease ED length of stay. The key insight is that almost every child with croup benefits from dexamethasone, including those with only a barky cough. (Bjornson 2013; Gates 2018, Cochrane CD001955)"},
dex:{title:"Dexamethasone — The Cornerstone",
patho:"Corticosteroids reduce subglottic mucosal edema through multiple mechanisms: suppression of inflammatory cytokines, reduction of vascular permeability, decreased mucus secretion, and stabilization of endothelial cell membranes. The anti-inflammatory effect takes 2–4 hours to manifest clinically but persists for 48–72 hours due to dexamethasone's long biologic half-life.\n\nThis pharmacokinetic profile is critical: the steroid effect bridges the typical peak of croup severity (night 2–3 of illness), providing sustained benefit from a single dose.",
pearls:"Dexamethasone is indicated in ALL children diagnosed with croup — including those with ONLY a barky cough and no other respiratory distress. This is frequently under-treated: mild croup still benefits from steroid-mediated reduction in subglottic edema.\n\nThe IV formulation given orally minimizes volume and maximizes palatability. Less than 5% of children vomit the medication. For severe croup where the child cannot safely swallow, give IM — do not delay treatment.",
evidence:"A Cochrane review of 43 RCTs confirms that corticosteroids significantly reduce croup symptoms at 6 and 12 hours, decrease return visits, and shorten ED and hospital length of stay. Dexamethasone 0.6 mg/kg is the most studied and most effective dose. Lower doses (0.15 mg/kg) may be adequate for mild croup but 0.6 mg/kg is standard at DCH. (Gates 2018, Cochrane CD001955; Russell 2011)"},
epi:{title:"Racemic Epinephrine — Mechanism & Limitations",
patho:"Racemic epinephrine acts on alpha-1 adrenergic receptors in the subglottic vasculature, causing arteriolar vasoconstriction. This reduces blood flow to the inflamed mucosa, decreasing hydrostatic pressure and transudation of fluid — mechanically shrinking the edematous tissue and widening the airway lumen.\n\nThe effect is rapid (onset within minutes, peak at 30 min) but transient (duration 1–2 hours). As the alpha-mediated vasoconstriction wears off, rebound vasodilation can occur, potentially returning the airway to its pre-treatment caliber or worse. This is the physiological basis for the mandatory 2-hour observation period.",
pearls:"Racemic epi is for STRIDOR AT REST — not for a barky cough without stridor. The 2-hour post-epi observation is non-negotiable: rebound worsening can occur as the vasoconstrictive effect wears off before the steroid has fully taken effect.\n\nIf a 3rd dose of racemic epi is needed, you are treating something that is not responding like typical croup. Reconsider the differential: bacterial tracheitis, epiglottitis, foreign body, retropharyngeal abscess. Plan for admission.",
evidence:"Nebulized epinephrine produces rapid, significant improvement in croup symptoms and is the mainstay of acute management for moderate-to-severe disease. However, because the effect is temporary, it must always be paired with corticosteroids for sustained improvement. (Bjornson 2013, Cochrane CD006619)"},
heliox:{title:"Heliox — Physics-Based Rescue",
patho:"Heliox is a blend of helium (70%) and oxygen (30%). Helium has a density approximately one-seventh that of nitrogen. In a narrowed airway, airflow transitions from laminar to turbulent at lower flow rates (per the Reynolds number). Turbulent flow generates exponentially more resistance than laminar flow.\n\nBy replacing nitrogen with the much lighter helium, the gas density is reduced, the Reynolds number drops, and flow transitions back toward laminar. This dramatically decreases the pressure gradient needed to move air through the narrowed subglottis, reducing WOB while awaiting the steroid and/or epinephrine effects.",
pearls:"Heliox is a bridge — it buys time while definitive therapies (steroids, possible intubation) take effect. The 70/30 blend limits the FiO2 to 30%, which is adequate for most croup patients who are not primarily hypoxic.\n\nHeliox is most effective in the most severe cases where turbulent flow is the dominant problem. It is delivered via tight-fitting non-rebreather mask and requires a cooperative (or sedated) patient.",
evidence:"Heliox reduces work of breathing and croup severity scores in children with stridor refractory to standard racemic epinephrine. It is most useful as a temporizing measure in severe croup. (Moraa 2018; Vorwerk 2010)"},
monitoring:{title:"Monitoring Philosophy — Less Is More",
patho:"The sympathetic activation from agitation (crying, being held down for monitoring) directly worsens airway dynamics in croup. A crying child generates turbulent airflow, negative intrathoracic pressure increases, and the extrathoracic airway (subglottis) collapses further during forceful inspiration. Paradoxically, the monitoring itself can worsen the disease.",
pearls:"Continuous pulse oximetry for moderate and severe only. Spot-check SpO₂ for mild croup. Do NOT attach a continuous monitor to a calm, sleeping child with mild croup — the alarm will wake them, they'll cry, and you'll create the distress you were monitoring for.\n\nThe 2-hour post-epi observation clock starts after the LAST dose of racemic epinephrine. If a second dose is given at 30 minutes, the 2-hour window resets.",
evidence:"Over-monitoring of mild croup increases ED length of stay without improving outcomes. The minimize-stimuli philosophy is evidence-based and consistently emphasized in national guidelines. (Russell 2011; Bjornson 2008)"},
imaging:{title:"Imaging — Rarely Needed",
patho:"The classic 'steeple sign' on AP neck x-ray represents subglottic narrowing, but it has poor sensitivity (50%) and specificity. The normal subglottic airway in a child can appear tapered on a slightly rotated or expiratory film. The finding is not specific to croup and adds no information beyond what the clinical exam provides.",
pearls:"Consider imaging only when the diagnosis is in question: no response to standard treatment, high fever without URI prodrome, no barky cough (suggesting a non-croup cause of stridor), or toxic/ill appearance. Imaging targets the differential, not confirmation of croup.\n\nSoft tissue neck x-ray lateral view is more useful than AP — it can identify retropharyngeal abscess or epiglottitis (thumb sign).",
evidence:"Lab and radiological assessments are not necessary for the routine diagnosis of croup. Imaging should be reserved for atypical presentations or treatment failures where an alternative diagnosis is being considered. (Clarke 2012)"},
differential:{title:"Differential Diagnosis — When It's Not Croup",
pearls:"If no response to dexamethasone + racemic epinephrine × 2, strongly reconsider the diagnosis. The critical differential includes:\n\n• Bacterial tracheitis: toxic appearance, high fever, purulent secretions, fails to improve with epi\n• Epiglottitis: drooling, tripod positioning, muffled voice (NOT barky cough), toxic\n• Foreign body: sudden onset without URI prodrome, unilateral wheeze\n• Retropharyngeal abscess: neck stiffness, drooling, high fever\n• Hereditary angioedema: recurrent episodes without URI, family history\n• Laryngomalacia/tracheomalacia: chronic stridor since birth, not episodic",
evidence:"Bacterial tracheitis has emerged as the most important croup mimic since the near-elimination of epiglottitis by Hib vaccination. It presents similarly to severe croup but does not respond to standard therapy and requires IV antibiotics and often ICU-level airway management. (Hopkins 2006; Tebruegge 2009)"},
mist:{title:"Mist Therapy — No Evidence",
pearls:"Despite its long historical use and intuitive appeal, mist therapy (cool mist, heated mist, saline nebulizers) has no demonstrated benefit in croup. It does not reduce subglottic edema, does not improve symptom scores, and the nebulizer apparatus adds noxious stimuli to an already distressed child.",
evidence:"A Cochrane review and multiple RCTs show no benefit of humidity/mist therapy in croup. The AAP and CPS recommend against its use. (Moore 2006, Cochrane)"},
admission:{title:"Admission & PICU Criteria",
patho:"The natural history of viral croup typically peaks on illness day 2–3 with gradual resolution over 5–7 days. The critical window for deterioration is the first 12–24 hours after ED presentation, particularly overnight when symptoms worsen.",
pearls:"Consider admission if: recurrent stridor after 2 hours of observation + epi × 2, steroid given >4 hours ago with continued moderate distress, any concern for alternative diagnosis, or social/geographic factors limiting return access.\n\nPICU criteria: impending respiratory failure (fatigue, listlessness, pallor, decreasing stridor with decreasing air movement), refractory to epinephrine × 2, need for heliox or concern for intubation.",
evidence:"Children discharged after successful treatment with dexamethasone + observation (± epinephrine) have very low rates of return and deterioration. The key is ensuring the 2-hour post-epi observation window is completed and that the steroid has had time to take effect. (Bjornson 2008; Amir 2006)"},
};
function calcDoses(w){
  var wt=parseFloat(w)||0;if(wt<=0)return null;
  var dex=Math.min(Math.round(wt*0.6*10)/10,16);
  return{w:wt,dex:dex};
}

  return(<Pad>
    <Q text="Walk-Through" sub="Assess severity → treat → observe → disposition"/>
    <TeachBox id="overview" teaching={teaching}/>

    {/* STEP 1: Severity */}
    <Card title="Step 1 — Severity Assessment" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>
        <strong>Assess croup severity.</strong> Initiate droplet + contact isolation. Full vitals. Assess for possibility of airway foreign body.
      </div>
      <WizBtn label="Mild" sub="Occasional barky cough · No stridor at rest · No to mild retractions" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={severity==="mild"} onClick={function(){setSeverity("mild");setModResp(null);setMod2hr(null);setSevResp1(null);setSevResp2(null);setSev2hr(null)}}/>
      <WizBtn label="Moderate" sub="Frequent barky cough · Stridor at rest · Suprasternal/sternal retractions at rest · Without significant agitation" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={severity==="moderate"} onClick={function(){setSeverity("moderate");setModResp(null);setMod2hr(null);setSevResp1(null);setSevResp2(null);setSev2hr(null)}}/>
      <WizBtn label="Severe" sub="Frequent barky cough · Prominent inspiratory ± expiratory stridor · Marked retractions · Significant distress and agitation" color={C.red} bg={C.redBg} border={C.redBorder} selected={severity==="severe"} onClick={function(){setSeverity("severe");setModResp(null);setMod2hr(null);setSevResp1(null);setSevResp2(null);setSev2hr(null)}}/>
      <WizBtn label="Impending Respiratory Failure" sub="AMS · Fatigue · Listlessness · Pallor · Dusky · Decreased retractions · Decreased breath sounds with decreasing stridor" color={C.red} bg={C.redBg} border={C.redBorder} selected={severity==="failure"} onClick={function(){setSeverity("failure")}}/>
    </Card>

    {/* ─── MILD ─── */}
    {severity==="mild"&&(<Card title="Step 2 — Mild Croup" color={C.greenMid}>
      <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="💊" title="Treatment">
        <strong>Dexamethasone</strong> {doses?doses.dex+" mg":"0.6 mg/kg"} PO (max 16 mg)<br/>
        Spot-check SpO₂<br/>
        Oral rehydration as appropriate
      </Alert>
      <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Discharge Home">
        <strong>Parent/caregiver education:</strong><br/>
        • Anticipated course of illness<br/>
        • Signs of respiratory distress<br/>
        • When to seek medical reassessment<br/>
        Return if: stridor at rest, increased WOB, poor feeding, lethargy
      </Alert>
      <TeachBox id="dex" teaching={teaching}/>
      <TeachBox id="mist" teaching={teaching}/>
    </Card>)}

    {/* ─── MODERATE ─── */}
    {severity==="moderate"&&(<div>
      <Card title="Step 2 — Moderate Croup" color={C.amberMid}>
        <Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="💊" title="Initial Treatment">
          <strong>Dexamethasone</strong> {doses?doses.dex+" mg":"0.6 mg/kg"} PO (max 16 mg)<br/>
          <strong>Racemic epinephrine</strong> 2.25% — 0.5 mL in 2.5 mL NS neb<br/>
          Minimize interventions — place child on parent's lap<br/>
          Position for comfort · Continuous pulse oximetry
        </Alert>
        <TeachBox id="epi" teaching={teaching}/>

        <div style={{fontSize:13,marginBottom:10,marginTop:4}}><strong>Response to racemic epinephrine?</strong></div>
        <WizBtn label="Stridor / retractions resolved" sub="Good response to neb" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={modResp==="resolved"} onClick={function(){setModResp("resolved")}}/>
        <WizBtn label="No or minimal improvement" sub="Persistent stridor at rest" color={C.red} bg={C.redBg} border={C.redBorder} selected={modResp==="no_improve"} onClick={function(){setModResp("no_improve")}}/>
      </Card>

      {modResp==="resolved"&&(<Card title="Step 3 — Observe 2 Hours" color={C.greenMid}>
        <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>
          <strong>Observe for minimum 2 hours after epinephrine.</strong><br/>
          Do not discharge before 2 hours post-epi.
        </div>
        <div style={{fontSize:13,marginBottom:10}}><strong>Status after 2-hour observation?</strong></div>
        <WizBtn label="No recurrence — persistent mild symptoms only" sub="No stridor at rest, no significant retractions" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={mod2hr==="good"} onClick={function(){setMod2hr("good")}}/>
        <WizBtn label="Recurrence of moderate/severe distress" sub="Stridor at rest returns" color={C.red} bg={C.redBg} border={C.redBorder} selected={mod2hr==="recur"} onClick={function(){setMod2hr("recur")}}/>

        {mod2hr==="good"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Discharge Home">Educate parents (as for mild croup). No stridor at rest after 2 hours → discharge.</Alert>}
        {mod2hr==="recur"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔁" title="Repeat Epinephrine → Consider Admit">Repeat racemic epinephrine. If good response → continue to observe. <strong>Consider admission</strong> if: steroid given {'>'}4 hours ago, continued moderate distress without agitation/lethargy.</Alert>}
        <TeachBox id="admission" teaching={teaching}/>
      </Card>)}

      {modResp==="no_improve"&&(<Card title="Step 3 — Poor Response" color={C.red}>
        <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔁" title="Repeat Epinephrine">
          <strong>Repeat racemic epinephrine</strong> 2.25% — 0.5 mL in 2.5 mL NS<br/>
          <strong>Reconsider differential diagnosis:</strong> bacterial tracheitis, epiglottitis, foreign body, retropharyngeal abscess, hereditary angioedema, laryngo/tracheomalacia, vascular rings/slings<br/>
          Consider imaging (neck x-ray, CXR)<br/>
          <strong>If 3rd dose needed → reconsider differential and admit</strong><br/>
          <strong>Consider admission</strong>
        </Alert>
        <TeachBox id="differential" teaching={teaching}/>
        <TeachBox id="imaging" teaching={teaching}/>
      </Card>)}
    </div>)}

    {/* ─── SEVERE ─── */}
    {severity==="severe"&&(<div>
      <Card title="Step 2 — Severe Croup" color={C.red}>
        <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="Initial Treatment — Severe">
          <strong>Dexamethasone</strong> {doses?doses.dex+" mg":"0.6 mg/kg"} <strong>IM</strong> (parenteral if unable to tolerate PO safely)<br/>
          <strong>Racemic epinephrine</strong> 2.25% — 0.5 mL in 2.5 mL NS neb (use mask if severe symptoms)<br/>
          Minimize interventions · Provide oxygen · Position for comfort<br/>
          Continuous pulse oximetry<br/>
          <strong>Consider Heliox</strong> (70% He / 30% O₂)
        </Alert>
        <TeachBox id="heliox" teaching={teaching}/>

        <div style={{fontSize:13,marginBottom:10,marginTop:4}}><strong>Response to 1st racemic epinephrine?</strong></div>
        <WizBtn label="Good response" sub="Stridor improved, decreased WOB" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={sevResp1==="good"} onClick={function(){setSevResp1("good")}}/>
        <WizBtn label="No or poor response" sub="Persistent severe stridor and distress" color={C.red} bg={C.redBg} border={C.redBorder} selected={sevResp1==="poor"} onClick={function(){setSevResp1("poor")}}/>
      </Card>

      {sevResp1==="good"&&(<Card title="Step 3 — Observe 2 Hours" color={C.amberMid}>
        <div style={{fontSize:13,lineHeight:1.6,marginBottom:10}}>Observe minimum 2 hours post-epi. Monitor for recurrence.</div>
        <div style={{fontSize:13,marginBottom:10}}><strong>Status after observation?</strong></div>
        <WizBtn label="Resolved — mild symptoms only" sub="No stridor at rest after 2h" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={sev2hr==="good"} onClick={function(){setSev2hr("good")}}/>
        <WizBtn label="Recurrence of moderate/severe distress" sub="Stridor returns" color={C.red} bg={C.redBg} border={C.redBorder} selected={sev2hr==="recur"} onClick={function(){setSev2hr("recur")}}/>

        {sev2hr==="good"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Consider Discharge">No stridor at rest after 2h observation. Educate parents. Discharge with return precautions.</Alert>}
        {sev2hr==="recur"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🏥" title="Repeat Epi → Consider Admission">Repeat racemic epinephrine. If epi × 2 with recurrent stridor after 2h observation → <strong>admit</strong>. Call pediatric ward or PICU attending.</Alert>}
        <TeachBox id="admission" teaching={teaching}/>
      </Card>)}

      {sevResp1==="poor"&&(<Card title="Step 3 — Poor Response to 1st Epi" color={C.red}>
        <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔁" title="Repeat Epinephrine + Escalate">
          <strong>Repeat racemic epinephrine</strong> neb<br/>
          <strong>Consider Heliox</strong> if not already started<br/>
          Reconsider differential diagnosis<br/>
          Consider imaging
        </Alert>
        <div style={{fontSize:13,marginBottom:10,marginTop:4}}><strong>Response to 2nd epinephrine?</strong></div>
        <WizBtn label="Improved" sub="Decreased stridor and WOB" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={sevResp2==="improved"} onClick={function(){setSevResp2("improved")}}/>
        <WizBtn label="Still no response" sub="Refractory to 2 doses" color={C.red} bg={C.redBg} border={C.redBorder} selected={sevResp2==="no"} onClick={function(){setSevResp2("no")}}/>

        {sevResp2==="improved"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🏥" title="Admit">Good response to 2nd epi but required 2 doses → <strong>admit for observation</strong>. Continue to monitor. Call pediatric ward attending.</Alert>}
        {sevResp2==="no"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="PICU Consult">Refractory to racemic epinephrine × 2. <strong>Consult PICU.</strong> Continue Heliox. Reconsider differential. Consider imaging if not done.</Alert>}
        <TeachBox id="differential" teaching={teaching}/>
      </Card>)}
    </div>)}

    {/* ─── IMPENDING RESPIRATORY FAILURE ─── */}
    {severity==="failure"&&(<Card title="Step 2 — Impending Respiratory Failure" color={C.red}>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🚨" title="EMERGENCY — PICU">
        <strong>Signs:</strong> Change in mental status · Fatigue · Listlessness · Pallor · Dusky appearance · Decreased retractions · Decreased breath sounds with decreasing stridor<br/><br/>
        <strong>Dexamethasone</strong> {doses?doses.dex+" mg":"0.6 mg/kg"} <strong>IM/IV</strong><br/>
        <strong>Racemic epinephrine</strong> neb<br/>
        Supplemental O₂ · Consider Heliox<br/>
        <strong>→ Immediate PICU consult</strong><br/>
        Prepare for potential intubation
      </Alert>
    </Card>)}

    {/* RESET */}
    {severity!==null&&(<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>)}

    <PathwayFlowchart/>
  </Pad>);
}

// REFERENCE MODE TABS
// ═══════════════════════════════
function RefTriage({teaching}){return(<Pad>
<Q text="Triage & Initial Assessment"/>
<TeachBox id="overview" teaching={teaching}/>
<Card title="Nurse Documentation" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>Chief complaint · Onset of symptoms · Alleviating/contributing factors<br/>Appearance · Lung sounds · Work of breathing · Retractions · Pulses · Skin temperature/fever<br/><strong>Assess for possibility of airway foreign body</strong></div></Card>
<Card title="Initiate on Arrival" color={C.primary}><div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>Initiate <strong>droplet + contact isolation</strong><br/>Full set of vitals<br/><strong>Minimize noxious stimuli</strong> for moderate and severe croup<br/>Determine severity of exacerbation<br/>Continuous pulse oximetry for moderate/severe · Spot-check for mild<br/>Initiate <strong>oral dexamethasone</strong> for mild and moderate severity<br/>Administer O₂ if cyanosis or SpO₂ {'<'}93%<br/>Give <strong>racemic epi</strong> for stridor at rest — alert LIP immediately<br/><strong>Mist therapy (saline nebs) NOT recommended</strong></div><TeachBox id="mist" teaching={teaching}/></Card>
<Card title="Severity Assessment" color={C.blue}><div style={{marginTop:8}}>
{[
{sev:"Mild",color:C.greenMid,bg:C.greenBg,bd:C.greenBorder,desc:"Occasional barky cough · No audible stridor at rest · No to mild suprasternal and/or intercostal retractions"},
{sev:"Moderate",color:C.amberMid,bg:C.amberBg,bd:C.amberBorder,desc:"Frequent barky cough · Easily audible stridor at rest · Suprasternal and sternal wall retraction at rest · Without significant agitation"},
{sev:"Severe",color:C.red,bg:C.redBg,bd:C.redBorder,desc:"Frequent barky cough · Prominent inspiratory and occasionally expiratory stridor · Marked sternal retractions · Significant distress and agitation"},
{sev:"Impending Respiratory Failure",color:C.red,bg:C.redBg,bd:C.redBorder,desc:"Change in mental status · Fatigue · Listlessness · Agitation · Pallor · Dusky appearance · Decreased retractions · Decreased breath sounds with decreasing stridor"}
].map(function(s){return <div key={s.sev} style={{background:s.bg,border:"1.5px solid "+s.bd,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:s.color}}>{s.sev}</div><div style={{fontSize:12,marginTop:2}}>{s.desc}</div></div>})}
</div></Card>
</Pad>)}

function RefDecisions({teaching,doses}){return(<Pad>
<Q text="Decision Tree" sub="Severity-driven management"/>
<Card title="Mild" color={C.greenMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Dex {doses?doses.dex+" mg":"0.6 mg/kg"} PO (max 16 mg)<br/>Spot-check SpO₂ · Oral rehydration<br/><strong>Discharge home</strong> with parent education: anticipated course, signs of respiratory distress, when to seek reassessment</div></Card>
<Card title="Moderate" color={C.amberMid}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Dex {doses?doses.dex+" mg":"0.6 mg/kg"} PO + <strong>Racemic epi</strong> 2.25% (0.5 mL in 2.5 mL NS)<br/>Minimize stimuli · Child on parent's lap · Continuous SpO₂<br/><div style={{marginTop:6,padding:"8px 10px",background:C.greenBg,border:"1px solid "+C.greenBorder,borderRadius:6,fontSize:12}}><strong>Stridor resolved →</strong> observe 2h → if no recurrence → discharge with education</div><div style={{marginTop:4,padding:"8px 10px",background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,fontSize:12}}><strong>No improvement →</strong> repeat epi · reconsider differential · if 3rd dose needed → reconsider dx and admit</div><div style={{marginTop:4,padding:"8px 10px",background:C.amberBg,border:"1px solid "+C.amberBorder,borderRadius:6,fontSize:12}}><strong>Recurrence after 2h →</strong> repeat epi · if good response continue observing · consider admit if steroid {'>'}4h ago + continued moderate distress</div></div></Card>
<Card title="Severe" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Dex {doses?doses.dex+" mg":"0.6 mg/kg"} <strong>IM</strong> (parenteral) + <strong>Racemic epi</strong> neb (mask delivery)<br/>O₂ · Position comfort · Continuous SpO₂<br/>Consider <strong>Heliox</strong> (70% He / 30% O₂)<br/><div style={{marginTop:6,padding:"8px 10px",background:C.greenBg,border:"1px solid "+C.greenBorder,borderRadius:6,fontSize:12}}><strong>Good response →</strong> observe 2h → may discharge if no stridor at rest</div><div style={{marginTop:4,padding:"8px 10px",background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,fontSize:12}}><strong>Poor response →</strong> repeat epi · Heliox · reconsider differential · if refractory × 2 → <strong>PICU consult</strong></div></div><TeachBox id="heliox" teaching={teaching}/></Card>
<Card title="Impending Respiratory Failure" color={C.red}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>AMS · Fatigue · Listlessness · Pallor · Dusky · Decreased retractions with decreasing stridor<br/>Dex IM/IV + Racemic epi + O₂ + Consider Heliox<br/><strong>→ Immediate PICU consult</strong> · Prepare for potential intubation</div></Card>
<Card title="Differential Diagnosis" color={C.muted} defaultOpen={false}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>If no response to standard treatment, consider: bacterial tracheitis, epiglottitis, foreign body aspiration, retropharyngeal abscess, hereditary angioedema, laryngo- or tracheomalacia, vascular rings/slings<br/>Consider imaging (soft tissue neck x-ray, CXR) for children who don't respond to treatment, present with high fever, or lack infectious symptoms.</div><TeachBox id="differential" teaching={teaching}/></Card>
<PathwayFlowchart/>
</Pad>)}

function RefMeds({teaching,doses}){return(<Pad>
<Q text="Medications & Dosing" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/>
{!doses&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight in the bar above.</Alert>}
<Card title="Dexamethasone (All Severities)" color={C.primary}><div style={{marginTop:8}}><DoseRow label="Dexamethasone PO (0.6 mg/kg, max 16 mg)" value={doses?doses.dex:"—"} unit={doses?"mg":""}/><div style={{fontSize:12,color:C.muted,marginTop:6}}>PO for mild/moderate (use parenteral version orally to minimize volume). IM/IV for severe or if unable to tolerate PO safely. Single dose. {'<'}5% of children vomit the medication.</div></div><TeachBox id="dex" teaching={teaching}/></Card>
<Card title="Racemic Epinephrine" color={C.primary}><div style={{marginTop:8}}><DoseRow label="Racemic epi 2.25%" value="0.5 mL" unit="in 2.5 mL NS"/><div style={{fontSize:12,color:C.muted,marginTop:6}}>For stridor at rest with distress. May repeat × 1. If 3rd dose needed → reconsider differential and admit. Use mask for neb delivery if severe symptoms. <strong>Observe ≥2 hours after administration before considering discharge.</strong></div></div><TeachBox id="epi" teaching={teaching}/></Card>
<Card title="Heliox (Rescue)" color={C.purple}><div style={{marginTop:8}}><DoseRow label="Heliox" value="70% He / 30% O₂" unit=""/><div style={{fontSize:12,color:C.muted,marginTop:6}}>Consider for stridor refractory to racemic epinephrine. Reduces turbulent airflow through narrowed subglottic airway.</div></div><TeachBox id="heliox" teaching={teaching}/></Card>
<Card title="NOT Recommended" color={C.red}><div style={{marginTop:8}}><div style={{background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,padding:"8px 10px",fontSize:12,fontWeight:500,color:C.red}}>✘ Mist therapy / saline nebs — not recommended for any severity</div></div><TeachBox id="mist" teaching={teaching}/></Card>
</Pad>)}

function RefDispo({teaching}){return(<Pad>
<Q text="Disposition & References"/>
<Card title="Disposition Summary" color={C.primary}><div style={{marginTop:8}}>
<div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>DISCHARGE</div><div style={{fontSize:12,marginTop:2}}><strong>Mild:</strong> after dexamethasone + education<br/><strong>Moderate/Severe:</strong> if stridor resolved and no recurrence after ≥2h observation post-epi</div></div>
<div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}><div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>CONSIDER ADMISSION</div><div style={{fontSize:12,marginTop:2}}>Recurrent stridor after 2h observation + epi × 2 · Steroid given {'>'}4h ago with continued moderate distress · If 3rd epi dose needed → reconsider dx and admit</div></div>
<div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px"}}><div style={{fontSize:13,fontWeight:700,color:C.red}}>PICU</div><div style={{fontSize:12,marginTop:2}}>Impending respiratory failure · Refractory to racemic epinephrine × 2 · Severe distress not responding to treatment</div></div>
</div><TeachBox id="admission" teaching={teaching}/></Card>
<Card title="Discharge Education" color={C.blue}><div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>Anticipated course of illness (typically 3–5 days, worst nights 2–3)<br/>Signs of respiratory distress to watch for<br/>When to seek medical reassessment<br/>Return precautions: stridor at rest, increased WOB, poor feeding, lethargy, color change</div></Card>
<Card title="References" color={C.muted} defaultOpen={false}><div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>1. Westley CR, Cotton EK, Brooks JG. Nebulized racemic epinephrine by IPPB for the treatment of croup. <em>Am J Dis Child</em> 1978; 132:484.<br/>2. Gates A et al. Glucocorticoids for croup in children. <em>Cochrane Database Syst Rev</em> 2018; 8:CD001955.<br/>3. Clarke M, Allaire J. An evidence-based approach to the evaluation and treatment of croup in children. <em>Pediatric Emergency Medicine Practice</em> 2012; 9:1.<br/>4. Bjornson C et al. Nebulized epinephrine for croup in children. <em>Cochrane Database Syst Rev</em> 2013; CD006619.</div></Card>
</Pad>)}

function App(){
  var s1=useState("wizard"),mode=s1[0],setMode=s1[1];
  var s2=useState("triage"),tab=s2[0],setTab=s2[1];
  var s3=useState(false),teaching=s3[0],setTeaching=s3[1];
  var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];
  var s5=useState(""),ageMo=s5[0],setAgeMo=s5[1];
  var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);
  var rr=useResponsive(),maxW=rr.maxW;

  var refTabs=[{key:"triage",label:"Triage"},{key:"decision",label:"Decisions"},{key:"meds",label:"Meds"},{key:"dispo",label:"Dispo & Refs"}];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>

      {mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}

      <div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (months)</label><input type="number" inputMode="decimal" value={ageMo} onChange={function(e){setAgeMo(e.target.value)}} placeholder="18" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="10" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
      </div>

      {mode==="wizard"&&<Wizard teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}
      {mode==="reference"&&tab==="decision"&&<RefDecisions teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}>
