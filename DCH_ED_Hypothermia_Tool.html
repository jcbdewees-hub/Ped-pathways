const{useState,useMemo,useEffect}=React;
const C={primary:"#b45309",pLight:"#fffbeb",pBorder:"#fcd34d",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

/* ═══════════════════════════════
   TEACH — Tiered Teaching
   ═══════════════════════════════ */
const TEACH={
overview:{
  title:"Pathway Rationale — Young Infant Hypothermia",
  patho:"Hypothermia in infants 0–60 days is defined as a core body temperature below 36.5°C. Neonates are uniquely vulnerable because of their large surface-area-to-body-mass ratio, limited subcutaneous fat, and immature thermoregulatory mechanisms — particularly brown fat thermogenesis, which is metabolically costly and easily overwhelmed. Critically, young infants may fail to mount a febrile response to infection due to immature hypothalamic set-point regulation, making hypothermia the sole early sign of sepsis, meningitis, or UTI.\n\nBelow 36.0°C, mortality and rates of serious bacterial infection (SBI) increase significantly. Hypothermia-associated complications cascade: glycogen depletion causes hypoglycemia, increased metabolic demand for thermogenesis causes lactic acidosis, clotting factor dysfunction causes coagulopathy, and compensatory mechanisms can produce tachycardia followed by bradycardia and cardiovascular collapse.",
  pearls:"The key clinical question is whether hypothermia is environmental (underdressing, cold exposure in a well-appearing infant) or pathologic (infection, metabolic disease, cardiac lesion). The REAL BIGS mnemonic guides your physical exam: Respiratory distress, Energy deficiency, Abnormal tone, Liver issues, Bad feeding, Irregular vitals, GI problems, Skin changes. Any positive REAL BIGS finding should lower your threshold for full workup.\n\nTemperature thresholds drive management: ≥36.0°C gets passive warming (hat, swaddle, skin-to-skin). ≤35.9°C triggers active warming on a radiant warmer within 15 minutes, plus IV access and LP setup at bedside.",
  evidence:"SBI prevalence in hypothermic infants ≤60 days ranges from 4–10% across studies, comparable to febrile infants. Mortality increases significantly below 36.0°C. (Delaney 2023 — systematic review; Raffaele 2023 — multisite study; Perry 2021; Ramgopal 2019, 2020, 2023). The RISHI study group found wide practice variability — this pathway standardizes the approach. (Ramgopal Pediatrics 2023)"
},
realBigs:{
  title:"REAL BIGS — Physical Exam Findings of Concern",
  patho:"The REAL BIGS mnemonic captures the multi-organ manifestations of serious illness in hypothermic neonates. Each element reflects a different pathophysiologic mechanism: respiratory distress from pneumonia or metabolic compensation; energy deficiency from CNS infection or metabolic disease; abnormal tone from meningitis or inborn errors; hepatic dysfunction from HSV hepatitis or metabolic disease; feeding failure from any serious illness; vital sign abnormalities from sepsis or cardiac disease; GI symptoms from NEC, obstruction, or infection; and skin changes from poor perfusion in septic or cardiogenic shock.",
  pearls:"R — Respiratory distress: grunting, flaring, retractions, tachypnea, cyanosis\nE — Energy deficiency: excessive sleepiness or persistent irritability\nA — Abnormal tone: hypotonia, hypertonia, jitteriness, abnormal movements\nL — Liver issues: jaundice within 24 hours or persistent beyond 2 weeks\nB — Bad feeding: difficulty feeding, weak suck, reduced intake\nI — Irregular vitals: tachypnea, hypotension, tachycardia, bradycardia\nG — GI problems: distended/tender abdomen, vomiting, bloody stool\nS — Skin changes: slow cap refill, mottling, pallor, cold extremities, petechiae, purpura\n\nAny positive finding = higher concern for pathologic cause.",
  evidence:"REAL BIGS was developed for this pathway based on DCH ED internal data review. Individual elements are supported by literature on serious bacterial infection recognition in young infants. (OHSU DCH ED Pathway, June 2025)"
},
warming:{
  title:"Warming Strategies & Temperature Thresholds",
  patho:"Passive warming (hat, swaddle, skin-to-skin contact) relies on reducing convective and radiant heat losses from the infant's large surface area. This is appropriate for temperatures ≥36.0°C where the infant's endogenous thermogenesis can restore normothermia. Active warming via radiant warmer provides external infrared energy to directly raise skin and core temperature — indicated at ≤35.9°C where the infant cannot self-correct. Servo-controlled mode maintains target skin temperature while preventing overshoot hyperthermia.",
  pearls:"≥36.0°C → Passive warming: hat + single/double swaddle or skin-to-skin with blanket. Recheck rectal temperature in 30–60 minutes.\n≤35.9°C → Active warming: radiant warmer within 15 minutes. Initiate PIV, prepare LP setup with topical anesthetic. Continuous pulse oximetry.\n\nThe goal is temperature ≥36.5°C sustained for at least 1 hour before considering discharge. An infant who cannot maintain ≥36.5°C after appropriate warming requires admission.",
  evidence:"WHO defines neonatal hypothermia thresholds: mild 36.0–36.4°C, moderate 32.0–35.9°C, severe <32.0°C. The 36.0°C active warming trigger is supported by data showing increased SBI rates below this threshold. (WHO Thermal Protection Guide 1997; Lo 2023 — EMJ temperature threshold study)"
},
antibiotics:{
  title:"Antibiotic Selection by Age",
  patho:"Antibiotic selection mirrors the neonatal fever pathway because the pathogen spectrum is identical — GBS, E. coli, Listeria, and Klebsiella dominate in the 0–21 day group. Ampicillin provides Listeria and Enterococcus coverage that cephalosporins lack. Gentamicin adds synergistic gram-negative and GBS coverage. For 22–60 day infants, the pathogen spectrum shifts toward E. coli and other gram-negatives with lower Listeria risk, making ceftriaxone monotherapy appropriate unless meningitis or HSV is suspected.\n\nCeftazidime replaces ceftriaxone in infants ≤14 days or with hyperbilirubinemia because ceftriaxone displaces bilirubin from albumin, increasing free bilirubin and the risk of kernicterus. Ceftazidime has equivalent gram-negative coverage without albumin binding.",
  pearls:"0–21 days, no meningitis/HSV concern: Ampicillin 50 mg/kg + Gentamicin 5 mg/kg\n0–21 days, meningitis/HSV concern: Acyclovir 20 mg/kg + Ampicillin 75 mg/kg (meningitic dose) + Ceftazidime 50 mg/kg (if ≤14d or hyperbili) OR Ceftriaxone 50 mg/kg (if >14d, no hyperbili)\n\n22–60 days, no meningitis/HSV: Ceftriaxone 50 mg/kg\n22–60 days, meningitis/HSV concern: Acyclovir 20 mg/kg + Ampicillin 75 mg/kg + Ceftriaxone 50 mg/kg (or Ceftazidime if hyperbili)\n\nAntibiotics within 60 minutes for acutely ill/toxic-appearing infants.",
  evidence:"Antibiotic selection follows AAP 2021 febrile infant guidelines adapted for hypothermic infants. Ceftazidime substitution for hyperbilirubinemia is based on ceftriaxone's albumin displacement causing kernicterus risk. (AAP Clinical Practice Guideline 2021; OHSU DCH ED Pathway June 2025)"
},
hsv:{
  title:"HSV Risk Assessment in Hypothermic Infants",
  patho:"Neonatal HSV has three clinical presentations: skin-eye-mouth (SEM), CNS disease, and disseminated disease. Disseminated HSV has 29% mortality even with treatment and frequently presents with temperature instability (both fever and hypothermia), hepatitis, coagulopathy (DIC), and seizures. HSV-2 accounts for most neonatal infections, acquired during passage through an infected birth canal, but HSV-1 can be transmitted postnatally from oral lesions.",
  pearls:"Suspect HSV if any of the following: vesicular lesions anywhere, ill appearance, maternal HSV history or HSV exposure, seizures or abnormal neurologic exam, thrombocytopenia, elevated transaminases (hepatitis), CSF pleocytosis with negative gram stain, or hypothermia that doesn't respond to warming.\n\nIf HSV suspected: obtain surface swabs (eyes, mouth, rectum) for HSV culture, blood HSV PCR, CSF HSV PCR, LFTs. Start IV acyclovir 20 mg/kg immediately — do not wait for results.",
  evidence:"Neonatal HSV incidence is approximately 2–10 per 100,000 live births. Disseminated disease mortality is 29% at 1 year; 70% of CNS HSV survivors develop abnormal neurologic outcomes. Early acyclovir significantly improves outcomes. (Kimberlin 2013; OHSU DCH ED Pathway June 2025)"
},
etiologies:{
  title:"Differential Diagnosis of Infant Hypothermia",
  patho:"The differential for neonatal hypothermia spans multiple organ systems. Environmental/physiologic hypothermia (underdressing, cold ambient temperature) is common but is a diagnosis of exclusion. Infectious causes (meningitis, UTI, sepsis, HSV) are the most dangerous and most common pathologic etiology. Cardiac lesions (ductal-dependent lesions, coarctation) present with poor perfusion and cyanosis. Inborn errors of metabolism (organic acidemias, urea cycle defects) present with poor feeding, lethargy, and metabolic acidosis. Endocrine disorders (congenital adrenal hyperplasia, congenital hypothyroidism) may present with electrolyte abnormalities and hypoglycemia.",
  pearls:"Always consider: infection (most common pathologic cause), cardiac lesion (check pre/post-ductal sats, 4-point BPs), metabolic disease (check ammonia, lactate, newborn screen), endocrine disorder (check electrolytes, TSH/free T4, glucose — consider CAH if hyperkalemia + hypoglycemia + ambiguous genitalia), and non-accidental trauma (neuroimaging if concern, check coagulopathy panel, skeletal survey if indicated).\n\nHydrocortisone is indicated if CAH suspected (10–20 days old, hyperkalemia, hypoglycemia, ambiguous genitalia). Prostaglandin E1 for suspected ductal-dependent cardiac lesion.",
  evidence:"Selected etiologies and workup recommendations from OHSU DCH ED Pathway June 2025 and supporting literature. IEM screening should include newborn screening results review — many are diagnosed in the first week of life. (OHSU DCH ED Pathway June 2025)"
},
disposition:{
  title:"Disposition Decision-Making",
  patho:"Disposition is driven by the infant's ability to achieve and maintain normothermia (≥36.5°C) independently, which reflects intact thermoregulatory function and suggests lower risk of underlying pathology. An infant requiring active warming who cannot sustain temperature for at least 1 hour has demonstrated thermoregulatory failure — a marker for serious illness or physiologic vulnerability requiring inpatient monitoring.",
  pearls:"PICU/NICU: Critically ill infants, infants actively requiring radiant warmer, infants unable to maintain ≥36.5°C for at least 1 hour.\nPediatric Hospitalist: Stable infants with REAL BIGS findings or risk factors who maintain ≥36.5°C for at least 1 hour.\nConsider Discharge: Asymptomatic, low-risk infants who achieve ≥36.3°C after 1–2 hours of passive warming. Call PCP before discharge.\n\nKey risk factors favoring admission: prematurity, maternal infections (if <28 days GA), repeated temperature instability, comorbidities, WBC abnormalities, thrombocytopenia.",
  evidence:"Disposition criteria based on OHSU DCH ED internal data review and RISHI study group recommendations. Temperature maintenance for ≥1 hour is the key physiologic test for discharge readiness. (Ramgopal Pediatrics 2023; OHSU DCH ED Pathway June 2025)"
},
diagnostics:{
  title:"Diagnostic Workup",
  pearls:"Core labs: CMP, CBG, CBC with differential, procalcitonin, coagulopathy panel, POC lactate with VBG, blood culture.\nCSF: Gram stain, cell count, protein, glucose, culture, HSV panel, enterovirus PCR.\nUrine: Catheter specimen — Pedi UTI Panel (UA, microscopy, mandatory culture).\nConsider: TSH/free T4, ammonia, RPP, chest X-ray + EKG (if tachypnea, hypoxia, cough, cyanosis), neuroimaging (if trauma/vitamin K deficiency/intracranial abnormality suspected).\nPoint-of-care electrolytes if ill-appearing or T <36.0°C.\n\nIf HSV suspected: surface swabs for HSV culture, blood HSV PCR, CSF HSV PCR."
}
};

/* ═══════════════════════════════
   calcDoses
   ═══════════════════════════════ */
function calcDoses(w){
  var wt=parseFloat(w)||0;if(wt<=0)return null;
  return{
    w:wt,
    amp50:Math.round(wt*50),
    amp75:Math.round(wt*75),
    gent:Math.round(wt*5*10)/10,
    ceftri50:Math.round(wt*50),
    ceftaz50:Math.round(wt*50),
    acyclovir:Math.round(wt*20),
    bolus10:Math.round(wt*10),
    bolus20:Math.round(wt*20),
    d10:Math.round(wt*5),
    apapPO:Math.round(wt*12.5*10)/10,
    apapPR:Math.round(wt*15)
  };
}

function useResponsive(){var s=useState(typeof window!=='undefined'?window.innerWidth:520),w=s[0],setW=s[1];useEffect(function(){var h=function(){setW(window.innerWidth)};window.addEventListener('resize',h);return function(){window.removeEventListener('resize',h)};},[]);return{maxW:w>=640?800:520};}

/* ═══════════════════════════════
   PRIMITIVES
   ═══════════════════════════════ */
function Header({teaching,onToggleTeach,mode,onToggleMode}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Young Infant Hypothermia</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · June 2025</div></div><div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}><button onClick={onToggleMode} style={{background:mode==="wizard"?"#ffffff30":"#ffffff15",border:"1.5px solid "+(mode==="wizard"?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{mode==="wizard"?"🔀 Walk-Through":"📋 Reference"}</button><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:"1.5px solid "+(teaching?"#fff":"#ffffff40"),color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 Teaching ON":"📖 Teach"}</button></div></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:"1px solid "+C.rule,overflowX:"auto"}}>{tabs.map(function(t){var act=t.key===current;return(<button key={t.key} onClick={function(){onChange(t.key)}} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?"2.5px solid "+C.primary:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>)})}</div>);}
function Pad({children}){return <div style={{padding:"20px"}}>{children}</div>}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>)}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:"1.5px solid "+border,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color:color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>)}
function DoseRow({label,value,unit}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:"1px dashed "+C.rule}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit||""}</span></div>)}
function Card({title,color,children,defaultOpen}){var s=useState(defaultOpen!==false),open=s[0],setOpen=s[1];return(<div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={function(){setOpen(!open)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color:color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:"1px solid "+C.rule}}>{children}</div>}</div>)}
function WizBtn({label,sub,color,bg,border,onClick,selected}){return(<button onClick={onClick} style={{display:"block",width:"100%",textAlign:"left",background:selected?bg:C.white,border:"2px solid "+(selected?color:C.rule),borderRadius:10,padding:"14px 16px",marginBottom:8,cursor:"pointer",transition:"all 0.15s"}}><div style={{fontSize:14,fontWeight:700,color:selected?color:C.ink}}>{label}</div>{sub&&<div style={{fontSize:12,color:selected?color:C.muted,marginTop:2,opacity:0.85}}>{sub}</div>}</button>)}

/* ═══════════════════════════════
   TIERED TEACHBOX
   ═══════════════════════════════ */
function TeachBox({id,teaching}){
  var s=useState("pearls"),tab=s[0],setTab=s[1];
  if(!teaching||!TEACH[id])return null;
  var t=TEACH[id];
  if(t.content&&!t.patho&&!t.pearls&&!t.evidence){
    return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:"4px solid "+C.teal}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{t.content}</div></div>);
  }
  var tabs=[];
  if(t.patho)tabs.push({key:"patho",label:"🧠 Pathophysiology"});
  if(t.pearls)tabs.push({key:"pearls",label:"🩺 Clinical Pearls"});
  if(t.evidence)tabs.push({key:"evidence",label:"📊 Evidence"});
  if(tabs.length===0)return null;
  var activeKey=tabs.find(function(x){return x.key===tab})?tab:tabs[0].key;
  var activeContent=t[activeKey]||"";
  return(<div style={{background:C.tealBg,border:"1.5px solid "+C.tealBorder,borderRadius:10,marginBottom:12,overflow:"hidden",borderLeft:"4px solid "+C.teal}}>
    <div style={{padding:"10px 14px 0"}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6}}>📖 {t.title}</div></div>
    <div style={{display:"flex",gap:0,padding:"8px 14px 0",borderBottom:"1px solid "+C.tealBorder}}>
      {tabs.map(function(tb){var act=tb.key===activeKey;return(<button key={tb.key} onClick={function(){setTab(tb.key)}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,fontWeight:act?700:500,color:act?C.teal:C.muted,padding:"4px 10px 8px",borderBottom:act?"2px solid "+C.teal:"2px solid transparent",whiteSpace:"nowrap"}}>{tb.label}</button>)})}
    </div>
    <div style={{padding:"10px 14px 12px",fontSize:12,lineHeight:1.6,color:C.ink,whiteSpace:"pre-wrap"}}>{activeContent}</div>
  </div>);
}

/* ═══════════════════════════════
   FLOWCHART
   ═══════════════════════════════ */
function PathwayFlowchart(){
  var rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5",aC="#d97706",aBg="#fffbeb",aBd="#fcd34d",gC="#16a34a",gBg="#f0fdf4",gBd="#86efac",blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd",pC="#6b21a8",pBg="#faf5ff",pBd="#c4b5fd",mC="#6b7280",tC="#0f766e",tBg="#f0fdfa",tBd="#5eead4";
  var Arrow=function(p){var dx=p.x2-p.x1,dy=p.y2-p.y1,len=Math.sqrt(dx*dx+dy*dy);if(len===0)return null;var ux=dx/len,uy=dy/len,px=-uy,py=ux;return <g><line x1={p.x1} y1={p.y1} x2={p.x2} y2={p.y2} stroke={p.color||"#94a3b8"} strokeWidth={1.5}/><polygon points={p.x2+","+p.y2+" "+(p.x2-ux*6+px*3.5)+","+(p.y2-uy*6+py*3.5)+" "+(p.x2-ux*6-px*3.5)+","+(p.y2-uy*6-py*3.5)} fill={p.color||"#94a3b8"}/></g>};
  var Box=function(p){return <g><rect x={p.x} y={p.y} width={p.w} height={p.h} rx={p.radius||6} fill={p.fill} stroke={p.stroke} strokeWidth={p.sw||1}/>{p.children}</g>};
  var T=function(p){return <text x={p.x} y={p.y} textAnchor={p.anchor||"middle"} fontSize={p.size||9} fontWeight={p.weight||600} fill={p.color||"#1a1d21"} fontFamily="'IBM Plex Sans',sans-serif">{p.children}</text>};

  return(
    <div style={{marginTop:20}}>
      <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Full Algorithm</div>
      <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Infant 0–60 days · Rectal temp ≤36.4°C · Exclude history of fever ≥38.0°C</div>
      <div style={{background:C.white,border:"1.5px solid "+C.rule,borderRadius:10,padding:6,overflow:"hidden"}}>
        <svg viewBox="0 0 480 580" style={{width:"100%",display:"block"}}>
          <rect width={480} height={580} fill="#fafaf8" rx={6}/>

          {/* Entry */}
          <Box x={100} y={8} w={280} h={30} fill={aBg} stroke={aBd} sw={1.5} radius={14}>
            <T x={240} y={20} size={9} weight={700} color={aC}>HYPOTHERMIC INFANT 0–60 DAYS</T>
            <T x={240} y={31} size={6} color={mC}>Rectal temp ≤36.4°C · ESI II · Vitals + naked weight</T>
          </Box>

          <Arrow x1={240} y1={38} x2={240} y2={54}/>

          {/* Exclusion */}
          <g transform="translate(240,68)">
            <polygon points="0,-14 65,0 0,14 -65,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
            <T x={0} y={-2} size={7} weight={700}>Hx of fever ≥38°C?</T>
          </g>
          <line x1={305} y1={68} x2={415} y2={68} stroke="#94a3b8" strokeWidth={1}/><Arrow x1={415} y1={68} x2={415} y2={84} color={mC}/>
          <Box x={370} y={84} w={90} h={24} fill="#f1f5f9" stroke="#e2e8f0">
            <T x={415} y={93} size={7} weight={600} color={mC}>OFF PATH</T>
            <T x={415} y={103} size={5.5} color={mC}>Use Fever pathway</T>
          </Box>

          <Arrow x1={240} y1={82} x2={240} y2={100}/>

          {/* Temperature check */}
          <g transform="translate(240,114)">
            <polygon points="0,-14 65,0 0,14 -65,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
            <T x={0} y={-2} size={7} weight={700}>Temp ≤35.9°C?</T>
          </g>

          {/* ≤35.9 branch */}
          <Arrow x1={305} y1={114} x2={390} y2={140} color={rC}/>
          <T x={358} y={126} size={6} weight={600} color={rC}>Yes</T>
          <Box x={330} y={140} w={130} h={36} fill={rBg} stroke={rBd} sw={1.5}>
            <T x={395} y={152} size={7} weight={700} color={rC}>ACTIVE WARMING</T>
            <T x={395} y={162} size={6} color={mC}>Radiant warmer ≤15 min</T>
            <T x={395} y={172} size={6} color={mC}>PIV + LP setup + CBG</T>
          </Box>

          {/* ≥36.0 branch */}
          <Arrow x1={175} y1={114} x2={90} y2={140} color={aC}/>
          <T x={120} y={126} size={6} weight={600} color={aC}>No (36.0–36.4)</T>
          <Box x={20} y={140} w={140} h={36} fill={aBg} stroke={aBd} sw={1.5}>
            <T x={90} y={152} size={7} weight={700} color={aC}>PASSIVE WARMING</T>
            <T x={90} y={162} size={6} color={mC}>Hat + swaddle or skin-to-skin</T>
            <T x={90} y={172} size={6} color={mC}>CBG · Recheck in 30–60 min</T>
          </Box>

          {/* Both converge to REAL BIGS */}
          <Arrow x1={90} y1={176} x2={200} y2={200} color={aC}/>
          <Arrow x1={395} y1={176} x2={280} y2={200} color={rC}/>

          <Box x={140} y={200} w={200} h={26} fill={tBg} stroke={tBd} sw={1.5}>
            <T x={240} y={210} size={8} weight={700} color={tC}>ASSESS: REAL BIGS</T>
            <T x={240} y={222} size={5.5} color={mC}>Resp · Energy · Tone · Liver · Feed · Vitals · GI · Skin</T>
          </Box>

          <Arrow x1={240} y1={226} x2={240} y2={244}/>

          {/* Ill-appearing diamond */}
          <g transform="translate(240,258)">
            <polygon points="0,-14 70,0 0,14 -70,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
            <T x={0} y={-2} size={6} weight={700}>Ill/toxic appearing?</T>
          </g>

          {/* Toxic → resuscitate */}
          <Arrow x1={310} y1={258} x2={400} y2={284} color={rC}/>
          <T x={365} y={270} size={6} weight={600} color={rC}>Yes</T>
          <Box x={340} y={284} w={130} h={40} fill={rBg} stroke={rBd} sw={2}>
            <T x={405} y={296} size={7} weight={700} color={rC}>RESUSCITATE</T>
            <T x={405} y={307} size={6} color={mC}>Full workup + HSV</T>
            <T x={405} y={317} size={6} color={mC}>Abx within 60 min</T>
            <T x={405} y={327} size={6} weight={600} color={rC}>→ PICU/NICU</T>
          </Box>

          {/* Well-appearing */}
          <Arrow x1={240} y1={272} x2={240} y2={294}/>
          <T x={240} y={290} size={6} weight={600} color={gC}>Well-appearing</T>

          {/* Age stratification */}
          <Box x={155} y={296} w={170} h={22} fill={blBg} stroke={blBd} radius={10}>
            <T x={240} y={310} size={8} weight={700} color={blC}>AGE STRATIFICATION</T>
          </Box>

          <Arrow x1={195} y1={318} x2={100} y2={344} color={rC}/>
          <Arrow x1={285} y1={318} x2={380} y2={344} color={blC}/>
          <T x={135} y={330} size={6} weight={600} color={rC}>0–21 days</T>
          <T x={345} y={330} size={6} weight={600} color={blC}>22–60 days</T>

          {/* 0-21 days */}
          <Box x={20} y={344} w={160} h={56} fill={rBg} stroke={rBd} sw={1.5}>
            <T x={100} y={356} size={7} weight={700} color={rC}>0–21 DAYS</T>
            <T x={100} y={367} size={6} color={mC}>Full workup including LP</T>
            <T x={100} y={377} size={6} color={mC}>Amp 50 + Gent 5</T>
            <T x={100} y={387} size={6} color={mC}>+ Acyclovir if HSV concern</T>
            <T x={100} y={397} size={6} weight={600} color={rC}>ADMIT</T>
          </Box>

          {/* 22-60 days */}
          <Box x={300} y={344} w={165} h={56} fill={blBg} stroke={blBd} sw={1.5}>
            <T x={383} y={356} size={7} weight={700} color={blC}>22–60 DAYS</T>
            <T x={383} y={367} size={6} color={mC}>Labs, UA, blood Cx</T>
            <T x={383} y={377} size={6} color={mC}>LP if concerned</T>
            <T x={383} y={387} size={6} color={mC}>Ceftriaxone 50 mg/kg</T>
            <T x={383} y={397} size={6} weight={600} color={blC}>Admit or observe</T>
          </Box>

          {/* Warming assessment */}
          <Arrow x1={240} y1={400} x2={240} y2={420}/>
          <g transform="translate(240,434)">
            <polygon points="0,-14 80,0 0,14 -80,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/>
            <T x={0} y={-2} size={6} weight={700}>Maintains ≥36.5°C × 1 hr?</T>
          </g>

          {/* Cannot maintain */}
          <Arrow x1={320} y1={434} x2={400} y2={458} color={rC}/>
          <T x={370} y={445} size={6} weight={600} color={rC}>No</T>
          <Box x={340} y={458} w={130} h={30} fill={rBg} stroke={rBd}>
            <T x={405} y={470} size={7} weight={700} color={rC}>ADMIT PICU/NICU</T>
            <T x={405} y={482} size={6} color={mC}>Cannot maintain temp</T>
          </Box>

          {/* Can maintain */}
          <Arrow x1={160} y1={434} x2={80} y2={458} color={gC}/>
          <T x={108} y={445} size={6} weight={600} color={gC}>Yes</T>

          {/* Dispo bar */}
          <Box x={10} y={500} w={225} h={40} fill={gBg} stroke={gBd} radius={8}>
            <T x={122} y={514} size={7} weight={700} color={gC}>CONSIDER DISCHARGE</T>
            <T x={122} y={526} size={6} color={mC}>Asymptomatic + low-risk</T>
            <T x={122} y={535} size={6} color={mC}>Achieves ≥36.3°C after 1–2h passive</T>
          </Box>
          <Box x={245} y={500} w={225} h={40} fill={rBg} stroke={rBd} radius={8}>
            <T x={358} y={514} size={7} weight={700} color={rC}>ADMIT</T>
            <T x={358} y={526} size={6} color={mC}>REAL BIGS findings · Risk factors</T>
            <T x={358} y={535} size={6} color={mC}>Cannot maintain temp · Abnl labs</T>
          </Box>

          {/* Summary */}
          <Box x={10} y={548} w={460} h={24} fill={blBg} stroke={blBd} radius={6}>
            <T x={120} y={563} size={6} color={mC}>≤35.9°C → radiant warmer ≤15 min</T>
            <T x={360} y={563} size={6} color={mC}>Abx within 60 min if toxic/ill</T>
          </Box>
        </svg>
      </div>
    </div>
  );
}

/* ═══════════════════════════════
   WIZARD
   ═══════════════════════════════ */
function Wizard({teaching,doses,ageDays}){
  var s1=useState(null),excl=s1[0],setExcl=s1[1];
  var s2=useState(null),temp=s2[0],setTemp=s2[1];
  var s3=useState(null),illAppear=s3[0],setIllAppear=s3[1];
  var s4=useState(null),ageGroup=s4[0],setAgeGroup=s4[1];
  var s5=useState(null),hsvRisk=s5[0],setHsvRisk=s5[1];
  var s6=useState(null),warmResult=s6[0],setWarmResult=s6[1];
  var s7=useState([]),realBigs=s7[0],setRealBigs=s7[1];
  var s8=useState([]),riskFactors=s8[0],setRiskFactors=s8[1];

  var age=parseFloat(ageDays)||0;
  var autoAge=age>0?(age<=21?"0to21":"22to60"):null;

  function toggleBig(item){setRealBigs(function(p){return p.includes(item)?p.filter(function(x){return x!==item}):[].concat(p,[item])});}
  function toggleRisk(item){setRiskFactors(function(p){return p.includes(item)?p.filter(function(x){return x!==item}):[].concat(p,[item])});}
  function reset(){setExcl(null);setTemp(null);setIllAppear(null);setAgeGroup(null);setHsvRisk(null);setWarmResult(null);setRealBigs([]);setRiskFactors([]);}

  var BIGS=["Respiratory distress","Energy deficiency","Abnormal tone","Liver issues (jaundice)","Bad feeding","Irregular vitals","GI problems","Skin changes (mottling, pallor, petechiae)"];
  var RISKS=["Prematurity","Maternal infections (<28 days GA)","Repeated temperature instability","Comorbidities","WBC abnormalities","Thrombocytopenia"];
  var totalConcerns=realBigs.length+riskFactors.length;
  var hasConcerns=totalConcerns>0||temp==="low";

  return(<Pad>
    <Q text="Hypothermia Walk-Through" sub="Step-by-step assessment for infants 0–60 days with temp ≤36.4°C"/>
    <TeachBox id="overview" teaching={teaching}/>

    {/* Step 1: Exclusion */}
    <Card title="Step 1 — Exclusion Screening" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Does this infant have a history of fever (≥38.0°C)?</div>
      <WizBtn label="Yes — History of fever" sub="Off pathway → use Neonatal Fever or Fever 29-60d pathway" color={C.red} bg={C.redBg} border={C.redBorder} selected={excl==="yes"} onClick={function(){setExcl("yes")}}/>
      <WizBtn label="No — No fever history" sub="Proceed with hypothermia pathway" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={excl==="no"} onClick={function(){setExcl("no")}}/>
      {excl==="yes"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="⚠️" title="Off Pathway">This infant has a history of fever. Use the Neonatal Fever (≤28d) or Fever 29–60 Days pathway instead.</Alert>}
    </Card>

    {/* Step 2: Temperature */}
    {excl==="no"&&<Card title="Step 2 — Rectal Temperature" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>What is the rectal temperature?</div>
      <WizBtn label="≤35.9°C — Active warming needed" sub="Radiant warmer within 15 min · PIV + LP setup · CBG" color={C.red} bg={C.redBg} border={C.redBorder} selected={temp==="low"} onClick={function(){setTemp("low")}}/>
      <WizBtn label="36.0–36.4°C — Passive warming" sub="Hat + swaddle or skin-to-skin · CBG · Recheck 30–60 min" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={temp==="mild"} onClick={function(){setTemp("mild")}}/>
      {temp==="low"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Active Warming Required">Place on radiant warmer within 15 minutes. Initiate PIV, prepare LP setup with topical anesthetic. CBG immediately. Continuous pulse oximetry — O₂ to maintain SpO₂ {'>'} 93%. Point-of-care electrolytes.</Alert>}
      {temp==="mild"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🌡️" title="Passive Warming">Hat + single/double swaddle or skin-to-skin with blanket. CBG. Recheck rectal temperature in 30–60 minutes.</Alert>}
      <TeachBox id="warming" teaching={teaching}/>
    </Card>}

    {/* Step 3: REAL BIGS + Risk Factors */}
    {excl==="no"&&temp!==null&&<Card title="Step 3 — REAL BIGS & Risk Factors" color={C.primary}>
      <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:6}}>Physical Exam — REAL BIGS</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Select any findings of concern:</div>
      {BIGS.map(function(item){var sel=realBigs.includes(item);return <button key={item} onClick={function(){toggleBig(item)}} style={{display:"block",width:"100%",textAlign:"left",background:sel?C.redBg:C.white,border:"2px solid "+(sel?C.red:C.rule),borderRadius:10,padding:"10px 14px",marginBottom:6,cursor:"pointer"}}><div style={{fontSize:13,fontWeight:sel?700:400,color:sel?C.red:C.ink}}>{sel?"✓ ":""}{item}</div></button>})}

      <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:6,marginTop:16}}>Selected Risk Factors</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Select any that apply:</div>
      {RISKS.map(function(item){var sel=riskFactors.includes(item);return <button key={item} onClick={function(){toggleRisk(item)}} style={{display:"block",width:"100%",textAlign:"left",background:sel?C.amberBg:C.white,border:"2px solid "+(sel?C.amberMid:C.rule),borderRadius:10,padding:"10px 14px",marginBottom:6,cursor:"pointer"}}><div style={{fontSize:13,fontWeight:sel?700:400,color:sel?C.amberMid:C.ink}}>{sel?"✓ ":""}{item}</div></button>})}

      <div style={{background:hasConcerns?C.redBg:C.greenBg,border:"2px solid "+(hasConcerns?C.red:C.greenMid),borderRadius:10,padding:"10px 14px",marginTop:8}}>
        <div style={{fontSize:13,fontWeight:700,color:hasConcerns?C.red:C.greenMid}}>{hasConcerns?"⚠️ "+totalConcerns+" concern(s)"+(temp==="low"?" + temp ≤35.9°C":""):"✓ No findings of concern, no risk factors"}</div>
        <div style={{fontSize:12,marginTop:2,color:C.ink}}>{hasConcerns?"Proceed to clinical appearance assessment and workup":"If temp 36.0–36.4°C: passively warm and reassess — may not need workup"}</div>
      </div>
      <TeachBox id="realBigs" teaching={teaching}/>
    </Card>}

    {/* Step 4: Branch point — mild temp + no concerns → warming trial first; otherwise → clinical appearance */}

    {/* Step 4A: MILD TEMP + NO CONCERNS → Passive warming trial before deciding on workup */}
    {excl==="no"&&temp==="mild"&&!hasConcerns&&<Card title="Step 4 — Passive Warming Reassessment" color={C.greenMid}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>This infant is 36.0–36.4°C with no REAL BIGS findings and no risk factors. Passively warm (hat, swaddle, skin-to-skin) and recheck rectal temperature after 1–2 hours.<br/><br/><strong>After warming, does the infant achieve ≥36.3°C and remain asymptomatic?</strong></div>
      <WizBtn label="Yes — Achieves ≥36.3°C, asymptomatic" sub="Consider discharge without workup — call PCP" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={warmResult==="discharge"} onClick={function(){setWarmResult("discharge")}}/>
      <WizBtn label="No — Fails to warm, or develops concerning features" sub="Proceed to full workup" color={C.red} bg={C.redBg} border={C.redBorder} selected={warmResult==="workup"} onClick={function(){setWarmResult("workup")}}/>
      {warmResult==="discharge"&&<Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✅" title="Consider Discharge">Asymptomatic, low-risk infant who achieves ≥36.3°C after 1–2 hours of passive warming. No REAL BIGS findings, no risk factors. <strong>Call primary care physician</strong> before discharge. Ensure close follow-up. Return if fever, poor feeding, lethargy, or any new symptoms develop.</Alert>}
      {warmResult==="workup"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚠️" title="Proceed to Workup">Failed to warm or developed concerning features — proceed to clinical appearance assessment and full workup below.</Alert>}
      <TeachBox id="disposition" teaching={teaching}/>
    </Card>}

    {/* Step 4B: All other patients — toxic/ill assessment */}
    {excl==="no"&&temp!==null&&(hasConcerns||warmResult==="workup")&&<Card title={temp==="mild"&&warmResult==="workup"?"Step 5 — Clinical Appearance":"Step 4 — Clinical Appearance"} color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Is the infant toxic or ill-appearing?</div>
      <WizBtn label="Yes — Toxic / Ill-appearing" sub="Resuscitate → full workup + HSV → PICU/NICU" color={C.red} bg={C.redBg} border={C.redBorder} selected={illAppear==="toxic"} onClick={function(){setIllAppear("toxic")}}/>
      <WizBtn label="No — Well-appearing" sub="Proceed to diagnostics and management" color={C.greenMid} bg={C.greenBg} border={C.greenBorder} selected={illAppear==="well"} onClick={function(){setIllAppear("well")}}/>
      {illAppear==="toxic"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Toxic / Ill — Resuscitate">
        <strong>Full workup:</strong> CBC, CMP, blood culture, procalcitonin, coag panel, POC lactate/VBG, UA + culture (catheter), LP (CSF studies + HSV panel + enterovirus PCR)<br/>
        <strong>HSV workup:</strong> Surface swabs, blood HSV PCR, CSF HSV PCR<br/>
        <strong>Antibiotics within 60 minutes:</strong><br/>
        {doses&&<div style={{marginTop:4}}>
          Acyclovir {doses.acyclovir} mg IV + Ampicillin {doses.amp75} mg IV (meningitic dose)<br/>
          + Ceftriaxone {doses.ceftri50} mg IV (or Ceftazidime {doses.ceftaz50} mg if ≤14d/hyperbili)
        </div>}
        {!doses&&<span>Acyclovir 20 mg/kg + Ampicillin 75 mg/kg + Ceftriaxone/Ceftazidime 50 mg/kg</span>}<br/>
        <strong>Admit PICU/NICU</strong> · NS bolus {doses?doses.bolus10+"–"+doses.bolus20+" mL":"10–20 mL/kg"} PRN
      </Alert>}
    </Card>}

    {/* Diagnostics — for patients proceeding to workup */}
    {excl==="no"&&(hasConcerns||warmResult==="workup")&&illAppear==="well"&&<Card title="Diagnostics" color={C.blue}>
      <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
        <strong>Core labs:</strong> CMP, CBG, CBC with differential, procalcitonin, coagulopathy panel, POC lactate with VBG, blood culture<br/>
        <strong>Urine:</strong> Catheter specimen — Pedi UTI Panel (UA, microscopy, mandatory culture)<br/>
        <strong>CSF:</strong> Gram stain, cell count, protein, glucose, culture, HSV panel, enterovirus PCR — per MD<br/>
        <strong>Point-of-care electrolytes</strong> if temp {"<"}36.0°C<br/>
        <strong>Consider:</strong> TSH, free T4, ammonia, RPP<br/>
        <strong>CXR + EKG</strong> if tachypnea, hypoxia, cough, or cyanosis<br/>
        <strong>Neuroimaging</strong> if suspected trauma, vitamin K deficiency, or intracranial abnormality<br/>
        <strong>If HSV suspected:</strong> surface swabs for HSV culture, blood HSV PCR, CSF HSV PCR
      </div>
      <TeachBox id="diagnostics" teaching={teaching}/>
    </Card>}

    {/* Antibiotic Selection — age-stratified regimen */}
    {excl==="no"&&(hasConcerns||warmResult==="workup")&&illAppear==="well"&&<Card title="Antibiotic Selection (Age-Based Regimen)" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Select infant age for antibiotic regimen:{autoAge&&<span style={{color:C.primary,fontWeight:600}}> (Auto-detected: {autoAge==="0to21"?"0–21 days":"22–60 days"})</span>}</div>
      <WizBtn label="0–21 days" sub="Ampicillin + Gentamicin (± Acyclovir/cephalosporin if HSV/meningitis concern)" color={C.red} bg={C.redBg} border={C.redBorder} selected={(ageGroup||autoAge)==="0to21"} onClick={function(){setAgeGroup("0to21")}}/>
      <WizBtn label="22–60 days" sub="Ceftriaxone (± Acyclovir/Ampicillin if HSV/meningitis concern)" color={C.blue} bg={C.blueBg} border={C.blueBorder} selected={(ageGroup||autoAge)==="22to60"} onClick={function(){setAgeGroup("22to60")}}/>

      {(ageGroup||autoAge)==="0to21"&&<div>
        <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:8,marginTop:12}}>Concern for meningitis or HSV?</div>
        <WizBtn label="No meningitis/HSV concern" sub="Ampicillin + Gentamicin" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={hsvRisk==="no"} onClick={function(){setHsvRisk("no")}}/>
        <WizBtn label="Meningitis or HSV concern" sub="Acyclovir + meningitic-dose Ampicillin + cephalosporin" color={C.red} bg={C.redBg} border={C.redBorder} selected={hsvRisk==="yes"} onClick={function(){setHsvRisk("yes")}}/>
        {hsvRisk==="no"&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="💊" title="Antibiotics — 0–21 Days (No Meningitis/HSV)">
          {doses?<div><DoseRow label="Ampicillin IV (50 mg/kg)" value={doses.amp50} unit="mg"/><DoseRow label="Gentamicin IV (5 mg/kg)" value={doses.gent} unit="mg"/></div>:<span>Ampicillin 50 mg/kg IV + Gentamicin 5 mg/kg IV</span>}<br/><strong>Admit</strong>
        </Alert>}
        {hsvRisk==="yes"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="💊" title="Antibiotics — 0–21 Days (HSV/Meningitis Concern)">
          {doses?<div><DoseRow label="Acyclovir IV (20 mg/kg)" value={doses.acyclovir} unit="mg"/><DoseRow label="Ampicillin IV (75 mg/kg — meningitic)" value={doses.amp75} unit="mg"/><DoseRow label="Ceftazidime IV (50 mg/kg) — if ≤14d or hyperbili" value={doses.ceftaz50} unit="mg"/><DoseRow label="OR Ceftriaxone IV (50 mg/kg) — if >14d, no hyperbili" value={doses.ceftri50} unit="mg"/></div>:<span>Acyclovir 20 mg/kg + Ampicillin 75 mg/kg + Ceftazidime/Ceftriaxone 50 mg/kg</span>}
          <div style={{fontSize:12,color:C.muted,marginTop:6}}>Obtain HSV surface swabs, blood HSV PCR, CSF HSV PCR</div>
          <strong>Admit</strong>
        </Alert>}
        <TeachBox id="antibiotics" teaching={teaching}/>
      </div>}

      {(ageGroup||autoAge)==="22to60"&&<div>
        <div style={{fontSize:13,fontWeight:700,color:C.ink,marginBottom:8,marginTop:12}}>Concern for meningitis or HSV?</div>
        <WizBtn label="No meningitis/HSV concern" sub="Ceftriaxone monotherapy" color={C.blue} bg={C.blueBg} border={C.blueBorder} selected={hsvRisk==="no"} onClick={function(){setHsvRisk("no")}}/>
        <WizBtn label="Meningitis or HSV concern" sub="Acyclovir + Ampicillin + cephalosporin" color={C.red} bg={C.redBg} border={C.redBorder} selected={hsvRisk==="yes"} onClick={function(){setHsvRisk("yes")}}/>
        {hsvRisk==="no"&&<Alert color={C.blue} border={C.blueBorder} bg={C.blueBg} icon="💊" title="Antibiotics — 22–60 Days">
          {doses?<DoseRow label="Ceftriaxone IV (50 mg/kg)" value={doses.ceftri50} unit="mg"/>:<span>Ceftriaxone 50 mg/kg IV</span>}<br/><strong>Admit or observe</strong>
        </Alert>}
        {hsvRisk==="yes"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="💊" title="Antibiotics — 22–60 Days (HSV/Meningitis)">
          {doses?<div><DoseRow label="Acyclovir IV (20 mg/kg)" value={doses.acyclovir} unit="mg"/><DoseRow label="Ampicillin IV (75 mg/kg — meningitic)" value={doses.amp75} unit="mg"/><DoseRow label="Ceftriaxone IV (50 mg/kg)" value={doses.ceftri50} unit="mg"/><div style={{fontSize:12,color:C.muted,marginTop:4}}>Use Ceftazidime {doses.ceftaz50} mg if hyperbilirubinemia</div></div>:<span>Acyclovir 20 mg/kg + Ampicillin 75 mg/kg + Ceftriaxone 50 mg/kg (or Ceftazidime if hyperbili)</span>}<br/><strong>Admit</strong>
        </Alert>}
        <TeachBox id="hsv" teaching={teaching}/>
      </div>}
    </Card>}

    {/* Disposition for worked-up patients */}
    {excl==="no"&&(hasConcerns||warmResult==="workup")&&illAppear==="well"&&(ageGroup||autoAge)!==null&&hsvRisk!==null&&<Card title="Warming Outcome & Disposition" color={C.primary}>
      <div style={{fontSize:13,lineHeight:1.6,marginTop:8,marginBottom:10}}>Can the infant maintain temperature ≥36.5°C for at least 1 hour?</div>
      <WizBtn label="Yes — Maintains ≥36.5°C × 1 hour, stable" sub="Admit to Pediatric Hospitalist (has risk factors/findings)" color={C.amberMid} bg={C.amberBg} border={C.amberBorder} selected={warmResult==="stable"||warmResult==="maintains"} onClick={function(){setWarmResult("stable")}}/>
      <WizBtn label="No — Cannot maintain temperature" sub="Admit PICU/NICU" color={C.red} bg={C.redBg} border={C.redBorder} selected={warmResult==="fails"} onClick={function(){setWarmResult("fails")}}/>
      {(warmResult==="stable"||warmResult==="maintains")&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="🏥" title="Admit — Pediatric Hospitalist">Stable infant with REAL BIGS findings or risk factors who maintains ≥36.5°C for at least 1 hour. Continue workup and monitoring inpatient.</Alert>}
      {warmResult==="fails"&&<Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="🔴" title="Admit PICU/NICU">Critically ill, actively requiring radiant warmer, or unable to maintain ≥36.5°C for at least 1 hour.</Alert>}
      <TeachBox id="disposition" teaching={teaching}/>
    </Card>}

    {excl!==null&&<div style={{textAlign:"center",marginTop:8}}><button onClick={reset} style={{padding:"10px 24px",background:C.white,border:"1.5px solid "+C.rule,borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:600,color:C.muted}}>↻ Reset Walk-Through</button></div>}

    <PathwayFlowchart/>
  </Pad>);
}

/* ═══════════════════════════════
   REFERENCE MODE TABS
   ═══════════════════════════════ */
function RefTriage({teaching}){return(<Pad>
  <Q text="Triage & Initial Assessment" sub="Infant 0–60 days with rectal temperature ≤36.4°C"/>
  <TeachBox id="overview" teaching={teaching}/>
  <Card title="Inclusion / Exclusion" color={C.primary}>
    <div style={{marginTop:8}}>
      <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Infants aged 0–60 days with rectal temperature ≤36.4°C measured at home, another healthcare facility, or in ED.</Alert>
      <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">History of fever (≥38.0°C) — use Neonatal Fever or Fever 29–60 Days pathway instead.</Alert>
    </div>
  </Card>
  <Card title="Initiate on Arrival" color={C.primary}>
    <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
      <strong>ESI Triage Level II</strong><br/>
      Full set of vitals including <strong>rectal temperature</strong> and <strong>naked weight</strong><br/>
      <strong>If temp ≥36.0°C:</strong> passive warming — hat + single/double swaddle or skin-to-skin with blanket<br/>
      <strong>If temp ≤35.9°C:</strong> radiant warmer within 15 minutes<br/>
      Capillary blood glucose (CBG)<br/>
      If ill-appearing or temp ≤35.9°C: initiate PIV, prepare LP setup with topical anesthetic<br/>
      Continuous pulse oximetry — O₂ to maintain SpO₂ {'>'} 93%
    </div>
    <TeachBox id="warming" teaching={teaching}/>
  </Card>
  <Card title="REAL BIGS — Exam Findings of Concern" color={C.red}>
    <div style={{marginTop:8}}>
      {[
        {letter:"R",name:"Respiratory distress",detail:"Grunting, flaring, retractions, tachypnea, cyanosis"},
        {letter:"E",name:"Energy deficiency",detail:"Excessive sleepiness or persistent irritability"},
        {letter:"A",name:"Abnormal tone",detail:"Hypotonia, hypertonia, jitteriness, abnormal movements"},
        {letter:"L",name:"Liver issues",detail:"Jaundice within 24h or persistent beyond 2 weeks"},
        {letter:"B",name:"Bad feeding",detail:"Difficulty feeding, weak suck, reduced intake"},
        {letter:"I",name:"Irregular vitals",detail:"Tachypnea, hypotension, tachycardia, bradycardia"},
        {letter:"G",name:"GI problems",detail:"Distended/tender abdomen, vomiting, bloody stool"},
        {letter:"S",name:"Skin changes",detail:"Slow cap refill, mottling, pallor, cold extremities, petechiae"}
      ].map(function(r){return <div key={r.letter} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"6px 0",borderBottom:"1px dashed "+C.rule}}><div style={{background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:14,color:C.red,flexShrink:0}}>{r.letter}</div><div><div style={{fontSize:13,fontWeight:600}}>{r.name}</div><div style={{fontSize:12,color:C.muted}}>{r.detail}</div></div></div>})}
      <div style={{fontSize:12,color:C.muted,marginTop:8}}>Selected risk factors: prematurity, maternal infections ({"<"}28d GA), repeated temperature instability, comorbidities, WBC abnormalities, thrombocytopenia</div>
    </div>
    <TeachBox id="realBigs" teaching={teaching}/>
  </Card>
  <Card title="Diagnostics" color={C.blue}>
    <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
      <strong>Core labs:</strong> CMP, CBG, CBC with differential, procalcitonin, coagulopathy panel, POC lactate with VBG, blood culture<br/>
      <strong>CSF:</strong> Gram stain, cell count, protein, glucose, culture, HSV panel, enterovirus PCR<br/>
      <strong>Urine:</strong> Catheter specimen — Pedi UTI Panel (UA, microscopy, mandatory culture)<br/>
      <strong>Point-of-care electrolytes</strong> if ill-appearing or temp {"<"}36.0°C<br/>
      <strong>Consider:</strong> TSH, free T4, ammonia, RPP<br/>
      <strong>CXR + EKG</strong> if tachypnea, hypoxia, cough, or cyanosis<br/>
      <strong>Neuroimaging</strong> if suspected trauma, vitamin K deficiency, or intracranial abnormality<br/>
      <strong>If HSV suspected:</strong> surface swabs for HSV culture, blood HSV PCR, CSF HSV PCR
    </div>
    <TeachBox id="diagnostics" teaching={teaching}/>
  </Card>
</Pad>)}

function RefDecisions({teaching}){return(<Pad>
  <Q text="Decision Tree" sub="Clinical assessment · Universal workup · Age-stratified antibiotics · Warming outcome"/>
  <Card title="Toxic / Ill-Appearing → Resuscitate" color={C.red}>
    <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
      Full workup including LP + HSV workup<br/>
      <strong>Antibiotics within 60 minutes</strong><br/>
      Acyclovir 20 mg/kg + Ampicillin 75 mg/kg + Ceftriaxone/Ceftazidime 50 mg/kg<br/>
      NS bolus 10–20 mL/kg PRN · D10W 5 mL/kg for CBG {"<"}50<br/>
      <strong>Admit PICU/NICU</strong>
    </div>
  </Card>
  <Card title="Diagnostics — All Hypothermic Infants" color={C.blue}>
    <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
      <div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>Temp 36.0–36.4°C + asymptomatic + no risk factors + no REAL BIGS findings:</div>
        <div style={{fontSize:12,marginTop:2}}>Passively warm and recheck in 1–2 hours. If achieves ≥36.3°C and remains well → consider discharge without workup. Call PCP.</div>
      </div>
      <div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:700,color:C.amberMid}}>Workup indicated if ANY of: temp ≤35.9°C, REAL BIGS findings, risk factors, ill-appearing, failure to warm to ≥36.3°C, or new concerning features.</div>
      </div>
      <strong>Core labs:</strong> CMP, CBG, CBC with differential, procalcitonin, coagulopathy panel, POC lactate/VBG, blood culture<br/>
      <strong>CSF:</strong> Gram stain, cell count, protein, glucose, culture, HSV panel, enterovirus PCR — per MD<br/>
      <strong>Urine:</strong> Catheter specimen — Pedi UTI Panel (UA, microscopy, mandatory culture)<br/>
      <strong>Consider:</strong> TSH, free T4, ammonia, RPP, CXR/EKG, neuroimaging
    </div>
    <TeachBox id="diagnostics" teaching={teaching}/>
  </Card>
  <Card title="Risk Factors — Lower Threshold for Full Workup" color={C.amberMid}>
    <div style={{marginTop:8}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {["Prematurity","Maternal infections (<28d GA)","Repeated temp instability","Comorbidities","WBC abnormalities","Thrombocytopenia"].map(function(r){return <div key={r} style={{background:C.amberBg,border:"1px solid "+C.amberBorder,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:500}}>{r}</div>})}
      </div>
      <div style={{fontSize:12,color:C.muted,marginTop:8}}>Any risk factor or REAL BIGS finding should lower the threshold for full workup (including LP) and favor admission over discharge, regardless of age.</div>
    </div>
  </Card>
  <Card title="Antibiotic Selection — 0–21 Days" color={C.red}>
    <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
      <strong>No meningitis/HSV concern:</strong> Ampicillin 50 mg/kg + Gentamicin 5 mg/kg<br/>
      <strong>Meningitis/HSV concern:</strong> Acyclovir 20 mg/kg + Ampicillin 75 mg/kg + Ceftazidime 50 mg/kg (≤14d or hyperbili) or Ceftriaxone 50 mg/kg ({">"} 14d, no hyperbili)
    </div>
    <TeachBox id="antibiotics" teaching={teaching}/>
  </Card>
  <Card title="Antibiotic Selection — 22–60 Days" color={C.blue}>
    <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
      <strong>No meningitis/HSV concern:</strong> Ceftriaxone 50 mg/kg<br/>
      <strong>Meningitis/HSV concern:</strong> Acyclovir 20 mg/kg + Ampicillin 75 mg/kg + Ceftriaxone 50 mg/kg (or Ceftazidime if hyperbili)
    </div>
    <TeachBox id="hsv" teaching={teaching}/>
  </Card>
  <Card title="Differential Diagnosis" color={C.purple} defaultOpen={false}>
    <div style={{marginTop:8}}>
      {[
        {dx:"Immature thermoregulation",clue:"0–7 days, preterm, low birth weight, responds to passive warming"},
        {dx:"Meningitis",clue:"Irritability, lethargy, poor feeding, seizures, bulging fontanelle, CSF pleocytosis"},
        {dx:"HSV",clue:"Vesicles, maternal HSV, seizures, thrombocytopenia, hepatitis"},
        {dx:"UTI",clue:"Poor feeding, fussiness, vomiting, hx UTI or renal abnormality"},
        {dx:"Cardiac lesion",clue:"Cyanosis, tachypnea, poor feeding, abnormal heart tones, pre/post-ductal sat difference"},
        {dx:"Inborn error of metabolism",clue:"Poor feeding, vomiting, seizures, hypotonia, unusual odors"},
        {dx:"Endocrine disorder (CAH)",clue:"Hypoglycemia, hyperkalemia, hyponatremia, ambiguous genitalia"},
        {dx:"Non-accidental trauma",clue:"Unexplained injuries, altered mental status, retinal hemorrhages"}
      ].map(function(d){return <div key={d.dx} style={{padding:"6px 0",borderBottom:"1px dashed "+C.rule}}><div style={{fontSize:13,fontWeight:600}}>{d.dx}</div><div style={{fontSize:12,color:C.muted}}>{d.clue}</div></div>})}
    </div>
    <TeachBox id="etiologies" teaching={teaching}/>
  </Card>
  <PathwayFlowchart/>
</Pad>)}

function RefMeds({teaching,doses}){return(<Pad>
  <Q text="Medications & Dosing" sub={doses?"Calculated for "+doses.w+" kg":"Enter weight for calculations"}/>
  {!doses&&<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight in the bar above for dose calculations.</Alert>}
  <Card title="Anti-Infectives — 0–21 Days" color={C.red}>
    <div style={{marginTop:8}}>
      <div style={{fontSize:12,fontWeight:700,color:C.ink,marginBottom:6}}>No meningitis/HSV concern:</div>
      <DoseRow label="Ampicillin IV (50 mg/kg)" value={doses?doses.amp50:"—"} unit={doses?"mg":""}/>
      <DoseRow label="Gentamicin IV (5 mg/kg)" value={doses?doses.gent:"—"} unit={doses?"mg":""}/>
      <div style={{fontSize:12,fontWeight:700,color:C.ink,marginBottom:6,marginTop:12}}>Meningitis/HSV concern:</div>
      <DoseRow label="Acyclovir IV (20 mg/kg)" value={doses?doses.acyclovir:"—"} unit={doses?"mg":""}/>
      <DoseRow label="Ampicillin IV (75 mg/kg — meningitic)" value={doses?doses.amp75:"—"} unit={doses?"mg":""}/>
      <DoseRow label="Ceftazidime IV (50 mg/kg) — ≤14d or hyperbili" value={doses?doses.ceftaz50:"—"} unit={doses?"mg":""}/>
      <DoseRow label="Ceftriaxone IV (50 mg/kg) — >14d, no hyperbili" value={doses?doses.ceftri50:"—"} unit={doses?"mg":""}/>
    </div>
    <TeachBox id="antibiotics" teaching={teaching}/>
  </Card>
  <Card title="Anti-Infectives — 22–60 Days" color={C.blue}>
    <div style={{marginTop:8}}>
      <div style={{fontSize:12,fontWeight:700,color:C.ink,marginBottom:6}}>No meningitis/HSV concern:</div>
      <DoseRow label="Ceftriaxone IV (50 mg/kg)" value={doses?doses.ceftri50:"—"} unit={doses?"mg":""}/>
      <div style={{fontSize:12,fontWeight:700,color:C.ink,marginBottom:6,marginTop:12}}>Meningitis/HSV concern:</div>
      <DoseRow label="Acyclovir IV (20 mg/kg)" value={doses?doses.acyclovir:"—"} unit={doses?"mg":""}/>
      <DoseRow label="Ampicillin IV (75 mg/kg — meningitic)" value={doses?doses.amp75:"—"} unit={doses?"mg":""}/>
      <DoseRow label="Ceftriaxone IV (50 mg/kg)" value={doses?doses.ceftri50:"—"} unit={doses?"mg":""}/>
      <div style={{fontSize:12,color:C.muted,marginTop:4}}>Use Ceftazidime {doses?doses.ceftaz50+" mg":"50 mg/kg"} if hyperbilirubinemia</div>
    </div>
  </Card>
  <Card title="Supportive Care" color={C.primary}>
    <div style={{marginTop:8}}>
      <DoseRow label="NS bolus (10–20 mL/kg)" value={doses?doses.bolus10+"–"+doses.bolus20:"—"} unit={doses?"mL":""}/>
      <DoseRow label="D10W bolus (5 mL/kg) for CBG <50" value={doses?doses.d10:"—"} unit={doses?"mL":""}/>
      <DoseRow label="Acetaminophen PO (12.5 mg/kg)" value={doses?doses.apapPO:"—"} unit={doses?"mg":""}/>
      <DoseRow label="Acetaminophen PR (15 mg/kg)" value={doses?doses.apapPR:"—"} unit={doses?"mg":""}/>
    </div>
  </Card>
  <Card title="Special Medications" color={C.purple} defaultOpen={false}>
    <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
      <strong>Hydrocortisone</strong> — if concern for CAH (10–20 day old, hyperkalemia, hypoglycemia, ambiguous genitalia)<br/>
      <strong>Prostaglandin E1</strong> — if concern for ductal-dependent cardiac lesion<br/>
      Consult Endocrinology or Cardiology respectively
    </div>
  </Card>
</Pad>)}

function RefDispo({teaching}){return(<Pad>
  <Q text="Disposition & References"/>
  <Card title="Disposition Summary" color={C.primary}>
    <div style={{marginTop:8}}>
      <div style={{background:C.redBg,border:"1.5px solid "+C.redBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700,color:C.red}}>ADMIT — PICU / NICU</div>
        <div style={{fontSize:12,marginTop:2}}>Critically ill infants · Infants actively requiring radiant warmer · Unable to maintain ≥36.5°C for at least 1 hour</div>
      </div>
      <div style={{background:C.amberBg,border:"1.5px solid "+C.amberBorder,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>ADMIT — PEDIATRIC HOSPITALIST</div>
        <div style={{fontSize:12,marginTop:2}}>Stable infants with REAL BIGS findings or risk factors who maintain ≥36.5°C for at least 1 hour · Abnormal labs · 0–21 day infants</div>
      </div>
      <div style={{background:C.greenBg,border:"1.5px solid "+C.greenBorder,borderRadius:8,padding:"10px 12px"}}>
        <div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>CONSIDER DISCHARGE</div>
        <div style={{fontSize:12,marginTop:2}}>Asymptomatic, low-risk infants who achieve ≥36.3°C after 1–2 hours of passive warming · No REAL BIGS findings · Normal labs · Call PCP before discharge</div>
      </div>
    </div>
    <TeachBox id="disposition" teaching={teaching}/>
  </Card>
  <Card title="Risk Factors Favoring Admission" color={C.red}>
    <div style={{marginTop:8}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {["Prematurity","Maternal infections (<28d GA)","Repeated temp instability","Comorbidities","WBC abnormalities","Thrombocytopenia","Any REAL BIGS finding","Abnormal inflammatory markers"].map(function(r){return <div key={r} style={{background:C.redBg,border:"1px solid "+C.redBorder,borderRadius:6,padding:"6px 8px",fontSize:12,fontWeight:500}}>{r}</div>})}
      </div>
    </div>
  </Card>
  <Card title="References" color={C.muted} defaultOpen={false}>
    <div style={{fontSize:11,lineHeight:1.6,marginTop:8,color:C.muted}}>
      OHSU DCH ED Young Infant Hypothermia Clinical Pathway, June 2025<br/>
      Delaney KM et al. Prevalence for risk of serious infection in hypothermic infants ≤60 days: systematic review. Acad Emerg Med 2023;30(1):40-44<br/>
      Raffaele JL et al. Prevalence of invasive bacterial infection in hypothermic young infants: multisite study. J Pediatr 2023;258:113407<br/>
      Ramgopal S et al. Clinician management practices for infants with hypothermia in the ED. Pediatrics 2023;152(6):e2023063000<br/>
      Perry MC et al. Hypothermia in young infants: frequency and yield of sepsis workup. Pediatr Emerg Care 2021;37(8):e449-e455<br/>
      Lo YHJ et al. Temperature threshold in screening of bacterial infections in hypothermic infants. Emerg Med J 2023;40(3):189-194<br/>
      Kasmire KE et al. Hypothermia: a sign of sepsis in young infants in the ED? Pediatr Emerg Care 2021;37(3):e124-e128<br/>
      WHO. Thermal Protection of the Newborn: A Practical Guide. 1997<br/>
      Yankova LC, Aronson PL. Infants With Hypothermia: Are They Just Like Febrile Infants? Hosp Pediatr 2024;14(3):e161-e163
    </div>
  </Card>
</Pad>)}

/* ═══════════════════════════════
   APP
   ═══════════════════════════════ */
function App(){
  var s1=useState("wizard"),mode=s1[0],setMode=s1[1];
  var s2=useState("triage"),tab=s2[0],setTab=s2[1];
  var s3=useState(false),teaching=s3[0],setTeaching=s3[1];
  var s4=useState(""),weightKg=s4[0],setWeightKg=s4[1];
  var s5=useState(""),ageDays=s5[0],setAgeDays=s5[1];
  var doses=useMemo(function(){return calcDoses(weightKg)},[weightKg]);
  var rr=useResponsive(),maxW=rr.maxW;

  var refTabs=[{key:"triage",label:"Triage"},{key:"decisions",label:"Decisions"},{key:"meds",label:"Antibiotics"},{key:"dispo",label:"Dispo & Refs"}];

  return(
    <div style={{maxWidth:maxW,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh",transition:"max-width 0.2s"}}>
      <Header teaching={teaching} onToggleTeach={function(){setTeaching(!teaching)}} mode={mode} onToggleMode={function(){setMode(mode==="wizard"?"reference":"wizard")}}/>

      {mode==="reference"&&<TabBar current={tab} tabs={refTabs} onChange={setTab}/>}

      <div style={{background:C.white,borderBottom:"1px solid "+C.rule,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (days)</label><input type="number" inputMode="decimal" value={ageDays} onChange={function(e){setAgeDays(e.target.value)}} placeholder="14" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
        <div style={{flex:1}}><label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label><input type="number" inputMode="decimal" value={weightKg} onChange={function(e){setWeightKg(e.target.value)}} placeholder="3.5" style={{display:"block",width:"100%",padding:"6px 8px",border:"1.5px solid "+C.rule,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}}/></div>
      </div>

      {mode==="wizard"&&<Wizard teaching={teaching} doses={doses} ageDays={ageDays}/>}
      {mode==="reference"&&tab==="triage"&&<RefTriage teaching={teaching}/>}
      {mode==="reference"&&tab==="decisions"&&<RefDecisions teaching={teaching}/>}
      {mode==="reference"&&tab==="meds"&&<RefMeds teaching={teaching} doses={doses}/>}
      {mode==="reference"&&tab==="dispo"&&<RefDispo teaching={teaching}/>}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:"1px solid "+C.rule}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Young Infant Hypothermia Clinical Pathway · June 2025
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
