<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fever 29–60 Days — DCH PED Clinical Decision Tool</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f7f6f3}</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useMemo}=React;
const C={primary:"#b45309",pLight:"#fffbeb",pBorder:"#fcd34d",red:"#b91c1c",redBg:"#fef2f2",redBorder:"#fca5a5",amber:"#92400e",amberBg:"#fffbeb",amberBorder:"#fcd34d",amberMid:"#d97706",green:"#166534",greenBg:"#f0fdf4",greenBorder:"#86efac",greenMid:"#16a34a",blue:"#1e40af",blueBg:"#eff6ff",blueBorder:"#93c5fd",purple:"#6b21a8",purpleBg:"#faf5ff",purpleBorder:"#c4b5fd",teal:"#0f766e",tealBg:"#f0fdfa",tealBorder:"#5eead4",muted:"#6b7280",ink:"#1a1d21",paper:"#f7f6f3",white:"#fff",rule:"#e5e2db"};

const TEACH={
  overview:{title:"Pathway Rationale",content:"This pathway applies the PECARN febrile infant rule to identify infants 29–60 days at low risk for serious bacterial infection (SBI). The two key inflammatory markers — ANC and procalcitonin — drive the decision to pursue LP, start antibiotics, and determine disposition. In the setting of negative urine, ANC <4000, and PCT <0.5 ng/mL, sensitivity for invasive bacterial infection is 97.7% (95% CI 91.3–99.6%) with NPV of 99.6%. This allows safe discharge without antibiotics for low-risk infants with close follow-up."},
  temperature:{title:"Temperature Measurement",content:"Rectal thermometry is the gold standard. Studies show greatest discordance in young children between rectal and temporal measurements. Parental report of tactile fever is likely to be accurate (sensitivity 82–89%, specificity 76–86%). Any rectal or axillary temperature ≥38.0°C at home, clinic, or ED qualifies."},
  urine:{title:"Urine Collection & Analysis",content:"Bladder catheterization or suprapubic aspiration is required per AAP — bag collection has a false-positive rate >67%. UA is considered positive if LE trace or greater, nitrites positive, or >5 WBC/hpf or bacteria on micro. Recent high-quality studies show UA with micro has excellent sensitivity (LE sensitivity ≥94%) in this age group, and pyuria (>5 WBC) adds incremental sensitivity."},
  lp:{title:"When Is LP Needed?",content:"LP is NOT necessary in infants 29–60 days with negative inflammatory markers (ANC <4000 AND PCT <0.5), as this group appears to be at very low risk for bacterial meningitis — no missed cases in PECARN, Step-by-Step, or PROS studies. LP should be considered in infants with ANC ≥4000 or PCT ≥0.5, and is strongly recommended for ill/toxic-appearing infants where meningitis risk is substantially greater."},
  markers:{title:"Inflammatory Markers — ANC & PCT",content:"ANC ≥4000 or Procalcitonin ≥0.5 ng/mL defines 'positive inflammatory markers' in this pathway. These thresholds were validated in the PECARN multicenter study (Kuppermann 2019). Positive markers warrant further workup (LP consideration) and empiric antibiotics. Negative markers in combination with negative UA essentially rule out SBI with >99% NPV and allow discharge without antibiotics."},
  csfInterp:{title:"CSF Interpretation",content:"CSF pleocytosis is defined as ≥10 WBC in this pathway. A traumatic tap is defined as ≥10,000 RBC/mm³ — in this case, CSF WBC count is unreliable and the patient should be managed as if CSF was not obtained. When CSF is negative (no pleocytosis, negative gram stain), empiric ceftriaxone alone is appropriate regardless of UA result."},
  antibiotics:{title:"Antibiotic Selection Rationale",content:"Ceftriaxone provides broad gram-negative coverage. Vancomycin is added for suspected meningitis (CSF ≥10 WBC or toxic appearance) to cover resistant gram-positives including GBS with high-level penicillin resistance and Listeria. For UTI with negative inflammatory markers, oral cephalexin or cefdinir provides adequate coverage for the most common uropathogens (E. coli, Klebsiella) without the need for parenteral therapy."},
  disposition:{title:"Disposition Logic",content:"Toxic/ill-appearing → always admit (consider PICU). Positive inflammatory markers + CSF pleocytosis → admit. Positive markers + traumatic/unobtained CSF → admit vs discharge with close follow-up (clinical judgment). Positive markers + negative CSF → admit vs discharge with close follow-up. Negative inflammatory markers → discharge regardless of UA result, with appropriate oral antibiotics if UA positive and close follow-up within 24–36 hours."},
};

function calcDoses(w){
  const wt=parseFloat(w)||0;if(wt<=0)return null;
  return{w:wt,
    ceftri50:Math.round(wt*50),ceftri100:Math.round(wt*100),
    vanco:Math.round(wt*20),
    cefdinir:Math.round(wt*14*10)/10,
    cephalexinLo:Math.round(wt*50),cephalexinHi:Math.round(wt*100),
    apapPO:Math.round(wt*12.5*10)/10,apapPR_lo:Math.round(wt*15),apapPR_hi:Math.round(wt*30),
    d10:Math.round(wt*5),
    bolus:Math.round(wt*20),
  };
}

// Primitives
function Header({teaching,onToggleTeach}){return(<div style={{background:C.primary,color:C.white,padding:"16px 20px",borderRadius:"12px 12px 0 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:13,opacity:0.8,letterSpacing:"0.05em",textTransform:"uppercase",fontWeight:600}}>Doernbecher Children's Hospital · PED</div><div style={{fontSize:21,fontWeight:700,marginTop:4,lineHeight:1.2}}>Fever in Infants 29–60 Days</div><div style={{fontSize:14,opacity:0.85,marginTop:2}}>Clinical Decision Tool · March 2022</div></div><button onClick={onToggleTeach} style={{background:teaching?"#ffffff30":"#ffffff15",border:`1.5px solid ${teaching?"#fff":"#ffffff40"}`,color:C.white,borderRadius:8,padding:"6px 10px",cursor:"pointer",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{teaching?"📖 ON":"📖 Teach"}</button></div></div>);}
function TabBar({current,tabs,onChange}){return(<div style={{display:"flex",padding:"0 12px",background:C.white,borderBottom:`1px solid ${C.rule}`,overflowX:"auto"}}>{tabs.map(t=>{const act=t.key===current;return(<button key={t.key} onClick={()=>onChange(t.key)} style={{padding:"11px 14px",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?C.primary:C.muted,borderBottom:act?`2.5px solid ${C.primary}`:"2.5px solid transparent",whiteSpace:"nowrap",marginBottom:-1}}>{t.label}</button>);})}</div>);}
function Pad({children}){return<div style={{padding:"20px"}}>{children}</div>;}
function Q({text,sub}){return(<div style={{marginBottom:16}}><div style={{fontSize:17,fontWeight:700,color:C.ink,lineHeight:1.3}}>{text}</div>{sub&&<div style={{fontSize:13,color:C.muted,marginTop:4,lineHeight:1.5}}>{sub}</div>}</div>);}
function Alert({color,border,bg,icon,title,children}){return(<div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:10,padding:"12px 14px",marginBottom:12}}><div style={{fontSize:14,fontWeight:700,color,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>{icon} {title}</div><div style={{fontSize:13,lineHeight:1.5,color:C.ink}}>{children}</div></div>);}
function Sec({title,color,children}){return(<div style={{marginBottom:14}}><div style={{fontSize:13,fontWeight:700,color,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6,paddingBottom:4,borderBottom:`2px solid ${color}`}}>{title}</div>{children}</div>);}
function DoseRow({label,value,unit=""}){return(<div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",padding:"4px 0",borderBottom:`1px dashed ${C.rule}`}}><span style={{fontSize:13,fontWeight:500}}>{label}</span><span style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:14,fontWeight:600,color:C.primary}}>{value} {unit}</span></div>);}
function TeachBox({id,teaching}){if(!teaching||!TEACH[id])return null;const t=TEACH[id];return(<div style={{background:C.tealBg,border:`1.5px solid ${C.tealBorder}`,borderRadius:10,padding:"12px 14px",marginBottom:12,borderLeft:`4px solid ${C.teal}`}}><div style={{fontSize:12,fontWeight:700,color:C.teal,display:"flex",alignItems:"center",gap:6,marginBottom:4}}>📖 {t.title}</div><div style={{fontSize:12,lineHeight:1.6,color:C.ink}}>{t.content}</div></div>);}
function Card({title,color,children,defaultOpen=true}){const[open,setOpen]=useState(defaultOpen);return(<div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,marginBottom:12,overflow:"hidden"}}><button onClick={()=>setOpen(o=>!o)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",padding:"12px 14px",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:14,fontWeight:700,color}}>{title}</span><span style={{fontSize:12,color:C.muted,transform:open?"rotate(180deg)":"none",transition:"transform 0.2s"}}>▼</span></button>{open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${C.rule}`}}>{children}</div>}</div>);}

function App(){
  const[tab,setTab]=useState("triage");
  const[teaching,setTeaching]=useState(false);
  const[weightKg,setWeightKg]=useState("");
  const[ageDays,setAgeDays]=useState("");
  const doses=useMemo(()=>calcDoses(weightKg),[weightKg]);

  const tabs=[
    {key:"triage",label:"Triage"},
    {key:"decision",label:"Decisions"},
    {key:"meds",label:"Antibiotics"},
    {key:"special",label:"Dispo & Refs"},
  ];

  return(
    <div style={{maxWidth:520,margin:"0 auto",fontFamily:"'IBM Plex Sans',-apple-system,sans-serif",background:C.paper,minHeight:"100vh"}}>
      <Header teaching={teaching} onToggleTeach={()=>setTeaching(t=>!t)}/>
      <TabBar current={tab} tabs={tabs} onChange={setTab}/>

      <div style={{background:C.white,borderBottom:`1px solid ${C.rule}`,padding:"10px 20px",display:"flex",gap:10,alignItems:"center"}}>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Age (days)</label>
          <input type="number" inputMode="decimal" value={ageDays} onChange={e=>setAgeDays(e.target.value)} placeholder="42" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
        <div style={{flex:1}}>
          <label style={{fontSize:10,fontWeight:600,color:C.muted,textTransform:"uppercase",letterSpacing:"0.05em"}}>Weight (kg)</label>
          <input type="number" inputMode="decimal" value={weightKg} onChange={e=>setWeightKg(e.target.value)} placeholder="4.5" style={{display:"block",width:"100%",padding:"6px 8px",border:`1.5px solid ${C.rule}`,borderRadius:6,fontSize:15,fontWeight:500,fontFamily:"'IBM Plex Mono',monospace",outline:"none",marginTop:2}} onFocus={e=>e.target.style.borderColor=C.primary} onBlur={e=>e.target.style.borderColor=C.rule}/>
        </div>
      </div>

      {/* ── TRIAGE ── */}
      {tab==="triage"&&(
        <Pad>
          <Q text="Triage & Initial Assessment" sub="Infants 29–60 days with documented fever ≥38.0°C"/>
          <TeachBox id="overview" teaching={teaching}/>

          <Card title="Inclusion / Exclusion" color={C.primary}>
            <div style={{marginTop:8}}>
              <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="Inclusion">Age 29–60 days with rectal/axillary temp ≥38.0°C at home, clinic, or ED</Alert>
              <Alert color={C.red} border={C.redBorder} bg={C.redBg} icon="✘" title="Exclusion">Prematurity &lt;37 weeks · Pre-existing medical conditions · Indwelling devices · Focal bacterial infections (except AOM) · Clinical bronchiolitis · Immunizations in last 48 hours</Alert>
            </div>
          </Card>

          <Card title="Initiate on Arrival" color={C.primary}>
            <div style={{fontSize:13,lineHeight:1.8,marginTop:8}}>
              <strong>ESI Level II</strong><br/>
              Full vitals including <strong>rectal temperature</strong> + weight<br/>
              O₂ to maintain SpO₂ &gt;93%<br/>
              <strong>LMX to LP site</strong> and/or J-tip<br/>
              LP tray to bedside<br/>
              IV placement for all ill/toxic presentations (consider IO)<br/>
              <strong style={{color:C.red}}>Goal: antibiotics within 60 min for ill/toxic infants</strong>
            </div>
            <TeachBox id="temperature" teaching={teaching}/>
          </Card>

          <Card title="Diagnostics — All Patients" color={C.blue}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              CBG (if ill-appearing, hypoglycemic symptoms, vomiting, decreased PO)<br/>
              <strong>Catheter UA with micro + mandatory culture</strong><br/>
              CBC with differential · <strong>Procalcitonin</strong> · Blood culture<br/>
              BMP/CMP (Chem8 if ill-appearing)<br/>
              <strong>CSF</strong> (gram stain, cell count, protein, glucose, culture, hold extra fluid) — per MD<br/>
              CXR if tachypnea, hypoxia, or respiratory symptoms<br/>
              Stool sample if diarrhea<br/>
              VBG/lactate POC if ill/toxic
            </div>
            <TeachBox id="urine" teaching={teaching}/>
            <TeachBox id="lp" teaching={teaching}/>
          </Card>

          <Card title="Key Thresholds" color={C.red}>
            <div style={{marginTop:8}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                <div style={{background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.red}}>Positive Inflammatory Markers</div>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:16,fontWeight:700,color:C.red,marginTop:4}}>ANC ≥4000</div>
                  <div style={{fontSize:11,color:C.muted}}>OR</div>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:16,fontWeight:700,color:C.red}}>PCT ≥0.5</div>
                </div>
                <div style={{background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"10px",textAlign:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>Negative Inflammatory Markers</div>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:16,fontWeight:700,color:C.greenMid,marginTop:4}}>ANC &lt;4000</div>
                  <div style={{fontSize:11,color:C.muted}}>AND</div>
                  <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:16,fontWeight:700,color:C.greenMid}}>PCT &lt;0.5</div>
                </div>
              </div>
              <div style={{fontSize:11,color:C.muted,marginTop:6,textAlign:"center"}}>UA positive = LE trace+, nitrites+, or &gt;5 WBC/hpf · Traumatic tap = ≥10,000 RBC/mm³ · CSF pleocytosis = ≥10 WBC</div>
            </div>
            <TeachBox id="markers" teaching={teaching}/>
          </Card>
        </Pad>
      )}

      {/* ── DECISIONS ── */}
      {tab==="decision"&&(
        <Pad>
          <Q text="Decision Tree" sub="Driven by appearance, inflammatory markers, CSF, and UA"/>

          <Card title="Toxic / Ill-Appearing" color={C.red}>
            <div style={{fontSize:13,lineHeight:1.7,marginTop:8}}>
              <strong>Aggressive fluid resuscitation</strong><br/>
              CBC, CMP, coags, VBG/lactate, blood culture, UA + urine micro/culture<br/>
              <strong>Lumbar puncture</strong><br/>
              <strong>IV ceftriaxone + vancomycin</strong><br/>
              <strong style={{color:C.red}}>→ Admit (consider PICU)</strong>
            </div>
          </Card>

          <Card title="Well-Appearing — Positive Inflammatory Markers" color={C.amberMid}>
            <div style={{fontSize:13,lineHeight:1.6,marginTop:8}}>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:C.red,fontWeight:600,marginBottom:8}}>ANC ≥4000 OR PCT ≥0.5 ng/mL</div>

              <div style={{fontSize:14,fontWeight:700,color:C.ink,marginBottom:6}}>→ Consider LP</div>

              <div style={{background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:700,color:C.red}}>CSF Pleocytosis (≥10 WBC) or + Gram Stain</div>
                <div style={{fontSize:12,marginTop:2}}>Ceftriaxone 100 mg/kg/day IV q12h + Vancomycin 20 mg/kg once<br/><strong>→ Admit</strong></div>
              </div>

              <div style={{background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>CSF Negative (whether UA+ or UA−)</div>
                <div style={{fontSize:12,marginTop:2}}>Ceftriaxone 50 mg/kg IV daily<br/><strong>→ Admit vs discharge with close follow-up</strong><br/><span style={{fontSize:11,color:C.muted}}>If UA+ and discharging: complete 9–13 days cefdinir 14 mg/kg daily</span></div>
              </div>

              <div style={{background:C.purpleBg,border:`1.5px solid ${C.purpleBorder}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.purple}}>CSF Not Obtained or Traumatic Tap (≥10K RBC)</div>
                <div style={{fontSize:12,marginTop:2}}>Ceftriaxone 50 mg/kg IV daily<br/><strong>→ Admit vs discharge with close follow-up</strong></div>
              </div>
            </div>
            <TeachBox id="csfInterp" teaching={teaching}/>
          </Card>

          <Card title="Well-Appearing — Negative Inflammatory Markers" color={C.greenMid}>
            <div style={{fontSize:13,lineHeight:1.6,marginTop:8}}>
              <div style={{fontFamily:"'IBM Plex Mono',monospace",fontSize:12,color:C.greenMid,fontWeight:600,marginBottom:8}}>ANC &lt;4000 AND PCT &lt;0.5 ng/mL</div>

              <div style={{display:"flex",gap:6}}>
                <div style={{flex:1,background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"10px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.amberMid}}>UA Positive</div>
                  <div style={{fontSize:11,marginTop:4}}>Start oral antibiotics<br/>(cephalexin or cefdinir)<br/><strong>→ Discharge</strong><br/>Follow-up 12–24h</div>
                </div>
                <div style={{flex:1,background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"10px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:C.greenMid}}>UA Negative</div>
                  <div style={{fontSize:11,marginTop:4}}>No antibiotics needed<br/>Observe closely at home<br/><strong>→ Discharge</strong><br/>Follow-up 24–36h</div>
                </div>
              </div>
              <div style={{fontSize:12,color:C.muted,marginTop:8}}>LP NOT necessary for this group — very low risk for bacterial meningitis (PECARN, Step-by-Step, PROS: no missed cases)</div>
            </div>
            <TeachBox id="markers" teaching={teaching}/>
          </Card>

          {/* ── FLOWCHART ── */}
          {(()=>{
            const rC="#b91c1c",rBg="#fef2f2",rBd="#fca5a5";
            const aC="#d97706",aBg="#fffbeb",aBd="#fcd34d";
            const gC="#16a34a",gBg="#f0fdf4",gBd="#86efac";
            const bC="#b45309",bBg="#fffbeb",bBd="#fcd34d";
            const blC="#1e40af",blBg="#eff6ff",blBd="#93c5fd";
            const pC="#6b21a8",pBg="#faf5ff",pBd="#c4b5fd";
            const mC="#6b7280";
            const Arrow=({x1,y1,x2,y2,color="#94a3b8"})=>(<g><line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={1.5}/><polygon points={`${x2},${y2} ${x2-3.5},${y2-6} ${x2+3.5},${y2-6}`} fill={color}/></g>);
            const Box=({x,y,w,h,fill,stroke,sw=1,radius=6,children})=>(<g><rect x={x} y={y} width={w} height={h} rx={radius} fill={fill} stroke={stroke} strokeWidth={sw}/>{children}</g>);
            const T=({x,y,size=9,weight=600,color="#1a1d21",anchor="middle",children})=>(<text x={x} y={y} textAnchor={anchor} fontSize={size} fontWeight={weight} fill={color} fontFamily="'IBM Plex Sans',sans-serif">{children}</text>);
            return(
              <div style={{marginTop:20}}>
                <div style={{fontSize:15,fontWeight:700,color:C.ink,marginBottom:4}}>Pathway Overview</div>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>Infant 29–60 days · Temp ≥38.0°C</div>
                <div style={{background:C.white,border:`1.5px solid ${C.rule}`,borderRadius:10,padding:6,overflow:"hidden"}}>
                  <svg viewBox="0 0 480 400" style={{width:"100%",display:"block"}}>
                    <rect width={480} height={400} fill="#fafaf8" rx={6}/>

                    <Box x={100} y={6} w={280} h={28} fill={bBg} stroke={bBd} sw={1.5} radius={14}>
                      <T x={240} y={18} size={9} weight={700} color={bC}>FEBRILE INFANT 29–60 DAYS</T>
                      <T x={240} y={28} size={6} color={mC}>CBG · UA cath · CBC · PCT · Blood cx · Consider LP</T>
                    </Box>
                    <Arrow x1={240} y1={34} x2={240} y2={48}/>

                    <g transform="translate(240,62)"><polygon points="0,-14 55,0 0,14 -55,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-2} size={7} weight={700}>Toxic/Ill?</T></g>

                    <line x1={295} y1={62} x2={420} y2={62} stroke="#94a3b8" strokeWidth={1}/>
                    <Arrow x1={420} y1={62} x2={420} y2={82} color={rC}/>
                    <Box x={370} y={82} w={100} h={32} fill={rBg} stroke={rBd} sw={2}>
                      <T x={420} y={93} size={7} weight={700} color={rC}>TOXIC/ILL</T>
                      <T x={420} y={103} size={6}>Ceftri + Vanco</T>
                      <T x={420} y={111} size={6} weight={700} color={rC}>→ ADMIT/PICU</T>
                    </Box>

                    <Arrow x1={240} y1={76} x2={240} y2={92}/>
                    <T x={240} y={88} size={6} color={gC} weight={600}>Well-appearing</T>

                    <g transform="translate(240,108)"><polygon points="0,-14 70,0 0,14 -70,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={-3} size={7} weight={700}>ANC ≥4000 or</T><T x={0} y={7} size={7} weight={700}>PCT ≥0.5?</T></g>

                    {/* Positive markers → left */}
                    <Arrow x1={170} y1={108} x2={100} y2={136} color={rC}/>
                    {/* Negative markers → right */}
                    <Arrow x1={310} y1={108} x2={380} y2={136} color={gC}/>

                    {/* POSITIVE MARKERS BRANCH */}
                    <Box x={30} y={136} w={140} h={22} fill={rBg} stroke={rBd} sw={1.5}><T x={100} y={145} size={8} weight={700} color={rC}>MARKERS POSITIVE</T><T x={100} y={154} size={6} color={mC}>Consider LP</T></Box>
                    <Arrow x1={100} y1={158} x2={100} y2={172}/>

                    <g transform="translate(100,186)"><polygon points="0,-14 45,0 0,14 -45,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>CSF Result?</T></g>

                    <Arrow x1={55} y1={186} x2={30} y2={210} color={rC}/>
                    <Arrow x1={100} y1={200} x2={100} y2={210} color={aC}/>
                    <Arrow x1={145} y1={186} x2={170} y2={210} color={pC}/>

                    <Box x={2} y={210} w={70} h={34} fill={rBg} stroke={rBd}><T x={37} y={221} size={6} weight={700} color={rC}>CSF ≥10 WBC</T><T x={37} y={231} size={6}>Ceftri+Vanco</T><T x={37} y={240} size={6} weight={700} color={rC}>→ ADMIT</T></Box>
                    <Box x={78} y={210} w={70} h={34} fill={aBg} stroke={aBd}><T x={113} y={221} size={6} weight={700} color={aC}>CSF NEG</T><T x={113} y={231} size={6}>Ceftri 50</T><T x={113} y={240} size={6} color={aC}>Admit/D/C</T></Box>
                    <Box x={154} y={210} w={70} h={34} fill={pBg} stroke={pBd}><T x={189} y={221} size={6} weight={700} color={pC}>NO CSF /</T><T x={189} y={231} size={6} color={pC}>TRAUMATIC</T><T x={189} y={240} size={6} color={aC}>Admit/D/C</T></Box>

                    {/* NEGATIVE MARKERS BRANCH */}
                    <Box x={310} y={136} w={140} h={22} fill={gBg} stroke={gBd} sw={1.5}><T x={380} y={145} size={8} weight={700} color={gC}>MARKERS NEGATIVE</T><T x={380} y={154} size={6} color={mC}>LP not needed</T></Box>
                    <Arrow x1={380} y1={158} x2={380} y2={174}/>

                    <g transform="translate(380,188)"><polygon points="0,-14 40,0 0,14 -40,0" fill="#f8fafc" stroke="#94a3b8" strokeWidth={1.2}/><T x={0} y={1} size={6} weight={700}>UA?</T></g>

                    <Arrow x1={345} y1={192} x2={325} y2={212} color={aC}/>
                    <Arrow x1={415} y1={192} x2={435} y2={212} color={gC}/>

                    <Box x={290} y={212} w={70} h={34} fill={aBg} stroke={aBd}><T x={325} y={223} size={6} weight={700} color={aC}>UA POS</T><T x={325} y={233} size={6}>Oral abx</T><T x={325} y={242} size={6} weight={700} color={gC}>→ D/C</T></Box>
                    <Box x={405} y={212} w={66} h={34} fill={gBg} stroke={gBd}><T x={438} y={223} size={6} weight={700} color={gC}>UA NEG</T><T x={438} y={233} size={6}>No abx</T><T x={438} y={242} size={6} weight={700} color={gC}>→ D/C</T></Box>

                    {/* Bottom summary */}
                    <Box x={30} y={264} w={420} h={22} fill={blBg} stroke={blBd} radius={8}>
                      <T x={240} y={273} size={7} weight={700} color={blC}>NEGATIVE MARKERS: ANC &lt;4000 AND PCT &lt;0.5 → NPV 99.6% FOR SBI</T>
                      <T x={240} y={283} size={6} color={mC}>PECARN validated · No LP needed · Safe discharge with close follow-up</T>
                    </Box>

                    {/* Follow-up box */}
                    <Box x={30} y={300} w={420} h={28} fill="#f1f5f9" stroke="#e2e8f0" radius={6}>
                      <T x={130} y={312} size={7} weight={700} color={rC}>ADMIT: abx within 60 min if toxic</T>
                      <T x={130} y={322} size={6} color={mC}>Positive markers + CSF+ → always admit</T>
                      <T x={370} y={312} size={7} weight={700} color={gC}>DISCHARGE: close f/u</T>
                      <T x={370} y={322} size={6} color={mC}>Neg markers: 24–36h · Pos markers: 12–24h</T>
                    </Box>
                  </svg>
                </div>
              </div>
            );
          })()}
        </Pad>
      )}

      {/* ── ANTIBIOTICS ── */}
      {tab==="meds"&&(
        <Pad>
          <Q text="Antibiotic Dosing" sub={doses?`Calculated for ${doses.w} kg`:"Enter weight for calculations"}/>
          {!doses&&(<Alert color={C.amberMid} border={C.amberBorder} bg={C.amberBg} icon="⚖️" title="Weight Required">Enter weight above.</Alert>)}

          <Card title="Suspected Meningitis or Toxic-Appearing" color={C.red}>
            <div style={{fontSize:12,color:C.muted,marginBottom:4}}>CSF ≥10 WBC or toxic appearance</div>
            <div style={{marginTop:4}}>
              <DoseRow label="Ceftriaxone (100 mg/kg/day) IV q12h" value={doses?`${Math.round(doses.ceftri100/2)} q12h`:"—"} unit={doses?`mg (${doses.ceftri100} mg/day)`:""}/>
              <DoseRow label="Vancomycin (20 mg/kg) IV ×1" value={doses?doses.vanco:"—"} unit={doses?"mg":""}/>
            </div>
            <TeachBox id="antibiotics" teaching={teaching}/>
          </Card>

          <Card title="Positive Markers — CSF Negative or Not Obtained" color={C.amberMid}>
            <div style={{marginTop:8}}>
              <DoseRow label="Ceftriaxone (50 mg/kg) IV daily" value={doses?doses.ceftri50:"—"} unit={doses?"mg":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:6}}>If UA positive and discharging: complete additional 9–13 days of:</div>
              <DoseRow label="Cefdinir (14 mg/kg) PO daily" value={doses?doses.cefdinir:"—"} unit={doses?"mg":""}/>
            </div>
          </Card>

          <Card title="Negative Markers — UA Positive" color={C.greenMid}>
            <div style={{marginTop:8}}>
              <DoseRow label="Cephalexin (50–100 mg/kg/day) PO QID" value={doses?`${doses.cephalexinLo}–${doses.cephalexinHi}`:"—"} unit={doses?"mg/day":""}/>
              <div style={{fontSize:12,color:C.muted,marginTop:4}}>OR</div>
              <DoseRow label="Cefdinir (14 mg/kg) PO daily" value={doses?doses.cefdinir:"—"} unit={doses?"mg":""}/>
            </div>
          </Card>

          <Card title="Negative Markers — UA Negative" color={C.greenMid} defaultOpen={false}>
            <Alert color={C.greenMid} border={C.greenBorder} bg={C.greenBg} icon="✓" title="No Antibiotics">
              Antibiotics discouraged. Observe closely at home. Follow-up 24–36 hours.
            </Alert>
          </Card>

          <Card title="Supportive Care" color={C.primary} defaultOpen={false}>
            <div style={{marginTop:8}}>
              <DoseRow label="NS bolus (20 mL/kg)" value={doses?doses.bolus:"—"} unit={doses?"mL":""}/>
              <DoseRow label="D10W (5 mL/kg) for CBG <50" value={doses?doses.d10:"—"} unit={doses?"mL":""}/>
              <DoseRow label="Acetaminophen PO (12.5 mg/kg)" value={doses?doses.apapPO:"—"} unit={doses?"mg":""}/>
              <DoseRow label="Acetaminophen PR (15–30 mg/kg)" value={doses?`${doses.apapPR_lo}–${doses.apapPR_hi}`:"—"} unit={doses?"mg":""}/>
            </div>
          </Card>
        </Pad>
      )}

      {/* ── DISPO & REFS ── */}
      {tab==="special"&&(
        <Pad>
          <Q text="Disposition & References"/>

          <Card title="Disposition Summary" color={C.primary}>
            <div style={{marginTop:8}}>
              <div style={{background:C.redBg,border:`1.5px solid ${C.redBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:700,color:C.red}}>ADMIT</div>
                <div style={{fontSize:12,marginTop:2}}>Toxic/ill-appearing (consider PICU)<br/>Positive markers + CSF pleocytosis or + gram stain</div>
              </div>
              <div style={{background:C.amberBg,border:`1.5px solid ${C.amberBorder}`,borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:700,color:C.amberMid}}>ADMIT vs DISCHARGE (clinical judgment)</div>
                <div style={{fontSize:12,marginTop:2}}>Positive markers + traumatic tap or CSF not obtained<br/>Positive markers + negative CSF (± UA positive)<br/>If discharging: close follow-up within 12–24 hours</div>
              </div>
              <div style={{background:C.greenBg,border:`1.5px solid ${C.greenBorder}`,borderRadius:8,padding:"10px 12px"}}>
                <div style={{fontSize:13,fontWeight:700,color:C.greenMid}}>DISCHARGE</div>
                <div style={{fontSize:12,marginTop:2}}>Negative inflammatory markers (regardless of UA result)<br/>Oral abx if UA positive · No abx if UA negative<br/>Follow-up 24–36 hours</div>
              </div>
            </div>
            <TeachBox id="disposition" teaching={teaching}/>
          </Card>

          <Card title="References" color={C.muted} defaultOpen={false}>
            <div style={{fontSize:11,lineHeight:1.7,marginTop:8,color:C.muted}}>
              1. Teran CG et al. Clinical accuracy of non-contact infrared skin thermometer in pediatric practice. <em>Child Care Health Dev</em> 2012; 38(4):471–476.<br/>
              2. Mintegi S et al. Invasive bacterial infections in young afebrile infants with a history of fever. <em>Arch Dis Child</em> 2018; 103(7):665–669.<br/>
              3. Tosif S et al. Contamination rates of different urine collection methods. <em>J Paediatr Child Health</em> 2012; 48(8):659–664.<br/>
              4. Tzimenatos L et al. Accuracy of the urinalysis for UTI in febrile infants 60 days and younger. <em>Pediatrics</em> 2018; 141(2):e20173068.<br/>
              5. Kuppermann N et al. A clinical prediction rule to identify febrile infants 60 days and younger at low risk for SBI. <em>JAMA Pediatr</em> 2019; 173(4):342–351.<br/>
              6. Wang ME et al. Testing for meningitis in febrile well-appearing young infants with a positive urinalysis. <em>Pediatrics</em> 2019; 144(3):e20183979.<br/>
              7. Pantell RH et al. AAP Clinical Practice Guideline: Evaluation and management of well-appearing febrile infants 8 to 60 days old. <em>Pediatrics</em> 2021; 148(2):e2021052228.
            </div>
          </Card>
        </Pad>
      )}

      <div style={{padding:"12px 20px",fontSize:10,color:C.muted,lineHeight:1.5,borderTop:`1px solid ${C.rule}`}}>
        <strong style={{color:C.red}}>DISCLAIMER:</strong> This tool supports but does not replace clinical judgment. Verify all orders against institutional protocols.
        <br/>Doernbecher Children's Hospital · PED · Fever 29–60 Days Clinical Pathway · March 2022
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
